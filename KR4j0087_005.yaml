body:
  text: 詞律巻五宜興萬樹撰賀聖朝四十七字杜安世牡丹盛折春將暮羣芳羞妒幾時流落在人間半開仙露馨香艷冶吟看醉賞歎誰能留住莫辭持燭夜深深怨等閒風雨結語前四後五又一體四十七字杜安世東君造物無凝滯芳容相替杏花桃萼一時開就中明媚綠叢金朶枝長葉細稱花王相待萬般堪愛暫時見了斷腸無計後結語用四字三句異又一體四十八字葉清臣滿斟綠醑留君住莫匆匆歸去三分春色二分愁悶一分風雨花開花謝花無語且髙歌休訴知他來嵗牡丹時候相逢何處後起或作花開花謝都來幾日或作都來幾許皆可又一本作花無語與前段相同故亦收存以備一體又一體四十九字趙師使千林脫落羣芳息有一枝先白孤標疎影壓花叢更清香堪惜吟情無盡賞音未巳早紛紛籍籍想貪結子去調羮任呌雲横笛孤標想貪二句用七字并換頭與前異附又賀聖朝影調原名太平時故雖三字相同不此後又一體六十一字歐陽炯憶昔花間相見後只憑纎手暗抛紅豆人前不解巧傳心事别來依舊辜負春晝碧羅衣上蹙金繡覩對對鴛鴦空裛泪痕透想韶顔非久終是爲伊只恁偷瘦舊字是叶韻舊譜作八字句失註矣觀别作云玉指偷撚雙鳯金線可見覩對對鴛鴦兩句十字正與别作誰料得兩情何日教繾綣同嘯餘落一對字各譜因之遂少了一字但問覩對二字豈成文理乎只憑纎手别作用紅袖半遮想所不拘負恁去聲别作用鳯暮亦去聲不可用平也按此調一作賀聖朝而汲古刻花間集以此調作賀明朝似可另列一調本譜不欲尚奇故附此雙鸂鶒四十八字朱敦儒拂破秋江烟碧一對雙飛鸂鶒應是逺來無力稍下相偎沙磧小管誰吹横笛驚起不知消息悔不當時描得如今何處尋覓前後各四句皆六字相同只後結平仄與前結異鸂鶒圖譜作鷄鵡誤錦堂春四十八字又名烏夜啼趙令畤樓上縈簾弱絮牆頭礙月低花年年春事闗心事腸斷欲棲鴉舞鏡鸞衾翠減啼珠鳳蠟紅斜重門不鎖相思夢隨意遶天涯前後同坡公前第三句作若見故人須細問後第三句作更有鱸魚堪切鱠與此平仄異因字數同不另錄首按歐公有聖無憂一詞四十七字與錦堂春同只句少一字初謂是兩體然觀李後主烏夜啼一首首句亦五字正與聖無憂同蓋錦堂春原别名烏夜啼也是則錦堂春本有五字起句之格而聖無憂之五字起者斷即是錦堂春耳本譜務覈實歸併不欲侈異誇多故不收聖無憂體而並載歐李二篇于後以資考証識者鑒諸沈選明詞有用仄韻者今查宋元人無此體此聖無憂險十年一别須㬰人生聚散歐陽修相見路風波長如此且歡娛紅好酒能消光景春風不染髭鬚爲公一醉花前倒袖莫來扶昨烏夜啼雨簾幃颯颯秋聲燭殘漏滴李後主起坐夜風兼頻欹枕不能平此世事謾隨流水算來一夢浮生醉鄉路穩宜頻到外不堪行此二詞脗合足見聖無憂之必爲烏夜啼而烏夜啼即錦堂春又足見聖無憂之必爲錦堂春矣或曰如是則何不以四十七字者列之于前余曰因錦堂春之名最著作者頗多且後所收長調皆係錦堂春不便以聖無憂爲冠故變例載此至于烏夜啼不以立題說見相見懽調下兹不贅云又一體五十九字程珌最是元來苦無風雨只恁匆匆歸去看遊絲都不恨恨秦淮新漲向人東注醉裏仙人惜春曾賦却不解畱春且住問何人畱得住怕小山更有碧蕪春句前後同只後段第二句七字留得住之住字不必叶韻此調與前調逕庭錦堂春慢九十九字葛立方氣應三陽氛澄六幕翔烏初上雲端問朝來何事喜動門闌田父占來好歲星家說道宜官擬更憑髙望逺春在烟波春在晴巒歌管雕堂宴喜任重簾不捲交䕶春寒况金釵整整玉樹團團栢葉輕浮重醑梅枝巧綴新幡共祝年年如願壽過松椿壽過彭􅔶問朝來以下與後段况金釵以下同田父二句各六字相對正與栢葉二句合汲古刻歸愚詞落一家字遂使文理大謬讀者勿誤認也又一體一百一字司馬光紅日遲遲虚廊轉影槐隂迤邐西斜彩筆工夫難狀晚意烟霞蝶尚不知春去漫遶幽砌尋花奈猛風過後縱有殘紅飛向誰家始知青髩無價欲飄零官路荏苒年華今日笙歌叢裏特地咨嗟席上青衫溼透算感舊何止琵琶怎不教人見老多少離愁散在天涯席上二句應同前蝶尚二句而算感舊多了一字奈猛風句應同後怎不句而少了一字恐有誤處若于漫遶下増一着字奈字上増一爭字則爲完璧矣然相傳巳久不敢妄註也彩筆十字上四下六今日十字上六下四總是語氣一貫分處不拘耳學者若賦此調不如用前體穩當人月圓四十八字又名青衫溼吳激南朝千古傷心事還唱後庭花舊時王謝堂前燕子飛向誰家恍然一夢仙肌勝雪宫鬂堆鴉江州司馬青衫泪溼同是天涯又一體四十八字楊旡咎風和日薄餘烟嫩側側透鮫鮹相逢且喜人圓玳席月滿丹霄爛遊勝賞髙低燈火鼎沸笙簫一年三百六十日願長似今宵未句與前異又一體四十八字楊旡咎月華燈影光相射還是元宵也綺羅如畫笙歌逓響無限風雅閙蛾斜揷輕衫乍試閒趂尖耍百年三萬六千夜願長如今夜用仄聲首句即用韻起六千夜之夜可不用韻喜團圓四十八字晏幾道危樓靜鎖牕中迢岫門外垂楊珠簾不禁春風度解偷送餘香眠思夢想不如雙燕得到蘭房别來只是憑髙泪眼感舊離腸此調惟此詞後段同人月圓鬲溪梅令四十八字姜䕫好花不與殢香人浪粼粼又恐春風歸去綠成隂玉鈿何處尋木蘭雙槳夢中雲水横陳謾向孤山山下覓盈盈翠禽啼一春前後段同此白石自度腔也朝中措四十八字歐陽修平山闌檻倚晴空山色有無中手種堂前垂栁别來幾度春風文章太守揮毫萬字一飲千鍾行樂直須年少尊前看取衰翁前後結二句同文按垂字應作楊字故坡公西江月云欲弔章太守仍歌楊栁春風又一體四十八字趙長卿荷錢浮翠㸃前溪梅雨日長時恰是清和天氣雕鞍又作分攜别來幾日愁心折針線小蠻衣羞對緑隂庭院銜泥燕子于飛後起二句七字五字與前詞異雙頭蓮令四十八字趙師使太平和氣兆嘉祥草木總成雙紅苞翠蓋出横塘兩兩鬭芬芳幹揺碧玉並青房仙髻擁新妝連枝不解引鸞皇留取映鴛鴦前後四段一七一五字俱各整齊想題名因此也雙頭蓮一百字陸游華鬢星星驚壯志成虚此身如寄蕭條病驥向暗裏消盡當年豪氣夢斷故國山川隔重重烟水身萬里舊社凋零青門俊遊誰記盡道錦里繁華歎官閒晝永柴荆添睡清愁自醉念此際付與何人心事縱有楚柁吳檣知何時東逝空悵望鱠美菰香秋風又起驚壯志以下九字上五下四陸又别作堪歎處青驄正揺金轡上三下六不拘身萬里叶韻空悵望不叶其别作前後俱用韻學者亦皆叶之可也又一體一百三字周邦彦一抹殘霞幾行新雁天染斷紅雲迷陣影隱約望中㸃破晚空澄碧助秋色門掩西風橋横斜照青翼未來濃塵自起咫尺鳯幃合有人相識歎乖隔知甚時恣與同攜歡適度曲傳觴並韀飛轡綺陌畫堂連夕樓頭千里帳底三更盡堪泪滴怎生向總無聊但只聽消息前段多不叶韻語未審有訛與否惜方千里無和詞莫可訂正也海棠春四十八字秦觀流鶯牕外啼聲巧睡未足把人驚覺翠被曉寒輕寶篆沈烟裊宿酲未解宫娥報道别院笙歌㑹早試問海棠花昨夜開多少前後段同有于解字道字斷句讀者差慶春時四十八字晏幾道倚天樓殿昇平風月彩仗春移鸞絲鳯竹長生調裏迎得翠輿歸雕鞍遊罷何處還有心期濃熏翠被深停幽燭人約月西時濃熏下與前同武陵春四十九字毛滂風過冰簷環珮響宿霧在華茵賸落瑶花襯月明嫌怕有纎塵鳯口銜燈金炫轉人醉覺寒輕但得清光解照人不負五更春武陵或作武林誤前後同又一體四十九字李清照風住塵香春巳盡日曉倦梳頭物是人非事事休欲語淚先流聞說雙溪春尚好也擬泛輕舟只恐雙溪舴艋舟載不動許多愁詞統詞滙俱註載字是襯悞也詞之前後結多寡一字者頗多何以見其爲襯乎查坦庵作尾句亦云流不盡許多愁可証沈選有首句三句後第三句平仄全反者尾云忽然又起新愁者愁從酒畔生者竒絶洞天春四十八字歐陽修鶯啼緑樹聲早檻外殘紅未掃露㸃珍珠遍芳草正簾幃清曉鞦韆宅院悄悄又是清明過了燕蝶輕狂栁絲撩亂春心多少後起三句同前圖譜謂首句可仄仄平平仄仄遍芳草可平仄仄何據耶秋蕋香四十八字晏殊梅蕋雪殘香瘦羅幙輕寒微透多情只似春楊栁占斷可憐時候蕭娘勸我杯中酒翻紅袖金烏玉兎長飛走争得朱顔依舊多情下與後同桃源憶故人四十八字人影又名虞美王之道逢人借問春歸處遥指蕪城煙樹滴盡栁梢殘雨月闖西南户遊絲不解畱伊住漫惹閒愁無數燕子爲誰來去似說江南路前後同今桃源汲古放翁詞作桃園誤此調又名虞美人影只收本題不列虞美人之後與賀聖朝同三字令四十八字歐陽炯春欲盡日遲遲牡丹時羅幌巻翠簾垂彩箋書紅粉泪兩心知人不在燕空歸負佳期香燼落枕函欹月分明花淡薄惹相思每句三字前後段同幌字即後段燼字亦即後詞滿字我字圖譜謂可平何據又一體五十四字向子諲春盡日雨餘時紅䔩䔩綠漪漪花滿地水平池烟光裏雲影上畫船移文鴛並白鷗飛歌韻響酒行遲將我意入新詩春欲去畱且住莫教歸比歐詞前後各多第三句而裏字去字用仄比前用書字明字平聲亦稍異眼兒媚四十八字又名秋波媚王雱楊栁絲絲弄輕柔烟縷織成愁海棠未雨梨花先雪一半春休而今徃事難重省歸夢遶秦樓相思只在丁香枝上豆蔲梢頭起四字平仄平平惟此詞及阮閎樓上黄昬杏花寒耳歴查宋人樂府皆用霏霏疎雨轉征鴻句法只此註明不復另録歸書舟歸愚詞俱以朝中措誤作眼兒媚毛子晉䟦愚云眼兒媚不合譜未敢妄爲更定豈朝中措亦不辨耶至圖譜失收此調更爲疎畧撼庭秋四十八字晏殊别來音信千里恨此情難寄碧紗秋月梧桐夜雨幾囘無寐樓髙目斷天涯雲黯只堪顦顇念蘭堂紅燭心長焰短向人垂泪與撼庭竹無涉前後結二句同沙塞子四十八字葛立方天生玉骨冰肌瘦損也知他爲誰寒底傲霜凌雪不教春知髙樓横笛試輕吹要一片花飛酒巵拚沈醉㡌簷斜揷折取南枝論後段􅍆沈醉及後趙詞則寒㡳句尚該一字然不敢增入姑列如右又一體四十九字趙彦端春水緑波南浦漸理棹行人欲去黯消魂栁際輕烟花梢微雨長亭放􅊦無計住但芳草迷人去路忍囘頭斷雲殘日長安何處此用仄韻與前詞異黯消䰟三字與後忍囘頭同而斷雲殘日比前段栁際輕烟異想亦不拘又一體五十字周紫芝玉溪秋月浸寒波忍持酒重聽鸝歌不堪對緑隂飛閣月下羞蛾夜深驚鵲轉南柯慘别意無奈愁何他年事不須重問轉更愁多前後段同對此詞完整又有兩闋証可從品令四十九字顏博文夜蕭索側耳聽清海樓頭吹角停歸棹不覺重門閉恨暮潮落偷想紅啼緑怨道我真箇情薄紗牕外厭厭新月上應也睡不着恨字上下必有落字又一體四十九字石孝友困無力幾度偎人翠顰紅溼低低問幾時麽道不遠三五日你也自家寧耐我也自家將息驀然地煩惱一箇病教一箇怎知得首句下與前異後段同或謂驀然地句應于惱字分句然觀前後詞則皆上三下五余謂此兩相慰勉之語若煩惱出一箇病來則那一箇知了便難當矣作煩惱一箇病五字正合又一體五十一字秦觀幸自得一分索彊教人難喫好好地惡了十來日恰而今較些不須管啜持教笑又也何須肐織衠倚頼臉兒得人惜放軟頑道不得第二三句似石詞惡了比前多二字較全衠音諄西廂一團衠是嬌又一體五十二字秦觀棹又􅋯天然箇品格于中壓一簾兒下時把鞵兒踢語低低笑咭咭每毎秦樓相見見了無限憐惜人前彊不欲相沾溼把不定臉兒赤此詞五十二字比前較全兩結各六字應是正格也前調恐俱有闕誤未可從稼軒作正與此同只踢溼二字不用韻耳兹不錄而按此調多作俳詞故爲彼時歌伶語氣多用入聲肐織字與棹又􅋯及壓一等語未解且亦恐傳冩有訛也又一體五十五字周邦彦夜闌人靜月痕寄梅梢疎影簾外曲角欄杆近舊攜手處花霧寒成陣應是不禁愁與恨縱相逢難問黛眉曾把春衫印後期無定腸斷香消盡此與前原各自一體觀方千里和詞平仄處無一字不同初欲作旁註而令人握筆不敢下古人詞律如此謹嚴可亂塡乎又一體六十四字吕渭老霜蓬零亂笑緑髩光隂晚紫朱時節小樓長醉一川平逺休說龍山佳㑹此情不淺黄花香滿記白苧吳歌軟如今却向亂山叢裏一枝重看對着西風搔首爲誰腸斷此又另體前後段同又一體六十五字黄庭堅鳯舞團團餅恨分破教孤另金渠體淨隻輪慢碾玉塵光瑩湯響松風早減二分酒病味濃香永醉鄉路成佳境恰如燈下故人萬里歸來對影口不能言心下快活自省首句五字異湯響下口不下各十字上四下六前吕詞上六下四此十字總是一氣貫下斷句不拘也或日金渠三句恰如三句各四字然恰如以下讀作兩六字亦可蓋山谷又一詞千金渠三句用裁成桃李未開便解銀章歸早前段亦作六字兩句耳圖譜以尾句六字上五字平仄俱可相反竒陽臺夢四十九字唐莊宗薄羅衫子金泥縫困纎腰怯銖衣重笑迎移步小蘭叢嚲金翹玉鳯嬌多情脉脉羞把同心撚弄楚天雲雨却相和又入陽臺夢取末三字爲調名兩結七字五字兩句平仄雖同而前尾嚲字領句後尾又入與陽臺各分句法不同圖譜謂情字可仄何也極相思四十九字吕渭老西園鬭草歸遲隔葉囀黄鸝闌干醉倚秋千背立數遍佳期寒食清明都過了趂如今芍藥薔薇衩衣吟露歸舟纜月方解開眉末三句前後同月宫春四十九字毛文錫水晶宫裏桂花開神仙探幾迴紅芳金蕋繡重臺低傾瑪瑙杯玉兎銀蟾争守䕶姮娥姹女戱相偎遙聽鈞天九奏玉皇親看來前段同阮郎歸此體宋人無作者鳯孤飛四十九字晏幾道一曲畫樓鐘動宛轉歌聲緩綺席飛塵座滿更小待金蕉㬉細雨輕寒今夜短依前是粉牆别館端的懽期應未晚奈歸雲難管惟有此詞外無他証栁梢靑四十九字秦觀岸草平沙吳王故苑栁裊烟斜雨後寒輕風前香細春在梨花行人一棹天涯酒醒處殘陽亂鴉門外秋千牆頭紅粉深院誰家首句有用仄不起韻者不另録又一體四十九字張元幹海山浮碧細風絲雨新愁如織慵試春衫不禁宿酒天涯寒食歸期莫數芳辰誤幾度囘廊夜色入戸飛花隔簾雙燕有誰知得此用仄韻首句有用平聲不起韻者次句有仄仄平平者愁字涯字有用仄聲者後起有叶仄韻者如家山辜負猿鶴是也字句相同不能備録大約此調平仄二體兹兩詞可爲凖繩矣按此調後第二句殘陽亂鴉四字平平仄平其仄字宜用去聲乃爲起調觀古名篇無不如是前詞亂字可見即仄叶者亦于此字用去此詞夜字可見此等須再四吟玩而後知之乃填詞家抉髓處不可不曉也如沈選釋涵初作此四字云亂㸃蒼茫豈不貽笑于世太常引四十九字辛棄疾仙機似欲織纎羅髣髴度金梭無奈玉纎何却彈作清商恨多朱簾影裏如花半面絶勝隔簾歌世路苦風波日痛飲公無渡河恨渡二字必用去聲與栁梢青同此乃音理非穿鑿也又一體五十字髙觀國玉肌輕襯碧霞衣似争駕翠鸞飛羞問武陵溪笑女伴東風醉時不飄紅雨不貪青子冷淡却相宜春晩湧金池問一片將愁寄誰第二句多一字與前異稼軒亦有此體歸去來四十九字栁永初過元宵三五慵困春情緒燈月闌珊嬉游處游人盡厭歡聚全仗如花女持盃謝酒朋詩侣餘酲更不禁香醑歌筵舞且歸去厭且二字仄聲兩結平仄正同圖譜前作六字後作兩三字而于且字註可平何據乎河瀆神四十九字孫光憲江上草芊芊春晩湘妃廟前一方卵色楚南天數行斜雁聨翩獨倚朱闌情不極魂斷終朝相憶兩槳不知消息逺汀時起鸂鶒此調多用以詠鬼神祠廟又一體四十九字張泌古樹噪寒鴉滿庭楓葉蘆花晝燈當午膈輕紗畫閣珠簾影斜門外徃來祈賽客翩翩帆落天涯迴首隔江烟火渡頭三兩人家後段不另換韻迴首句不叶與前異燕歸梁四十九字杜安世風擺紅縚捲畫簾寶鑑慵拈日高梳洗幾時忺金盆水弄纎纎髻雲鬆軃衣斜褪和嬌嬾瘦巖巖離愁更宿酲兼空贏得病厭厭離愁二句各家俱合作七字更字下恐落一字然不敢増盆嬌贏可用仄聲大晏此三字句多用仄平仄又一體五十字栁永纎錦裁篇寫意深字值千金一囘披翫一愁吟腸成結淚盈襟幽歡巳散前期逺無聊頼是而今密憑歸燕寄芳音恐冷落舊時心密憑句七字是正體結按此調所用三字語俱兩句者各篇明白可據况處一七兩三前後正同圖譜以前爲兩句後則合六字爲一句試問恐冷落舊時心如何連法又一體五十字石孝友樓外春風桃李隂記一笑千金翠眉山歛眼波侵情滴滴怨深深當初見了而今别後算此恨難禁與其向後兩闗心又何似而今第二句五字異後段更異止按此調尾句凡作家無不用六字者此又何似句五字雖列此五十字一體但恐落一字不必從也又一體五十一字史達祖獨臥秋牕桂未香怕雨㸃飄涼玉人只在楚雲傍也着淚過昬黄西風今夜梧桐冷斷無夢到鴛鴦秋鉦二十五聲長請各自奈思量請各自兩句三字是正體又一體五十一字謝逸六曲闌干翠幙垂香燼冷金㹸日髙花外囀黄鸝春睡覺酒醒時草青南浦雲横西塞錦字杳無期東風只送栁棉飛全不管寄相思前史詞後起一七兩三與杜作同此詞後起兩四一五與石作同史詞怕雨㸃飄涼是怕字領句此則香燼畧斷可以不拘但用史詞句法則兩字可用平聲也又一體五十二字栁永輕躡羅鞋掩絳綃傳音耗苦相招語聲猶顫不成嬌乍得見兩䰟消怱怱草草難畱戀還歸去又無聊若諧雨夕與雲朝得似個有囂嚻首句之下即用三字兩句與前各體異苦字或作若恐誤醉鄉春四十九字秦觀喚起一聲人悄衾冷夢寒牕曉瘴雨過海棠開春色又添多少社甕釀成微笑半缺椰瓢共舀覺顚倒急投牀醉鄉廣大人間小後尾比前多一字舀音咬倒字偶合圖譜註叶差越江吟四十九字蘇易簡非烟非霧瑶池宴片片碧桃冷落黄金殿蝦鬚半捲天香散青雲和孤竹清婉入霄漢紅顔醉態爛熳金輿轉霓旌影斷簫聲逺此調無可查對句法叶韻亦未必如此平仄亦不敢註姑存關疑應天長四十九字歐陽修一彎初月臨鸞鏡雲鬢鳯釵慵不整珠簾静重樓逈惆悵落花風不定緑烟低栁徑何處轆轤金井昨夜更闌酒醒春愁勝却病又一體四十九字顧敻瑟瑟羅裙金線縷輕透鵞黄香面袴垂交帶盤鸚鵡裊裊翠翹移玉步背人匀檀炷慢轉嬌波偷覷歛黛春情暗許倚屏慵不語首句用仄仄平平平仄仄三句不叶韻從起句檀字用平與前異又一體五十字韋莊綠槐隂裏黄鸝語深院無人春晝午畫簾垂金鳯舞寂寞繡屏香一炷碧天雲無定處空有夢魂來去夜夜緑牕風雨斷腸君信否首句平仄與歐詞同畫簾垂用平後起用三字兩句與前異又一體五十字牛嶠玉樓春望晴烟滅舞衫斜捲金條脫黄鸝嬌囀聲初歇杏花飄盡龍山雪鳯釵低赴節筵上王孫愁絶鴛鴦對銜羅結兩情深夜月起四句皆七字皆用韻平仄亦皆同又後起用五字與前異又一體五十字毛文錫平江波煖鴛鴦語兩兩釣船歸極浦蘆洲一夜風和雨飛起淺沙翹雪鷺漁燈明逺渚蘭棹今宵何處羅袂從風輕舉愁殺採蓮女前段四句雖亦皆七字而第二第四句平仄與前異尾句亦稍異又一體九十四字葉夢得松陵秋巳老正栁岸田家酒醅初熟鱸鱠蓴羮萬里水天相續扁舟波浩𣺌寄一葉暮濤呑沃青蒻笠西塞山前自翻新曲來往未應足便細雨斜風有誰拘束陶寫中年何待更須絲竹䲭彝千古意算入手比來尤速最好是千㸃雲峰半篙澄緑耆卿此體于醅字誰字篙字俱用仄聲不拘正栁岸以下與後便細雨以下同圖譜註首句松陵秋已四字可作仄仄仄平未知何據𣺌字意字栁俱叶韻想可不拘又一體九十八字周邦彦條風布煖霏霧弄晴池塘遍滿春色正是夜堂無月沈沈暗寒食梁間燕前社客似笑我閉門愁寂亂花過隔院芸香滿地狼籍長記那囘時邂逅相逢郊外駐油壁又見漢宫傳燭飛烟五侯宅青青草迷路陌彊載酒細尋前跡市橋逺栁下人家猶自相識此九十八字乃一定之格只内數字平仄可換耳竹山詞本和周韻而正是句刻作轉翠籠池閣又見句刻作漫有戲龍盤乃各落一字遂使人疑有九十六字一體不特詞調傳訛而文理亦失錯矣余嘗謂千里和清真四聲一字不改觀竹山亦一字不改益知用字自有定格不如今人髙見隨意可填也亂花過過字各家俱用仄蔣集作似瓊花花字亦訛恐是苑字夢窗甲槁于梁問二句作芙蓉詞賦客亦是蓉字下落一字非有九十七字一體也或曰前葉詞此句云扁舟波浩𣺌亦用五字或夢窗同之耳余曰葉用栁體是五字其後段䲭彝千古意亦五字夢窗用周體是六字其後段凌波恨簾户寂亦六字兩體前後各自相同不可亂也伯可于正是二句又見二句作上四下七不拘此十一字語氣總一貫耳圖譜以此收康周作兩體不必也弄字宜用去聲譜圖云可平暗寒食五候宅宜仄平仄方康呉蔣皆用譜圖云可平仄仄前社客迷路陌宜平去仄方康吳蔣皆同譜圖云可仄平仄似笑我彊載酒宜仄去上方康吳蔣皆同圖譜云可平平仄後起康作楚岫在何處正與前葉詞同譜圖云在字可平駐油壁宜去平仄方康吳蔣皆同譜圖云可平平仄亂花過市橋逺宜仄平仄方康吳蔣皆同譜圖云可平平平俱不顧腔調而信意亂註真爲怪事至于閔字細字方用易漸康用頓夜吳用醉墮蔣用晝墮俱是去聲槩曰可平必欲將此調註壊何歟隔字栁字亦不可平憶漢月五十字又名望漢月歐陽修紅艷幾枝輕裊早被東風開了倚烟啼露爲誰嬌故惹蝶憐蜂惱多情遊賞處留戀向緑叢千繞酒䦨歡罷不成歸腸斷月斜人老同叔作名望漢月查與此詞同只倚烟句用謝娘春晩先多愁先字恐誤酒闌句用年年歲歲好時節節可作平觀後栁詞則知亦可用仄但前結云更撩亂絮如雪三字兩句與此不同後結云怎奈有人離别則可作三句兩句亦可作六字也又一體五十字栁永明月明月明月何事乍圓還缺恰如年少洞房人歡㑹依前離别小樓凭檻處正是去年時節千里清光又依舊奈永夜厭厭人絶起六字乃巧句非有此定格也蓋月字入聲可借用耳前段與前詞同後段畧異少年遊五十字毛滂遙山雪氣入疎簾羅幕曉寒添愛日騰波朝霞入户一線過冰簷緑尊向嫩蒲桃映滿酌破冬嚴庭下早梅已含芳意春近瘦枝南後起句用仄餘同子野作于愛日句用銀瓶素綆庭下句用韶華長在與此稍異然各家多從毛詞體又一體五十字向子諲去年同醉酴醿下儘筆賦新詞今年君去酴醿欲破誰與醉爲期舊曲重歌傾别酒風露泣花枝章水能長湘水逺流不盡兩相思首句仄不起韻後起句平仄相反第三句七字不叶韻結句六字皆與前詞異又一體五十字梅堯臣欄干十二獨憑春晴碧逺連雲千里萬里二月三月行色苦愁人謝家池上江淹浦吟魄與離䰟那堪疎雨滴黄昬更特地憶王孫後第三句七字叶韻異千里里字以上作平二月月字以入作平又一體五十字張耒含羞倚醉不成歌纎手掩香羅偎花映燭偷傳深意酒思入横波看朱成碧心還亂脉脉歛雙蛾相見時稀隔别多又春盡奈愁何後第三句七字叶韻而平仄與前詞各異又一體五十字柳永淡黄衫子鬱金裙長憶個人人文譚閒雅歌喉清麗舉措好精神當初爲倚深深寵無箇事愛嬌瞋想得别來舊家模様只恁翠蛾顰後段次句用六字又一體五十一字栁永一生贏得淒凉追往事暗心傷好天良夜深屏香被爭忍便相忘王孫動是經年去貪迷戀有何長萬種千般把伊情分顛倒盡猜量首句六字前後第二句皆六字又一體五十一字晏幾道西樓别後風髙露冷無奈月分明飛鴻影裏搗衣砧外總是玉關情王孫此際山重水逺何處賦西征金閨魂夢枉叮嚀尋盡短長亭首起兩四字至第三句方起韻後起亦同尾用一七一五俱叶韻又一體五十一字姜䕫雙螺未合雙蛾先歛家在碧雲西别母情懷隨郎滋味桃葉渡江時扁舟載了匆匆去今夜泊前溪楊栁津頭梨花牆外心事兩人知前起兩四字後起七字又一體五十一字蘇軾去年相送餘杭門外飛雪似楊花今年春盡楊花似雪猶不見還家對酒捲簾邀明月風露透牕紗恰似嫦娥憐雙燕分明照畫梁斜後段七字起尾又用一七一六或對酒恰似兩句有拗字不必從雙字作隻又一體五十二字髙觀國春風吹碧春雲映緑曉夢入芳闉軟襯飛花逺連流水一望隔香塵萋萋多少江南舊恨翻憶翠羅裙冷落閒門淒迷古道烟雨正愁人四段俱用兩四一五字又一體四十九字晁補之當年攜手是處成雙無人不羨自問阻五年也一夢擁嬌嬌粉面栁眉輕掃杏腮微拂依前雙靨甚睡裏起來尋覔却眼前不見本譜皆以字數次序前後但此詞全與本調不似未審果是少年遊否今姑依原集題名載此故另列于後城頭月五十字李公昂工夫作用中霄晝㸃化無中有真氣常存童顔不改底用呵磨皺一身二五之精媾積得嬰兒就試問霞翁三田熟未還解飛冲否前後段同此調與少年遊字句同但係仄韻不敢擅以爲一調故另收之詞律巻五
