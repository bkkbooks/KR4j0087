body:
  text: 詞律卷十宜興萬樹撰錦纒道六十六字宋祁燕子呢喃景色乍長春晝覩園林萬花如繡海棠經雨胭脂透栁展宮眉翠拂行人首向郊原踏青恣歌攜手醉醺醺尚尋芳酒問牧童遙指孤村道杏花深處那裏人家有沈天羽云諸本作尋芳酒問牧童説不去詞譜欲羡問字又不必故定作尚尋芳問酒余謂詞有定律豈得以羡字解之乂豈得以不必二字委之俱誤矣愚意醉醺醺句同前覩園林句不應多一字問牧童有何説不去小杜詩借問酒家何處有牧童遙指杏花村原是問牧童故牧童答應也況此處句法原與前不同何故要去問字或云牧童句該于道字讀斷蓋此句雖不叶韻而與前海棠句聲響相合觀下二句一四一五可見明吳純叔于道字用平聲誤矣或前海棠句亦是八字而上落一字也此則未必玉梅令六十六字薑夔疏疏雪片散入溪南苑春寒鎖舊家亭館有玉梅幾樹背立怨東風髙花未吐暗香巳逺公來領客梅花能勸花長好願公更健便揉春為酒剪雪作新詩拚一日繞花千轉髙字恐贅蓋自春寒以下前後同也更字恐是長字謝池春六十六字又名賣花聲陸遊賀監湖邊初繫放翁歸棹小園林時時醉倒春眠驚起聽啼鶯催曉嘆功名誤人堪笑朱橋翠徑不許京塵飛到挂朝衣東歸欠早連宵風雨捲殘紅如掃恨樽前送春人老前後同只後起句作平平仄仄異觀黃子常與喬夢符諸作亦如此平仄此是換頭也放翁詞精警無敵如此詞用諸去聲字可愛醉倒欠早去上尤妙譜按此調又名賣花聲因浪淘沙亦名賣花聲故本各歸其正名不列賣花聲之目字按此詞格律放翁歸棹京塵飛到宜仄平平仄京應去聲恐誤耳放翁精練必不然也觀其别作用少字故字可見時時醉倒東歸欠早必平平仄仄别作淒涼病驥晴嵐暖翠可見啼鶯催曉連宵風雨必平平平仄别作臨風清泪羣仙同醉可見誤人堪笑送春人老必仄平平仄誤送去聲尤妙别作伴人兒戲露桃開未可見驚字風字亦必用平聲此乃詞中句法抑揚相間起腔妙處不可混亂譜圖罔知槩注平仄互用使一調聲響俱壞矣更謂小園林嘆功名挂朝衣恨樽前之仄平平皆可平平仄尤為無理又云聽捲可平啼殘可仄是不知此是一字領句而欲作五言詩讀也謬甚謝池春慢九十字李之儀殘寒銷盡疏雨過清明後花徑欵殘紅風沼縈新皺乳燕穿庭戶飛絮沾襟袖正佳時仍晚晝著人滋味真箇濃如酒頻移帶眼空只恁厭厭瘦不見又思量見了還依舊為問頻相見何似長相守天不老人未偶且將此恨分付庭前栁前後同只天不老句與正佳時平仄異查張子野作前云徑莎平後云歡難偶是定格應如此耳按此詞不見又思量與前花徑句同用平聲住句為問頻相見與前乳燕句同用仄聲住句子野作則前段與此相同後段于不見句用秀艷過施粉不作平聲住句矣雖或不拘不如此詞前後合轍為妥青玉案六十六字史達祖蕙花老盡離騷句緑染遍江頭樹日午酒消聽驟雨青榆錢小碧苔錢古難買東君住官荷不礙遺鞭路被芳草將愁去多定紅樓簾影暮蘭燈初上夜香初駐猶自聽鸚鵡此調多有參差此詞前後第二句皆六字古字駐字俱叶韻者又一體六十六字沈端節使君標韻如徐庾更名節髙千古卧治姑溪才小駐間雲無定陽春有腳又作南昌去興來亭上清歌度盡能唱公詩句記取諸生臨别語從容占對天顔應喜千萬留王所此與前詞同而腳字喜字不叶韻者又一體六十六字趙長卿恍如遼鶴歸華表閲盡人間巧天乞一堂山對繞微波不動岸巾時照照見星星好舞風荷蓋從欹倒碧樹生涼自天杪誰識元龍胸次浩騎􅚪欲去引杯獨嘯醉眼青天小此前第二句用五字後第二句用七字者又一體六十七字賀鑄凌波不過橫塘路但目送芳塵去錦瑟年華誰與度月樓花院綺窗朱戶惟有春知處碧雲冉冉衡臯暮綵筆空題斷腸句試問間愁知幾許一川煙草滿城風絮梅子黃時雨此前第二句六字後第二句七字戶字絮字叶韻者各調中惟此為中正之則人因此詞呼為賀梅子詞情詞律髙壓千秋無怪一時推服涪翁有云解道江南腸斷句世間惟有賀方回信非虛言按此詞和者甚衆然于戶絮二字俱不叶韻涪翁嘗用語浦二字為叶而不和其原字想亦因戶絮二字掣肘也雖曰不拘亦是微疵總之似此絶作難為和耳知幾許三字逃禪作尋靈藥金谷作如何也琴趣作彤庭沓皆拗不可從又一體六十七字吳文英東風客雁溪邊道帶春去隨春到認得踏青香徑小傷髙懷逺亂雲深處目斷湖山杳梅花似惜行人老不忍輕飛送殘照一曲秦娥春態少幽香誰採舊寒猶在歸夢啼鶯曉此同賀詞而處字在字不卟韻者此格作者最多餘送殘照仄平仄與前斷腸句三字同此定格也嘯猶刻作斷腸句注七字不注可平可仄不差也圖譜則注斷字可平腸字可仄遂致遊移而選聲更誤刻腸斷句其旁反不注可仄可平則是以平仄仄為此句定格人若從便而填之大失體矣各家此作極多惟逃禪有一首此句末用凝不掃三字恐是偶筆然凝字可讀去聲不字可作平聲亦或不誤也他如書舟蘆川知稼等後四字句叶而前不叶海野審齋等前四字句叶而後不叶因字句同不另録又一體六十七字張矩西風亂葉溪橋樹秋在黃花羞澀處滿袖塵埃推不去馬蹄濃露雞聲淡月寂歷荒村路身名多被儒冠誤十載重來慢如許且盡清尊公莫舞六朝舊事一江流水萬感天涯暮此第二句用七字者惜香亦有此體于查惜香又一首于羞澀處三字作兩眉聚石孝友推不去作落平野片玉前起作良夜燈光簇如豆後起作玉體偎人情何厚後第三句作雨散雲收眉兒皺惠洪于前第三句作日永如年愁難度平仄稍異茲皆一録又一體六十八字曹組碧山錦樹明秋霽路轉陡疑無地忽有人家臨曲水竹籬茅舍酒旗沙岸一笑漁樵市淒涼只恐鄉心起鳳樓逺回頭慢凝睇何處今宵孤館裏一聲征雁半窗明月總是離人泪此後第二句用八字者陳瓘一首亦作正千里瓊瑤未輕掃凡作詞須將古名篇紬繹諷詠自得其音節段落如此調為體甚繁用字稍異而其聲響則莫非青玉案也沈氏新集收吳文定公作前段次句云要遊時春常盡時字用平聲不協然猶于三字分豆也至後段次句云可惜情懷不順則青玉案內無此六字相連句法亦無此聲響在作者原於文章政事之外遊戲為之疏節濶目無足為異選者將以垂示後人觀沈氏所論字句自謂考究精當足以為譜乃不能訂正其咎安辭乎僕以弇鄙之識而作此狂妄之言極知開罪先賢取詬時俗然寸心之愚不能自緘況為此針砭將以救世之誤服藥者想沈公有靈亦曲諒其責備賢者之心也聲聲令六十六字俞克成簾移碎影香褪衣襟舊家庭院嫩苔侵東風過盡暮雲鎖緑窗深怕對人間枕剩衾樓底輕陰春信斷怯登臨斷腸魂夢兩沉沉花飛水逺便從今莫追尋又怎禁驀地上心舊家下與後斷腸下同今字似乎用韻然此句同前暮雲鎖不必叶恐原是此字之訛耳怕對人與後又怎禁句同嘯餘未辨三字豆句將間字刻作間字誤矣怕對人間猶不妨也枕剩衾三字豈不可笑明髙深甫作兩結云儼風走漁陽甲兵都付與東風戰爭陽風二字平而走與二字反仄謬甚蓋不知枕地二字必用去聲故其上必用人禁二字平聲也此正與戀繡衾結句同如髙詞則竟與栁梢青太常引慶春宮等調中一句同矣豈得為聲聲令乎如此失調而選之以誤後人沈氏之無識甚矣聲聲慢九十六字石孝友花前月下好景良辰厮守日許多時正美之間何事便有輕離無端珠泪暗䔩染征衫點點紅滋最苦是殷勤密約做就相思咿啞櫓聲離岸魂斷處髙城隱隱天涯萬水千山一去定失花期東君鬬來無賴散春紅點破梅枝病成也到而今著個甚醫殷勤句四字與諸家不同恐落一字然文義不差不敢謂其訛錯故收為一體作者但從後調可耳又一體九十七字吳文英雲深山塢煙冷江臯人生未易相逢一笑燈前叉行兩兩春容清芳夜爭真態引生香撩亂東風探花手與安排金屋懊惱司空憔悴欹翹委佩恨玉奴消瘦飛趂輕鴻試問知心尊前誰最情濃連呼紫雲伴醉小丁香才吐微紅還解語待攜歸行雨夢中此則各家所通用之體也一笑至花手試問至解語前後同恨玉奴句惜香作空記得當時平仄異亦不拘行雨夢中四字用平仄仄平乃一定之律歷考各家作此體者無不皆然如此方是聲聲慢也行字夢窗間用起字上聲猶可若夢字自古無用平聲者即仄韻詞亦于此字必用仄聲譜圖岸然注曰可平大可駭異不知有何所據嗚呼妄矣若後所載周趙二詞乃九十九字者後結句用十二字其體原與此各別不得以此十字結者比而同之也若用此十字結之體則萬萬無夢字用平之理也按此調惟有此體與仄韻二格及九十九字平仄各二格譜圖所分五體可駭今備指其謬于左其所云第一體者收稼軒開元盛日一首前段第三四句云十里芬芳一枝金粟玲瓏後云枉學丹蕉葉底偷染妖紅本皆上四下六譜乃以前為上四下六後為上六下四豈枉學丹蕉不可作四字讀乎此總不知詞有前後相合之理也又後段第二第三句被西風醖釀徹骨香濃原上五下四兩句乃認定被字以下合為九字句不知何意其後各體皆因此而收也其所云第二體停雲靄靄一首因認定前詞九字句將後段第二第三句列初榮枝葉再競春風注為上三下六謂與前九字句不同夫列初榮枝葉五字與被西風醖釀五字何異而收為第二體乎嘯餘既誤作圖譜者自應出已意裁審何以仍訛襲謬若此至嘯餘之所以誤者因不識榮字是八庚韻音盈而讀作一東韻音雄遂謂此句列初榮是三字句叶通篇濛從等韻其不通尤甚稼軒此詞本櫽陶詩謂方見佳樹之列于東園者枝葉初榮今又見其再競春風矣故上用嘆息二字下接以日月于征也今以列初榮作一句其義理安在稼軒真寃矣又第三四句前既下相畢丹蕉處認差故于此篇謂其前後皆上四下六遂另收作一體矣其所謂第三體亦以此十字強分上六下四另收一體不知此十字語氣一貫四字斷六字斷皆無礙音節詞中如此類者最多此尚不解何以論定其所謂第四體本是用仄韻者乃不注因仄韻另收而曰前同第三體後同第一體惟第三句四字第四句六字余閲之初甚不解細思之則彼仍以第二第三句九字合為第二句而指枉學丹蕉十字為第三四句且仍謂上六下四故收此為第四體耳至所謂第五體其謬尤甚如吳詞還解語三字待攜歸三字行雨夢中四字定格應爾各家皆同即其前四體所收辛詞無不同他若各家用仄韻者亦無不同即其所收第五體詞未云有皓月照黃昏眠又未得亦無不同也乃以有皓月照黃昏為六字句故又另列作第五體豈有皓月三字不許其斷句乎真所不解矣此類往往皆然不能盡舉姑臚列于此以告天下之信譜圖而誤者夢又按草窗燕泥沾粉一首于清芳句作多憐漂泊窗春星當戶一首于叉行句作暗䔩文梁俱係誤落二字非有此體也又一體九十七字髙觀國壺天不夜寶炬生香光風蕩搖金碧月灧水痕花外峭寒無力歌傳翠簾盡捲誤驚回瑤臺仙迹禁漏促拚千金一刻未酬佳夕捲地香塵不斷最得意輸他五陵狂客楚栁吳梅無限眼邊春色鮫鮹暗中寄與待重尋行雲消息乍醉醒怕南樓吹斷曉笛用仄韻從來此體皆收易安所作蓋其遒逸之氣如生龍活虎非描塑可擬其用字竒橫而不妨音律故卓絶千古人若不及其才而故學其筆則未免類狗矣觀其用上聲入聲如慘字戚字盞字點字滴字等原可作平故能諧協非可泛用仄字而以去聲填入也其前結正傷心却是舊時相識于心字豆句然于上五下四者原不拗所謂此九字一氣貫下也後段第二三句憔悴損如今有誰忺摘句法亦然如髙詞應以最得意為豆然作者于輸他住句亦不妨也余恐人因易安詞髙難學故録竹屋此篇又最得意句稼軒作是傳家合在玉皇香案上五字竟與髙詞相反然平聲調內本是如此總之不拘耳或曰子論譜謂宜一字不茍有若鐵板而忽于句法及上入作平等又作籠統顢頇之語豈非矛盾余應之曰所以嘵嘵辨論者在不可假借處若于音律不爽則原無妨礙何必拘泥此中自有一定之理在君但平心細閲髙聲頻讀自當于喉吻間得之豈可漫無主張而隨意作囈語乎又一體九十九字勝慢朝集作勝周密瓊壺敲月白髮簮花十年一夢揚州恨入琵琶小憐重見灣頭樽前謾題金縷奈芳情巳逐東流還送逺甚長安亂葉都是間愁次第重陽近也看黃花緑酒只合遲留脆栁無情不堪重繫行舟百年正消幾别對西風休賦登樓怎去得怕淒涼時節團扇悲秋平韻後結與前結同另為一體琴趣亦有此體詞亦精因其第四句用斷腸如雪與前諸家不合故録此篇其後段于看黃花句作别後縱青青平仄與惜香空記得當時同不拘又一體九十九字趙長卿金風玉露緑橘黃橙商秋爽氣飄逸南斗騰光應是間生賢出照人紫芝眉宇更仙風誰能儔匹細屈指到小春時候恰則三日莫論早年富貴也休問文章有如椽筆堯舜逢君啓沃定知多術而今且張錦幄麝煤泛暖香鬱鬱華堂裏聽瑤琴輕弄水仙新律仄韻後結亦與前結同另為一體酷相思六十六字程垓月挂霜林寒欲墜正門外催人起奈離别如今真個是欲住也留無計欲去也來無計馬上離情衣上泪各自箇供憔悴問江路梅花開也未春到也須頻寄人到也須頻寄前後同兩結疊韻汲古刻書舟詞落箇字誤慶春澤六十六字張先飛閣危橋相倚人獨立東風滿衣輕絮還記憶江南如今天氣正白蘋花繞堤漲流水寒梅落盡誰寄方春意無窮青空千里愁草樹依依關城初閉對月黃昏角聲傍煙起此調六十六字前後各三十三字其句法乃是照合者或曰滿衣句六字憶江南句七字後段自當亦如前此草字乃翠字之訛蓋前則滿衣輕絮還記後則青空千里愁翠也人因里字似叶韻故于千里斷句草樹又似相連故認為愁草樹依依以致前後不一耳余曰記憶草樹自當相連前段原是滿衣輕絮為句絮字非韻乃三影借叶也若照前説則上用記字不應下復憶字上用青字不應下復翠字又一體一百字臺即髙陽或加慢字劉叔安燈火烘春樓臺浸月良宵一刻千金錦步成蓮彩雲簇仗難尋蓬壺影動星毬轉映兩行寶珥瑤簮恣嬉遊玉漏聲催未歇芳心笙歌十里誇張地記年時行樂憔悴而今客裏情懷伴人間笑間吟小桃未盡劉郎老把相思細寫瑤琴怕歸來紅紫欺風三徑成陰按此調與髙陽臺字字相同舊草堂兩收之以此為慶春澤以僧皎如紅入桃腮一首為髙陽臺蓋以此篇後起七字用仄不卟皎如後起六字叶韻也愚謂如此長調必不以一字多少而分兩調從昔致疑不敢臆斷及閲竹山髙陽臺後起云臞翁一點清寒性人情終似蛾兒舞正用七字不叶韻猶恐有誤又查王沂孫後起云一枝芳信應難寄江南自是離愁苦張炎後起云當年燕子知何處因爽然自信髙陽臺即慶春澤而輯草堂者未之校勘耳何況後之著譜作圖者耶今將舊譜所收髙陽臺録後以備查對紅髙陽臺九十九字韶華巳破三分人僧皎如空教入桃腮青回栁眼不歸來草怨王孫平明幾點催花雨夢半闌欹枕初聞問東君因甚將春老却間人東郊十里香塵旋安排玉勒整頓雕輪趂取芳時去尋島上紅雲朱衣引馬黃金帶算到頭總是虛名莫間愁一半悲秋一半傷春試與慶春澤對證豈非一調舊譜兩收不惟不辨且將前結注問東君因甚為一句將春老却間人為一句竟不知是一三字兩四字句法而諸家從之于是圖譜選聲皆相沿而未察獨不見其後結莫間愁三字下兩句各四字乎然則竹山之好傷情春也難留人也難留亦可讀好傷情春也為一句難留人也難留為一句乎何其忽略如此而後段以莫間愁至悲秋作七字句又不足竒矣譜又注前叔安詞以蓬壺影動為四字句星毬轉映為四字句兩行寶珥瑤簮為六字句此調除兩起三句外餘字句無不合一奈何全不照管也獨又按竹山亦有用平叶如皎如者又一首前結云裊鞭梢笑不成七字後起云春愁吟未了煙林曉人謂換頭八字兩仄叶宜另一體余曰此汲古誤以前尾春字移加後首耳非有此體鳳凰閣六十七字趙師使正薰風初扇黃梅暑溽並搖雙槳去程速那更黃流浩渺白浪如屋動歸思離愁萬斛平生竒觀頗快江山寓目日斜雲定晚風熟白鷺飛來點破一川明緑展十幅瀟湘畫軸白鷺下十字上四下六似與前那更下十字稍異然是一氣分豆不拘且于破字分斷亦不妨也蓋並搖下與後日斜下同耳思字觀字皆去聲又一體六十七字葉清臣遍園林緑暗渾如翠幄下無一片是花蕚可恨狂風橫雨忒煞情薄盡底把韶華送却楊花無奈是處穿簾透幕豈知人意正蕭索春去也這般愁沒處安著怎奈何黃昏院落春去也下六字與前段可恨句六字不同更與前詞亦異嘯餘以這般愁連下作七字不知沒處安著乃四字句正對上忒煞情薄也字煞音晒是去聲處亦去聲也前詞浪字亦同只川作平恐是片字之訛耳是花蕚是字正蕭索正字與前詞去字晚字定格仄聲又前詞暑浩萬寓畫此詞翠橫送透院皆去聲是調中喫緊處譜俱注可平豈有此理夢行雲六十七字吳文英簟波皺纎縠朝炊熟眠未足青奴細膩未拚真珠斛素蓮幽怨風前影搔頭斜墜玉畫欄枕水垂楊梳雨青絲亂如乍沐嬌笙微韻晚蟬亂秋曲翠陰明月勝花夜那愁春去速朝炊下與後青絲下同若照青絲亂句則熟字是偶合非叶韻也未拚句可疑照後晚蟬句恐有訛字勝字平聲語或云朝炊青絲二皆六字句看花回六十七字栁永玉墄金階舞舜干朝夜多歡九衢三市風光麗萬家急管繁絃鳳樓臨綺陌佳氣非煙雅俗熙熙物態妍忍負芳年笑筵歌席連宵盡在旗亭斗酒十千賞心何處好惟有樽前萬家句六字而在旗亭句七字又一首前反七字而後反六字必皆誤也此調兩疊相符作者或前後俱六或前後俱七可也又一體一百一字蔡伸夜久涼生庭院漏聲頻促念昔勝遊舊地對畫閣層巒雨餘煙簇新詩暗藏小字霜刀刋翠竹攜素手細繞回塘芰荷香裏彩鴛宿别後想香消膩玉帶圍減削寬金粟雖有鱗鴻錦素奈事與心違佳期難卜擬解愁腸萬結惟憑尊酒緑望天涯斷魂處醉拍闌干曲用仄韻與前調迥別又一體一百一字周邦彥蕙風初散輕暖霽景澄潔秀蕊乍開乍斂帶雨態煙痕春思紆結危絃弄響來去驚人鶯語滑無賴處麗日樓臺亂絲岐路總竒絶何計解黏花繫月嘆冷落頓辜佳節猶有當時氣味挂一縷相思不斷如髮雲飛帝國人在雲邊心暗折語東風共流轉謾作匆匆别首句比前詞平仄異危絃至語滑雲飛至暗折俱上四下七比前新詩與擬解上六下五不同景字思字斷字用仄字亦異山谷亦有此體而危絃與雲飛四字句前用歡意未闌後用暗想當時因體同且有訛字故不録仄片玉又一首前起云秀色芳容明眸就中竒絶平與此不同眸字恐誤恐是媚字其危絃句用平平仄仄雲飛句用仄仄平平想不拘也尾句用與他衫袖裛平仄與前異恐誤不可從又一體一百三字趙彥端注目正江湖浩蕩煙雲離屬美人衣蘭佩玉淡秋水凝神陽春翻曲烹鮮坐嘯清淨五千言自足橫劍氣南斗光中浩然一醉引雙鹿回雁未歸書未續夢草處舊芳重緑誰想瀟湘嵗晚為喚起長風吹飛黃鵠功名異時圯上家傳謝寵辱待封留拜公堂下授我長生録首句第二字即起韻又一首云愛日報疏梅動意春前呼得餘與前詞大約相同衣字去聲此句玉字用韻與前詞異初疑偶合及觀後詞竹字知是用叶者時字恐應是日字然此十一字總是一串或四或六斷句皆可拜公堂下比前詞多一字其别作云未妨遊戲亦同後起句前詞上三下四介庵别作亦同惟此用上四下三亦另為一體功名下十一字別作云他年妙髙臺上優曇會堪折稍異又一體一百四字趙彥端端有恨留春無計花飛何速檻外青青翠竹鎮髙節凌雲清陰常足春寒風袂帶雨穿窗如利鏃催處處燕巧鶯慵幾聲鈎輈呌雲木看波面垂楊蘸緑最好是風流煙沐陰重薰簾未捲正泛乳新芽香飄清馥新詩惠我開卷醒然欣再讀嘆詞章過人華麗擲地勝如金玉起異尾句多一字用此調何速用平仄翠竹用去仄常足用平仄利鏃去仄雲木用平仄蘸緑用去仄煙沐用平仄未捲用去仄清馥用平仄再讀用去仄金玉用平仄相間用之此是詞眼不可不知觀前所載各篇及未録諸作無不皆然故知閉門造車出而合轍非有規矩尺寸車可信手而造耶輈字宜用仄聲查考工毛詩俱無音仄者此誤也三奠子六十七字王惲悵神光奕奕天上良宵花露溼翠叉翹風回鸞扇影愁滿紫雲軺恨相望雖一水隔三橋朱絃寂寂心思迢迢人未老鬢先凋翻騰驚世故機巧到鮫鮹涼夜永簫聲咽篆煙飄後起句比前起少一字餘同兩同心六十八字晏幾道楚鄉春晚似入仙源拾翠處間尋流水踏青路暗惹香塵心心在栁外青簾花下朱門對景且醉芳樽莫話銷魂好意思曽同明月惡滋味最是黃昏相思處一紙紅箋無限啼痕只換頭一句異前餘同此詞用詩韻十三元故用源字起韻不知此字入詞實與餘音不叶今人皆知分用不宜效之矣又一體六十八字黃庭堅一笑千金越樣情深曽共結合歡羅帶終須效比翼文禽許多時靈利惺惺驀地昏沉自從官不容針直至而今你共人女邊著子爭知我門裏挑心記攜手小院回廊月影花陰首句即起韻又一體六十八字栁永佇立東風斷魂南國花光媚春醉瓊樓蟾彩過夜遊香陌憶當時酒戀花迷役損詞客别有眼長腰搦痛憐深惜鴛衾冷夕雨淒淒錦書斷暮雲凝碧想别來好景良時也應相憶字句同上但用仄耳叶韻上一字俱用平方有調圖譜概作可仄誤又一體七十二字杜安世巍巍劒外寒霜覆林枝望衰栁尚色依依暮天靜雁陳髙飛入碧雲際江山秋色遣客心悲蜀道㟓嶮行遲瞻京都迢遞聽巴峽數聲猿啼惟獨箇未有歸計謾空悵望每每無言獨對斜暉比前晏詞前後第二句第五句各多一字遞字計字乃是以仄叶平此又一平仄兩叶者佳人醉六十九字栁永暮景蕭蕭雨霽雲淡天髙風細正月華如水金波銀漢瀲灧無際冷浸書幃夢斷却披衣重起臨軒砌素光遙指因念翠眉音塵何處相望同千里儘凝睇厭厭無寐漸曉雕欄獨倚姑依韻分句恐有訛錯未必確然臨軒砌恐是後段起句圖譜以夢斷下分句却披衣至軒砌為八字句或又曰前起該四字三句因無他作難以訂正耳且坐令七十字韓玉間院落誤了清明約杏花雨過胭脂綽緊了千秋索鬬草人歸朱門悄掩梨花寂寞書萬紙恨憑誰托才封了又揉却寃家何處貪歡樂引得我心兒惡怎生全不思量著那人人情薄前後全異月上海棠七十字陸遊蘭房繡戶厭厭病嘆春酲和悶甚時醒燕子空歸幾曽傳玉關音信傷心處獨展團窠瑞錦薰籠消歇沉煙冷泪痕深展轉看花影漫擁餘香怎禁他峭寒孤枕西窗曉幾聲銀瓶玉井前後同甚字看字必要去聲觀後所載段詞及放翁别作用泪字寄字可見或曰酲字深字是暗用平韻未必又一體七十字段成已酒杯何似浮名好一入枯腸太山小喚醒夢中身鶗鴂數聲春曉昻頭處幾點青山屋杪人生得計魚遊沼視過眼花陰向來少須卜一枝安笑月底驚烏三繞無窮事畢竟何時是了喚醒句須卜句比前詞各多一字一八句七字視過眼句八字而平仄聲響亦與前詞不同惜黃花七十字史達祖涵秋寒渚染霜丹樹尚依稀是來時夢中行路時節正思家逺道仍懷古更對著滿城風雨黃花無數碧雲欲暮美人兮美人兮未知何處獨自捲簾櫳誰為開樽俎恨不得御風歸去前後同美人兮巧借上三字非疊句也後或曰尚依稀二句是換稀時兩個平韻自相為叶段美人兮兩個兮字亦是叶前平韻此説亦新但未知確否附筆于此惜黃花慢一百八字楊旡咎霽空如水襯落木墜紅遙山堆翠獨立間階數聲蟬度風前幾點雁橫雲際已涼天氣未寒時問好處一年誰記笑聲裏摘得半叉金蕊來至橫斜為插烏紗更揉碎泛入金樽瓊蟻滿酌霞觴願人壽百千可奈此時情味牛山何必獨沾衣對佳節惟應歡醉看睡起曉蝶也愁花悴只換頭多二字結尾少二字餘同願人句同前數聲句必無五字之理偶落無疑為補之墜字泛字去聲不可平或謂時字衣字亦以平叶仄未必又一體一百八字吳文英送客吳臯正試霜夜冷楓落長橋望天不盡背城漸杳離亭黯黯恨水迢迢翠香零落紅衣老暮愁鎖殘栁眉梢念瘦腰沈郎舊日曽繫蘭橈仙人鳳咽瓊簫悵斷魂送逺九辨難招醉鬟留盼小窗剪燭歌雲載恨飛上銀霄素秋不解隨船去敗紅趂一葉寒濤夢翠翹怨紅料過南譙用平韻處夢窗詞七寶樓臺拆下不成片段然其用字精審嚴確可愛如此調有二首其所用正試夜望背漸翠念瘦舊繫鳳悵送醉載素夢翠怨料諸去聲字兩篇皆相合律呂之學必有不可假借如此千秋嵗七十一字謝逸楝花飄砌䔩䔩清香細梅雨過蘋風起情隨湘水逺夢繞吳峯翠琴書倦鷓鴣喚起南窗睡密意無人寄幽恨憑誰洗修竹畔疏簾裏歌餘塵拂扇舞罷風掀袂人散後一鈎淡月天如水只後起一句換五字餘同圖譜云歌餘句可作仄仄平平仄竒而情隨句又得免改何也青田後第三句良會知何許乃刻者誤落一字沈氏謂有少一字格謬也青田豈如此疏略哉又一體七十一字葉夢得雨聲蕭瑟初到梧桐響人不寐秋聲爽低簷燈暗淡畫幕風來往誰共賞依稀記得船篷上拍岸浮輕浪水濶菰蒲長向别浦收橫網緑簑衝暝色艇子搖雙槳君莫忘此情猶是當時唱首句不起韻誰共賞君莫忘皆叶韻者姑溪一首前後起句俱不用韻茲不備録又一體七十二字李之儀柔腸寸折解袂留清血藍橋動是經年别掩門春絮亂欹枕秋蛩咽檀篆滅鴛衾半擁空牀月妝鏡分來缺塵汚菱花潔嘶騎逺鳴機歇密封書錦字巧綰香囊結芳信絶東風半落梅梢雪第三句七字六一亦有此作而此調雖略有參差大約尾上三字句可叶可不叶兩起句以叶為妥千秋嵗引八十二字王安石別館寒砧孤城畫角一派秋聲入寥廓東歸燕從海上去南來雁向沙頭落楚臺風庾樓月宛如昨無奈被些名利縳無奈被他情擔閣可惜風流總間却當初謾留華表語而今誤我秦樓約夢闌時酒醒後思量著與前調迥别其平仄宜悉遵之庾不可讀平醒不可讀仄圖譜于此調只一庾字作可平誤餘俱不議改使此詞得成全璧手眼獨髙急表而讃之書明人徐元玉一首亦自名為千秋嵗引因翻沈氏讀之令人訝絶今全録于後以見作詞選調不可不致審也風千秋嵗引雨攪栁絲揉花纈蚤過了清徐元玉明時節鞦新來燕子蹴語何場多人老去鶯花飛未歇翠都韆院踘蹤絶踏青拾休説月從是已誰前自馬走無情章臺雪是誰簫弄秦樓緒可奈而今更離别千一回頭人結里腸百西施七十一字栁永栁街燈市好花多盡讓美璚娥萬嬌千媚的的在層波取次梳妝自有天然態愛淺畫雙蛾斷腸最是金閨客空憐愛奈伊何洞房咫尺無計枉朝珂有意憐才每遇行雲處幸時恁相過後起用仄第二句六字與前段異取次句有意句俱九字一氣第六字下略豆亦可盡愛幸三字皆領句與的的無計二句雖同五字而句法各殊又一體七十二字栁永苧蘿妖艷世難善媚悅君懷後庭恃愛寵盡使絶嫌猜正恁朝歡暮宴情未足早江上兵來捧心調態軍前死羅綺旋變塵埃至今想怨魂無主尚徘徊夜夜姑蘇城外當時月但空照荒臺難字下原缺一字後庭下恐有訛錯多後庭句比前調萬嬌句至今句比洞房句各一字惜奴嬌七十一字朝補之歌闋瓊筵暗失金貂侶説衷腸丁寧囑付棹舉帆開黯行色秋將暮欲去待却回髙城巳暮漁火煙村但觸目傷離緒此情向阿誰分訴那裏思量爭知我思量苦最苦睡不著西風夜雨前後同只後第二句六字欲去最苦乃叶韻兩字句友古詞只是唱曲兒詞中認意只替火桶兒與奴暖睡讀者不覺其在兩字用韻因于題下訛注一作粉蝶兒不知粉蝶兒自另一調判然不同也又一體七十二字史達祖香剝酥痕自昨夜春愁醒髙情寄冰橋雪嶺試約黃昏便不誤春昏信人靜倩嬌娥留連秀影吟鬢簮香巳斷了多情病年年待將春管領鏤月描雲不枉了間心性謾聽誰敢把紅顔比並第二句六字與後段同句按此句自應六字朝詞恐有脫字也此調凡七字于第六字皆用仄聲如此詞雪秀管比是也間有用平者不如從仄為是故未注可平友古于將春管領句作三字誰敢把上多一字皆誤刻無此體也至惜香一首本是少字韻而以香後為叶更于不枉了間心性作捧出金盞銀臺金盞相連又不叶韻且作平聲訛而愈訛矣又一體七十二字石孝友我巳多情更撞著多情底你把一心十分向你盡他們劣心腸偏有你共你撇了人只為箇你宿世寃家百忙裏方知你沒前程阿誰似你壞却才名到如今都因你是你我也沒星兒恨你第二句多一字盡他們比前後詞少一字必係脫去次句或是誤多底字又一體七十三字石孝友合下相逢算鬼話須沾惹間深裏倣場話霸負我看承枉駝我許多時價寃家你教我如何割捨苦苦孜孜獨自箇空嗟呀便心腸捉他不下你試思量亮從前説風話寃家休直待教人咒罵枉駝句多一字寃家二字乃以平叶仄此又一平仄通叶之體也離亭燕七十二字黃庭堅十載樽前談笑天祿故人年少可是陸沉英俊地看即鎖窗批詔此處忽相逢潦倒秃翁同調西顧郎官湖渺事看庾樓人小短艇絶江空悵望寄得詩來髙妙夢去倚君旁蝴蝶歸來清曉事看事字誤恐是爭字前後同又一體七十二字朝補之憶向吳興假守雙溪四垂髙栁儀鳳橋邊蘭舟過映水雕甍華牖燭下小紅粧爭看使君歸後攜手松亭難又題詩水軒依舊多少緑荷相倚恨背立西風回首悵望採蓮人煙波萬重吳岫雙溪爭看題詩煙波八字皆作平平與前異舟字恐是棹字此句不宜拗觀後段可見前黃詞及張升一帶江山如畫一首亦無拗句憶帝京七十二字黃庭堅鳴鳩乳燕春間暇化作緑陰槐夏壽斚舞紅裳睡鴨飄香麝醉此洛陽人佐郡深儒雅況座上玉麟金馬更莫問鶯老花謝萬里相依千金為壽未厭玉燭傳清夜不醉欲言歸笑殺髙陽社老字各家俱用平聲未厭句平仄如此是定格觀谷老又一首指下花落狂風雨耆卿作只恁寂寞厭厭地皆同圖譜讀厭字作平且云可作平仄平平平仄仄何據又一體七十六字黃庭堅銀燭生花如紅豆占好事如今有人醉曲屏深借寶瑟輕招手一陳白蘋風故滅燭教相就花帶雨冰肌香透恨啼鳥轆轤聲曉栁岸微涼吹殘酒斷腸人依舊鏡中消瘦恐那人知後鎮把你來僝僽起句平仄拗次句分兩三字前結六字俱與前詞異恨啼鳥下更不同詞統以曉字斷句然以前詞推之此句宜叶韻詞􅚈以曉作驟然啼鳥轆轤聲恐未可言驟或云曉字屬下句又或云舊字亦是叶總係可疑未敢臆斷粉蝶兒七十二字蔣捷啼鴂聲中春光化成春夢問東君仗誰時送燕憐晴鶯愛暖一窗芳哄奈匆匆催他栁棉狂縱輕羅小扇桐花又飛么鳳記寒吟沁梅霜凍古今人易老莫間雙鞚尚堪遊荼䕷粉雲香洞前後同只後起句平仄異燕憐晴二句與後古今人二句同本集人字下落一字非有此七十一字體也譜圖于澤民詞以燕憐晴二句古今人二句俱作六字句且注晴字可仄人若依之于晴鶯二字用相連仄平二字大誤矣嘯餘又另收稼軒作前後首次句俱作十字一句燕憐至芳哄前後各十字亦注作十字一句因與毛詞分為兩體竒矣圖譜遵嘯餘者也乃止于題名注粉蝶兒第一體却並無第二體更竒也四旁注雖如此然玩此調音響春光催他桐花荼䕷句俱宜平平仄平平仄仗一沁莫四字亦宜仄粉蝶兒慢九十六字周邦彥宿霧藏春餘寒帶雨占得羣芳開晚艷初弄秀倚東風嬌懶隔葉黃鸝傳好音喚入深叢中探數枝新比昨朝又早紅稀香淺眷戀重來倚檻當韶華未可輕辜雙眼賞心隨分樂有清樽檀板每嵗嬉遊能幾日莫使一聲歌欠忍因循片花飛又成春減艷初弄秀不成語且後段賞心隨分樂是五字可知艷字下落一字蓋占得至昨朝與後未可至花飛俱同也或謂此二句應在弄字分字下斷則艷初弄更不成語總應添一字于艷字下也故補一又或謂艷字是起韻尤非音字平聲不協定是語字之誤此句對後每嵗句也雖此句是用杜工部詩然音字于此不合或曰隔葉黃鸝原是一句傳好音原屬下句每嵗句亦然是三字略豆平仄總可通用也當韶華當字下亦疑有此字詞律卷十
