body:
  text: 詞律卷十一宜興萬樹撰于飛樂七十二字晏幾道曉日當簾睡痕猶占香腮輕盈笑倚鸞臺暈殘紅勻宿翠滿鏡花開嬌蟬鬢畔插一枝淡蕊疏梅每到春深多愁饒恨粧成懶下香階意中人從别後縈繫情懷良辰好景相思字喚不歸來粧成下與前輕盈下同梅溪詞于良辰句刻作將終怨魂誤魂字不可平必是魄字又一體七十三字張先寶奩開菱鑑淨一掬清蟾新粧臉旋學花添蜀紅衫雙繡蝶裙縷鶼鶼尋思前事小屏風仍畫江南怎空教草解宜男柔桑暗又過春蠶正陰晴天氣更暝色相兼幽期消息曲房西碎月篩簾怎空教七字是換頭餘同圖譜不解注正陰晴天氣為五字句更暝色相兼為五字叶不知更字乃以住句字作轉語過下所謂言斷氣連流走體也不可拘執而分破調格毋論他家詞無兩五字體即本詞前段蜀紅衫端然是一句三字豈可上句作蜀紅衫雙繡下句作蝶裙縷鶼鶼耶其則不逺胡不睨而視之又一體七十六字毛滂水邊山雲畔水新出煙林送秋來雙檜寒陰檜堂寒香霧碧簾箔清深放衙隱几誰知共雲水無心望西園飛蓋夜月到清樽為詩翁露冷風清退紅裙去碧袖花草爭春勸翁強飲莫辜負風月留人前後同後段起句用兩三一四與前詞七字異去字仄聲宜用平乃是毛又一首于望西園句作繫畫船畫字用仄或不拘然亦用平為是撼庭竹七十二字黃庭堅嗚咽南樓吹落梅聞鴉樹驚飛夢中相見不多時隔城今夜也應知坐久水空碧山月影沉西買箇宅兒住著伊剛不肻相隨如今却被天嗔你永落雞羣受雞欺空恁惡憐伊風日損花枝前後同後尾二句俱用平叶前段碧字亦是作平如今却被句即前段夢中相見句必該用韻觀後王詞畫欄句是叶可知你字乃以上叶平作者或仍用平聲必不可不叶韻也永落雞羣拗即同上隔城今夜句法亦不妨觀後詞佳辰句可見圖譜于受雞欺之雞字竟注可仄但要此句不拗而不管此調之拗矣即欲改順亦止可于永落雞羣改仄平平仄蓋前段隔城今夜可據也若雞欺之雞豈可用仄乎後結五字二句正與前同觀後王詞亦然圖譜乃分空恁惡為三字句下為七字句尤為無理又一體七十二字王詵綽略青梅弄春色真艷態堪惜經年費盡東君力有情先到探春客無語泣寒香時暗度瑤席月下風前空悵望思攜手同摘畫欄倚遍無消息佳辰樂事再難得還是夕陽天空暮雲凝碧此用仄韻而句中平仄較前詞整妥可從前後段同所稍異者後起句不叶耳雲字若依前段及前詞宜用仄聲想不拘也蓋前詞兩結如五言詩一句此詞兩結則以時空二字領句句法本不同耳此係撼庭竹與撼庭秋無涉風入松七十二字趙彥端傳聞天上有星榆歷歷誰居淡煙暮擁紅雲暖春寒乍有還無作態似深仍淺多情要密還疏移樽環坐足相娛醉影憑扶江南歸到雖憐晚猶勝不見踟躇儘拚緑陰青子憑肩攜手如初前後同拚字去聲讀又一體七十四字周紫芝禁煙過後落花天無奈輕寒東風不管春歸去共殘紅飛上秋千看盡天涯芳草春愁堆在闌干楚江橫斷夕陽邊無限青煙舊時雲去今何處山無數栁漲平川與問風前回雁甚時吹過江南前後第四句七字第控此調前後相同不應互異各譜所收伯可一首四句前云與誰同撚花枝六字後云嘆樓前流水難西七字必無此體斷是前段少一字也故本譜不收七十三字一格沈氏謂撚字下添好字亦非若作與誰同撚好花枝竟像七言詩句非上三下四句法矣又一體七十六字吳文英畫船簾密不藏香飛作楚雲狂傍懷半捲金爐燼怕暖消春日朝陽清馥晴薰殘醉斷煙無限思量憑闌心事隔垂楊樓燕鎖幽粧梅花偏惱多情月慰溪橋流水昏黃哀曲霜鴻悽斷夢魂寒蝶悠揚前後第二句五字水按孏窟一首五字句前作曽格外疏狂後作空煙微茫其句法以曽字空字領句與此吳詞不同是另一格也因句字同不另列又按夢窗春風吳栁一首一番疏雨一首第四句皆作前六後七亦是傳誤與康詞同本譜亦不收七十五字一格荔枝香近七十三字周邦彥夜來寒侵酒席露微泫舄履初會香澤方薰無端暗雨催人但怪燈偏簾卷回顧始覺驚鴻去逺大都世間最苦唯聚散到得春殘看即是開離宴細思别後栁眼花鬚更誰剪此懷何處消遣卷字應是叶韻但千里和詞通本皆字字模仿此調亦平仄不異而于無端以下作鶯啼燕語交加是處池館春遍風外認得笙歌近逺館字不用平聲而遍字不和卷字未審何故或疑卷字原非叶韻則自舄履起二十八字直至逺字方叶韻必無是理也首句似拗然千里所和小園花梢雨歇浪羞泫無異而夢窗亦作睡輕時聞晚鵲噪庭樹則正相同也但夢窗于此句之下則與後方詞翠壁以下同耳又一體七十六字方千里勝日登臨幽趣乘興去翠壁古木千章林影生寒霧空濛冷溼人衣山路元無雨深澗斗瀉飛泉溜甘乳漁唱晚看小棹歸前浦笑指官橋風颭酒旗斜舉還脫宮袍一醉芳杯倒鸚鵡幸有雕章蠟炬此和清真詞字字相同只深澗句周本作看兩兩相依燕新乳此詞却多一字耆卿此句作遙認衆裏盈盈好身段夢窗作天上未比人間更情苦則原應九字而周本于看字上落一字或係間字愁字也圖譜顛倒作新燕乳更謬首次二句周云照水殘紅零亂風喚去圖譜改喚字作掀字因于紅字斷句觀千里用興字則此字是仄而喚字甚妙蓋殘紅隨風如聞其呼喚而去也作掀字便沒意味栁詞甚處尋芳賞翠歸去晚亦是六字斷而去字用去聲也至夢窗一首作錦帶吳鈎征思渡淮水淮字平而渡字仄則用前周詞體而又略變耳夢窗又一首前結云因詰駐車新堤步秋綺詰字必訛車字必是馬字耆卿後起云擬回首平仄稍異或不拘平按片玉集刻周末句作如今誰念淒楚與耆卿尾仄同清真集作共剪西窗密炬與夢窗尾平仄同想亦不拘然觀方和詞則周詞是炬字煞者余謂學前周體則作前煞學此體則作此煞可也師師令七十三字張先香鈿寶珥拂菱花如水學妝皆道稱時宜粉色有天然春意蜀綵衣長勝未起縱亂霞垂地都城池苑誇桃李問東風何似不須回扇障清歌脣一點小於朱蘂正值殘英和月墜寄此情千里後起換頭餘同圖譜亂注平仄不可從五字四句俱以一字領句者勿誤菱東用平亂此用仄郭郎兒近拍七十三字栁永帝里間居小曲深坊庭院沉沉朱戶閉新霽畏景天氣薰風簾幕無人永晝厭厭如度嵗愁瘁枕簟微涼睡久轉轉慵起硯席塵生新詩小闋等間都盡廢這些兒寂寞情懷何事新來常恁地此詞非有落字必有訛字難以論定姑注如右所無疑者愁瘁二字必是後段起句蓋何事句與永晝句合耳畏景決係誤字或謂帝里即是起韻總無他闋可考恨恨隔浦蓮近拍七十三字止或無近拍二字或有近字周邦彥新篁搖動翠葆曲徑通深窈夏果收新脆金丸落驚飛鳥濃靄迷岸草蛙聲閙驟雨鳴池沼水亭小浮萍破處簷花簾影顛倒綸巾羽扇困卧北窗清曉屏裏吳山夢自到驚覺依前身在江表此調作者頗多而注者每誤今為細細正之首句六字三平三仄定格也譜圖只剩一葆字韻腳不注上五字俱曰可平可仄則此句可填作性旺耀同催葆之聲矣豈是隔浦蓮首句乎查千里和詞云垂楊煙溼嫩葆放翁云飛花如趂燕子騎鯨雲路倒景夢窗云榴花依舊照眼海野云涼秋湖上過雨梅溪云洛神一醉未醒逃禪云墻頭低蔭翠幄竹屋云銀灣初霽暮雨無非三平三仄者若論其細尚宜于第四第五字用去第六字用上豈有可用仄仄仄平平仄之理乎濃靄句平仄平仄仄定格也譜注濃可仄靄岸可平查千里云花妥庭下草放翁云雪澤秋萬頃介庵云秋館寒意早夢窗云年少驚送逺海野云粧臉宜淡濘梅溪云侵曉鷗夢穩陰壑生暗霧竹屋云纎巧雲暗度俱第二第四用仄止逃禪云新晴人意樂晴字或係霽字豈可以其拗而竟改作五言詩句法乎夢自到三字俱仄定格也譜注夢字可平查千里云倦再到放翁云怕蜀倚夜漏永介庵云待見了夢窗云蕩素練海野云待怨訴梅溪云暗折贈逃禪云怕又惡無非二去一上豈可用平仄仄乎其餘亂注更不可枚舉矣金丸落六字汲古刻注云一作金丸落飛鳥按譜此處應三字兩句宜作金丸落驚飛鳥毛氏可謂訂正矣然今歷查各家詞惟夢窗作汀菰緑薰風晚而放翁作金籠鸚鵡飛起寥然非復塵境海野作蕭然姑射儔侶梅溪作虛堂中自回互逃禪作餘酲推枕猶覺俱于第三第四字相連者且此二字俱用平仄只竹屋有涼生一天風露句一天用仄平然亦相連況千里乃和清真者原作彞猶終日魚鳥則周詞本是金丸驚落飛鳥而誤以驚落為落驚耳汲古乂注云時刻或于池沼下分段愚謂水亭小三字是後段起句觀千里和詞野軒小屬後段可信蓋前尾不宜有此贅句用作換頭為妥然各家如放翁梅溪竹屋屬前結海野夢窗屬後起則此句自來傳刻參差無有定例不敢鑿然姑仍舊繫于池沼之下至于嘯餘譜則竟將驟雨鳴注作三字句而以池沼二字連下水亭小作五字句其謬如此可發一笑閙字是叶韻千里和云鳴蟬閙是也譜圖不注叶差然此句放翁夢窗俱不用韻想不拘耳隔簾聽七十三字栁永咫尺鳳衾鴛帳欲去無因到蝦鬚窣地重門悄認繡履頻移洞房杳杳強語笑逞如簧再三輕巧梳妝早琵琶間抱愛品相思調聲聲似把相思告隔簾贏得斷腸多少恁煩惱除非共伊知道樂章如此分段然梳妝早三字不應贅于前結之下玩其語意自為過變起句且蝦鬚句七字抵後聲聲句七字認繡履二句抵後隔簾二句強歡笑三字抵後恁煩惱三字逞如簧句七字抵後末句則梳粧早非屬後段而何況語意亦謂梳粧早完間暇無事故抱弄琵琶耳碧牡丹七十四字晏幾道翠袖疏紈扇涼葉催歸燕一夜西風幾處傷髙懷逺細菊枝頭開嫩香還遍月痕依舊庭院事何限悵望秋意晚離人鬢華將換靜憶天涯路比此情還短試約鸞箋傳素期良願南雲應有新雁事何限是換頭起句子野正伯各詞皆同因舊刻誤連前結圖譜因之謬矣一夜西風以下俱與後段同靜憶天涯乃四字下路比句是六字圖譜誤分五字兩句尤大謬豈前段亦可以一夜西風幾為句耶又於傳素期句傳字下誤多與字又一體七十五字程垓睡起情無著曉雨盡春寒弱酒盞飄零幾日頓疏行樂試數花枝問此情何若為誰開為誰落正愁却不是花情薄花元笑人蕭索舊觀千紅至今冷夢難托燕麥春風更幾人驚覺對花羞為花惡前詞第二句五字此三字兩句前兩結皆六字一句此皆三字兩句餘同曉雨盡無咎作銀箏低三平字為誰開無咎作梁舟緊梁字平緊字仄子野作芭蕉寒芭字平問此情更幾人是一字領句者無咎用紅浪隨鴛履眼亂樽中翠如五言詩句想不拘至今句與幾日句平仄不同子野詞亦然無咎則前後相同與晏詞體合亦不拘也觀酒盞舊觀各二句愈可知圖譜注前詞以靜憶天涯路為五字之誤矣傳言玉女七十四字朝沖之一夜東風不見栁梢殘雪御樓煙暖對鼇山綵結簫鼓向晚鳳輦初回宮闕千門燈火九逵風月繡閣人人乍嬉遊困又歇艷粧初試把珠簾半揭嬌羞向人手撚玉梅低説相逢長是上元時節艷粧以下與前同對鼇山句即同把珠簾句對把二字領句各家皆然竹齋後段亦用比年時更瘦而前則云磔磔敲春晝此誤筆不可學其篇甚佳惜此句為疵也鼓晚二字俱仄羞人二字俱平或不拘竹齋前云衾繡半捲後云雙燕乍歸金谷前云華國翠路後云花旗翠帽國字恐訛不如海野前云華胥夢裏後云幽期密約逃禪前云看猶未足後云韶華過半為易填而諧聽耳此句第三字必用去聲勿誤困又歇三仄是定格石之照夜賞黃之似病酒楊之與有問氣味俗皆同獨曽氏云不似少年懷抱年懷二字皆平且不于三字豆句則竟與前段同格矣或另有此體然當從其多者不見二字作訝然意妙圖譜改作吹散真如嚼蠟矣此則嘯餘仍作不見二字未差也又以晚字訛作曉字則仍嘯餘之謬吾未見上元必待天曉而張燈火也何不從其是處而偏從其謬處耶百媚娘七十四字張先珠閣五雲仙子未省有誰能似百媚等應天乞與淨飾艷粧俱美取次芳華皆可意何處無桃李蜀被錦文鋪水不放彩鸞雙戲樂事也知存後會爭奈眼前心裏緑皺小池紅疊砌花外東風起前後同會字不是叶韻剔銀燈七十四字杜世安昨夜一場風雨催促牡丹歸去孫武宮中石崇樓下多情怎生為主真疑洛浦雲水莫杳無重數獨倚闌干凝佇香片亂沾塵土爭似當初不曽相見免恁惱人腸肚緑叢無語空留得寶刀剪處情字宜用仄聲前後同又一體七十五字毛滂簾下風光自足春忽到席間屏曲瑤甕酥融羽觴蟻鬭花映酃湖寒緑汨羅愁獨又何似紅圍翠簇聚散悲歡箭速不易一杯相屬頻剔銀燈别聽牙板尚有龍膏堪續羅薰繡馥錦瑟畔低迷醉玉前段第二句七字後段第二句六字初謂前後不宜參差查耆卿壽域皆有前七後六者故録此以備一格拘耆卿于頻剔銀燈句作論籃買花或平仄不然不可學但從其前段艷杏夭桃為是也又一體七十六字杜安世好事爭如不遇可惜許多情相誤月下風前偷期竊會共把衷腸分付尤雲殢雨正繾綣朝朝暮暮無奈别離情緒和酒病雙眉長聚往事淒涼佳音迢遞似此因緣誰做洞雲深處暗回首落花飛絮前後第二句俱七字越溪春七十五字歐陽修三月十三寒食日春色遍天涯越溪閬苑繁華地傍禁垣珠翠煙霞紅粉牆頭秋千影裏臨水人家歸來晚駐香車銀箭透窗紗有時三點兩點雨霽朱門栁細風斜沉麝不燒金鴨玲瓏月照梨花向來俱作沉麝不燒金鴨冷籠月照梨花今依詞綜校正作六字兩句按銀箭句即同前春色句則有時句似應作七字于兩點雨分斷而以霽字屬下為是然臆測不敢謂必然故依舊注之兩點二字皆上聲作平者少遊金明池亦云過三點兩點細雨其句正對後段才子倒玉山休訴也作者不必泥此而于此二字誤用去聲圖譜于瓏字作可仄想誤刻也長生樂七十五字晏殊閬苑神仙平地見碧海架蓬瀛洞門相向倚金鋪微明處處天花撩亂飄散歌聲裝真筵壽賜與流霞滿瑤觥紅鸞翠節紫鳳銀笙玉女雙來近彩雲隨步朝夕拜三清為傳王母金籙祝千嵗長生中多難句豆處必有訛錯又一體七十五字晏殊玉露金風月正圓臺榭早涼天畫堂佳會組繡列芳筵洞府星辰龜鶴來添福壽歡聲喜色同入金爐泛濃煙清歌妙舞急管繁絃榴花滿酌觥船人盡祝富貴又長年莫教紅日西晚留著醉神仙此比前詞略明然亦未必無誤也無可證姑依舊刻録存來添福壽改用叶韻語知前詞飄散歌聲則佳或原是福壽來添也千年調七十五字辛棄疾巵酒向人時和氣先傾倒最要然然可可萬事稱好滑稽坐上更對鴟彞笑寒與熱總隨人甘國老少年使酒出口人嫌拗此個和合道理近日方曉學人言語未會十分巧看他們得人憐秦吉了只後起一句換頭餘同事字日字俱仄稼軒又一首後用賜汝蒼壁亦同但前用叫開閶闔或偶誤或不拘未敢臆斷然作者依此用仄為是寒與熱下三句每句三字後結亦同圖譜分此九字前作三六後作六三又笑字失注叶韻且注可平誤矣而嘯餘之竒更可大粲更對鴟彞作四字句笑寒與熱作四字句總隨人甘國老作六字句後段結看他們得人作五字句憐秦吉了作四字句吉字注可平豈非怪事蓋甘國老是甘草也用以配後秦吉了鳥名作結巧絶作譜者不知耳其隨字注作可平意中竟以人甘二字連讀矣合字音呵譜圖無一字不亂注獨于合字作平者偏不注可平怪哉怪哉圖譜既知笑字屬上句又仍嘯餘之謬以笑字為可平且反注彞字可仄其去嘯餘一間耳稼軒又一首于隨字作斛字亦是作平蕊珠間七十五字趙彥端浦雲融梅風斷碧水無情輕度有嬌黃上林梢向春欲舞緑煙迷晝淺寒欺暮不勝小樓凝佇倦遊處故人相見易阻花事從今堪數片帆無恙好在一篙新雨醉袍宮錦畫羅金縷莫教恨傳幽句倦遊二句是換頭花事以下俱與前合但有嬌黃下十字不若後段片帆四字好在六字明順可從有嬌至林梢六字必有誤處惜無可考證也或曰嬌黃是嬌鶯之誤蓋謂鶯飛上林梢也然句法亦不可作上四下六解蹀躞七十五字周邦彥候館丹楓吹盡面旋隨風舞夜寒霜月飛來伴孤旅還是獨擁秋衾夢餘酒困都醒滿懷離苦甚情緒深念凌波微步幽房暗相遇泪珠都作秋宵枕前雨此恨音驛難通待憑征雁歸時寄將愁去夜寒下與後泪珠下同首句六字次句五字各家皆然嘯餘作一七一四謬甚面字應是回字之訛沈作百字未妥旋字去聲圖譜不解讀作平聲故反注可仄又因讀旋為平則風字拗遂并注風字可仄愈誤矣諸家于旋字皆用去聲夜寒句與後泪珠句皆九字各家俱然譜乃注夜字可平霜字可仄伴孤可平仄尤謬如逃禪云又還撩撥春心倍淒黯夢窗云倦蜂剛著梨花惹遊蕩千里云自憐春晚漂流尚羇旅而諸篇後段九字句亦無不與前同蓋此句以夜字去聲領起而第三字用霜字平聲接之至伴孤旅又用仄平仄音響所以諧協也若改此數字何以為調乎暗相遇宜仄平仄譜注可平仄仄總欲改拗作順而不知成其為詩句不成其為詞句矣夢餘下十字與後待憑下十字各家俱上六下四醒字須讀作平聲而千里和云恨添客鬢終日子規聲苦則上四下六愚謂有各家可據作者但照後段填之不誤也又夢窗一篇首句云醉雲又兼醒雨平仄異因餘同不録又一體七十五字楊無咎金谷樓中人在兩點眉顰緑叫雲穿月橫吹楚山竹怨斷憂憶因誰坐中有客猶記在平陽宿泪盈目百轉千聲相續停杯聽難足謾誇天海風濤舊時曲夜深煙慘雲愁倩君洗醉明日看梅梢玉兩結俱用四字一句三字兩句與前詞異瑞雲濃七十五字楊無咎暌離謾久年華誰信曽換依舊當時似花面幽歡小會記永夜杯行無算醉裏屢忘歸任虛簷月轉能變新聲隨語意悲歡感怨可更餘音寄羌管倦遊江浙問似伊阿誰曽見度已無腸為伊可斷依舊至無算與後可更至曽見同此是瑞雲濃與瑞雪濃無涉番搶子七十五字韓玉莫把團扇雙鸞隔要看玉溪頭春風客妙處風骨瀟間翠羅金縷瘦宜窄轉面兩眉攢青山色到此月想精神花似秀質待與不清狂如何得奈何難駐朝雲易成春夢恨又積送上七香車春草碧要看以下與後待與以下同下水船七十五字黃庭堅總領神仙侶齊到青雲岐路丹禁風微咫尺諦聞天語盡榮遇看即如龍變化一擲靈梭風雨真遊處上苑尋春去芳草芊芊迎步幾曲笙歌櫻桃艷裏歡聚瑤觴舉回祝堯齡萬萬端的君恩難負後段比前多起句三字又一體七十五字朝補之百紫千紅翠惟有瓊花特異便是當年唐昌觀中玉蘂尚記得月裏仙人來賞明日喧傳都市甚時又分與揚州本一朵冰姿難比曽向無雙亭邊半酣獨倚似夢覺曉出瑤臺十里猶憶飛瓊標致便字以下十字曽向以下十字一氣故前宜於當年下斷句後宜于亭邊下斷句其實一也尚記得似夢覺又字本字俱不用韻里字却叶與前詞異又一體七十六字朝補之上客驪駒繫驚喚銀瓶睡起困倚妝臺盈盈正解羅髻鳳叉墜繚繞金盤玉指巫山一段雲委半窺鏡向我橫秋水斜頷花枝交鏡裏淡拂鉛華匆匆自整羅綺斂眉翠雖有愔愔密意空作江邊解珮斜頷句比前多一字指字意字俱叶韻巫山句平仄變若作一段巫山雲委則與後結合而亦符前調矣撲蝴蝶七十五字或加近字趙彥端清和時候薰風來小院琅玕脫籜方塘荷翠颭栁絲輕度流鶯畫棟低飛乳燕園林緑陰初遍景何限輕紗細葛綸巾和羽扇披襟散髮心清塵不染一杯洗滌無餘萬事消磨去逺浮名薄利休羡前後段森然對峙只景何限三字為過變首句耳汲古不校以此三字刻附前結然未嘗云作譜也乃各書之自以為譜者亦俱不肻訂正何歟又一體七十七字呂渭老分叉綰髻洞府難分手離觴短闋啼痕冰舞袖馬嘶霜滑橋橫路轉人依古栁曉色漸分星斗怎分剖心兒一似傾入離愁萬千斗垂鞭佇立傷心還病酒十年夢裏嬋娟二月花中豆蔲春風為誰依舊洞府句平仄與前異傾入句比前調多二字萬千二字仄平亦與前異無名氏一首玉人應在明月樓中畫眉懶正與此同圖譜乃作上八字下三字誤聖求别作于馬嘶二句作乍涼衣著輕明微醉歌聲審聽穩必多一審字此二句俱用對偶語無七字之理也故不收七十八字格兩叶斗字誤春草碧七十五字李獻能紫簫吹破黃昏月簌簌小梅花飄香雪寂寞花底風鬟顔色如花命如葉千里浣凝塵凌波襪心事鑑影鸞孤箏絃雁絶舊時雪堂人今華髮腸斷金縷新聲杯深不覺琉璃滑醉夢繞南雲花上蝶後起二句換頭餘同然杯深句平仄異時字平上字仄亦稍異此調作者甚少平仄悉宜依之又一體九十八字万俟雅言又隨芳渚坐看翠連霽空愁遍征路東風裏誰望斷西塞恨迷南浦天涯地角意不盡消沉萬古曽是送别長亭下細緑暗煙雨何處亂紅鋪繡茵有醉眠蕩子拾翠遊女王孫逺栁外共殘照斷雲無語池塘夢生謝公後還能繼否獨上畫樓春山暝雁飛去亦惟詞隱有此調他不可考詞亦精妙可法坐字一作生字角字别字以入作平蓋此句即後段之池塘夢生獨上畫樓也或云坐字應從生字為是首句五字當于生字讀斷蓋此後之亂紅鋪繡茵五字平仄吻合而下以看字領下二句即如後之以有字領下二句也有一傖父云又隨芳渚下作生字無理地角角字何必作平夢生必是夢草之誤余笑謂曰此詞乃是詠草先輩尚未詳玩耳婆羅門引七十六字曹組漲雲暮卷漏聲不到小簾櫳銀河淡掃澄空皓月當軒髙挂秋入廣寒宮正金波不動桂影朦朧佳人未逢歎此夕與誰同望逺傷懷對影霜滿秋紅南樓何處想人在長笛一聲中凝泪眼立盡西風按此調向于婆羅門引上加望月二字誤也因是望月而作故傳訛以詞題加于牌名之上耳稼軒友古本名只四字婆羅門令八十六字栁永昨宵裏恁和衣睡今宵裏又恁和衣睡小飲歸來初更過醺醺醉中夜後何事還驚起霜天冷風細細觸疏窗閃閃燈搖曳空牀展轉重追想雲雨夢任欹枕難繼寸心萬緒咫尺千里好景良天彼此空有相憐意未有相憐計與前詞全不同句豆以意點定或有訛處未可知也御街行七十六字栁永燔柴煙斷星河曙寶輦回天步端門羽衛簇雕欄六樂舜韶先舉鶴書飛下雞竿髙聳恩露均寰寓赤霜袍爛飄香霧喜色成春煦九儀三事仰天顔八彩旋生眉宇椿齡無盡蘿圖有慶常作乾坤主又一體七十六字栁永前時小飲春庭院悔放笙歌散歸來中夜酒醺醺惹起舊愁無限雖看墜樓換馬爭奈不是鴛幃伴朦朧俱妙暗花面欲夢還驚斷和衣擁被不成眠一枕萬回千轉惟有畫梁新來雙燕徹曙聞長嘆雖看墜樓以下十四字語氣宜在換馬斷句然此調結處俱是兩四字一五字者想一氣貫下馬字可以作平歌時無礙耳樓梁二字用平與前異暗字宜平恐誤又一體七十八字又名孤雁兒范仲淹紛紛墜葉飄香砌夜寂靜寒聲碎真珠簾捲玉樓空天淡銀河垂地年年今夜月華如練長是人千里愁腸已斷無由醉酒未到先成泪殘燈明滅枕頭欹諳盡孤眠滋味都來此事眉間心上無計相回避次句用三字兩句與前異歐詞一首刻前六字後五字誤書舟有孤雁兒詞查與此調同故不另列又一體八十二字髙觀國香波半窣深深院正日上花陰淺青絲不動玉鈎間看翠額輕籠蔥蒨鶯聲似隔篆煙微度愛橫影參差滿那回低挂朱欄畔念悶損無人捲窺春偷倚不勝情倣佛見如花嬌面纎柔緩揭瞥然飛去不似春風燕按此調前後不宜參差此後結誤落一字耳友古一首前五字後六字亦誤側犯七十七字方千里四山翠合一溪碧繞秋容靚波定見鷺立魚跳動平鏡修篁散步屧古木通幽徑風靜煙霧直池塘倒晴影流年舊事老矣塵心瑩還暗省點吳霜憔悴愧潘令夢憶江南小園路迥愁聽葉落轆轤金井詞至千里而繩尺森然纎毫無假借矣四聲確定欲旁注而不可得矣舊刻片玉詞于小園路迥句作酒壚寂靜靜字犯重愁聽以下作煙鎖漠漠藻地苔井鎖字失叶詞統云方千里改之為是愚謂美成為樂府創始之人豈有謬誤況千里之和清真無一字聲韻不合寧有改之之理迥聽二字必其原韻因傳寫致訛而後遂不可考耳或曰白石作于尾句云寂寞劉郎自修花譜寞字亦不叶韻千里之聽字或是偶合然前段有波定風靜兩個二字叶韻句聽字亦必用韻也或白石之寞字借作暮字音亦未可知譜注尾句八字無足怪者乃以煙鎖二字注可用仄平則大誤矣觀白石用劉郎則方之葉落周之漠漠或皆以入作平是鎖字萬無用平之理也又以還暗省點吳霜作六字句動平鏡為可用平仄仄愧潘令為可用平平仄還暗省為可用仄平仄皆謬之謬者故又詞統云修篁散步屧不成句恐有誤此不知何若論音律則散步二字去聲正合周詞度暗二字若論文理則修篁之間可以散步無害于理步屧隨春風係杜詩散步詠涼天係韋詩何為不成句乎如謂通幽徑屬木散步屧屬人兩句不對則周詞度暗草屬飛螢遊花徑屬秉燭之人亦不成句乎此種論詞真不可解耳四園竹七十七字四或作西周邦彥浮雲護月未放滿朱扉鼠搖暗壁螢度破窗偷入書幃秋意濃間佇立庭柯影裏好風襟袖先知夜何其江南路繞重山心知謾與前期奈向燈前墮泪腸斷蕭娘舊日書辭猶在紙雁信絶清宵夢又稀諸刻皆以奈向誤作奈何遂致此句律拗而譜圖以腸斷句作七字讀且注叶韻蓋吳越鄉音多以魚虞韻混入支微如呼樞為癡呼儲為遲之類故作譜者認書字是韻耳豈清真詞伯而亦作此蠻音醜態耶觀方千里詞無限當年往復詩詞明明于辭字和韻何竟不一查也其裏字紙字乃以仄聲叶平方用疏疏雨裏千萬紙亦是和韻可見詞中平仄兩叶者甚多此又其一人未及細考耳圖譜不知此義竟以辭猶在紙連下雁信絶作七字句更為可笑豈方詞可讀作辭干萬紙甚近日耶且因誤讀句拗遂又注此七字可用仄平平仄平平仄如七言詩一句真怪絶矣嗚呼是可作譜何哉余每贊嘆方氏和清真一帙為千古詞音證據觀其字字摹合如此不惟調字可考且足見古人細心處不惟有功于周氏而凡詞皆可以此理推之豈非詞家所當蒸嘗者耶故字旁不敢復注平仄祝英臺近七十七字或無近字吳文英剪紅情裁緑意花信上叉股殘日東風不放嵗華去有人添燭西窗不眠侵曉笑聲轉新年鶯語舊樽俎玉纎曽擘黃柑柔香繫幽素歸夢湖邊還迷鏡中路可憐千點吳霜寒銷不盡又相對落花如雨此調多用仄平仄句譜皆注可平平仄誤笑聲又相有作平仄者柔香繫幽聖求書舟偶用平仄不宜從祝詞品載戴石屏所娶江西女子作惜多才一首即英臺也傳流殘缺前段三十七字不少後則逸去起處三句十四字圖譜不識合前後為一另立一調作六十三字而于尾句澆奴墳土作墳上土是六十四字矣且即取詞中第四語揉碎花箋四字命作調名因即杜撰出許多可平可仄來乃以為譜怪極矣鳳樓春七十七字歐陽炯鳳髻緑雲叢深掩房櫳錦書通夢中相見覺來慵勻面泪臉珠融因想玉郎何處去對淑景誰同小樓中春思無窮倚闌凝望暗牽愁緒栁花飛起東風斜日照簾羅幌香冷粉屏空海棠零落鶯語殘紅照簾一作照簾櫳詞綜仍之但前用房櫳此處不宜復叶譜圖以羅幌句拗因注羅幌香三字可用仄平仄此調自五代迄金元無第二首傳世者何從知幌字可平耶此句或當在幌字斷句而簾字上尚有繡字或珠字耳即謂幌字或是幃字之訛亦止可存其臆説相傳巳久豈可竟改其平仄以示後人乎一叢花七十八字秦觀年來今夜見師師雙頰酒紅滋疏簾半捲微燈外露華上煙裊涼颸簮髻亂拋偎人不起彈泪唱新詞佳期誰料久參差愁緒暗縈絲相應妙舞清歌夜又還對秋色嗟咨惟有畫樓當時皓月兩處照相思前後同露華上又還對多用仄平仄或有用仄平平仄仄平者亂字畫字必用去聲即不能亦用上入聲必不可用平此為定格如子野用漸細東坡用縱少惜香用乍厚等字可見書舟放翁于此句用平平仄仄則又一格亦可從也係惜香一首第四句作東西芳草漫茸茸誤刻無此體陽關引七十八字又名古陽關朝補之草草蛩吟噎暗栁螢飛滅空庭雨過西風緊飄黃葉卷書帷寂靜對此傷離别重感歎中秋數日又圓月沙觜檣竿上淮水濶有飛鳬客詞珠玉氣冰雪且莫教皓月照影驚華髮問幾時清樽夜景共佳節卷書帷與且莫教二句句法用卷且二字領句與下對此句照影句如五言詩者不同不可不知按寇萊公作前結云動黯然知有後會甚時節後結云念故人千里自此共明月有字里字俱用上聲不拘也空庭以下前後相同有飛鳬客仄平平仄與前異而飛鳬二字相連寇云嘆人生裏嘆字亦仄人生亦連氣字用去聲與前異寇亦用易字必非偶合作者須留意焉譜圖將西風緊連上作七字詞珠玉連下作六字前結一三一七後結兩五俱誤按第一草字恐誤金人捧露盤七十九字平西平曲又名上西程垓愛春歸憂春去為春忙旋點檢雨障雲妨遮紅護緑翠幃羅幕任髙張海棠明月杏花天更惜濃芳喚鶯吟招蝶拍迎栁舞倩桃粧盡呼起萬籟笙簧一觴一詠儘教陶瀉繡心腸笑他人世漫嬉遊擁翠偎香此調因有别名故各書多復收之而圖譜乃收至三體既收金人捧露盤與上西平又收一元人詞上南平調竒絶蓋嘯餘于兩結原讀作一七字一四字故圖譜亦以杏花天三字屬上句而嘯餘所收之詞于天字用仄圖譜所收之詞于天字用平且偶于通篇韻合故以為另一體而列之又其後段于盡呼起至繡心腸云洗五州妖氣關山巳平全蜀風行何用一泥丸是于州字豆山字叶蜀字句丸字叶者圖譜誤認洗五州妖氣為一句關山巳平為一句全蜀風行為一句何用一泥丸為一句則此詞比前詞原未嘗有異而讀者差到底故遂另列一體耳豈非竒絶乎又稼軒集九衢中一首前結云自憐是海山頭種玉人家乃于自憐是一句內落去一字觀其後段仍是兩句十一字可知譜因將自憐是連下作十字句故認為另格然則如東浦刻後結不如早問溪山髙養吾慵亦不管其是誤落而亦可另收一體耶總之此調起處三字三句換頭三字四句其餘字字相同豈有前後互異之理書籍之誤刻者甚多安可不一細心體認凡讀書皆然不獨一詞也蘆川後起作名與利不必學望雲涯引七十九字李甲秋容江上岸花老蘋洲白露溼蒹葭浦嶼漸增寒色間漁唱晚鶩雁驚飛處映逺磧數點輕帆送天際歸客鳳臺人散漫回首沉消息素鯉無憑樓上暮雲凝碧曉向西風下認逺笛宋玉悲懷未信金尊消得此詞後段比前少間漁唱晚四字尾句多一字愚以為不全之調也蓋尾句或多或寡詞原有換尾之例若通篇前後字句平仄音響皆同而中間缺去四字則各調無此例故謂其不全惜他無可考證耳夢還京七十九字栁永夜來匆匆飲散欹枕背燈睡酒力全輕醉魂易醒風揭簾櫳夢斷披衣重起悄無寐追悔當初繡閣話别太容易日許時猶阻歸計甚況味旅館虛度殘嵗想嬌媚那裏獨守鴛幃靜永漏迢迢也應暗同此意無可引證姑為分句恐有差落未必確然山亭栁七十九字晏殊家住西秦賭博藝隨身花栁上鬬尖新偶學念奴聲調有時髙遏行雲蜀錦纒頭無數不負辛勤數年來往咸京道殘杯冷炙謾消魂衷腸事託何人若有知音見採不辭遍唱陽春一曲當筵落泪重掩羅巾花栁下與後衷腸下同又一體七十九字杜安世曉來風雨萬花飄落歎韶光虛過却芳草萋萋映樓臺淡煙漠漠紛紛絮飛院宇燕子過朱閣玉容淡妝添寂寞檀郎孤願太情薄數歸期絶信約暗添春宵恨平康恣迷歡樂時時悶飲緑醑甚轉轉思量著用仄韻而首句不起韻次句四字前結五字後結六字芳草下暗添下各十一字皆上四下七俱與前調異姑分其句然或有訛脫也暗添添字該仄其誤尤明鎮西七十九字蔡伸秋風吹雨覺重衾寒透傷心聽曉鐘殘漏凝情久記紅窗夜雪促膝圍爐交杯歡酒如今頓孤歡偶念别後菱花清鏡裏眉峰暗鬭想標容怎禁銷瘦忍回首但雲箋墨妙鴛錦啼粧依然似舊臨風泪霑襟袖後段想標容以下與前段同念別後仄平仄莫誤又一體七十九字鎮西本集作小栁永意中有箇人芳顔二八天然俏自來姦黠最竒絶是笑時媚靨深深百態千嬌再三偎著再三香滑久離缺夜來魂夢裏尤花殢雪分明似舊家時節正歡悅被雞聲喚起一場寂寞無眠向曉空有半窗殘月首句五字次句四字無眠向曉不叶韻與前詞異或云前詞或亦五字起余謂秋風吹雨如何覺起來除是腳字則可段按此調天然俏以下前後相同久離缺三字係後換頭句前詞甚明汲古誤將此三字贅附前尾遂失却此調之體況論文義亦云離別巳久而夜來夢中猶是舊時光景乃正當歡悅却又被雞聲驚覺也豈可割一句搭上截耶本應改正今仍舊録之者因欲覽者與前蔡詞相較自見分明耳一場以下十四字若照前詞原可作一場寂寞一句無眠向曉一句空有半窗殘月一句但前段是笑時以下不可如此分讀故注斷句如右小鎮西犯七十一字栁永水鄉初禁火青春未老芳華滿栁汀煙島波際紅幃縹眇盡杯盤小歌袚褉聲聲諧調路遼繞野橋新市裏花穠妓好引遊人競來歡笑酩酊誰家年少信玉山倒家何處落日眠芳草汲古亦將路遼繞三字屬上段又袚字重寫今改正落日句五字比前結異玉字照前似應作平聲杯盤玉山皆四字句中用二字相連者不可不知全本譜以字少者居前此調因題有犯字必非鎮西體故以列于正調之後紅林檎近七十九字方千里曉起山光慘晚來花意寒映月衣纎縞因風佩琅玕三弄江梅聽徹幾點岸栁飄殘宛然舞曲初翻簾影捲波瀾把酒同喚醉促膝小留歡清狂痛飲能消多少杯盤況人生如寄相逢半老嵗華休作容易看起四句後起二句竟是五言古詩甚拗結一句亦拗但此係美成按腔製體有冬初雪景二首平仄相同千里和之亦一字不異是知調格應是如此不可任意更改不然美成既苦守不變千里又苦相模倣何其迂拙大遜今人之巧便乎于此可悟詞律之嚴愚之迂拙見哂于今人而或見諒于古人處亦可稍自白巳乃圖譜無一字不改拗為順不知皆改順為拗矣每見今之名流云作詞但要錬字尖新鍊句妥俊讀之諧耳即為甚工必費心力求合于古毋乃愚而無益余詞若然則隨意做成長短句便是詞矣何必更名為某調某調耶未有名為某某調而平仄字句故與相乖之理如五七言古詩而強名曰律豈理也哉步衣字去聲影字周用池字初疑千里和周詞一卷趨不差分寸此字何以不守及觀清真雪詞亦用手字故千里不妨亦用上聲耳詞律卷十一
