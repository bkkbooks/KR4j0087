body:
  text: 詞律卷四宜興萬樹撰伊川令四十四字范仲胤妻西風昨夜穿簾幕閨院添蕭索最是梧桐零落迤邐秋光過却人情音信難托教奴獨自守空房淚珠與燈花共落後庭花四十四字毛文錫輕盈舞妓含芳艷競粧新臉步搖珠翠修蛾斂膩鬟雲染歌聲慢發開檀點繡衫斜掩時將纎手勻紅臉笑拈金靨毛詞三首其苐一首次句用後庭花發正合題名而各刻多改後庭作瑞庭可笑後庭花乃陳後主曲瑞庭何所取義乎覺此詞用閉口韻甚嚴後人則與元寒刪先出入太泛濫不及唐人矣競膩繡笑皆去聲妙甚當學之是又一首時刻作爭不教人長相見句甚拗愚謂恐爭教人不長相見或教人爭不長相見之誤也又一體四十六字孫光憲景陽鐘動宫鶯囀露涼金殿輕飈吹起瓊花旋玉葉如剪晚來髙閣上珠簾捲見墜香千片修蛾慢臉陪雕輦後庭新宴後起用八字次句用五字與前異觀觀此尾句則毛詞後庭花發可信葉字可作平然後孫詞此字亦可用去又一體四十六字孫光憲石城依舊空江國故宫春色七尺青絲芳草碧絶世難得玉英凋落盡更何人識野棠如織只是教人添怨憶悵望無極後起九字異世字望字俱用仄聲與毛詞不同想不拘也碧字各本多作緑字此句須叶韻必係碧字無疑譜詞綜載王秋澗趙松雪後庭花破子乃是北曲本于曲調不收今録趙詞于後觀者自明蓋此等若收入詞則不勝其收矣清後庭花舟芙蓉兩岸秋採菱誰家女趙孟俯暮鷗溪一葉歌聲起亂雲愁滿頭風雨帶荷葉歸去休襯字若論曲調則此即西廂襯殘紅一曲也帶字是此詞之清溪一葉舟平仄為正而秋澗之緑樹逺連洲不合也菱字亦宜用仄巫山一段雲四十四字李珣景陽鐘動宫鶯囀露涼金殿輕飈吹起瓊花旋玉葉如剪晚來髙閣上珠簾捲見墜香千片修蛾慢臉陪雕輦後庭新宴後起用八字次句用五字與前異觀觀此尾句則毛詞後庭花發可信葉字可作平然後孫詞此字亦可用去又一體四十六字孫光憲石城依舊空江國故宫春色七尺青絲芳草碧絶世難得玉英凋落盡更何人識野棠如織只是教人添怨憶悵望無極後起九字異世字望字俱用仄聲與毛詞不同想不拘也碧字各本多作緑字此句須叶韻必係碧字無疑譜詞綜載王秋澗趙松雪後庭花破子乃是北曲本于曲調不收今録趙詞于後觀者自明蓋此等若收入詞則不勝其收矣清後庭花舟芙蓉兩岸秋採菱誰家女趙孟俯暮鷗溪一葉歌聲起亂雲愁滿頭風雨帶荷葉歸去休襯字若論曲調則此即西廂襯殘紅一曲也帶字是此詞之清溪一葉舟平仄為正而秋澗之緑樹逺連洲不合也菱字亦宜用仄巫山一段雲四十四字李珣古廟依青嶂行宫枕碧流水聲山色鎖妝樓往事思悠悠雲雨朝還暮煙花春復秋啼猿何必近孤舟行客自多愁此詞及毛文錫作俱即詠巫山神女事又一體四十六字唐昭宗蝶舞梨園雪鶯啼栁帶煙小池淺日艷陽天苧蘿山又山青鳥不來愁絶忍看鴛鴦雙結春風一等少年心間情恨不禁前段句法與前詞同但苧蘿句平仄各異耳後段起兩句六字全異醜奴兒四十四字羅敷艷歌又名羅敷媚采桑于和凝蝤蠐領上訶梨子繡帶雙垂椒戶間時競學樗蒲賭荔枝叢頭鞋子紅編細裙窣金絲無事嚬眉春思翻教阿母疑此是本調正格作者皆從之攤破醜奴兒六十字趙長卿樹頭紅葉飛都盡景物淒涼秀出羣芳又見江梅淺淡粧也囉真箇是可人香蘭魂蕙魄應羞死獨占風光夢斷髙唐月送疏枝過女牆也囉真箇是可人香粧牆二字叶韻真箇是六字前後同但按本集此詞題作一剪梅又注或作攤破醜奴兒觀也囉以上端端正正是醜奴兒只添也囉二字并真箇是六字所謂攤破也與一剪梅無干想因此詞是詠梅而首句七字下二句皆四字有似一剪梅故訛傳耳今收于此不載在一剪梅之後也囉二字乃歌詞助語之辭南曲水紅花亦用此二字説又按囉字佛經作羅打切俗語亦有囉哩囉嗹之而向來南曲俱唱作羅字音有一傖父自謂知音因聞此字宜讀羅打切謂是家麻韻遂以浣沙記唱一聲水紅花也囉句囉字是叶韻且云作此套曲者必用家麻韻方可偶見余所製南劇此曲不用家麻駭然以為大誤蓋其人但識浣沙一詞而未見他曲即譜中月明千里故人來也囉亦未寓目故大肆譏議余亦不與辨但笑而謝其糾正焉因思其人若見此詞既用芳粧韻而又用也囉亦當蒙駁矣因注此詞附記以為一笑促拍醜奴兒六十二字兒似娘兒又名青杏黃庭堅得意許多時長醉賞月下花枝暴風急雨年年有金籠鎖定鶯雛燕友不被雞欺紅斾轉逶迤悔無計千里追墮再來重綰瀘南印而今目下恓惶怎向日永春遲谷集直名曰醜奴兒而元遺山氷麝室中香一首題加促拍二字故從之以别于本調此調趙長卿名為青杏兒今北曲小石調青杏兒即此調詞綜所載趙秉文風雨替花愁是也大石調名青杏于亦同只于友字向字用仄叶本譜于乾荷葉後庭花平湖樂等實係北曲概不收入以與詞調相混故不存青杏兒名目作又按此調趙長卿又名似娘兒汲古毛氏注云或攤破醜奴兒誤毛氏亦非蓋醜奴兒非誤但攤破二字誤耳故前也囉一調準作攤破而此調準作促拍又按南曲仙吕引子似娘兒亦即此調故知此調多異名今以在詞為醜奴兒在北曲為青杏兒在南曲為似娘兒可也又書舟亦有此調名曰攤破南鄉子尢為無涉正與誤名一剪梅同故南鄉子正調後亦不另收程體醜奴兒慢九十字潘元質愁春未醒還是清和天氣對濃緑隂中庭院燕語鶯啼數點新荷翠鈿輕泛水平池一簾風絮才晴又雨梅子黃時忍記那回王人嬌困初試單衣共攜手紅窗描繡畫扇題詩怎有而今半牀明月兩天涯章臺何處多應為我蹙損雙眉吳子和此調題無慢字荷字今字俱用叶韻與此異後起云凝想恁時歡笑傷今萍梗悠悠句法亦纍兹注明因餘同不録稿按此詞因首句四字後人遂名曰愁春未醒夢窗東風未起一篇是也圖譜不知即醜奴兒慢故另立一愁春末醒之調且斷句差錯殊甚踵訛襲謬致時人之喜填新名者多受其纍矣總之作譜者全未費一絲心力半黍眼光不審調不訂韻不較本篇之前後不較他作之異同隨意斷句遂曰是足以為程式矣豈不怪哉今細加勘定先録吳詞于左東愁春未醒上纎塵無影峭雲溼凝酥深塢乍洗梅風未起花清釣倦遊絲冷浮虹氣海波明若耶門閉扁舟去懶客思鷗輕幾度問春倡紅冶翠空媚隂晴看真色千巖一素天淡無情醒看重開玉鈎簾外曉峯青相扶更醉越山更上臺最髙層此詞句法本如此讀與前潘詞如出一轍止洗梅清句上落去乍字今人任意混讀選聲及填詞圖譜皆以第二句作四字且云塵字起韻夫此詞通首用庚青韻豈獨用一真文字為起夢窗詞家龍象豈亦猶今人之亂用韻者真寃殺矣既注塵字為韻則後段春字亦可注叶矣何不注乎以次句作四字則前潘詞亦可于清和斷句乎又無影連下作五字凝酥連下作七字釣倦連下冷字作五字浮虹至波明作三字兩句如此讀法如此分句法豈不怪絶今斷之曰起句四字次句六字影字乃為起韻蓋長詞用平仄互叶者甚多不然直至清字方用韻起必無是理潘詞第二句氣字原端然是起韻也峭雲溼以下與後段看真色以下皆字字吻合亦與潘詞字字吻合峭雲溼乃三字一豆用仄平仄與後之看真色潘之對濃緑共攜手合也凝酥句四字洗梅句洗字上或下落一字蓋此二句對後段千巖至無情八字也釣倦句四字對後醒看句冷浮句七字對後玉鈎句若耶三句對後相扶三句不惟句字明晰而平仄亦甚嚴整以較潘詞有一字不合乎蓋夢窗丙稿愁春未醒深塢下即洗梅清而乙稿醜奴兒則有乍字人因忽略不察其兩稿同是一詞但見愁春未酲新名喜取入譜而不知有落字竟將句法亂分矣可歎哉况乙稿第二首亦即以鸞字叶亂字尤可據也兩詞平仄森然學者須依其矩矱如未醒未起之去上忍記幾度之上去皆當從之而後起首句之那字問字尤為要緊萬勿用平凡此皆愚意僭論如是有心人或首肯焉若以為怪誕以為穿鑿以為狂妄則皆聽之而巳有一友見此注口雖唯唯而心不信氣字影字仄聲起韻之説適讀友古詞則平仄更多問用始訝然知余説之不謬而余亦自幸其億中云因喜而備録之以廣平仄互用之格明醜奴兒慢是天真瀟灑更鬢髮堆雲玉臉淡拂輕眸秀色别霞醉裏精神衆中標格誰能畫當時攜手花籠淡日重門深亞巫峽夢回巳成陳事豈堪重話謾贏得羅襟清淚鬢髮霜華口念傷懷憑欄煙水渺無涯秦源目斷碧雲暮合難認仙家此詞以灑字仄聲起韻而以霞宇平接畫亞話仄華涯家平相間為叶更鬢髮下十一字一貫即前潘詞對濃緑下十一字其句豆處不妨上下也念傷懷上落一字嘯餘及圖譜又收醜奴兒近一調今查係全誤特照舊刻録之并駁正于後覽者當為一噱焉千醜奴兒近一百四十六字峯雲起驟雨一霎兒價更辛棄疦陽逺樹斜風景怎生圖畫中字青旗賣酒一山那畔别有人家只消山水光無事過者霎午睡醒時萬松窗竹户萬千瀟灑壑共千巖爭秀野鳥飛來平又是一飛流孤負生弄泉手歎輕衫帽幾許紅塵後還自喜濯髮滄浪依舊酒字人生行樂耳身虛名何似生前一杯栁便此地結吾廬老待學淵明問更手種門前五且歸去父約重來如此青山定重來否此詞自來分作三段其字一百四十六從稼軒舊集汲古閣板皆同其後嘯餘譜及填詞圖譜等書因從而分其字句論其平仄為圖為注于其下蓋欲以此譜詔天下後世之學詞者故學者亦從而信之守之俱謂醜奴兒近有此一格相與模倣填之矣稍有識者起而駁之日灑字是韻手字是借韻何以不注叶酒字即叶上秀手舊等韻何以注更韻且所注八字九字亦皆不確又有識髙者起而辨之曰譜于秀字注更仄韻大非此詞到底本是一韻因稼軒用韻常有出入如六么令以覺學叶折鴨之類乃此老誤處此詞是以秀栁叶價畫後人不可以譜更韻但改正通篇用一箇韻腳可耳二説如此謂留心風雅者矣而僕向來嘗疑之謂此詞必非僅字句之差叶韻之謬而巳如又是一飛流萬壑句稼軒必不至如是不通且用韻或一二假借亦必無前後分異若此者年來匆匆忽略未及校正近因有訂譜之役再四綢繹諷詠忽焉得之蓋其所謂第一段者實醜奴兒之前段也價畫之下用家字正此調平仄互用處而舊譜不識詞中兩箇一霎字俱作平聲一霎兒價即潘詞之清和天氣者字與俗這字同過者一霎即潘之梅子黃時是首段自起至末一字不差也其所謂第二段者則前半仍是醜奴兒而後半則非醜奴兒矣午睡以下十二字原是本調分作三句灑字是叶韻者其下則此調殘缺不全野鳥飛來又是一七個字即潘之攜手紅窗描繡畫七個字亦即同本詞前段逺樹斜陽風景怎七個字而野之字上缺一字又是一之下竟全遺失矣至飛流萬壑以下及所謂第三段者則係完全一首洞仙歌前段依舊止後段人生起也細細校對無一字不合只歎輕衫帽之衫字下落一短字耳以洞仙歌全首強借為醜奴兒之尾豈非大怪事乎又細考之稼軒原集醜奴兒近之後即載洞仙歌五闋當時不知因何遺失醜奴兒後半竟將洞仙歌一闋錯補其後故集中遂以醜奴兒作一百四十六字而後洞仙歌止存四闋矣讀者未嘗熟玩洞仙歌句法安能覺齒吻間有此聲響乎且見譜圖之中鑿然注明更無疑惑遂認定醜奴兒另有此一體然則讀者之不詳審共過尚輕而向來刻詞者之過較重至作譜作圖為定格以誤後人者其開罪于古今後世豈爰書可容未減哉僕本笨伯向來任意雌黃其為世所怒詈自揣不免然此等處輒自以為于詞學頗有微功耳時乙丑長夏展紅藤簞把卷卧端署東閣丹蕉花下不覺躍起大呼狂笑同人雪舫驚問因疏此相示雪舫亦掀髯擊節曰此詞自稼軒迄今五百七十餘年至今日始得洗出一副乾淨面孔真大快事因呼童子酌西國葡萄釀相與大醉菩薩蠻四十四字雲又名子夜歌巫山一片重疊金李白平林漠漠煙如織寒山一帶傷心碧暝色入髙樓有人樓上愁玉階空佇立宿鳥歸飛急何處是歸程長亭連短亭兩句一韻共易四韻連字或作更字然此一字用平為佳用平則此句首一字可用仄按青蓮此調與憶秦娥為千古詞祖實亦千古絶唱平仄悉宜從之又按唐蘇鶚杜陽雜編云宣宗大中初蠻國人入貢危髻全冠瓔垎被體故謂之菩薩蠻當時娼優遂製菩薩蠻曲文士往往聲其詞又崔令欽教坊記載兩院人歌曲名亦有菩薩蠻北夢瑣言云宣宗好唱菩薩蠻詞是原作蠻字自楊升庵好竒云是鬘字今人皆從之不知蠻字乃女蠻之蠻不必易也係按圖譜載菩薩蠻慢一調一百八字羅壺秋作查解連環別名故不録華清引四十五字蘇軾平時十月幸蓮湯玉甃瓊梁五家車馬如水珠璣滿路旁翠華一去掩方牀獨留煙樹蒼蒼至今清夜月依舊過繚牆散餘霞四十五字毛滂牆頭花口寒猶噤放嘯簾晝靜簾外時有蜂兒趂楊花不定闌干又還獨憑念翠低眉暈春夢枉惱人腸更懨懨酒病後起比前少一字憶悶令四十五字晏幾道取次臨鸞勻畫淺酒醒遲來晚多情愛惹間愁長黛眉低斂月底相逢見有深深良願願期信似月如花須更交長逺醒字作平聲讀與後深深良願句法同信字恐誤多蓋前後結相同而願期信字復而贅耳更漏子四十六字溫庭筠玉闌干金甃井月照碧梧桐影獨自箇立多時露華濃溼衣一向凝情望待得不成模樣雖叵耐又尋思怎生瞋得伊後起兩字韻後人俱三字矣又一體四十六字溫庭筠玉爐香紅蠟淚偏照畫堂秋思眉翠薄鬢雲殘夜長衾枕寒梧桐樹三更雨不道離情正苦一葉葉一聲聲空階滴到明起句毛熙震用煙月寒煙字平月字仄梧桐樹三字毛用人悄悄悄字仄可不拘也然自北宋以後前起皆用仄平平而後起竟與前同不復如樹字悄字用韻矣山谷一篇首句用菴摩勒此係偶然又一篇後一二句用休休休莫莫莫四五句用了了了玄玄玄亦是遊戲非正體也又一體四十六字孫光憲掌中珠心上氣愛惜豈將容易花下月枕前人此生誰更親交頸語合歡身便同比目金鱗連繡枕卧紅茵霜天似暖春前段與前體同後段不另換韻即叶前平聲監按各詞選所載皆只前一體蓋因花間止收孫少兩首皆與溫助教體同想忘考孫全詞故未及另立一體也又一體四十九字歐陽炯三十六宫秋夜永露華點滴髙梧丁丁玉漏咽銅壺明月上金鋪紅線毯博山爐香風暗觸流酥羊車一去長青蕪鏡塵鸞綵孤通首用平韻字句亦多異前結句平仄仄又一體一百四字杜安世庭逺途程算萬水千山路入神京暖日春郊緑栁紅杏香徑舞燕流鶯客館悄悄間庭堪惹舊恨深有多少馳驅驀嶺涉水枉廢身心思想厚利髙名謾惹得意煩枉度浮生幸有青松白雪深洞清間且樂升平長是宦遊羇思别離淚滿襟望江鄉蹤迹舊遊題書尚自分明此與唐腔迥别後段換頭六字以下俱與前段同只字之平仄略異耳悄悄聞庭疑是間庭悄悄總因恐有誤字不敢旁注好事近四十五字又名釣船笛鄭獬江上探春回正值早梅時節兩行小槽雙鳯按涼州初徹謝娘扶下繡鞍來紅靴踏殘雪歸去不須銀燭有山頭明月紅靴句如向子諲之尚喜知時節洪咨夔之半隂晴方好稍有不同然踏殘雪用仄平仄甚起調名詞皆然兩結用仄平平平仄圖譜謂可用平仄平仄仄誤誠齋末句看十五十六豈非上入作平之證張輯詞名東澤綺語債皆取詞中字題以新名如桂枝香名疏簾淡月齊天樂名如此江山長相思名山漸青憶秦娥名碧雲深點絳唇名南浦月又名沙頭雨謁金門名花自落又名垂楊碧憶王孫名闌干萬里心好事近名釣船笛然皆于題下自注寓某調今圖譜等好竒盡刪舊易新極無意味徒令人嘔惡耳好時光四十五字唐玄宗寶髻偏宜宫樣蓮臉嫩體紅香眉黛不須張敞畫天教入鬢長莫倚傾國貌嫁取個有情郎彼此當年少莫負好時光此調昉于明皇即以末字為名繡帶兒四十五字兒兒或作子一名好女曾覿瀟灑隴頭春取次一枝新還是東風來也猶作未歸人微月淡煙村謾佇立惆悵黃昏暮寒香細踈英幾點儘奈銷魂按山谷有好女兒詞三首其二首與此字字相合故嘯餘所收繡帶子即黃詞也今并入此調而録其又一首稍異者于左至好女兒又有晏小山六十二字一詞另列于後蓋調名重復訛混不得不如此分晰耳又一體四十五字黃庭堅春去幾時還問桃李無言燕子歸栖風徑梨雪亂西園唯有月嬋娟似人人難近如天願教清影常相見更乞取團圓問桃李無言句法不同願教句七字尾句五字皆與前異天門謡四十五字李之儀天塹休論險盡逺目與天俱占山水斂稱霜晴披覽正風靜雲間平瀲灧想見高吟名不濫頻扣檻杳杳落沙鷗數點或謂天塹塹字即是起韻蓋塹字亦閉口音必二字句不知此詞李自注賀方回韻今查賀詞首句牛渚天門險故知塹字不是起韻栁含煙四十五字毛文鍚隋堤栁汴河旁夾岸緑隂千里龍舟鳯舸木蘭香錦帆張因夢江南春景好一路流蘇羽葆笙歌未盡起橫流鎖春愁汴河旁舊刻俱訛作汴河春故作譜者謂與下香張字不叶韻另作一體而又收第二句起韻者作一體也不知毛詞四首精工麗密豈有三首皆同而一首獨異之理其第二首占芳春下叶人神三首近垂旒下叶州浮四首占春多下叶羅波皆于第二句起韻此首豈得至杳字方起韻乎近得善本乃是旁字正與下句叶耳一落索四十五字洛陽香又名玉聨環上林春吕渭老宫錦裁書寄逺意長辭短香蘭泣露雨催蓮暑氣昏池館向晚小園行遍石榴紅滿花花葉葉盡成雙渾似我梁間燕各家兩結俱六字此詞前尾五字獨異查所作有二首同故收之又一體四十六字辛棄疾羞見鑑鸞孤却倩人梳掠一春長是為春愁甚夜夜東風惡行繞翠簾珠箔錦箋誰托玉觴泪滿却停觴怕酒似郎情薄此前後整齊者辛又一首起云錦帳如雲髙處不知重數汲古刻錦帳如雲處髙不知重數乃誤也非另有此體倩錦二字不可用平又一體四十七字張先來時露浥衣香潤綵縧垂鬢卷簾還喜月相親把酒與花相近西去陽關休問未歌先恨玉峯山下水長流流水盡情無盡前起七字後起六字又一體四十八字嚴仁清曉鶯啼紅樹又一雙飛去日髙花氣撲人來獨自個傷春無緒别後暗寬金縷倩誰傳語一春不忍上髙樓為怕見分攜處第二句五字第四句七字又一體四十九字陳鳯儀蜀江春色濃如霧擁雙旌歸去海棠也似别君難一點點啼紅雨此去馬蹄何處向沙堤新路禁林賜宴賞花時還憶著西樓否前後次句俱五字又一體五十字黃庭堅誰道秋來煙景素任遊人不顧一番時態一番新到得意皆歡慕紫萸黃菊繁華處對風庭月露愁來即便去尋芳更作甚悲秋賦前後起句皆七字次句皆五字末句皆六字兩段整齊者按此調因題名有四字數又多寡不一故各譜收作兩調或三調如周美成眉共春山爭秀一首片玉詞作一落索清真集作洛陽春人不細考因而分列矣今查明歸併焉杏園芳四十五字尹鶚嚴妝嫩臉花明教人見了關情含羞舉步越羅輕稱娉婷終朝咫尺窺香閣迢遙似隔層城何時休遣夢相迎入雲屏後起七字用仄與前段異餘同迎一作縈綵鸞歸令四十五字張元幹珠履爭圍小立春風趂拍低態間不管樂催伊整朱衣粉融香潤隨人勸玉困花嬌越樣宜鳯城燈夜舊家時數他誰後起七字用仄與前段異餘同謁金門四十五字又名花自落韋莊空相憶無計得傳消息天上嫦娥人不識寄書何處覔新睡覺來無力不忍看伊書迹滿院落花春寂寂斷腸芳草碧各家俱從此體獨孫光憲後起云輕别離甘拋擲作三字兩句因字數叶韻同不另録圖譜乃注云孫後起處二字一句四字一句蓋錯認輕别為叶韻故云三字句也試問離甘拋擲如何成語寃哉孫少監也又將調名改花自落無謂憶少年四十六字又名十二時朝補之無窮官栁無情畫舸無根行客南山尚相送只髙城人隔罨畫園林溪紺碧算重來盡成陳迹劉郎鬢如此况桃花顔色算重來可用平平仄又一體四十七字曹組年時酒伴年時去處年時春色清明又近也却天涯為客念過眼光隂難再得想前歡盡成陳迹登臨恨如此把闌干暗拍近字暗字用仄不起調不如朝詞觀從來名作可知因後起八字故另收之然無第二首莫可訂正作者但從前體可也詞􅚈注念字是襯可刪但聞曲有襯字未聞詞有襯字不知何據也按朱敦儒有連雲衰草一首四十六字題作十二時查與憶少年一字無異故不另收作格説見長調十二時栁詞下占春芳四十六字蘇軾紅杏了夭桃盡獨自占春芳不比人間蘭麝自然透骨生香對酒莫相忘似佳人兼合明光只憂長笛吹花落除是寧王此體他無作者想因第三句為題名喜遷鶯四十六字張元幹文倚馬筆如椽桂殿早登仙舊遊册府記當年衮繡合貂蟬慶天申瞻玉座鵷鷺正陪班看君穩步過花甎歸院引金蓮前後字句同只後起二句先平後仄而不叶韻又一體四十七字天或加令字又名鶴沖燕歸來韋莊街鼓動禁城開天上探人回鳯銜金榜出雲來平地一聲雷鶯巳遷龍巳化一夜滿城車馬家家樓上簇神仙爭看鶴沖天用三韻與前不同唐詞皆此體譜圖以薛昭藴金門晚一首為第一體其後起云九陌喧千門啓滿袖桂香風細啓細二字相叶正與此詞化馬相叶同譜不注叶韻只作三字句六字句又收毛文錫芳春景一首為第二體其後起云錦翼鮮金毳軟百囀千嬌相喚則注軟喚二字相叶吾不知軟喚可謂相叶而啓細不可謂相叶是何故也沖按此詞末有鶴沖天三字故後人又名此詞日鶴天是惟此四十七字之喜遷鶯方可名鶴沖天也乃今人將一百三字之喜遷鶯亦名曰鶴沖天而選聲更注云又名鶴沖霄似此展轉訛謬豈可不加釐正哉作按張元幹又一首用此體汲古不知乃注云向亦喜遷鶯誤今改鶴沖天以為改正而實仄錯天下事往往如此而圖譜等書收作兩體者尤為無識又按杜安世栁耆卿别有鶴沖天八十餘字者與喜遷鶯本調相去懸絶各譜反不收今另列其體于後又一體四十七字晏幾道蓮葉雨蓼花風秋恨幾枝紅逺煙收盡水溶溶飛雁碧雲中衷腸事魚箋字情緒年年相似憑高雙袖晚寒濃人在月橋東後起首句即換仄韻開一本題作燕歸來選沈選新集有于尾句用榴花欲燃者不能辨反之可笑又一體四十七字毛文錫芳春景曖晴煙喬木見鶯遷傳枝偎葉語關關飛過綺叢間錦翼鮮金毳軟百囀千嬌相喚碧紗窗曉怕聞聲驚破鴛鴦暖末句不換平韻仍叶仄聲又一體一百三字蔣捷遊絲纎弱謾著意絆春春難憑託水暖成紋雲晴生影芳草漸侵裙幄露添牡丹新艷風擺秋千間索對此景動髙歌一曲何妨行樂行樂君聽取鶯囀緑窗也似來相約粉壁題詩香街走馬爭奈鬢絲輸却夢回晝長無事聊倚闌干斜角翠深處看悠悠幾點楊花飛落此詞諸去聲字宜玩後起行樂是叶韻不必疊上字謾著意絆春句有作仄平平仄仄露添句夢回句或作仄仄平平平仄故旁注如此以便學者易于填字然其實此三處須依此詞方為得調竹山鍊字精深調音諧暢乃詞家矩矱定宜遵之緑窗緑字亦要仄聲用平者亦不足法也又一體一百三字趙長卿商飈輕透動簾幕飛梧亂飄庭甃瑞氣氤氲沈檀初爇煙噴寶臺金獸黃花美酒天教占得先他時候誕元老慶有聲此夕降生華胃歡笑宜稱壽絃管鼎沸宫商方頻奏滿捧瑶巵華堂歌舞拍轉金叉斜溜朱顔緑鬢殷勤深願鎮長如舊歎濱海道難留指日榮遷飛驟黃花下朱顔下各十二字皆四字句與前兩六字句法不同又一體一百四字張元幹雁塔題名寶津朌宴盛事簪紳常説文物昭融聖代搜羅千里爭趨丹闕元侯勸駕卿老獻書發軔龜前列山川秀圜觀衆多無如閩越豪傑姓標紅紙帖報泥金喜信歸來俱捷驕馬蘆鞭醉垂藍綬吹雪芳月素蛾情厚桂花一任郎君折須滿引南臺又是合沙時節此與前調絶異其中恐有誤字無可查證姑照舊本録之以存其體荆州亭四十六字怨又名江亭吳城小龍女簾捲曲欄獨倚江展暮雲無際淚眼不曽晴家在吳頭楚尾數點落花亂委撲漉沙鷗驚起詩句欲成時沒入蒼煙叢裏此原無調名因題在荆州江亭故以名之萬里春四十六字周邦彥千紅萬翠簇清明天氣為憐他種種清香好難為不醉我愛深如你我心在箇人心裏便相看老却春風莫無些歡意為憐他二句前後同或謂前段應于好字分句後段應于莫字分句莫即暮字也余云如此則無些歡意説不去金蕉葉四十六字蔣捷雲褰翠幕滿天星碎珠迸索孤蟾闌外照我看看過轉角酒醒寒砧正作待眠來夢魂怕惡枕屏那更畫了平沙斷雁落後起去字與前段異餘同此體作者甚多平仄俱宜從之况前後森整如外照我過轉角更畫了斷雁落俱疊三仄字而外照更畫俱去聲我了二字俱上聲方是此調音響圖譜謂過轉角可仄平仄更畫了斷雁落可平仄仄此何據耶翠碎迸正夢怕等去聲字俱妙絶譜俱作可平嗟乎作譜者苦心宛轉必欲滅盡古調而後巳是何忍乎又一體六十二字栁永厭厭夜飲平陽第添銀燭旋呼佳麗巧笑難禁艷歌無間聲相繼凖擬幕天席地金蕉葉泛金波霽未更闌巳盡狂醉袖中有個風流暗向燈光底惱遍兩行珠翠與前調全異袖中至光底十一字與前段巧笑至相繼十一字句豆平仄雖微有不同實則兩段句法一般也名後起句有金蕉葉字或因句立或取名入句此類甚多朝天子四十六字楊無咎小閣寬如掌占螺浦山川彝曠千竒萬狀見雲煙收放更永夜風生明月上用取真成無盡藏誰共賞徙倚撫危欄吟望此體作者甚少平仄當依之憶秦娥四十六字碧雲深别名秦樓月雙荷葉李白簫聲咽秦娥夢斷秦樓月秦樓月年年栁色灞陵傷别樂遊原上清秋節咸陽古道音塵絶音塵絶西風殘照漢家陵闕秦樓月音塵絶俱疊上三字灞漢二字必用仄字得去聲尤妙今人竟有于傷字及陵闕陵字用仄者大謬沈選王修微竟于年年西風二句作仄仄平平更竒又一體四十六字孫夫人花深深一鈎羅襪行花隂行花隂間將栁帶試結同心日邊消息空沈沈畫眉樓上愁登臨愁登臨海棠開後望到如今用平韻竹屋亦有此體又一體四十六字石孝友秦樓月秦娥本是秦宫客秦宫客夢雲風韻借仙標格相從無計不如休如今去也空相憶空相憶樽前歡笑夢中尋覓前後俱仄韻獨後段起句用平聲不叶此又一變格然唯此一首他無作者雖列于此不宜從也又一體三十七字毛滂夜夜夜了花開也連忙指點銀瓶索酒嘗明朝花落知多少莫把殘紅掃愁人一片花飛減却春起韻疊字次句即頂上一字下換三韻鼻本譜俱以字數少者居前今因青蓮詞乃為此調祖故先列李作後及他體又一體三十八字馮延已風淅淅夜雨連雲黑滴滴窗外芭蕉燈下客除非魂夢到鄉國免被關山隔憶憶一句枕前爭忘得通篇一韻而與李詞各異忘字音望又一體四十一字張先參差竹吹斷相思曲情不足西北髙樓窮逺目憶苕溪寒影透清玉秋雁南飛速菰草緑應下溪頭沙上宿與馮詞同但換頭句多一字情不足菰草緑俱用三字琴調相思引四十六字趙彥端拂拂輕隂雨麴塵小庭深幕墮嬌雲好花無幾猶是洛陽春燕語似知懷舊主水生只解送行人可堪詩思和泪漬羅巾周紫芝有此調竹坡集內刻作定風波令必誤也定風波原有本調此只作相思引為是清平樂四十六字又名憶蘿月李白禁闈清夜月探金窗罅玉帳鴛鴦噴蘭麝時落銀燈香灺女伴莫話孤眠六宫羅綺三千一笑皆生百媚宸遊教在誰邊與清平調無涉蘿圖譜等改清平樂為憶月無謂望仙門四十六字晏殊玉池波浪碧如鱗露蓮新清歌一曲翠眉嚬舞華茵滿酌蘭英酒須知獻夀千春太平無事荷君恩荷君恩齊唱望仙門荷君恩三字疊末三字用調名用凡詞內用調名者俱與調無干不必也西地錦四十六字周紫芝雨細欲收還滴滿一庭秋色闌干獨倚無人共説這些愁寂手把玉郎書迹怎不教人憶看看又是黃昏也斂眉峯輕碧尾用一七一五與前段異又一體四十六字蔡伸寂寞悲秋懷抱掩重門悄悄清風皓月朱闌畫閣雙鴛池沼不忍今宵重到惹離愁多少蓬山路杳藍橋信阻黃花空老此前後相同尾皆四字三句者又一體四十八字石孝友回望玉樓金闕正水遮山隔風兒又起雨兒又煞好愁人天色兩岸荻花楓葉爭舞紅吹白中秋過也重陽近也作天涯孤客此前後結俱兩四一五者望仙樓四十七字晏幾道小春花信日邊來氷上江梅先拆今歲東君消息還自南枝得素衣染盡天香玉酒添成國色一自故溪踈隔腸斷長相憶後起比前少一字相思兒令四十七字晏殊昨日探春消息湖上緑波平無奈繞堤芳草還向舊痕生有酒且醉瑤觥更何妨檀板新聲誰教楊栁千絲就中牽繫人情與相思引無涉眉峰碧四十七字無名氏蹙破眉峰碧纎手還重執鎮日相看未足時便忍使鴛鴦隻薄暮投村驛風雨愁通夕窗外芭蕉窗裏人分明葉上心頭滴末句比前結多一字餘同首句用題名畫堂春四十七字徐俯落紅鋪徑水平池弄晴小雨霏霏杏花憔悴杜鵑啼無奈春歸栁外畫樓獨上憑欄手撚花枝放花無語對斜暉此恨誰知後起比前少一字又一體四十八字趙長卿小亭煙栁水溶溶野花白白紅紅惱人池上晚來風吹損春容又是清明天氣記當年小院相逢憑欄幽思幾千重殘杏香中後第二句七字餘同又一體四十九字黃庭堅摩圍小隱枕蠻江蛛絲間鎖晴窗水風山影上修廊不到晚來涼相伴蝶穿花徑獨飛鷗舞溪光不因送客下繩牀添火炷爐香兩結俱用五字珠簾捲四十七字歐陽修珠簾捲暮雲愁垂楊暗鎖青樓煙雨濛濛如畫輕風吹旋收香斷錦屏新别人間玉簟初秋多少舊歡新恨書杳杳夢悠悠首句有珠簾捲字想即因此名題也又蘆川一詞名捲珠簾查即蝶戀花不可溷錯間字宜作間甘草子四十七字栁永秋暮亂灑衰荷顆顆真珠雨雨過月華生冷徹鴛鴦浦池上憑欄愁無似奈此個單棲情緒却傍金籠教鸚鵡念粉郎言語似字非韻乃借叶也教鸚鵡栁又作慵整頓然觀楊旡咎作五湖去則仄平仄為是憑字音並不可誤讀平聲阮郎歸四十七字碧桃春又名醉桃源吳文英翠深濃合曉鶯堤春如日墜西畫圖新展逺山齊花深十二梯風絮晚醉魂迷隔城聞馬嘶落紅微沁繡鵷泥秋千教放低後起句六一作淺螺黛東坡作雪肌冷俱用仄平仄然此亦是偶爾作者自當用平仄仄也圖譜等削去阮郎歸而改用碧桃春無謂平日十二字夢窗必以入作平蓋此等句法以平仄為妙作者不盡然故旁注如此然髙明必能用平也詞律卷四
