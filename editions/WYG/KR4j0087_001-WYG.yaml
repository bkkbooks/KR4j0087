body:
  text: 詞律巻一宜興萬樹撰竹枝十四字又名巴渝辭皇甫松芙蓉並蒂竹枝一心連女兒花侵隔子竹枝眼應穿女兒竹枝之音起于巴蜀唐人所作皆言蜀中風景後人因效其體于各地為之非古也如白樂天劉夢得等作本七言絶句皇甫子竒亦有四句體所用竹枝女兒乃歌時羣相隨和之聲猶採蓮曲之有舉棹年少等字他人集中作詩故未註此四字此作詞體故加入也其詞六首皆每首二句相叶其句中平仄不拘但每句第二字皆平末一首乃用仄韻者另録于後又一體十四字皇甫松山頭桃花竹枝谷底香女兒兩花􅆼窕竹枝遙相映女兒又一體二十八字皇甫松門前春水竹枝白蘋花女兒岸上無人竹枝小艇斜女兒商女經過竹枝江欲暮女兒散抛殘食竹枝飼神鴉女兒此調竟是七言詩句中平仄亦可不拘若唐人抝體絶句者十六字令十六字又名蒼梧謠蔡伸天休使圓蟾照客眠人何在桂影自嬋娟此調舊刻收周美成作明月影穿窻白玉錢一首詞綜校正之謂此係周晴川詞明字乃眠字之誤本一字句月影以下為七字句蔡詞亦天字起韻今作三字起句者非也按張于湖送劉郎詞三首皆以歸字起韻一云歸十萬人家兒樣啼二云歸獵獵薰風捲繡旗三云歸數得宣麻拜相時是此調之為一字起句無疑矣盖蔡詞尚可讀天休使為句張詞豈可讀歸十萬等為句乎時流作詞名解謂三字起者為十六字令一字起者為蒼梧謠謬矣至于填詞圖譜註云首句本作五字今作三字㫁古無此體不知所謂古者何人之詞五字㫁句有何考據且引蔡詞云于五字用韻起則尤可笑蟾字是閉口音豈如此小調而必借他韻為叶友古不若是之陋也不亦妄哉字又按汲古刻張詞題名歸梧謠本是蒼梧因詞首而誤耳閒中好十八字段成式閒中好塵務不縈心坐對當窓木看移三面陰即以首句三字為題看字作去聲讀觀張善繼作亦然又一體十八字鄭符閒中好盡日松為侶此趣人不知輕風度僧語用仄韻與前異紇那曲二十字劉禹錫踏曲興無窮調同辭不同願郎千萬壽長作主人翁此本五言絶句尊前收之盖與小秦王等本七言絶句而實為詞調也觀夢得别作聴唱紇那聲可知羅嗊曲二十字劉采春借問東園栁枯來得幾年自無枝葉分莫怨太陽偏亦五言絶首句可起韻梧桐影二十字呂嵓落日斜秋風冷今夜故人來不來教人立盡梧桐影此本詩耳今人以其長短句故用入詞而取其末字為名醉妝詞二十二字蜀主王衍者邊走那邊走只是尋花栁那邊走者邊走莫厭金杯酒者邊即俗語這邊也這禪書多作者字南歌子二十三字歌又作柯温庭筠手裏金鸚鵡胸前繡鳳凰偷眼暗形相不如從嫁與作鴛鴦又一體二十六字張泌栁色遮樓暗桐花落砌香画堂開處晚風涼髙捲水晶簾額襯斜陽第三句作七字第四句作六字與前異又一體雙調秦川五十二字風蝶令又名望歐陽修鳳䯻金泥帶龍紋玉掌梳去來牕下笑相扶愛道画眉深淺入時無弄筆偎人久描花試手初等閒妨了繡工夫笑問鴛鴦兩字怎生書此比唐詞加後一疊宋人皆用此體圖譜于此調不收何也又有入韻者乃以入作平附見于後同下又一體五十二字石孝友春淺梅紅小山寒嵐氣薄斜風吹雨入簾幙夢覺西樓嗚咽數聲角歌酒工夫嬾别離情緒惡舞衫寛盡不堪著若比那囘相見更消削此與前詞字句俱同而用入聲為叶者于愚謂入聲可作平人多不信曰入聲派入三聲始元人論曲君何乃移其說于詞余曰聲音之道古今逓傳詩變詞詞變曲同是一理自曲盛興故詞不入歌然北曲憶王孫青杏兒等即與詞同南曲之引子與詞同者將六十調是詞曲同源也況詞之變曲正宋元相接處豈曲入歌當以入派三聲而詞則不然乎故知入之作平當先詞而後曲矣盖當時周栁諸公製調皆用中州正韻今觀詞中如不音逋一音伊之類多至萬千正與北曲同而又何疑于入作平之說耶且用韻句亦可以入為叶如惜香醉蓬萊以吉字叶髻戲坦菴以極字叶氣瑞等甚多若云入不可叶則此等詞落一韻矣至通篇入叶之詞有可兼用上去如賀新郎念奴嬌之類有本是平韻而以入代叶者如金谷此篇之類雖全用入聲而實以入作平必不可謂是仄聲而用上去為韻脚也若夫以上作平如永叔少年遊千里萬里里字東坡醉蓬萊好飲無事為我西飲飲我二字蘆川賀新郎肻兒曹恩怨相爾汝爾字誠齋好事近看十五十六五字皆以上作平亦不可勝舉姑識于此髙明自能類推而知鄙說非誣耳荷葉杯二十三字温庭筠鏡水夜來秋月如雪採蓮時小娘紅粉對寒浪惆悵正思惟凡三易韻浪悵二仄間用于時惟二平内對字必用仄聲又一體二十六字顧夐春盡小庭花落寂寞凭檻歛雙眉忍教成病憶佳期知摩知知摩知末疊三字摩字應係麽字設為問答之辭當于知麽二字畧豆又一體雙調五十字皇甫松記得那年花下深夜初識謝娘時水堂西面画簾垂攜手暗相期惆悵曉鶯殘月相別從此隔音塵如今俱是異鄉人相見更無因結用五字而比前加一疊凡四易韻塞姑二十四字無名氏昨日盧梅塞口整見諸人鎮守都䕶三年不歸折盡江邊楊栁仄韻六言絶句同解此係萬首絶句所收唐人樂府也塞姑二字不可然觀其詞意塞者謂邊塞姑者乃戍邊者之閨人耳按栁耆卿集有塞孤一詞題亦難解余謂必即是此調之遺名而訛以姑字為孤字也故取此篇列前而附栁詞于後但不敢擅改而仍其塞孤之名云塞孤九十五字栁永一聲雞又報殘更歇秣馬巾車催發草草主人燈下别山路險新霜滑瑤珂响起棲烏金鐙冷敲殘月漸西風𦂳襟袖淒裂遙指白玉京望㫁黄金闕逺道何時行徹筭得佳人凝恨切應念念歸時節相見了執柔荑幽㑹處偎香雪免鴛衾兩恁虛設樂章舊刻如此余細繹之知其為兩段而刻本誤連也盖前半于淒裂處分段遙指句比前首句多二字正是過變之體其下句句比對相符此栁詞中最森整妥協者向來人皆草草讀過不知其段落耳前結漸西風𦂳四字後結免鴛衾三字雖詞于結處多不同但此詞風度如此不應前多一字愚謂前句𦂳字為羨盖𦂳襟音相近寫者因誤多一字也袖恁二字去聲妙兩字不可用去囘波詞二十四字沈佺期囘波爾時佺期流向嶺外生歸身名巳䝉齒録袍笏未復牙緋此詞平仄不拘即六言絶句體當時入于歌曲囘波其調名也皆用囘波爾時四字起又一體二十四字裴談囘波爾時栲栳怕婦也是大好外邊祗有裴談内裏無過李老用仄韻舞馬詞二十四字張說綵旄八佾成行時龍五色因方屈膝銜杯赴節傾心獻壽無疆平仄不拘首句可不用韻另按此并前後二調唐時本為詩類而用以入歌則有腔板如七言之清平調小秦王等亦同雖字數相合而其腔則異耳清平樂後半亦即此四句也三臺二十四字韋應物冰泮寒塘水緑雨餘百草皆生朝來衡門無事晩下髙齋有情平仄不拘所賦不論何事詠宮闈者即曰宫中三臺亦名翠華引亦名開元樂詠江南者即曰江南三臺又有突厥三臺其長調則為宋人所撰而襲取其名因以類從載于左幅圖作開元樂收明夏言詞無謂又一體三疊一百七十一字万俟雅言見梨花初帶夜月海棠半含朝雨内苑春不禁過青門御溝漲潛通南浦東風靜細栁垂金縷望鳳闕非烟非霧好時代朝野多歡徧九陌太平簫鼓乍鶯兒百囀㫁續燕子飛來飛去近緑水臺榭映秋千鬬草聚雙雙遊女餳香更酒冷踏青路㑹暗識夭桃朱戸向晩驟寶馬雕鞍醉襟惹亂花飛絮正輕寒輕暖漏永半陰半晴雲暮禁火天巳是試新粧嵗華到三分佳處清明看漢蠟傳宮炬散翠烟飛入槐府斂兵衛閶闔門開住傳宣又還休務從來舊刻此篇俱作雙調于雙雙遊女分段余獨㫁之改為三疊人莫不疑且怪者余為解之曰首段見字以下梨花海棠兩句各六字相對次段乍字以下鶯兒燕子兩句各六字相對三段正字以下輕寒半陰兩句各六字相對字句明整對仗工嚴而見乍正三字皆以一去聲虛字領起句末三字皆仄而夜㫁漏俱用去聲豈非三段脗合乎内苑春八字句御溝漲七字句與中段近緑水八字鬭草聚七字後段禁火天八字嵗華到七字同也而内近禁皆去聲苑緑火亦皆用仄禁過榭映是試用六去御漲鬬聚嵗到又用六去下皆以平平平仄接之豈非三段脗合乎東風靜八字句望鳳闕七字句與中段􅄳香更八字㑹暗識七字後段清明看八字散翠烟七字同也而東風靜等三字俱用平平去下接以仄仄平平仄望鳳闕等三字俱用去去平下接以平平平仄豈非三段脗合乎好時代七字句徧九陌七字句與中段向晩驟七字醉襟惹七字後段斂兵衛七字住傳宣七字同也而好時代等三字俱仄平去徧醉住三去太亂又三去豈非三段脗合乎如此堂堂正正每段五十七字一字不茍豈非是三疊調乎詞隠領大晟府為詞壇主盟他作皆精緻絶倫如此長篇流麗瓌𢎞其下字真有千椎百煉之力而五百年來為流俗人草草讀過不能知其調之段落又安能知其語之義趣字之和協乎更可詫者沈氏指斥此篇謂雜遝少倫過接喚應虛字少力大怪事大怪事如此傑出之詞而遭其妄貶豈沈氏所作如夢令之逗下心頭一塊長相思之歡末盈别能輕虞美人之坐憶眠還想一剪梅之别又難樓臨江仙之錯疑奔司馬滿江紅之憂端欲去去翻覆賀新郎之管花管魚并管鳥等句可謂有倫可謂有力耶嗚呼豈不可悲哉然據愚臆㫁如此怒余者以為狂妄哂余者以為穿鑿愛余者以為勞憊余悉弗顧上之冀詞隠在天喜後世有子雲為之洗發下之冀天下後世或有諒其苦心而以為然者正不止圖作長短句周郎也内用不闕陌百踏識入等字乃以入作平九子水草晚寶惹巳等字乃以上作平皆須細心體認此言尤為讀詞闗鍵不可不知以入以上作平處不可用去聲字其說甚長巳于發凡悉之漢蠟傳宮炬向來俱刻漢宫傳蠟炬疑與前梢異後得粤中藏書家元刻本作漢蠟傳宮炬為之爽然心快伊州三臺雙調四十八字趙師使桂花移自露巖更被靈砂染丹清露溼酡顔醉乘風下臨世間素娥襟韻蕭閒不與羣芳並看蔌蔌綘綃單覺身輕夢囘廣寒伊州刻本作洲字今改正四此調雖前後段亦各二十四字而第三句五字第句七字下夢二字用去與上靈羣二字又别不可不知可又按調笑令亦名三臺令與此全異不誤認一㸃春二十四字侯夫人砌雪消無日捲簾時自顰庭梅對我有憐意先露枝頭一㸃春此隋宮看梅曲也凡二闋今録其一摘得新二十六字皇甫松酌一巵須教玉笛吹錦筵紅蠟燭莫來遲繁紅一夜經風雨是空枝皇甫别作首句三字摘得新因以為名上經風二字平聲而摘得新一首用幾十兩字幾字聲十字入聲盖可借作平不碍歌喉乃深于音律者所用也初學若謂此二字可仄而填入去聲字則大謬矣花非花二十六字白居易花非花霧非霧夜半來天明去來如春夢不多時去似朝雲無覔處此本長慶長短句詩而後人名之為詞者春曉曲二十七字朱敦儒西樓月落雞聲急夜浸疎香浙瀝玉人醉渴咽春冰曉色入簾横寶瑟第二句六字花草粹編所載如此後人于香字下増一寒字故作七言四句即謂之阿那曲耳毛氏名解于阿那曲下註又名春曉曲復引粹編云第二句本六字譜増一字以為阿那曲其實二調也夫既云本是六字其實二調而復云阿那曲又名春曉曲何其矛盾耶漁歌子二十七字又名漁父張志和西塞山前白鷺飛桃花流水鱖魚肥青篛笠緑簑衣斜風細雨不須歸和凝詞結句用香引芙蓉惹釣絲平仄不同𤣥真又一首起二句松江蟹舍主人歡菰飯蓴羮亦共餐平仄全異和凝又一首青篛笠句用釣車子是仄平仄想亦不拘然自宋以後皆依西塞一體今作者宜從之音山谷増句作鷓鴣天東坡増句作浣溪沙盖本調律失傳故加字歌之然坡止加潤𤣥真之語谷則増入朝廷尚覔𤣥真子何處如今更有詩二句于青篛笙之上語氣不倫可謂蛇足又一體雙調五十字孫光憲泛流螢明又滅夜涼水冷東灣濶風浩浩笛寥寥萬頃金波重疊杜若洲香郁烈一聲宿雁霜時節經霅水過松江盡屬儂家風月前後同風浩浩二句可用仄平平平仄仄而叶韻者後段同又李珣一首于第二句用瀟湘夜湘字平聲憶江南二十七字江又名夢江南江口望南望江梅謝秋娘春去也夢皇甫松蘭燼落屏上暗紅蕉閒夢江南梅熟日夜船吹笛雨瀟瀟人語驛邊橋又一體雙調五十四字吳文英三月暮花落更情濃人去秋千閒挂月馬停楊栁倦嘶風堤畔画船空厭厭醉長日小簾櫳宿燕夜歸銀燭外啼鶯聲在緑陰中無處覔殘紅即前調加一疊係此調隋煬帝有八􅂒但白香山三詞晚唐襲之皆單調至宋方加後疊故知隋詞乃贋作者無疑李後主多少恨及多少泪本是二首嘯餘合之為一大謬此調作者甚多何乃取李詞二首牽合以作五十四字格乎致後人疑前後可兩用韻豈不誤殺圖以前為夢江口此為雙調望江南異哉又一體五十九字馮延巳今日相逢花未發正是去年别離時節東風次第有花開恁時須約却重來重來不怕花堪折秪怕明年花發人離别别離若向百花時東風彈淚有誰知凡用三韻句法與前調全異搗練子二十七字又名深院月南唐後主深院靜小庭空㫁續寒砧㫁續風無奈夜長人不寐數聲和月到簾櫳又一體以下雙調三十八字無名氏林下路水邊亭涼吹水曲散餘酲小藤牀隨意横猶記得舊時經翠荷閙雨做秋聲恁時節不堪聴見天機餘錦與前調大異前後同只堪字用平異圖不用搗練子名而改為深院月可厭胡搗練四十八字晏殊小桃花與早梅花盡是芳妍品格未上東風先坼分付春消息佳人釵上玉尊前朶朶穠香堪惜誰把綵毫描得免恁輕抛擲前後同此與前調異桃源憶故人或云即胡搗練但彼前後起句即用仄起韻與此不同故仍各收之又一體五十字杜安世數枝半斂半開時洞閣曉粧新注寶香格艷姿天賦甘被羣芳妒狂風横雨且相饒又恐有彩雲迎去牽破少年心緒無計為長主第三句七字後第二句七字與前調異為長疑是長為赤棗子二十七字歐陽烱夜悄悄燭熒熒金爐香盡酒初醒春睡起來囘雪面含羞不語倚雲幈此詞與搗練子桂殿秋句法相同未免錯認今考定之曰首次二句三詞俱同第三句搗練用仄仄平平仄仄平赤棗反是桂殿則兩者不拘後二句搗練赤棗用平仄平平平仄仄平平仄仄仄平平桂殿反是同瀟湘神亦與此格但首句疊三字耳桂殿秋二十七字向子諲秋色裏月明中紅旌翠節下蓬宮蟠桃巳結瑶池露桂子初開玉殿風太白有此調二首一與此同一首于紅旌句平仄相反然酒邊詞所作平仄如右後人但學此可也選聲註桂殿云末二句不對即是赤棗大非解紅二十七字和凝百戲罷五音清解紅一曲新教成兩箇瑶池小仙子此時奪却柘枝名亦似前三調而第三句平仄畧拗有異瀟湘神二十七字又名瀟湘曲劉禹錫斑竹枝斑竹枝泪痕㸃㸃寄相思楚客欲聴瑶瑟怨瀟湘深夜月明時首三字用疊句又一首用湘水流二句是也章臺栁二十七字韓翃章臺栁章臺栁昔日青青今在否縱使長條似舊垂也應攀折他人手君平贈句本只是詩後人採入詞譜即以起句為名其栁姬答詞亦以起句名楊栁枝句法與此相同故即附于此楊栁枝芳菲節可恨年年贈離别一葉隨風忽報秋縱使君來豈堪折此譜凡調俱以字少者居前此栁氏詞本二十七字似應列于楊栁枝調之首但七言絶句楊栁枝其調最古作者亦最多不宜以此一詞為冠故録附君平詞後不復入楊栁枝調内覽者勿謂例有異同可也南鄉子二十七字歐陽烱岸逺沙平日斜歸路晩霞明孔雀自憐金翠尾臨水認得行人驚不起又一體二十八字歐陽烱路入南中桄榔葉暗蓼花紅兩岸人家㣲雨後收紅豆葉底纎纎擡素手前詞臨水是兩字句後詞收紅豆是三字句餘俱同又一體三十字李珣烟漠漠雨淒淒岸花零落鷓鴣啼逺客扁舟臨野渡思鄉處潮退水平春色暮起用三字兩句與前異餘俱同其逺客句李有十詞四與此同外三首用迴塘深處遙相見等句平仄與此反又二首用帶香遊女偎伴笑春酒香熟鱸魚美平仄拗想不拘也但帶香句或伴字平聲訛仄春酒句或是酒香春熟亦未可知訛以傳訛不可考矣學人但從其穏妥者可也又一體雙調五十六字陸游歸夢倚吳檣水驛江城去路長想見芳洲初繫纜斜陽烟樹叅差認武昌愁髩㸃新霜曽是朝衣染御香重到故鄉交舊少淒涼却恐他鄉勝故鄉雙疊句法亦異前詞詞統云前後四字起名減字南鄉子無㨿如指歐詞則彼先此後不可云減字也樂遊曲二十七字閩后陳氏龍舟搖曳東復東采蓮湖上紅更紅波淡淡水溶溶奴隔荷花路不通是調有二首此首與漁歌子松江蟹舍一首相近想其腔則各異也其又一首云西湖南湖鬭綵舟青蒲紫蕚滿中洲平仄想亦不拘小秦王二十八字又名陽闗曲無名氏栁條金嫩不勝鴉青粉墻頭道韞家燕子不來春寂寂小窻和雨夢梨花即七言絶句平仄不拘如東坡所作暮雲收盡溢輕寒一首下二句失粘不論採蓮子二十八字皇甫松菡蓞香連十頃陂舉棹小姑貪戲採蓮遲年少晩來弄水船頭溼舉棹更脱紅裙裹鴨兒年少即七言絶句其舉棹年少字乃相和之聲說見竹枝然竹枝二字用于句中女兒二字用于句尾此則一句一換耳或曰竹枝之枝兒兩字此調之棹少兩字亦自相為叶不可不知楊栁枝二十八字即栁枝温庭筠館娃宮外鄴城西逺映征帆近拂堤繫得王孫歸意切不闗春草緑萋萋即七言絶句平仄失粘不拘皆詠栁詞也不比竹枝汎用又一體以下雙調四十字顧夐秋夜香閨思寂寥漏迢迢鴛幃羅幌麝烟消燭光搖正憶玉郎遊蕩去無尋處更聞簾外雨瀟瀟滴芭蕉又張泌此調于鴛幃句用金鳳搔頭墜髩斜平仄同首句無尋處尋字用仄其餘無異是不拘也但顧詞鴛幃句與後更聞句同覺紀律更精故録之之按賀聖朝影句法字法皆與此同只後段無尋處處字仍用平聲叶前後韻故于此為各調不可誤也又一體四十四字朱敦儒江南岸栁枝江北岸栁枝折送行人無盡時恨分離栁枝酒一杯栁枝泪雙垂栁枝君到長安百事違幾時歸栁枝按此栁枝二字當如竹枝女兒舉棹年少作和歌之語今他無可考仍以大字書之且因時離等字即叶枝字韻故耳浪淘沙二十八字皇甫松蠻歌豆蔻北人愁浦雨杉風野艇秋浪起鵁鶄眠不得寒沙細細入江流此亦七言絶句平仄不拘觀劉白諸作皆切本調名非汎用也汲古花間刻淘作濤誤又一體以下雙調聲五十四字又名賣花南唐李後主簾外雨潺潺春意䦨珊羅衾不耐五更寒夢裏不知身是客一餉貪歡獨自莫凭欄無限江山别時容易見時難流水落花春去也天上人間自南唐後俱用此調另石孝友此調前後用四兒字為叶乃狡獪伎倆非有此體即如獨木橋之類耳汲古刻李之儀首句霞捲雲舒乃捲字下落一字非另體也觀其後段仍是五字可知與後栁詞不同按此調一名賣花聲而謝池春又别名賣花聲不可混也圖譜改調名并前唐調亦曰賣花聲無理沈氏選吳遵巖一首後第三句巳飄零一片減嬋娟乃誤多一巳字沈註云後段多一字則似有此體矣謬又一體五十四字宋祁年少不管流光如箭因循不覺韶華換到如今始惜月滿花滿酒滿扁舟欲解垂楊岸尚同歡宴日斜歌闋將分散倚蘭橈望水逺天逺人逺後段惟首句七字與前段異又前用始惜二字後惟一望字恐落去一字作者應照前段可也按何籕宴清都前結即用此結云天逺山逺水逺人逺余㫁以上兩逺字乃以上作平說見宴清都下此詞用滿逺二韻恐亦有作平處但舊詞惟小宋有此體不如宴清都有他詞可証耳然作者須記此字用上聲萬萬不可用去聲詞因宋公創此三逺句一變而為何子初細草沿堦再變而為王渼陂無意整雲鬟曲愈出愈妙紅杏尚書豈非風流之祖乎浪淘沙令五十二字栁永有箇人人飛燕精神急鏘環珮上華裀促盡隨紅袖舉風栁腰身䔩䔩輕裙妙盡尖新曲終獨立斂香塵應是四肢嬌困也眉黛雙顰此前李詞前後首句俱少一字餘皆同以調名加令字故收在後或謂凡小調俱可加令字非因另一體而加令字也汲古刻作有一箇人人促字下誤少一字今為以補之或曰有一箇人人仍是五字句或䔩䔩下落一字亦未可知余曰有一箇人人語氣不可于第二字畧㫁周美成栁梢青起句亦云有箇人人更何疑乎浪淘沙慢一百三十三字周邦彦曉陰重霜凋岸草霧隠城堞南陌指車待發東門帳飲乍闋正拂面垂楊堪攬結掩紅淚玉手親折念溪浦離魂去何許經時信音絶情切望中地逺天濶向露冷風清無人處耿耿寒漏咽嗟萬事難忘唯是輕别翠樽未竭憑㫁雲留取西樓殘月羅帶光銷紋衾疊連環解舊香頓歇怨歌永瓊壺敲盡缺恨春去不與人期弄夜色空餘滿地梨花雪精綻悠揚真千秋絶調其用去聲字尤不可及觀竹山和詞通篇四聲一字不殊豈非詞調有定格耶故可平可仄俱不敢填月又按此詞各刻俱作兩段而詞綜于西樓殘分段作三疊必有所據又一體一百三十三字周邦彦萬葉戰秋聲露結雁度砂磧細草和烟尚緑遙山向晩更碧見隠隠雲邊新月白映落照簾幕千家聴數聲何處倚樓笛装㸃盡秋色脈脈旅情暗自消釋念珠玉臨水猶悲感何況天涯客憶少年歌酒當時縱跡嵗華易老衣帶寛懊惱心腸終窄飛散後風流人阻藍橋約悵恨路隔馬蹄過猶嘶舊巷陌嘆往事一一堪傷曠望極凝思又把䦨干拍與前詞字數相同句法稍異緑字家字老字俱不用韻極字用韻家字涯字時字俱用平㸃字恨字舊字俱用仄而數聲何處比前溪浦離魂珠玉臨水比前露冷風清少年歌酒比前萬事難忘俱平仄不同飛散句與前羅帶句句法不同故另録一體然前調有蔣詞可証作者但從之可耳又一體一百三十三字栁永夢覺透窻風一線寒燈吹息那堪酒醒又聞空堦夜雨頻滴嗟因循久作天涯客負佳人幾許盟言更忍把從前歡㑹陡頓翻成憂戚愁極再三追思洞房深處幾度飲散歌闋香煖鴛鴦被豈暫時疎散費伊心力殢雨尤雲有萬船千種相憐惜到如今天長漏永無端自家疎隔知何時却擁秦雲態願低幃昵枕輕輕細說與江鄉夜夜數寒更思憶亦與前調字數同而中間句法又多異處至結語竟判然不同矣然樂章多有訛錯難于考訂不敢妄為之說歌闋闋字舊刻作闌知何時舊刻作知何時今改正之八拍蠻二十八字閻選雲鏁嫩黄烟栁細風吹紅蔕雪梅殘光影不勝閨閣恨行行坐坐黛眉攅即七言絶句而下二句平仄失粘閻二首及孫光憲一首皆然孫詞首句用平韻起又與此異阿那曲二十八字又名雞叫子楊太真羅袖動香香不巳紅蕖裊裊秋烟裏輕雲嶺下乍搖風嫩栁池塘初拂水即仄韻七言絶句平仄不拘欸乃曲二十八字元結千里楓林烟雨深無朝無暮有猿吟停橈靜聴曲中意好似雲山韶濩音亦即七言絶句平仄不拘戞按欸乃俗訛欵乃非字書作歀乃亦非欸乃棹船軋之聲栁詩欸乃一聲山水緑嚴次山集名清江欸乃是也欸字與唉字同是嘆恨發聲之辭通雅曰唉烏開切又於解於亥於皆三切楚辭唉秋冬之緒風亞父曰唉䜿子不足與謀此欸乃之欸正當作埃字上聲讀為烏蟹切盖船聲如人聲耳劉蛻湖中歌作靄迺劉言史瀟湘詩作曖迺皆欸乃之借字山谷黄直翁皆以為字異音同陰氏謂紫陽韻及韻㑹皆然而梅氏字彚謂數處當各如其音不必比而同之甚謬升庵云欸亞改切栁詩本作靄襖後人誤倒讀作襖靄近江右張爾公作正字通以為宜讀作矮靄然正韻于上聲六解内收乃字作依亥切去聲六泰内收乃字作於盖切皆引欸乃為証是乃有靄愛二音而欸則音襖是欸之音襖向來相傳亦必有所本魏校六書精藴云語辭之乃轉為欸乃之乃音烏皓切正作襖音是則欸字之為埃上聲無疑而乃字則或作靄或作襖未確然耳又陳氏謂當如乃字本音柰上聲則必不然而冷齋夜話載洪駒父云栁詩本是􅀢靄俗誤分􅀢為二字則其說新竒而無可考據也清平調二十八字李白雲想衣裳花想容春風拂檻露華濃若非羣玉山頭見㑹向瑤臺月下逢七言絶句平仄不拘甘州曲二十八字蜀主王衍画羅裙能解束稱腰身栁眉桃臉不勝春薄媚足精神可惜淪落在風塵衍幸青城至成都山上青宮隨駕宮人皆衣畵雲霞道服衍自製此曲與宮人唱和本意謂神仙而在凡塵耳後衍降中原宮妓多淪落者其語始騐云甘州子三十三字顧夐紅爐深夜醉調笙敲拍處玉纎輕小屏古画岸低平烟月滿閒庭山枕上燈背臉波横顧此調五首俱用山枕上三字此偶然不拘也首七字末八字與前異甘州遍以下雙調六十三字毛文錫春光好公子愛閒遊足風流金鞍白馬雕弓寶劍紅纓錦襜出長鞦花蔽膝玉衘頭尋芳逐勝歡宴絲竹不曽休美人唱揭調是甘州醉紅樓堯年舜日樂聖永無憂毛此體二闋查其用字無不相合可見古人填譜自有定律也此下三調皆以甘州名同類集于此甘州令七十八字栁永凍雲深淑氣淺寒欺緑野輕雪伴早梅飄謝豔陽天正明媚却成瀟灑玉人歌画樓酒對此早驟増髙價賣花巷陌放燈臺榭好時代怎生輕捨賴和風蕩霽靄廓清良夜玉塵鋪桂莖滿素光裏更堪遊冶後段只首句換頭放燈以下與前段寒欺以下俱同八聲甘州九十五字劉過問紫嵓去後漢公卿不知幾貂蟬誰能借留侯筯著祖生鞭依舊塵沙萬里河洛染腥羶誰識道山客衣鉢曽傳共記玉堂對策欲先明大義次第籌邊況重湖八桂袖手巳多年望中原馳驅去也擁十州牙纛正翩翩春風早看東南王氣飛繞星躔又一體九十五字蕭列可憐生飄零到荼䕷依然舊銷魂殘春幾許風風雨雨客裏又黄昬無奈一江烟霧腥浪捲河豚身世忽如葉那自清渾莫厭悲歌笑語奈天涯有夢白髮無根怕相思别後無字寫囘文更月明洲渚杜䳌聲裏立向臨分三生石情緣千里風月柴門殘春三句更月明二句與前調異情緣上比前少一字又一體九十七字字或止題甘州二栁永對蕭蕭暮雨灑江天一番洗清秋漸霜風淒𦂳闗河冷落殘照當樓是處紅衰緑減苒苒物華休惟有長江水無語東流不忍登髙臨逺望故鄉𣺌邈歸思難收歎年來踪跡何事苦淹留想佳人妝樓長望誤幾囘天際識歸舟爭知我倚闌干處正恁凝愁漸霜風三句與前兩詞皆異作者多用此體番字多用平聲如坡翁潮字石林然字心字草牕暉字夢牕天字盃字依字方壺䳌字稼軒陵字亭字皆然其用仄者十中之一耳幾字亦多用仄故兩字俱未旁註取法乎上者自當鑒之至倚闌干處四字内闌干二字相連如玉田之有斜陽處琴趣之筭如何此更何須惜夢牕之上琴臺去暗消磨盡醉秋香畔皆然此雖非大闗係古作者不必皆同然亦不可不知夢牕之故意填此必有謂也石按玉田首句第八字即起韻他作無之可不必從林于首二句一云故都迷岸草望長淮依然繞孤城一云又新正過了問東風消息幾時來一云問浮家汎宅自𤣥真去後有誰來皆首句作五字次句作八字與他家稍異因字數平仄同于此註明不另列字字雙二十八字王麗真床頭錦衾班復班架上朱衣殷復殷空庭明月閒復閒夜長路逺山復山七言四句俱用韻因末字重複故名字字雙九張機二十九字無名氏春衣素絲染就巳堪悲塵昬汗汚無顔色應同秋扇從茲永棄無復奉君時此用兩字起韻又一體三十字無名氏五張機横紋織就沈郎詩中心一句無人㑹不言愁恨不言憔悴只恁寄相思此用三字起韻圖譜但收三十字者失却前調矣此詞九首其第一字自一至九故有三張機三字平聲亦不拘也法駕導引三十字陳與義東風起東風起海上百花搖十八風鬟雲半動飛花和雨著輕綃歸路碧迢迢起兩句重用此調似憶江南而首多一疊句耳士按此詞三首各刻俱作烏衣女子歌之或問一道曰此赤城韓夫人作水府蔡真人法駕導引也今按簡齋無住詞首即載此題下註前事云是擬作三闋是為陳詞耳抛毬樂三十字劉禹錫五色繡團圓登君玳瑁筵最宜紅燭下徧稱落花前上客如先起應須贈一船五言六句中二句對偶劉他作及皇甫作俱同起句可用仄又一體四十字馮延已霜積秋山萬樹紅倚巖樓上挂朱櫳白雲天逺重重恨黄葉烟深漸漸風髣髴梁州曲吹在誰家玉笛中六句惟第五句五字餘皆七字中二句亦對偶又一體雙調一百八十七字栁永曉來天氣濃淡㣲雨輕灑近清明風絮巷陌烟草池塘盡堪圖畵艷杏暖粧臉勻開弱栁困宮腰低亞是處麗質盈盈巧笑嬉嬉爭簇鞦韆架戲綵毬羅綬金雞芥羽少年馳騁芳郊緑野占㫁五陵遊奏脆管繁絃聲和雅向名園深處爭泥畵輪競羇寶馬取次羅列杯盤就芳樹緑影紅陰下舞婆娑歌宛轉髣髴鶯嬌燕姹寸珠片玉爭似濃懽無價任他美酒十千一斗飲竭仍解金貂貰恣幕天席地陶陶盡醉太平且樂唐虞景化須信艷陽天看未足巳覺鶯花謝對緑蟻翠蛾怎生輕捨是處以下與後段任他以下相合至結處比前段少四字耳泥字去聲作長調須要如此照管則知安字平仄處裁句長短處不然隨讀隨填必至前後盡錯矣況不如此體認而惟舊譜是依豈不大悞耶江南春三十字寇準波𣺌𣺌栁依依孤村芳草逺斜日杏花飛江南春盡離腸㫁蘋滿汀洲人未歸兩三兩五兩七或曰此萊公自度曲他無作者余謂唐李青蓮詩秋風清秋月明落葉聚還散寒鴉棲復驚相思相見知何日此時此夜難為情即此調之濫觴耳踏歌辭三十字崔液庭際花㣲落樓前漢已横金壺催夜盡羅繡舞寒輕調笑暢歡情未半看天明唐詩刻此作五言六句誤詞律巻一
