body:
  text: 詞律巻十三宜興萬樹撰簇水八十五字趙長卿長憶當初是他見我心先有一鈎纔下便引得魚兒開口好事重門深院寂寞黄昏後厮覷著一面兒酒試撋就便把我得人意處閔子裏施纎手雲情雨意似十二巫山舊更向枕前言約許我長相守歡人也猶自眉頭皺一鈎下與後雲情下同只巫山舊三字舊字上恐落依字耳撋如専切閔子裏即西廂琵琶所云酩子裏乃暗地裏之謂也歡人恐是勸人華胥引八十六字方千里長亭無數羇客將歸故園換葉乳鴨隨波輕蘋滿渚時共唼接眼春色何窮更櫓聲伊軋思憶前歡未言心巳愁怯欺鬢吳霜恨星星又還盈鑷錦紋魚素那堪重翻再閱粉指香痕依舊在繡裳鴛篋多少相思皺成眉上千疊各書俱選周詞川原澄映一首只作八十五字蓋在繡裳句止云鳳牋盈篋故比此少一字也不知此句正與前段更櫓聲句相合當用五字則知片玉集乃落去一字而從來讀者未查校玩味耳又周尾句云夜來和淚雙疊來字平聲與前段醉頭扶起寒怯之頭字相同與此詞前結言字後結成字俱同圖譜乃作夜夜和涙雙疊第二夜字竟改用去聲而所繪黑圈偏不以為可平豈非故意欲改壊此調乎離别難八十七字薛昭藴寳馬曉鞴雕鞍羅幃乍别情難那堪春景媚送君千萬里半粧珠翠落露華寒紅蠟燭青絲曲偏能勾引淚闌干良夜促香塵緑魂欲迷檀眉半歛愁低未别心先咽欲語情難說出芳草路東西搖袖立春風急櫻花楊栁雨凄凄凡六易韻譜圖以促緑為更韻非也此是叶燭曲耳若立急則與咽說不同乃為更韻也又一體一百十二字栁永花謝水流倐忽嗟年少光隂有天然蕙質蘭心美韶容何啻值千金便因甚翠弱紅衰纒綿香體都不勝任算神仙五色靈丹無驗中路委瓶簪人悄悄夜沈沈閉香閨永棄鴛衾想嬌魂媚魄非逺總洪都方士也難尋最苦是好景良天樽前歌笑空想遺音望斷處杳杳巫峰十二千古暮雲深與前調迥别總洪都以下俱與前段合此詞俱用十二侵韻甚嚴醉思仙八十八字吕濱老斷人腸正西樓獨上愁倚斜陽稱鴛鴦鸂鶒兩兩池塘春又老人何處怎慣不思量到如今痩損我又還無計禁當小院呼盧夜當時醉倒殘缸被天風吹散鳳翼難雙南牕雨西牕月尚未散拂天香聽鶯聲悄記得那時舞板歌梁被天風以下與前稱鴛鴦以下皆同尚未句不應比怎慣句多一字非散字羨則拂字羨也蓋春又老兩句俱三字而怎慣句用五字住到如今兩句亦三字而又還句用六字住後段亦然若皆用六字便句法雷同再加後疊則四段皆三三六必無是理也故知怎慣句為是而尚未句為多一字耳八六子八十八字秦觀倚危亭恨如芳草萋萋剗盡還生念栁外青驄别後水邊紅袂分時愴然暗驚無端天與娉婷夜月一簾幽夢春風十里柔情怎奈何歡娛漸隨流水素絃聲斷翠綃香減那堪片片飛花弄晩濛濛殘雨籠晴正銷凝黄鸝又啼數聲又一體九十字杜牧洞房深畫屏燈照山色凝翠沈沈聽夜雨冷滴芭蕉驚斷紅牕好夢龍烟細飄繡衾辭恩久歸長信鳳帳蕭疎椒殿閒扃輦路苔侵繡簾垂遲遲漏傳丹禁蕣華偷悴翠鬟羞整愁重望處金輿漸逺何時綵仗重臨正消魂梧桐又移翠隂此詞字數雖較多於秦亦有訛處前段當於繡衾分住鳳帳至苔侵十二字自應與前詞夜月十二字相合該在殿字分句蓋此處是六字兩句况扃字不是閉口韻非叶也至侵字方是叶耳以下俱與前合矣總之此兩篇恐俱有誤觀後所載諸作可知又一體八十九字楊纘怨殘紅夜來無賴雨催春去匆匆但暗水新流芳恨蝶悽蜂慘千林嫩緑迷空那知國色還逢柔弱華清扶倦輕盈洛浦臨風細認得凝籹點脂勻粉露蟬聳翠蕊金團玉成叢幾許愁隨笑解一聲歌轉春融眼朦朧凭闌干半醒醉中此學秦體者但蝶悽句語氣當作四字而千林二字屬下句者秦則上句六字下句四字也觀杜詞及後晁詞千林句可六字但上句亦應六字耳然此十字一氣可以借讀上六下四也只緑字仄迷字平於各家不合必是誤處此句與尾句半醒醉中皆去平去平乃此調定格聲響如此秦之愴然暗驚又啼數聲杜之細飄鳳衾又移翠隂晁之漏長夢驚舊愁旋生無不相同此等若誤便失腔調圖譜註秦詞黄鸝又啼數聲云可用仄平平仄平平真信意妄改也細認得二句上五下四與秦怎奈何以下九字上三下六微異然此亦不妨借讀或曰秦之何字本是向字原於娯字斷句此亦不必蓋杜詞此處亦上三下六第三字亦用垂字平聲也露蟬二句上四下六與秦素絃二句皆四字者不同而叢字是叶韻此則晁詞亦於此處用叶余故謂杜秦兩家恐有傳訛耳幾許二句各六字正對秦之片片以下杜之望處以下晁之賴有以下各十二字皆相對偶者只秦於此句上多那堪二字杜於此句上多愁重二字晁於此句上多難相見三字而此篇則缺之余則謂此處晁詞為獨全也尾句各家皆六字此恐原是凭闌半醒醉中誤多一干字耳雨字宜平勿用去聲凭字宜作凴平聲醒字應讀平聲又一體八十四字李濱乍鷗邊一番腴緑流紅又怨蘋花看曉吹約晴歸路夕陽分落漁家輕寒半遮縈情芳草無涯還報舞香一曲玉瓢幾許春華正細栁烟青小桃朱户去年人面誰知此日重來繫馬東風淡墨欹鴉黯牕紗人歸緑隂自斜此篇正細栁九字此日重來下十二字俱與前同而去年人面誰知六字比前少四字恐有脫誤愚謂去年人面四字即同秦素絃聲斷四字其那知二字連下同秦那堪二字而人面之下落四字一句耳家字叶韻與他家不同烟青恐是青烟對下朱户也此調第二句或云當作六字第三句當作四字余觀杜晁作宜上四下六然通玩之皆可兩讀者是亦在所不拘兩結半字自字去聲甚妙又一體九十一字晁補之喜秋晴淡雲縈縷天高羣雁南征正露冷初減蘭紅風緊潛雕栁翠愁人夢長漏驚重陽景物淒清漸老何時無事當歌好在多情暗自想朱顔並遊同醉宦名韁鏁世路蓬萍難相見賴有黄花滿把從教緑酒深傾醉休醒醒來舊愁旋生此學杜體者但重陽句叶韻杜則仄聲漸老二句各六字應是正格余故謂杜刻訛分作者自依秦晁及前載楊李此二句竟作偶語可也暗自想下九字可同各家上五下四然依杜作上三下六亦可而其下則較杜及秦為明整矣余自幼讀草堂秦詞即深訝之怎奈何以下三十一字方以晴字叶韻疑有脫誤繼讀杜詞其三十一字方叶處亦與秦同至於閒扃處分段乃必無之理故余確謂杜詞傳訛而秦亦未必確然蓋前結與後尾杜俱用平平去平去平秦則少龍烟二字是亦或不全也繼又讀晁詞疑團方釋一者於萍字用平叶可見非三十一字方叶者較秦之香減杜之羞整仄聲者明白易曉二者用難相見三字為短句啟下六字相對兩句較秦之那堪杜之愁重止用兩字者尢明蓋六字句上以三字領之則易讀易填以二字領之則難讀難填自然之理也總論之此調首句三字起韻次二句或上四下六或上六下四不拘四句五句以一字為領下各六字杜蕉字夢字先平後仄晁從之秦後字時字先仄後平李從之亦隨人所擇旣有李詞可証則前結如秦四字亦不妨至換頭以下則從晁為妥高明以為何如惜紅衣八十八字姜䕫枕簟邀涼琴書換日睡餘無力細灑冰泉并刀破甘碧牆頭喚酒誰訊問城南詩客岑寂高樹晩蟬說西風消息虹梁水陌魚浪吹香紅衣半狼藉維舟試望故國渺天北可惜栁邊沙外不共美人遊歴問甚時同賦三十六陂秋色夢牕此調於牆頭至岑寂云烏衣細語傷伴惹茸紅曽約南陌傷伴惹難解約字非韻玩其語意似以傷伴二字屬上句而曽約南陌四字相連則與姜句法異且失一韻矣維舟至天北夢牕作當時醉近繡箔夜吟不惟少一字且少一韻是必吟字下落一字或吟字乃吹字之訛而其下尚有一笛字耳必無此句用平直至二十二字纔用韻之理況此調創自石帚夢牕自註從石帚遊苕霅間三十五年感而賦此必倣其調而作決無異同且其餘平仄無字不合也故本譜不收八十七字體或曰據夢牕則此誰訊問句當五字而詩客岑寂為四字客字偶在句中非韻也傷伴惹謂燕子心傷同伴去惹紅花耳此解有理勸金船八十八字蘇軾無情流水多情客勸我如曽識杯行到手休辭却這公道難得曲水池上小字更書年月如對茂林脩竹似永和節纎纎素手如霜雪笑把秋光插尊前莫怪歌聲咽又還是輕别此去翺翔遍賞玉堂金闕欲問再來何嵗應有華髮前後相同却字乃坡老借韻非不叶也圖譜失註誤上字與後翔字同應用平聲或是頭字邊字之訛耳滿江紅八十九字吕渭老晚浴新涼風蒲亂松梢見月庭隂静暮蟬啼歇螢遶井闌簾入燕荷香蘭氣供搖箑賴晚來一雨洗游塵無些熱心下事蜂重疊人甚處星明滅想行雲應在鳳凰城闕曽約佳期同菊蕊當時共指燈花說據眼前何日是西風吹涼葉第三句七字初疑有誤及查本集又有别作亦是如此始知有此八十九字一體也書舟有九十字一首乃於賴晚來處缺一賴字故本譜不收九十字體又一體九十一字吕渭老燕拂危檣斜日外數峰疑碧正暗潮生渚暮風飄席初過南村沽酒市連空十頃菱花白想故人輕箑障遊絲聞遙笛魚與雁通消息心與夢空牽役到如今相見怎生休得斜抱琵琶傳密意一襟新月横空碧問甚時同作醉中仙烟霞客正暗潮二句九字與前詞異問文溪芸窗有九十二字一首乃於問甚時處缺一字故本譜亦無九十二字體又一體九十三字程垓門掩垂楊寳香度翠簾重疊春寒在羅衣初試素肌猶怯薄霧籠花天欲暮小風送角聲初咽但獨褰幽幌悄無言傷初别衣上雨眉間月滴不盡顰空切羨棲梁歸燕入簾雙蝶愁緒多於花絮亂柔腸過似丁香結問甚時重理錦囊書從頭說各家詞多從此體字按前後段中俱用七字兩句多作對偶萬無用八而前後參差者惟坡公二首於後段上句兩用君不見多一君字孏窟前段亦用君不見文溪後段下句多一望字稼軒於羅衣句多一見字皆係誤傳即當時偶筆亦是差處不可學也至于湖作前段七字上句用巴滇緑駿追風逺平仄全反尤是錯處無此體也他如友古後起之並蘭舟舟字平文溪尾句之劍休舞劍字仄金谷尾句之秋更緑坦庵尾句之無杜字更杜用仄此類尚多俱不可從此調平順字之平仄可以游移然如眉間月顰空切之平平仄自不可改圖譜謂俱可三仄若用三仄豈不落腔乎沈氏收鳳洲一首謂後段可少一羨字白陽一首於羨栖梁句作看有斐堂前俱誤又一體九十三字張元幹春水迷天桃花浪幾番風惡雲乍起逺山遮盡晩風還作緑遍芳洲生杜若楚帆帶雨烟中落傍向來沙嘴共停橈傷飄泊寒猶在衾偏薄腸欲斷愁難著倚蓬牕無寐引盃孤酌寒食清明都過却最憐輕負年時約想小樓終日望歸舟人如削兩段中七字句俱叶韻客有見余收此體者謂此若却二字乃是偶合非故叶者余因檢程洺水詞示之程詞用語字韻前七字句云當日卧龍商畧處秦淮王氣真何許後七字句云可笑唐人無意度却言此虎凌波去豈非四句俱叶乎客大笑而服又一體九十三字吳文英雲氣樓臺分一派滄浪翠蓬開小景玉盆寒浸巧石盤松風送流花時過岸浪搖晴棟欲飛空算鮫宫祇隔一紅塵無路通神女駕凌曉風明月佩響丁東對兩蛾猶鎖怨緑烟中秋色未教飛盡雁夕陽長是墜疎鐘又一聲款乃過前巖移釣篷用平韻無路通凌曉風移釣篷用平仄平乃是定格夢窗又一首用猿鶴驚朝馬鳴秋一聲彭芳逺一首用何處尋晴又隂霜滿林作者勿誤可也又一體九十七字栁永剪恨千愁將年少衷腸牽繫殘夢斷酒醒孤館夜長滋味可惜許枕前多少意到如今兩總無終始獨自箇贏得不成眠成憔悴添傷感何計空只恁厭厭地無人處思量幾度垂淚不㑹得都來些子事甚恁底抵死難􅍆棄待到頭終久問伊著如何是兩段七字句俱作八字此則另為一體非前後參差者比也其用意字事字亦鑿然是韻愈足知前張蘆川是叶韻矣石湖仙八十九字姜䕫松江烟浦是千古三高遊衍佳處須信石湖仙似䲭彛翩然引去浮雲安在我自愛緑香紅舞容與看世間幾度今古盧溝舊曽駐馬為黄花閒吟秀句見說吳兒也學綸巾欹雨玉友金蕉玉人金縷緩移箏柱聞好語明年定在槐府此堯章自度腔也宜悉遵之魚遊春水八十九字無名氏秦樓東風裏燕子還來尋舊壘餘寒猶峭紅日薄侵羅綺嫩草方抽碧玉茵媚栁輕窣黄金縷鶯囀上林魚遊春水幾曲闌干遍倚又是一番新桃李佳人應怪歸遲梅粧淚洗鳳簫聲絶沈孤雁望斷清波無雙鯉雲山萬重寸心千里縷字是借叶古按復齋謾録云政和中一中貴使越州囘得詞於碑無名無譜録以進御命大晟府填腔因詞中語賜名魚遊春水又古今詞話云是東都防河卒於汴河掘地得石刻此詞唐人語也是則此調起於此詞後之作者皆宜從其平仄今查蘆川於窣字用傳字平聲窣字原可以入作平而鳳簫句用夢想濃粧碧雲邊平仄大異想謂與前段相同耳但於原詞不合又蒲江於嫩草一聨用軟紅塵裏鳴鞭鐙拾翠叢中勾伴侣趙聞禮用剪勝裁旛春日戲簇栁簪花元夜醉後段皆各同前與原詞相去更逺惟元人梁寅家鄰千峯翠一首倣古甚嚴愚謂作者雖有游移然論理則當照原腔填之也至首句起用四平定格蒲江作離愁禁不去不字是以入作平後人不可貪其易填而用仄也圖譜註秦樓二字可仄可笑中七字結四字尢為亂註至以嫩草句七箇字全改作平平仄仄平平仄怪極蘆川於無字用夕字重字用客字亦皆作平至於上字萬字必去聲乃起調蘆川用岸送蒲江用嵗暮可見雪獅兒八十九字程垓斷雲低晩輕烟帶暝風驚羅幙數㸃梅花香倚雪牕搖落紅爐對謔正酒面瓊酥初削雲屛暖不知門外月寒風惡迤邐慵雲半掠笑盈盈閒弄寳筝絃索㬉極生春巳向横波先覺花嬌栁弱漸倚醉要人摟著低告託早把被香薰却數㸃至初削與後㬉極至摟著同要須讀作平聲蓋去聲之要是人心中欲得也作邀字音乃彊索人摟正是醉後嬌憨不復矜持景態待其巳摟故下即低告耳又一體九十二字張雨含香弄粉便勾引游騎尋芳城南城北别有西村斷港冰凘微緑孤山路熟伴老鶴晩先尋宿怕凍損三花兩蕊寒泉幽谷幾番花影一作隂濯足記歸來醉卧雪深平屋春夢無憑髩底閙蛾爭撲不如圖畫相對展官奴風竹燒黄獨一作燭自聽瓶笙調曲比前詞多便勾引三字游騎尋芳與輕烟帶暝平仄亦反餘同别有至尋宿俱與後段無異圖譜乃註别有句作六字誤矣圖畫應是畫幅或畫軸之訛蓋此句同前孤山句應叶韻者前程詞紅爐對謔花嬌栁弱且對字栁字俱仄則此用路字畫字何疑譜不及考但據傳訛之圖畫二字遂註不如圖畫相對為一句而展官奴風竹為一句失韻破體為甚且因此并註不如圖畫四字可用平仄仄平訛而又訛矣北字詞家多取叶屋沃黄獨生土中或云即黄精杜詩黄獨無苗山雪盛此必用之燒黄獨者即煨芋之意若燭則可云紅而不可云黄也逺朝歸八十九字趙耆孫金谷先春見乍開江梅玉膩珠簾院落人静雨疎烟細横斜帶月别是一般風味金尊裏任遺英亂點殘粉低墜惆悵秦隴當年念水逺天長故人難寄山城倦眼無緒更看桃李當時醉魄算依舊徘徊花底斜陽外謾回首畫樓十二前珠簾至風味與後山城至花底同只算依舊比前别是句多一字裏字用韻則斜陽外句亦宜叶此用外字非韻或曰永叔踏莎行云行人更在春山外亦以外字叶細轡等字通用處北宋人時有之耳探芳信八十九字歌又名玉人張炎坐清晝正冶思縈花餘酲倦酒甚探芳人老芳心尚如舊消魂忍說銅駝事不是因春痩向西園竹掃頽垣蔓蘿荒甃風雨夜來驟歎歌冷鶯簾恨凝蛾岫愁到今年都似去年否賦情嬾聽山陽笛目極空搔首我何堪老却江潭漢栁題探字及探芳人老探字去聲正冶思至西園與後歎歌冷至何堪同只甚探芳句比後愁到句多一字首句及尚如舊夜來驟去年否俱仄平仄如夢窗梅溪竹山莫不皆然圗譜俱註可用平平仄殊不可解竹掃疑是掃竹此對蔓蘿也芳按楊炎有玉人歌一調與此調通篇皆同只甚探句少一甚字實係一調而異名者今録於後風玉人歌老盡籬花寒輕香細漫題紅楊句炎意誰西起又葉裏㑹長天不恨江南逺苦恨無書寄最相思盤橘千枚鱠鱸十尾鴻雁阻歸計算愁滿離腸十分豈止倦倚闌干顧影在天際凌烟圖畫青山約總是浮生事判從今買取朝酲夕醉又一體九十字吳文英探春到見綵花釵頭玉燕來早正紫龍眠重明月弄清曉夜塵不沁銀河水金盎供新澡鎮帷犀䕶緊東風秀藏芝草星斗燦懐抱問霧㬉藍田玉長多少禁苑傳香栁邊語聽鶯報片雲飛趂春潮去紅軟長安道試囘頭一點蓬萊翠小見綵花釵頭句三字連平亦有此體夢窗别作更痩如梅花正賣花吟春竹山如有人黄裳可証燕字用仄夢窗别作弄字竹山竚字同月字用仄梅溪都未有人掃同長字用仄竹山紅軃茸帽同若栁邊語用三字兩句比前調都似句多一字而句法亦異吳蔣史皆同可從翠小用去上妙妙觀前玉田之漢栁及竹山之正好梅溪之夢老皆可師法夢窗别作云笑拍東風醉醒汲古刻作醇醒一字之訛謬乃千里遙天奉翠華引九十字侯窴雪消樓外山正秦淮翠蕰囘瀾香梢豆蔲紅輕猶怕春寒曉光浮畫㦸捲繡簾風㬉玉鈎閒紫府仙人花圍羽帔星冠蓬萊閬苑意倦游常戲世間佩麟舊都江左襦袴歌歡只恐催歸覲賸宴都休訴酒杯寛明嵗應看君鈞容舞袖歌鬟意倦遊以下與前正秦淮以下俱同只佩麟下十字難讀愚謂必是佩麟江左舊都襦袴歌歡錯倒寫耳如此則不惟與香梢下十字脗合而文理亦通矣只恐句五字與前平仄異賸宴下八字應與前捲繡簾同平仄雖不差而賸宴都三字難解或有誤也明嵗應看之下比前多一字然亦是誤蓋君鈞容亦不可解必止一鈞字録者因君鈞二字同音信手錯寫不然則於君字住句而應字誤多惜無他詞可証也蕰字平聲拗或曰當讀作揾音然考左傳蕰藻之菜及凡我同盟毋蕰年皆無作去聲讀者此恐􅍨字之訛也世字或是人字玉京秋九十字周密烟水濶高林弄殘照晩蜩淒切碧砧度韻銀牀飄葉衣溼桐隂露冷採涼花時賦秋雪難輕别一襟幽事砌蛩能說客思吟商還怯怨歌長瓊壺暗缺翠扇疎紅衣香褪翻成銷歇玉骨西風恨最恨閒却新涼時節楚簫咽誰倚西樓淡月他作甚少照填可也或云衣溼句宜五字下作八字玉骨下亦應如前分句蓋前碧砧後紅衣下俱同耳戀香衾九十字吕渭老記得花隂同攜手指定日許我同歡喚做真成熱心安打疊從來不成器待做箇平地神仙又却不成些事驀地心殘據我如今沒投奔見著你淚早偷彈對月臨風一味埋寃笑則人前不妨笑行笑裏斗覺心煩怎分得煩惱兩處勻攤前後俱同只又却句六字怎分句五字異至於喚做下七字比後對月下八字則必於熱字上少了一字蓋不惟兩疊宜同而熱心安三字亦欠妥此戀香衾與戀繡衾無涉駐馬聽九十字栁永鳳枕鴦帷二三載如魚似水相知良天好景深憐多愛無非盡意依隨奈何伊恣性靈撻㬠些兒無事孜煎萬囘千度怎免分離而今漸疎漸逺雖悔難追謾恁寄消息終久奚為也擬重論繾綣爭奈翻復思維縱再㑹恐恩情難似當時只此一首無可查對然亦無訛法曲獻仙音九十一字栁永追想秦樓心事當年便約于飛比翼悔恨臨歧處正攜手翻成雲雨離析念倚玉偎香前事慣輕擲慣憐惜饒心性正厭厭多病栁腰花態嬌無力早是乍清減别後忍教愁寂記取盟言少孜煎剰好將息遇佳景臨風對月事須時恁相憶栁詞多訛此調與諸家句法大異必有錯誤處不可從姑存之以俟識者又一體九十二字吳文英落葉霞翻敗牕風咽草色淒涼深院痩不闗秋淚緑生别情銷髩霜千點恨翠冷搔頭燕那能語恩怨紫簫逺記桃枝向隨春渡愁未洗鉛水又將恨染粉縞澀離箱忍重拈燈夜裁剪望極藍橋綵雲飛羅扇歌斷料鸚籠玉鎖夢裏隔花時見紫簫逺三字諸家多作前段之尾汲古刻片玉詞亦兩存其說今照夢窗稿録之故不敢移屬上句然照前栁詞慣輕擲慣憐惜則此句宜屬於前又夢窗别作起用上浪韻而前結云過數點斜陽雨啼銷粉痕冷宛相向冷字不叶韻則宛相向三字連上無疑然冷字諸家無不叶者恐是誤也篇中用平仄抑揚乃是定體歴查諸家皆同圖譜乃註情銷可仄悵翠可平能語可仄平紫字可平桃枝可仄鉛水又三字可仄平平試問于周方吳姜張諸公外有何傳稿可據而註之乎後結凡作者皆是上五下六而註作上七下四因謂周詞待花前月下見了為一句不教歸去為一句又因月下見了皆仄自以為拗遂註月下二字可平更因月下註作可平則連上花前二字為四平又拗遂并註花前二字可仄直似眯目而猜黑白矣嗚呼何其陋哉紅恨染吳别作珮响周作間阻方作尚阻而白石用舞玉田用春感想不拘然以去上為佳燕字各家俱不叶惟周詞處字似叶然皆係偶合觀方和詞不叶可知不必韻也渡字玉田用叶亦不必周方亦皆不叶采蓮令九十一字栁永月華收雲澹霜天曙西征客此時清苦翠娥執手送臨歧軋軋開朱户千嬌血盈盈竚立無言有淚斷腸爭忍囘顧一葉蘭舟便恁急槳凌波去貪行色豈知離緒萬般方寸但飲恨脈脈同誰語更囘首重城不見寒江天外隠隠兩三烟樹清苦應是情苦血字差急槳下與前段合只飲恨二字更字第二隠字兩三二字平仄稍異不拘淒涼犯九十一字瑞犯又作調又名鶴仙影吳文英空江浪濶清塵凝層層碎刻冰葉水邊照影華裾曳翠露搔涙溼湘烟暮合塵襪凌波半涉怕臨風欺痩骨䕶冷素衣疊樊姊玉奴恨小鈿疎唇洗粧輕怯氾人最苦粉痕深幾重愁靨花溢香濃猛薰透霜綃細摺倚瑤臺十二金錢暈半囗又一體九十三字姜䕫緑楊巷陌西風起邊城一片離索馬嘶漸逺人歸甚處戍樓吹角情懐正惡更衰草寒烟淡薄似當時將軍部曲迤邐度沙漠追念西湖上小舫攜歌晩花行樂舊遊在否想如今翠凋紅落謾寫羊裙等新雁來時繫著怕匆匆不肻寄與悞後約比前更衰草句多一字將軍部曲句多一字寄與二字與前詞金錢二字用平聲異按此篇載白石集題下註云仙吕調犯雙調合肥秋夕作而夢窗乙稿亦載之題曰淒涼調註云合肥巷陌皆種栁秋風起騷騷然余客居闔户時聞馬嘶出城四顧則荒烟野草不勝淒黯乃著此體琴有淒涼調假以為名歸行都以此曲示國工田正徳使以亞觱栗吹之其韻極美亦曰瑞鶴仙影據此則是篇乃夢窗自製之調非姜作明矣想此二公交厚同遊最乆故集中混入耳豈吳作此篇後又以其調賦前詞詠重臺水仙乎余又思焉知非姜所作此註亦姜所註而混入吳稿乎蓋姜有淡黄栁詞亦是客合肥作也旣自註用琴曲名則此詞宜曰淒涼調矣而傳作犯字者亦有故其題下又註云凡曲言犯者謂以宫犯商商犯宫之類如道調宫上字住雙調亦上字住所住字同故道調曲中犯雙調或於雙調曲中犯道調其他準此唐人樂書云犯有正旁偏側宫犯宫為正宫犯商為旁宫犯角為偏宫犯羽為側此說非也十二宫所住字各不同不容相犯十二宫特可犯商角羽耳據此則因此詞用犯故自註於下而姜集題下所註仙吕犯商調正與此註同在一處耳愚按宫商之理今已失傳自詩餘變為北曲北曲變為南曲雖亦相沿有宫調之殊而莫能辨悉南曲自故眀中葉有吳腔傳習至今但知某曲是如何唱法音響各别而宫調則置而不論北曲則并各宫各調而一様音響矣元音不絶於天壤之間我朝以文治天下詞學甚盛而宫調之理律吕之學無能通明者大為恨事安得起白石夢窗輩於九亰而暢言之乎其註云惟道調雙調可以互犯而又云仙吕犯商恐商字即雙字豈仙吕即道調乎吕之名仙或以道故邪今南曲亦止有仙吕入雙調曲他宫不入雙調亦其証也但北曲有仙吕又有道宫總不可解矣夏雲峰九十一字栁永宴堂深軒楹雨輕壓暑氣沈沈花洞彩舟泛斚坐遶清潯楚臺風快湘簟冷永日披襟坐乆覺疎絃翠管時換新音越娥蕙態蘭心逞妖艷昵歡邀寵難禁筵上笑歌間發舄履交侵醉鄉深處須盡興滿酌高吟向此免名韁利鎖虚費光隂暑氣上去洞彩泛斚坐遶簟冷坐乆脆管向此利鎖各去上聲俱妙而脆管利鎖之下接以時換虚費之平去尢妙花洞至清潯十字惜香作朱户小窗坐來低按秦筝似句法四六不同然此是十字一氣所謂可上可下者也筵上十字亦然結句向此以下趙云是我不卿卿更有誰可卿卿亦是語氣貫下音韻諧適不必拘也須盡興七字趙作一任側耳與心傾句法不同不可從前段結語原係時換新音四字本集現明因草堂舊刻傳訛落去時字譜圖遂以為據將坐久至末作十字句不知前後只首句有異其餘字字相同時換新音正如後之虚費光隂也趙作體段輕盈蘆川作玉燕投懐俱同今少一字不惟失却古調且使作者棘手可歎哉譜此調本非僻調舊草堂即已收之而詞統詞滙圖等書竟皆遺却所更竒者詞滙反將仲殊天濶雲高一首收作夏雲峯不知天濶雲高詞乃金明池也大誤大竒醉翁撡九十一字蘇軾琅然清圓誰彈響空山無言惟翁醉中和其天月明風露娟娟人未眠荷蕢過山前曰有心也哉此賢泛聲同此醉翁嘯詠聲和流泉醉翁去後空有朝唫夜怨山有時而童巔水有時而囘川思翁無嵗年翁今為飛仙此意在人間試聽徽外三兩絃起處三句皆兩字第三句三字第四句兩字稼軒效之云長松之風如公肻余從山中是也圖譜以首句次句為兩字而以誰彈響作三字句空山無言作四字句得無供人噴飯乎詞滙又將三兩絃改作兩三絃蓋以此句為拗而改作七言詩句法耳亦竒又以今字訛作旣字不特旣字去聲失調而文義亦差皆失考之故也謂按和其天向來傳刻皆然或謂知字之訛娟字余是涓字附記以俟識者按稼軒本倣此而作與此異者月明作湛湛第二湛字去聲或不拘曰有心句作望君之門兮九重君門二字平聲想此二字平仄皆可用但不可用去聲耳娟字稼軒用江字非失韻本集常有借叶字也聽字平聲讀觀稼軒用之字可知荷蕢句稼軒云噫送子於東空有句稼軒云或一朝兮取封汲古刻本集落於字兮字因使此調只存八十九字人不可為此誤也露華九十一字王沂孫紺葩乍坼笑爛熳嬌紅不是春色換了素粧重把青螺輕拂舊歌共渡烟江却占玉奴標格風霜峭瑤臺種時付與仙骨閒門晝掩凄惻似淡月梨花重化清魄尚帶唾痕香凝怎忍攀摘嫩緑漸暖溪隂䔩蓛粉雲飛出芳艷冷劉郎未應認得笑爛熳至風露峭與後似淡月至芳艶冷同換了下十字上四下六尚帶下十字上六下四然是一氣貫下分句不拘是字素字化字唾字不惟用仄且俱去聲不可依譜槩作可平瑤臺下兩四字句圖譜註上三下五誤種字去聲非上聲也宣清九十二字栁永殘月朦朧小宴闌珊歸來輕寒森森背銀缸孤館乍眠擁重衾醉魄猶噤永漏頻傳前歡巳去離愁一枕暗尋思舊追遊神京風物如錦㑹擲果朋儕絶纓宴㑹當時曽痛飲命舞燕翻翻鳳樓鴛寢玉釵亂横信任散盡高陽這歡娛甚時重恁森字平起是又一平仄兩叶之調矣若以噤字起韻恐無自首起二十八字纔用韻之理也或云衾字亦是叶總因只此一篇無可考証聲按杜曽詩哀猿藏森聳渇鹿聽潺湲自註森字去或此亦作去叶耳塞翁吟九十二字吳文英有約西湖去移棹曉折芙蓉算終是稱心紅染不盡薰風千桃過眼春如夢還認錦疊雲重弄晩色舊香中旋撐入深叢從容情猶賦冰車健筆人未老南屏翠峰轉河影浮查信早素妃呌海目歸來太液池東紅衣卸了結子成蓮夭勁秋濃查夢窗别作及片玉千里趙文諸詞平仄俱與此同終字宜仄聲恐是縱字之訛卸了去上妙各詞皆然夢窗别作於南屏翠峰刻作吳女暈濃乃誤也女字必娥字或謂娥不可言暈則又必蛾字而再誤耳蓋其下用唱入眉峰可推耳深按此調應分三疊自起至薰風為第一段千桃至叢為第二段蓋千桃句七字換頭還認句即同移棹句弄曉色兩句即同算終是兩句旋撐入句即同染不盡句平仄一字無異即如瑞龍吟所謂雙拽頭也其第三疊則另為長短句與前絶不相類矣譜圖不識所載片玉詞第三四句散水麝小池東本是兩句乃以為六字不知其第二句窗外曉色瓏璁是六字而三四句乃三字曉色可連讀豈麝小亦可連讀乎如此吳詞是稱二字可連乎更可笑者周於弄晩色下云夢逺别淚痕重淡鉛臉斜紅重字乃是叶韻處譜圖以夢逺別為三字句以淚痕重淡為四字句豈不笑破人口周意謂淚重疊故臉上紅色淡也重淡如何解然則此詞可讀為舊香中旋吳别作可讀為桂花宫為千里作可讀為繡衾重尚趙文作可讀為斗牛箕彊矣不惟失韻失體且使古作者俱判作不通文理人矣豈不寃哉轆轤金井九十二字劉過翠眉重拂後房深自喚小孌嬌小繡帶羅垂報濃粧纔了堂虚夜悄但夜約鼓簫聲閙一曲梅花樽前舞徹梨園新調高陽醉山未倒看鞵飛鳳翼釵褪微溜秋滿東湖更西風涼早桃源路杳記流水泛舟曽到桂子香濃梧桐影轉月寒天曉夜悄路杳俱去上聲妙絶此二字不惟不可用平去亦不可用去去褪字亦不可平聲孌字恐蠻字鸞字之訛溜字非韻誤也秋滿以下俱與前段繡帶以下同則釵褪句不可不叶豈改之偶爾借韻邪東風齊著力九十二字胡浩然殘臘收寒三陽初轉巳換年華東君律管迤邐到山家處處笙簧鼎沸㑹佳宴坐列仙娃花叢裏金爐滿爇龍麝烟斜此景轉堪誇深意祝壽山福海増加玉觥滿泛且莫羨流霞幸有迎春壽酒銀瓶浸幾朶梅花休辭醉園林秀色百草萌芽本譜所註平仄俱查此一體有他詞互用者方敢旁列否則於其前後段合拍者註之如此調他無可証只玉觥以下與前東君以下相同故為畧註此外如殘已迤處坐此壽福且幸幾等字或亦可平仄互用因無考據槩不亂填非曰太拘蓋以尊古從嚴為主耳於此偶識可例其餘金盞倒垂蓮九十二字晁補之諸阮英游盡千鍾飲量百丈詞源對舞春風螺髻小雙蓮念兩處登高臨逺又傷芳物新年此景不待桓伊危柱哀絃身閒未應無事趂栽梅徑裏插栁池邊野鶴飄颻幽興在青田也莫話書生豪氣更銘功業燕然畢竟得意何如月下花前无咎又一首亦和此韻又傷句云㑹須行樂止四字乃誤落去華年二字非有此體也換頭六字與前異餘同兩結各十字姑於四字畧豆實則一氣注下者其用此景不待畢竟得意皆仄仄入去乃是定格觀其别作用只有一部後㑹一笑可見學者勿誤或謂身閒是換頭二字叶者不知晁别作和韻此字用情字故知非叶韻也糖倒垂蓮乃金盞之像即如左相之金巻荷耳竹山多令有句云金盞倒垂蓮歌搖香霧鬟意難忘九十二字周邦彦衣染鶯黄愛停歌駐拍勸酒持觴低鬟蟬影動私語口脂香蓮露滴竹風涼􅂸劇飲淋浪夜漸深籠燈就月子細端相知音見說無雙解移宫換羽未怕周郎長顰知有恨貪耍不成粧些箇事惱人腸待說與何妨又恐伊尋消問息痩減容光詞中七言有上四下三者有上三下四者各譜總作七字句往往誤認誤填而圖中黑白圏尢為眩目故本譜於七言如詩句者不註於上三下四者註豆字於第三字旁庶不致混亂也若五字句有上二下三如五言詩者亦有以一字領句而二三兩字相聨者尢多誤認但又不可註豆學者當自詳之如此詞􅂸劇飲淋浪待說與何妨是也若誤作五言詩句則大謬矣此類甚多偶記於此惜秋華九十三字吳文英路逺仙城自玉郎去却芳卿憔悴錦段鏡空重鋪步幢新綺凡花痩不禁秋幻膩玉腴紅鮮麗相攜試新粧乍畢交扶輕醉長記斷橋外驟玉驄過處千嬌凝睇昨夢頓醒依約舊時眉翠愁邊暮合碧雲倩唱入六么聲裏風起舞斜陽闌干十二此調他家罕覩夢窗所作五闋亦不盡同詞統收其思渺西風一首於凡花句讀作七字句不知此詞自玉郎至鮮麗與後段驟玉驄至聲裏相同凡花句即如後愁邊句及後詞秋蛾句皆六字攜字似叶然非平仄通用者豈亦可作去聲邪聲步瘦舊暮去聲至於鏡字頓字必用去勿誤又一體九十四字吳文英思渺西風悵行蹤浪逐南飛高雁怯上翠微危樓更堪凭晩蓬萊對起幽雲澹埜色山容乍捲清淺瞰蒼波静銜愁痕一綫十載寄吳苑慣東籬深處把露黄偷剪移暮景照越鏡意銷香斷秋娥賦得閒情倚翠尊小眉初展深勸待明朝醉巾重岸比前於後段第三句多一把字故為九十四字體然照前段及他作此句止宜四字此或偶誤不足據也所異者清淺二字儼然叶韻蓋後深勸二字是叶前亦相同也但其所作五闋惟此用淺字仄聲其餘一云新鴻喚淒涼漸入紅茰烏帽一云相逢縱相疎勝却巫陽無準一云留連有殘蟬韻晩時歌金縷第二字皆作平聲非用韻者是可知此調乃另為一體耳其前詞相攜以下十一字語氣蟬聯不便分豆大約皆於第二字一頓其下則或於三字或於五字畧斷俱無不可也又按前詞昨夢頓醒依約舊時眉翠頓醒二字相連而此詞移暮景照越鏡乃是三字兩句其下意銷香斷自為四字句又其别作一云晩夢趂鄰杵斷乍將愁到一云綵雲斷翠羽散此情難問一云此去杜曲已近紫霄尺五多不相合余因再四讀而斷之曰此詞及晩夢綵雲三處皆是三字兩句四字一句前詞昨夢頓醒醒字應讀平聲與前段之錦段錦空相合此去杜曲曲字亦應以入讀作平聲與其前段之𤓰果夜深相合皆上四下六句法鏡頓夜杜四去余所謂此與前詞另為一體於此更明耳又露罥蛛絲一首於危樓句刻作當時鈿釵送遺恨七字乃抄書者因遺字邊旁相同偶誤多一送字遂使人疑有此體其實此句只六字且加送字不通矣滿庭芳九十三字黄公度一徑义分三亭鼎峙小園别是清幽曲欄低檻春色四時留怪石參差卧虎長松偃蹇拏虬攜笻晩風來萬里冷撼一天秋優游消永晝琴尊左右賓主風流且偷閒不妨身在南州故國歸帆隠隠西崑往事悠悠都休問金釵十二滿酌聽輕謳怪石二句與故園二句皆作對偶如雨中花慢調中二語此知稼翁所獨也又一體九十五字滿又名鏁陽臺庭霜程垓南月驚烏西風破雁又是秋滿平湖採蓮人盡寒色戰菰蒲舊信江南好景一萬里輕覓蓴鱸誰知道吳儂未識蜀客巳情孤憑高増悵望湘雲盡處都是平蕪問故鄉何日重見吾廬縱有荷紉芰製終不似菊短籬疎歸情逺三更雨夢依舊繞庭梧前後第七句比前詞俱多一字不作儷語此通用體也後起二字不用韻問故鄉五字亦與前異沈選詞後起云有舟中絃管終不似句云不道是箇老儒生誰知道句平叶望故鄉二句云總成就天涯一病身此非詞選乃笑林耳又一體九十五字黄庭堅修水柔藍新條淡緑翠光交映虚亭錦鴛霜露荷徑拾幽蘋香度欄杆屈曲紅粧隠薄綺疎樝風清夜横塘月滿水淨見移星堪聽微雨過媻姍藻荇瑣碎浮萍便移轉吳牀湘簟方屏練靄鱗雲旋滿聲不斷簷響風鈴重開宴瑤池雪沁山露佛頭青香度下與後練靄下同便移轉句轉字仄牀字平與前詞異此兩體隨意不拘按此調作者如林嘗細加玩校其中仄韻住句者須留意不可以其調太穏熟率筆填之大抵次句淡緑二字淡字平仄不拘霜露必用平仄屈曲月滿藻荇旋滿雪沁俱要仄仄是此調中得法處荷字水字山字以用平為主上入亦不妨切不可用去聲古詞豈無一二出入然歴查諸大家名詞無不如前說者人但平心考古而更調其音響自知愚言之非穿鑿耳譜圖分句註字俱不可從晁無咎一首次句乗槎心閒懶乃誤多一字無此體又小晏於紅粧隠下七字作可憐流水各東西句法乃如詩句此必傳訛無此體也觀其後段仍用上三下四可知譜圖以微雨過連下作七字句非後起二字用叶為正此篇為涪翁最整練當行之作瀟湘夜雨九十三字趙長卿斜點銀缸高擎蓮炬夜深不耐微風重重簾幙捲堂中香漸逺長烟裊穟光不定寒影搖紅偏竒處當庭月暗吐焰如虹紅裳呈艷麗娥一見無奈狂蹤試煩他纎手捲上紗籠開正好銀花照夜堆不盡金粟凝空丁寧語頻將好事來報主人公此調與滿庭芳相近而實不同或曰此即滿庭芳起三句無異重重簾幙句雖止七字然其後段試煩他九字與滿庭芳無異則此句或於捲堂中上落二字未可知前結句雖只四字然其後結與滿庭芳無異或於吐焰上下落一字亦未可知後起是麗字斷句娥字上亦落一字故周紫芝集瀟湘夜雨凡四首實即滿庭芳是一調而異名耳余曰此說固是但其中前後兩七字句對偶整齊揣其音響竟與滿庭芳相去甚逺豈可將香漸逺與開正好亦各刪一字以合滿庭芳調乎其另為一調無疑故列於此本譜欲黜新名復古調然實係殊體不敢不收也選聲旣收瀟湘夜雨調而不收此詞反收紫芝之真滿庭芳以為式則不可解矣詞律巻十三
