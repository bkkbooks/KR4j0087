body:
  text: 詞律卷十四宜興萬樹撰如魚水九十三字栁永輕靄浮空亂峰倒影瀲灧十里銀塘繞岸垂楊紅樓朱閣相望芰荷香雙雙戲鸂鶒鴛鴦乍雨過蘭芷汀洲望中依約似瀟湘風淡淡水茫茫動一片晴光畫舫相將盈盈紅粉清商紫薇郎修褉飲且樂仙鄉便歸去遍歷鸞坡鳳沼此景也難忘栁詞僻調難得如此嚴整者裏愚謂中字恐是裏字乍雨過下當作蘭芷汀洲望為一句依約似瀟湘為一句正與後結二句相符蓋此調前段繞岸下後段畫舫下字句無不合轍蘭芷句必係六字耳或曰人方以君為穿鑿似此詞頗順妥即如其舊亦無不可若執此說則穿鑿之毁更不免矣相與一笑梅子黃時雨九十四字張炎流水孤村愛塵事頓消來訪深隱向醉裏誰扶滿身花影鷗鷺驚看相比瘦近來不是傷春病嗟流景竹外野橋猶繫烟艇誰引斜川歸興便啼鵑縱少無奈時聽待棹擊空明魚波千頃彈斷琵琶留不住最愁人是黃昏近江風緊一行栁絲吹暝鷗鷺句多刻鷗鷺相看如瘦詞綜亦相仍録之但於如字下注云一作驚相比余考此調前後只頭尾稍變自來訪下俱係相同鷗鷺句正與後段彈斷句合斷宜七字若作如瘦語甚晦或作鷗鷺驚相比瘦亦少一字觀玉田自注題下曰病中懷歸蓋其意謂病而消瘦竟與鷗鷺同故鷗鷺見之訝其瘦甚與已相比故曰鷗鷺驚看相比瘦也或去相比字或去看字則意難解而調亦失矣頓字訪字野字繫字奈字用仄方是此詞聲響若依圖譜亂注可平可仄每句雖覺順便奈不是梅子黃時雨何醉裏外野縱少之去上比瘦之上去皆妙甚可法尾犯九十四字吳文英翠被落紅粧流水膩香猶共吳越十載江楓冷霜波成纈燈院靚涼花乍剪桂園深幽香旋折醉雲吹散晚樹細蟬時替離歌咽長亭曽送客偷賦錦雁留别淚接孤城渺平蕪烟濶半菱鏡青門重售採香堤秋蘭共結故人憔悴逺夢越來溪畔月膩字兩箇共字乍字旋字雁字俱去聲各家皆然此係用字要緊處勿為譜注所誤若細字離字則平仄可通用也乍剪去上晚樹錦雁上去俱妙夢窗别作及竹山耆卿等皆同送字半字故字亦須去聲逺夢句夢窗别作滿地桂隂無人惜與此異說詳後注又一體九十五字蓉又名碧芙蔣捷夜倚讀書牀敲碎唾壺燈暈明滅多事西風把齊鈴頻掣人共語溫溫芋火雁孤飛蕭蕭檢雪遍闌干外萬頃魚天未了豫愁絶雞邊長劍舞念不到此樣豪傑瘦骨稜稜但淒其衾鐵是非夢無痕堪記似雙瞳繽紛翠纈浩然心在我逢著梅花便說念不到比前多一字尾句用上三下四與他家不同又一體九十五字栁永夜雨滴空階孤館夢回情緒蕭索一片閒愁想丹青難貌秋漸老蛩聲正苦夜將闌燈花漸落最無端處忍把良宵只恁孤眠却佳人應怪我自别後寡信輕諾記得當時剪香雲為約甚時向幽閨深處按新詞流霞共酌再同歡笑肻把金玉珍珠博按此詞舊草堂所收而樂章片玉詞皆載之然玩其語句則為栁作無疑但栁集止作别後寡信輕諾少一自字此字雖可有可無而有之為妥詞字汲古栁集誤刻調字不可錯認於此字用去聲也尾句較前兩詞又各異愚謂依吳詞逺夢句蔣詞我逢著句順而易填然此肻把句與夢窗别作滿地桂隂句相合必有定格從之為是故雖同是九十五字特具列於此以備參考蓋作譜欲使人明白易曉若選聲葫蘆嘯餘而刪其各體惟略注題下欲取簡省謂小冊便攜未免晦而難考耳至譜圖注肻把金三字可作平平仄不知出於何典此亦亂注中之最無理者而夢漸後共等去聲字皆云可平亦誤甚貌字正韻在入聲六藥韻讀若莫音乃描畫人物荀子貌而不切楊妃傳命工貌妃子别殿韓詩不得畫師來貌取杜詩屢貌尋常行路人皆謂寫人容貌也嘯餘注叶未詳疑從卜各反一作邈非沈天羽云貌字於義合邈字於韻合詞韻貌字作轉韻亦通觀此等注皆因未識貌字入聲故紛紛如此可歎哉又一體九十八字栁永晴烟羃羃漸東郊芳草染成輕碧野塘風暖遊魚動觸冰澌微坼幾行斷雁旋次第歸霜磧詠新詩手撚江梅故人贈我春色似此光隂催逼念浮生不滿百雖照人軒冕潤屋金珠於身何益一種勞心力圖利祿殆非長䇿除是恁點檢笙歌訪尋羅綺消得首句四字起韻刻本誤羃作幕便不是韻矣勞字刻方亦誤或謂野塘句應於動字分斷則下句五字便合前調想丹青句法余謂此本兩體不可彊同及讀後朝詞深溪池底句益信余言非妄又或謂此十二字宜作兩六字讀未審然否又一體九十九字朝補之廬山小隱漸年來疏懶浸濃歸興綵橋飛過深溪池底奔雷餘韻香爐照日望處與青霄近想羣仙呼我應還怪曉來鬢絲垂鏡海上雲車回軔少姑傳金母信森翠裾瓊佩落日初霞紛紜相映誰見湖中景花洞裏杳然漁艇别是箇瀟灑乾坤世情塵土休問怪曉來句比前詞多一字但栁作前後兩結上七下六相同此作後結與栁合其前結多一字恐誤耳鬢絲亦應作絲鬢乃與後尾及栁同琴趣刻本鬢字訛鬚故知此句必有誤處今不敢輒謂與前一體同故另收於此作者自照栁填之足矣雪梅香九十四字栁永景蕭索危樓獨立面晴空動悲秋情緒當時宋玉應同漁市孤烟裊寒碧水村殘葉舞愁紅楚天濶浪浸斜陽千里溶溶臨風想佳麗别後愁顔鎮斂眉峰可惜當年頓乖雨跡雲蹤雅態妍姿正歡洽落花流水忽西東無憀恨相思意盡分付征鴻當時下與後頓乖下同此調惟耆卿有之他無可考其平仄自應守之乃譜於第一景字便注可平竒矣漁市句與雅態句只第一字平仄可通用餘乃鐵板定格必如此方成為雪梅香調也譜乃於下五字云可作仄平平仄仄蓋欲與下句相對作七言詩一聯後之趂便者悉從之矣豈非作俑者之過乎或謂風字非叶然過變處於第二字儼然用韻不敢謂其偶合也金浮圖九十四字尹鶚繁華地王孫富貴玳瑁筵開下朝無事壓紅裀鳳舞黃金翅玉立纎腰一片揭天歌吹滿目綺羅珠翠和風淡蕩偷散沈檀氣堪判醉韶光正媚折盡牡丹艷迷人意金張許史應難比貪戀歡娛不覺金烏墜還惜㑹難别易金船更勸勒住花驄轡前後整對後段不應偏少乃金張上落去一便字金烏下落去一西字作者竟與前段同填可也判字宜作􅍆平聲一枝春九十四字周密淡碧春姿栁眠醒似怯朝來疏雨芳塵乍數喚起探花情緒東風尚淺甚先有翠嬌紅嫵應自把羅綺圍春占得畫屛春聚留連繡叢深處愛歌雲裊裊低隨香縷瓊窗夜暖試與細評新譜妝眉媚粉料無奈弄顰佯妒還只怕簾外籠鸚笑人醉語草窗此調二首音節俱同但應自把作空自傷愚謂把字即同後怕字傷字平聲或誤觀其後段用深院悄悄字用仄無異也料無奈作曽記是愚謂此三字即同前甚先有或係記曽是誤倒觀其前段用倩誰畫無異也草窗為顧曲周郎其所用乍數喚起尚剪夜暖試與媚粉等去上字俱宜恪遵至於尾句笑人醉語别作云倩鶯寄語皆是去平去上尢不可差圖譜載楊守齊一首與此詞用字平仄全同可愛而羅綺圍春本作歌字清圓誤刻歌清字圓得字用誇字或不拘乃將醒朝芳東留連瓊新粧眉無還簾等字俱注可仄似乍喚尚甚翠目把與自等字俱注可平絶妙好辭可惜都遭改壞作者費盡拈髭走甕一片苦心讀者全然不知無怪浪仙有歸卧故山之痛也白雪九十四字楊無咎蟾收雨腳雲乍斂依舊又滿長空紋蠟焰低薰爐燼冷寒衾擁盡重重隔簾櫳聽撩亂撲漉春蟲曉來見玉樓朱殿恍若在蟾宫長愛越水泛舟藍關立馬畫圖中悵望幾多詩無句可形容誰與問巳經三白或是報年豐未應真箇情多老却天公亦作掃除隂翳惟祈紅日生東誰與問下三句似前結語立馬下似有脫落大抵此詞有誤刻處試據愚意移補録後蟾收雨腳雲乍斂依舊又滿長空紋蠟焰低薰爐燼冷寒衾擁盡重重隔簾櫳聽撩亂撲漉春蟲曉來見玉樓朱殿恍若在蟾宫未應真箇情多老却天公無長愛越水泛舟藍關立馬幾多悵望囗畫圖中詩句囗可形容誰與問巳經三白或是報年豐掃除隂翳惟祈紅日生東以未應二句補前尾以掃除二句改後尾長愛處為換頭玩越水泛舟句泛字去聲確與紋蠟焰低相合只換頭字太少或更有脫落耳天香九十四字王充霜瓦鴛鴦風簾翡翠今年又是寒早矮釘明窗側開朱户斷莫亂教人到重隂未解雲共雪商量不少青帳垂氊要密縫放圍宜小呵梅弄粧試巧繡羅衣瑞雲芝草伴我語同語笑時同笑巳被金樽勸酒又唱箇新詞故相惱盡道窮冬元來恁好草堂舊載如此舊譜分句如此余閲他家詞皆九十六字者因疑此前結青氊二句各家皆六字兩句且多為對偶語此必以放圍宜小對上垂氊要密而縫字乃係脫誤但思其字不得及觀沈天羽所駁謂密字下是紅窗二字乃紅字誤作縫而窗字誤缺耳初亦謂然沈又云窗字犯上明窗宜改因思作者必不連用兩窗而上之明窗非訛字沈所云紅窗未必確也又伴我以下各家俱十字沈謂當作語時同語而缺一字余又信之乃今查校各集始得其說方知舊譜之非誤而沈為臆說耳蓋毛澤民詞本有此體其前結云對罷宵分又金蓮燭引歸院句法亦上四下七是此結所云縫密而圍小者即是青氊一物而密字作平讀耳其伴我下九字毛云碧瓦千家借袴襦餘暖亦是九字是與草堂舊載者正同九十四字余因爽然信有此體而譜注為非謬也本譜於嘯餘駁正最多此調又幾因沈氏謬為論定故詳識於此以表愚意之公云隂字向訛冷字或作寒字亦誤又一體九十六字唐藝孫螺甲磨星犀株搗月蕤英嫩壓拖水海蜃樓高仙娥鈿小縹眇結成心字麝媒候暖載一朵輕雲未起銀葉初生薄暈金猊旋翻纎指芳杯惱人漸醉碾微馨鳳團閒試滿架舞紅都換懶收珠珮幾片菱花鏡裏更摘索雙鬟伴秋睡早是新涼重薰翠被此則前結六字滿架以下十字者芳杯句草窗作素被瓊篝夜悄乃是偶誤不可從壓字亦有用平者亦不如用仄為是裏字可不必卟韻篇中諸去聲字凡名家皆同俱宜細玩譜於搗嫩壓結候漸碾鳳滿鏡更摘早翠等字俱注可平螺㽔芳杯閒菱重等字俱注可仄謬甚而將伴秋睡注可用平仄仄尢可怪從未見此三字用平仄仄之天香也晴又景覃有二闋前結俱作四字三句如云宿雨新隴頭閒看露桑風麥又云紙帳練衾日高睡起懶梳蓬鬢此又是一體因其餘皆同且作者多從唐體故不録其餘滿架下十字有用上四下六此則語氣本係一貫不必拘也又譜圖載劉方叔漠漠紅臯一首自草堂舊刻皆於後段第二句作不許蝶親蜂近然查從來作家此句皆七字無六字者此必係脫落一字故本譜不收九十五字格沈氏刻不許上加全字玉漏遲九十四字元好問浙江歸路杳西南却羡投林高鳥升斗微官世纍苦相縈繞不似麒麟殿裏又不與巢由同調時自笑虛名負我半生吟嘯擾擾馬足車塵被嵗月無情暗消年少鐘鼎山林一事幾時曽了四壁秋蟲夜雨更一點殘燈斜照清鏡曉白髮又添多少投林至自笑與後暗消至鏡曉同杳字可不起韻宋子京吳夢窗皆有之然不必起韻為正查竹山一首於更一點處少一更字此句宜同前段又不與句乃誤落一字也又草窗一首西南却羡句作錦鯨去三字亦誤落一字也又歸愚於被嵗月句止有四字殘燈斜照止有三字亦誤落二字也故本譜不收九十三字格又書舟於升斗下十字作忍對危欄數曲暮雲千疊是上六下四然可不拘後尾白髮二字乃以入作平觀子京用東風夢窗用瑤臺黃昏歸愚用何人竹山用盈盈皆兩平聲竹山又一首用鶴立二入聲正與白髮二字同此二字用平其下一字必仄如白髮之下必用又字也書舟用不耐飛來蝴蝶耐仄飛平乃誤筆不可從後起擾字非叶不可誤認沈選有於虛名上多一字者非六么令九十四字又或作緑腰録要名樂世李琳淡烟疏雨香徑渺啼鴂新晴畫簾閒卷燕外寒猶力依約天涯芳草染得春風碧人間陳迹斜陽今古幾縷遊絲趂飛蝶誰向尊前起舞又覺春如客翠袖折取蔫紅笑與簪華髮回首青山一點簷外寒雲疊梨花搖葉栁花飛絮夢繞闌干滿園雪燕外下與後笑與下同渺寒二字片玉俱用平亦有俱用仄者不拘趂字滿字則必用仄耳栁詞前結刻作夢裏欲歸歸不得誤歸不得恐是怎歸得也韻此篇絶妙好辭惜於梨花下用著雨二字忘却卟愚僭改如右非敢妄易前賢之句因欲以為程式必用韻為佳又愛其詞故不取他作而録之四犯剪梅花九十四字劉過水殿風涼賜環歸正是夢熊華旦解連環疊雪羅輕稱雲章題扇醉蓬萊西清侍宴望黃傘日華寵輦雪獅兒金劵三王玉堂四世帝恩偏眷醉蓬萊臨安記龍飛鳳舞信神明有後竹梧隂滿解連環笑折花看槖荷香紅潤醉蓬萊功名嵗晚帶河與礪山長逺雪獅兒麟脯杯行狨薦坐穩內家宣勸醉蓬萊此調為改之所創採各曲句合成前後各四段故曰四犯栁詞醉蓬萊屬林鍾商調或解連環雪獅兒亦是同調也剪梅花三字想亦以剪取之義而名之但前段起句與解連環本調全不相似殊不可解後段起句比解連環多一記字此係誤傳宜去之此篇雖是集成仍分前後段汲古所刻龍洲詞乃欲連刻之又因舊刻分段處空白疑有落字遂於分處多加一誤矣寵字應是龍字薦字應是韉字此二處俱宜平聲槖字疑亦有誤或用荷囊故事恐是笑折花香看荷囊紅潤或云紫荷囊荷字去聲與前雲章雲字不合不知醉蓬萊此字原平仄可以通用也潤章借叶非失韻又按玲瓏四犯史邦卿起處云雨入愁邊翠樹晚無人風葉如剪與此詞起句相似恐史之四犯亦即與此同留客住九十四字周邦彥嗟烏兔正茫茫相催無定只恁東生西沒半均寒暑昨見花紅栁緑處處林茂又覩霜前籬畔菊散餘香看看又還秋暮忍思處念古往賢愚終歸何處爭似高堂日夜笙歌齊舉選甚連宵徹晝再三留住待擬沈醉扶上馬怎生向主人未肻交去字有脫落姑仍舊録之段愚謂沒字音暮緑字音慮皆用北音為叶不然前用韻太稀恐無此詞體也又一體九十七字栁永偶登眺恁小樓艷陽時節乍晴天氣是處閒花野草遙山萬疊雲散漲海千里潮平波浩渺烟村院落是誰家緑樹數聲啼鳥旅情悄逺信沈沈離魂杳杳對景傷懷度日無言誰表惆悵舊歡何處後約難憑看看春又老盈盈淚眼望仙鄉隱隱斷霞殘照此亦有差落處但比前詞稍全旅情悄係後段起句舊刻屬前結尾今照周詞改正度日句可擬是處句遙山至浩渺十五字宜同惆悵至又老十五字今觀後段不差此必前段訛錯愚謂里字應作重字而顛倒之云雲散遙山萬疊漲海千重潮平波浩渺則可與後相符烟村以下則前後原同矣玉女迎春慢九十五字彭元遜才入新年逢人日拂拂淡烟無雨葉底妖禽自語小啄幽香還吐東風辛苦便怕有踏青人誤清明寒食消得渡江黃翠千縷看臨小帖宜春填輕暈溼碧花生霧為說叉頭裊裊繫著輕盈不住問郎留否似昨夜教成鸚鵡走馬章臺憶得畫眉歸去葉底至人誤與後段為說至鸚鵡同填輕句似宜同逢人日句恐填字有誤否則輕字下落一字耳圖譜以填輕暈溼為一句填輕二字難解余不敢從語字似乎用韻故圖譜注叶然觀後段裊字非韻因知語字乃偶合也掃花遊九十五字掃又名掃地花地遊方千里野亭話别恨露草芊綿曉風酸楚怨絲恨縷正楊花碎玉滿城雪舞耿耿無言暗灑闌干淚雨片帆去縱百種避愁愁早知處離思都幾許但漸慣征塵斗迷歸路亂山似俎更重江浪渺易沈書素瞪目銷魂自覺孤吟調苦小留佇隔前村數聲簫鼓恨露草至帆去與後但漸慣至留佇同千里和周一字不異或謂太拘不知有不可假借處也如此詞只種字夢窗兩首用隂字湖字其餘皆同歷查清真西麓夢窗五首碧山四首玉田二首邵清溪張半湖如出一轍其中恨縷淚雨似俎浪渺調苦諸去上字并諸仄字俱是定例譜圖亂注話恨露曉怨恨正碎滿耿暗淚片怨思但漸斗亂似更易瞪目調小隔俱謂可平而楊離歸前數字必須用平者則反注可仄豈非深恨掃花遊之調必欲盡壞之而後快邪吾不知捨宋元諸公外别何可宗既欲如此則作譜者何不自我作古悉載自度之腔而猶勉彊襲古人之調名列古人之詞句邪按第一野字碧山用商字係偶筆不必從玉田一首野字用烟避字用荒思字用天玉田於此中最精深必不如此皆誤刻也圖譜既收掃地花又收掃花遊其注亦差至縷字俎字二句不注叶韻意欲將後之作者皆勒令失韻可謂忍矣水調歌頭九十五字名夢窗名江南好白石花犯念奴蘇軾明月幾時有把酒問青天不知天上宫闕今夕是何年我欲乘風歸去又恐瓊樓玉宇高處不勝寒起舞弄清影何似在人間轉朱閣低綺户照無眠不應有恨何事常向别時圓人有悲歡離合月有隂晴圓缺此事古難全但願人長久千里共嬋娟幾時有弄清影用仄平仄絶妙人長久之人字若亦用仄聲尢妙後人多用平平仄全不起調矣不知至何年十一字語氣一貫有於四字一頓者有於六字一頓者平仄亦稍有不同但隨筆致所至不必拘定而闕字用仄覺有調耳起句月字有用平者竟有作偶語如五言律者不如此起為妙舞字或用平清字長字或用仄亦皆不妥無字有用仄者縱入聲可代平終是不響至稼軒多用上去字雖或不妨然不可學鳳凰臺上憶吹簫九十五字李清照香冷金猊被翻紅浪起來慵自梳頭任寶奩塵滿日上簾鈎生怕離懷别苦多少事欲說還休新來瘦非干病酒不是悲秋休休這回去也千萬遍陽關也則難留念武陵人逺烟鎖秦樓惟有樓前流水應念我終日凝眸凝眸處從今又添一段新愁休休二字查他人不叶然此篇二字定是用韻作此體者自宜依之添字若照前結亦可用仄但不敢擅注也又一體九十六字吳元可更不成愁何曽是醉豆花雨後輕隂似此心情自可多了閒吟秋在西樓西畔秋較淺不似情深夜來月為誰瘦小塵鏡羞臨彈筝舊家伴侣記雁啼秋水下指成隂聽未穩當時自誤又況如今那是柔腸易斷人間事獨此難禁雕籠近數聲别似春禽似此句比前調任寶奩句多一字聽未穩句比念武陵句多二字數聲句比從今句少二字而記雁啼句與千萬遍句平仄亦異或曰彈筝是叶韻非也此調原不必叶況通篇用十二侵閉口韻必不搭一庚青字也又一體九十七字侯填浴雪精神倚風情態百端邀勒春還記舊隱溪橋日暮驛路泥乾曽伴先生蕙帳香細細粉瘦瓊閒傷牢落一夜夢回腸斷家山空教映溪帶月供遊客無情折滿雕鞍便忘了明窗淨几筆研同歡莫向高樓噴笛花似我蓬鬢霜斑都休說今夜倍覺清寒前詞似此句六字聽未穩句七字不如此詞為全蓋記舊隱便忘了兩句前後宜同也一夜夢三字用仄回字用平及夜倍覺三字用仄皆此體定格懶窟四首皆同雙瑞蓮九十五字趙以夫千機雲錦裏看並蒂新房駢頭芳蕊清標艷態兩兩翠裳霞袂似是商量心事倚緑蓋無言相對天蘸水彩舟過處鴛鴦驚起縹眇漾影搖香想劉阮風流雙仙姝麗閒情未斷猶戀人間歡㑹莫待西風吹老薦玉醴碧筒􅍆醉清露底月照一襟涼思看並蒂至蘸水與後想劉阮至露底同二按此調比玉漏遲只第二句多一看字清標閒情句平仄顛倒其餘句字通首皆同應是一體想趙公原以玉漏遲調詠雙頭瑞蓮或自變其名或後人因題而誤也不然何長調而相同如此本應合前玉漏遲之後終以多一字顛倒四字不敢確信同調故仍另列於此五圖譜以倚緑蓋無言為五字句相對天蘸水亦為字句不僅句法兩差調因隨失而相對二字如何連得天蘸水趙虛齊文理豈至如此乎夢揚州九十六字秦觀晚雲收正栁塘烟雨初休燕子未歸惻惻輕寒如秋小闌干外東風軟透繡幃花密香稠江南逺人何處鷓鴣啼破春愁長記曽陪燕遊酬妙舞清歌麗錦纒頭殢酒困花十載因誰淹留醉鞭拂面歸來晚望翠樓簾捲金鈎佳㑹阻離情正亂頻夢揚州如此丰度豈非大家傑作乃為傖父讀錯注錯可歎哉燕子至香稠與後殢酒至金鈎同燕子殢酒俱用去上妙絶未字困字用去聲是定格蓋上面用去上下面用平此字非去聲不足以振起況有此去字則落下輕寒如秋與因誰淹留四箇平聲字方為抑揚有調不解此義於燕殢未困四字俱注可平寒誰二字俱注可仄有此夢揚州乎從長記起至金鈎皆追想當時遊宴之樂為酒所殢為花所困也沈氏及圖譜以困作為全失意味而沈氏又注云為一作因不惟平聲失調而下即有因誰之因字豈不一顧邪誰字嘯餘刻猶不差但注可仄沈氏竟刻甚字注一作誰圖譜竟作甚字矣此真為訛以傳訛也譜圖俱落去干字而以透字連上作上三下四句法繡幃句止有六字亦從未取後段試一較量此則沈氏已注缺干字誤矣何圖譜於徐氏之嘯餘沈氏之别集不從其是處而偏從其誤處邪塞垣春九十六字周邦彥暮色分平野傍葦岸征帆卸烟深極浦樹藏孤館秋景如畫漸别離氣味難禁也更物象供瀟灑念多才渾衰減一懷幽恨難寫追念綺窗人天然自風韻閒雅竟夕起相思慢嗟怨遙夜又還將兩袖珠淚沈吟向寂寥寒燈下玉骨為多感瘦來無一把觀千里和詞其四聲無字不同未便臆注只各處所刻千里詞前結俱作短長音如寫比此少一字愚謂必無此體方上句云聽黃鸝啼紅樹則此句必於短長音下落一韻字或調字耳人不可但見詞統詞綜等所載而誤認有此五字句格也兩袖珠淚方和云堆滿襟袖而自汲古刻及統綜等書皆倒作滿堆不此二字不可用仄平說見後注譜圖以暮傍葦景韻謾怨向為俱作可平秋多衰遙俱作可仄更將又還將兩袖珠六字翻作平仄仄平平仄不知出於何典又一體九十八字吳文英漏瑟侵瓊管潤鼓借烘爐暖藏鈎怯冷畫難臨曉鄰語鶯囀殢緑窗細咒浮梅盞換密炬花心短夢驚回林鴉起曲屏春事天逺迎路栁絲裙看爭拜東風盈灞橋岸髻落寶叉寒恨花勝遲燕漸街簾影轉還似新年過郵亭一相見南陌又燈火繡囊塵香淺前詞天然自句七字此看爭拜句九字則當於風字斷句未審是否或有訛字不可知也漸街簾至相見十五字照前周詞及方和俱上句七字下句八字此詞平仄雖與周無異而分句不得不於轉字年字住亭字為略豆想平仄字數不差其斷句可不拘也觀此影轉二字可知方詞堆滿必不可作滿堆或曰譜圖於前詞注又還將作九字向寂寥作六字則與此倣佛君何於此互異余曰千里和周云念征塵堆滿襟袖那堪更獨遊花隂下則自當於襟袖分句不可以念征塵堆滿為一句襟袖那堪為一句更獨遊花隂下為一句也是周詞讀法必當依前所注而不可與吳詞同矣香字周用一字方用滿字或曰可通用或曰堆滿可作平俱未可知然方詞上已用滿字不宜重出恐本是盈字如此則此字必以用平為是既有吳詞可據作者自宜用平蓋此詞韻腳上一字通篇皆平此處亦必平字或仍用上聲入聲斷不可用去聲也客曰囊塵香三平拗余曰其上郵亭一相之一字周詞寂寥寒燈之寂字方詞獨遊花隂之獨字互玩之皆以入作平是上句已疊用四平下句疊三平何足為異必其調之音響如此耳倦尋芳九十六字王雱露晞向曉簾幕風輕小院閒晝翠徑鶯來驚下亂紅鋪繡倚危欄登高榭海棠著雨胭脂透算韶華又因循過了清明時候倦遊燕風光滿目好景良辰誰共攜手恨被榆錢買斷兩眉長鬭憶得高陽人散後落花流水仍依舊這情懷對東風盡成消瘦首句用去平去上各家皆同是定格院共二字亦定用仄聲得去聲更佳古詞無不同者不可受誤於譜圖也餘諸去聲字皆當學之必如此然後為倦尋芳耳後字不必叶韻又一體九十七字或加慢字潘元質獸鐶半掩鴛甃無塵庭院瀟灑樹色沈沈春盡燕嬌鶯姹夢草池塘青漸滿海棠軒檻紅相亞聽簫聲記秦樓夜約彩鸞齊跨漸迤邐更催銀箭何處貪歡猶繫驄馬旋剪燈花兩點翠眉誰畫香滅羞回空帳裏月高猶在重簾下恨疏狂待歸來碎揉花打夢草二句七字與香滅二句相對如滿江紅中語比前倚危欄二句不同按盧申之一首前起句用香泥壘燕第三句用春晴寒淺記秦樓句用記寶帳歌慵猶繫句用牡丹開遍待歸來用但鎮日俱與此不合因其句字同且不足取法故不録又查夢窗三首篇篇用字精當無疵俱與此相合只一首於第三句作空閒孤燕間字當是閉字之訛蓋此句即與後第三句同其後云衫䄂溼遍袖字既用去聲則知其間字必無用平之理夢窗非率筆者流其為誤刻無疑況上句塵鏡迷樓則是用燕子樓事尢可信為閉字詞統亦照舊刻録之未及深辨人不可貪用平聲而以此藉口也圖譜既收王詞為倦尋芳乂收潘詞為倦尋芳慢蓋前則以算韶華作八字此則分一三一五前則以倦遊燕作七字此則分一三一四前則以這情懷作六字此則分一三一七故列兩體其意見真獨出矣雙雙燕九十六字吳文英小桃謝後雙雙燕飛來幾家庭户輕烟曉暝湘水暮雲遙度簾外餘香未捲共斜入紅樓深處相將占得雕梁似約韶光留住堪舉翩翩翠羽楊栁岸泥香半知梅雨落花風軟戲逐亂紅飛舞多少呢喃意緒盡日向流鶯分訴還過短牆誰㑹萬千言語捲字照後段緒字及後史詞宜用韻另按史詞於還過短牆句六字與前段同此只四字為一體或謂恐是落去二字然玩此句似亦無字可添詞體常有後結比前較少者或另有此體故收之又一體九十八字史達祖過春社了度簾幕中間去年塵冷差池欲往試入舊巢相並還相雕梁藻井又軟語商量不定飄然快拂花稍翠尾分開紅影芳徑芹泥雨潤愛貼地爭飛競誇輕俊紅樓歸晚看足栁昏花暝應是棲香正穩便忘了天涯芳信愁損翠黛雙蛾日日畫欄獨憑愛字以下同前通首平仄除前吳詞所注數字外俱不可游移圖譜從第一字改起可笑蓋此調所用仄平仄仄與仄平平仄平平仄仄平平平仄似可相混不知皆有分别如首句必仄平仄仄而第三字必以去聲為妙其下去年舊巢競誇栁昏畫欄等句必仄平平仄雕梁芹泥棲香等句必平平仄仄商量分開天涯等句必平平平仄試以後段較前段更以此詞較彼詞則古人名作無不整齊明白若指掌列眉一定不易所謂律也豈可一槩抹却亂注亂填乎且凡詞篇中必有語氣段落如還相二語乃上呼下應還字與下又字相照應是二語亦然正字與下便字相照此語氣也而段落因之試入句束住上語飄然句另起下意後段亦然自不可以還相句截連於上又軟語句截連於下此段落也而音響因之藻井用去上藻字去聲一縱則不定須用平去不字平聲一收此音響也凡此皆至理所存各詞皆有其義作者但取名篇細玩熟吟必得其解慎勿貪便而以妄譜為據致來識者之譏也偶注此調不覺饒舌覽者亮焉黃鶯兒九十六字栁永園林靜晝誰為主暖律潛催幽谷暄和黃鸝翩翩乍遷芳樹觀露濕縷金衣葉映如簧語曉來枝上綿蠻似把芳心深意低訴無據乍出暖烟來又趂遊蜂去恣狂蹤跡兩兩相呼終朝霧吟風舞當上苑栁濃時别館花深處此際海燕偏饒都把韶光與向讀此詞於暖律下難以句豆嘯餘彊分和字住為八字句黃鸝以下為八字句心嘗疑之無可考證後讀朝無咎詞亦有此調方喜得以校正矣而朝詞此數句比栁更多一字尢難分斷其首句七字用韻起與栁同其下云兩兩三三修篁新笋出初齊猗猗過牆侵户共十七字再四紬繹不得其理既而悟曰此朝詞誤多一出字耳蓋栁第二句是暖律潛吹幽谷六字用鄒衍事吹字誤催其谷字乃以入聲叶首句主字韻中州韻云谷叶古是也朝詞修篁篁字乃是竹字之訛其詞首句暑字亦是魚虞韻故以竹字叶中州韻云竹叶主是也栁詞暄和黃鸝是四字句翩翩乍遷芳樹是六字句和字去聲謂當春暄鶯聲相和而鳴或是喧字之誤朝詞新笋初齊四字句猗猗過牆侵户六字句蓋竹至過牆不宜言新出但言新笋為是如此則兩詞皆字字相合而於文理條貫無聱牙矣蓋暄和至綿蠻與後兩兩至偏饒俱相同也雨乍字露葉似意又趂恣霧上别此諸仄字兩詞如一不可照譜用平幽黃鸝觀枝蹤終風當諸平字不可照譜用仄步月九十六字史達祖剪栁章臺問梅東閣醉中攜手初歸逗香簾下璀璨縷金衣正依約冰絲射眼更荏苒蟾玉西飛輕塵外雙鴛細蹙誰賦洛濱妃霏霏紅霧繞步搖共鬢影吹入花圍管絃將散人靜燭龍稀泥私語香櫻乍破怕夜寒羅襪先知歸來也相偎未肻入重幃按此調與滿庭芳相似但正依約句泥私語句俱多一字步搖句亦多一字末句相偎下少二字耳然其體格自是不同中間兩七字句即如瀟湘夜雨中二語自相對偶與滿庭芳之上句六字下句七字者判然不同管絃二句雖亦是九字却與前段逗香二句一樣句法乃前後比合者與滿庭芳之上句五字下句四字者亦判然不同至末句少字不必言矣故不彊扭作滿庭芳也或曰子於他調有一二字參差者往往合而為一獨於此歧而别之何也余曰詞有聲響如此篇聲響自各異耳及閲施仲山梅川詞亦有此調用入聲叶者比史詞少二字其聲響更别愈知與滿庭芳徑庭矣今録於右又一體九十四字施嶽玉宇薰風寶階明月翠叢萬點晴雪煉霜不就散廣寒霏屑采珠蓓緑萼露滋嗔銀豔小蓮冰潔花魂在纎指嫩痕素英重結枝頭香未絶還是過中秋丹桂時節醉香冷境怕翻成消歇玩芳味春焙旋薰貯穠韻水沈頻爇堪憐處輸與夜涼睡蝶用入聲叶其句法與前詞稍異處則散廣寒句怕翻成句是一字領句者後起二字不叶韻還是句平仄相反兩結各少一字耳入按前詞尾句或謂相偎下必落相倚二字蓋欲增以合滿庭芳也不知滿庭芳此句應於第三字仄聲梅溪精審絶倫必不用相倚相字至於此輸與句則與滿庭芳之尾一四字一五字者相去河漢豈得謂之合調乎況前結不惟上四字句平仄不同素英句四字與滿庭芳之五字聲響全别不可添一字而相合尢為明證矣標又按此體九十四字字數較少於前然梅溪詞家凖用平自為正體施詞另格故載後云漢宫春九十六字吳文英花姥來時帶天香國艷羞掩名姝日長半嬌半困宿酒微蘇沈香檻北比人間風異烟殊春恨重盤雲墜髻碧花翻吐瓊盂洛苑舊移仙譜向吳娃深館曽奉君娛猩唇露紅未洗客鬢霜鋪蘭詞沁壁過西園重載雙壺休謾道花扶人醉醉花却要人扶後段起句換頭餘同賦此調者甚衆此篇用字穩妥可為程式日長二句與猩唇二句本上六下四而稼軒用無端風雨未肻收盡餘寒乃上四下六且風雨二字平仄亦異余謂雖此句十字貫下或可不拘然歷觀諸家皆用此篇之體即稼軒此首後段亦云閒時又來鏡裏轉變朱顔矣更有作長把清明夜雨者尢不可從此平平仄平仄仄則為中正之理也後段起句亦有用平平仄平平仄者不拘檻沁二字以仄為妙比人間過西園兩處有作仄平仄有作仄仄平皆不拘凡詞調於此等七字句往往互異然此調似用仄平平為響知音者審之至春恨重春字自當用平有作仄者不可學也墜字是仄人字亦宜仄此則古人用平者亦多然求無瑕之壁其亦以用仄為全美乎又前後首句有起韻者如惜香講栁談花從前萬事堪誇是又一體因字同不録附記於此若放翁後起用無事又作南來又非叶韻乃用平聲斷句他無同者恐不可從又一體九十六字康與之雲海沈沈峭寒收建章雪殘鳷鵲華燈照夜萬井禁城行樂春隨鬢影映參差栁絲梅萼丹禁杳鼇峯對聳三山上通寥廓春衫繡羅香薄步金蓮影下三千綽約冰輪桂滿皓色冷侵樓閣霓裳帝樂奏升平天風吹落留鳳輦通宵宴賞莫放漏聲閒却用仄韻兩結平仄稍異所用峭照鬢映禁對上繡步桂帝奏鳳宴漏諸去聲宜學帝樂二字偶合非叶韻觀前段影字可知第一字嘯餘作雪字誤下有雪殘也按春隨鬢影與霓裳帝樂乃四字句其下七字上三下四於差字平字為豆而萼字落字為叶也其下又七字亦上三下四於杳字輦字為豆而聳字賞字為句也結句皆六字前後相對明明白白且此體雖仄韻而句字與用平一樣甚為顯而易見乃圖譜將映參差與奏升平分屬上句誤矣猶未足竒也竟以丹禁至三山作九字末作四字而後段之尾則又作一七一六何所見而云然乎又以禁字聳字注可平竒甚更可笑者嘯餘不識丹禁杳讀斷竟將杳字讀作香字遂刻作丹禁香鼇不知鼇有何香臭真足捧腹陽臺路九十六字栁永楚天晚墜冷風敗葉疏紅零亂冒征塵匹馬區區愁見水遙山逺追念年時正恁鳳幃倚香偎暖嬉遊慣又豈知前歡雲雨分散此際空勞回首望帝里難收淚眼暮烟衰草算暗鎖路歧無限今宵又依前寄宿甚處葦村山館寒燈半夜厭厭憑何消遣此篇婉順可從平仄宜悉遵之幸譜圖失收尚留得本來面目未被雕鎪塗抹也採明珠九十六字杜安世雨乍收小院塵消雲淡天高露冷坐看月華生射玉樓清瑩蟋蟀鳴金井下簾幃悄悄空階敗葉墜風惹動閒愁千端萬緒難整秋夜永涼天迥可不念光景嗟薄命倐忽少年忍教孤冷燈閃紅窗影步回廊懶入香閨暗落珠滿面誰人知我為伊成病他無作者莫可校勘姑注其句豆如右然或有訛落非確然也其中確然者惟蟋蟀句至空階與後燈閃句至香閨可以無疑珠字上必有淚字孤冷冷字不宜犯重恐是另字景字亦未必是叶慶清朝九十七字或加慢字史達祖墜絮孶萍狂鞭孕竹偷移紅紫池亭餘花未落似供殘蝶經營賦得送春詩了夏帷攛斷緑隂成桑麻外乳鴉稚燕别樣芳情荀令舊香易冷歎俊遊疏懶枉是銷凝塵侵謝屐幽徑斑駁苔生便覺寸心尚老故人前度謾丁寧空相誤祓蘭曲水挑菜東城餘花下與後塵侵下同此詞是此調正體穩順可從王碧山詞亦與此合較後載王通叟所作易填也細玩各家詞於未送乳稚舊易後謝寸尚祓曲等字皆宜用仄此篇詩字恐是句字此乃起調處不可謂古人之拙而愚見之迂也又一體九十七字王觀調雨為酥催冰做水東君分付春還何人便將輕暖點破殘寒結伴踏青去好平頭鞋子小雙鸞烟郊外望中秀色如有無間晴則箇隂則箇餖飣得天氣有許多般須教撩花撥栁爭耍先看不道吳綾繡襪香泥斜沁幾行斑東風巧盡收翠緑吹上眉山何人二句與須教二句上六下四與前詞異後起兩句亦異故雖字同另録之然亦因其詞佳也晴則箇二句雖各三字然與前調六字一句者平仄恰合故妙餖飣二句用流走活字巧合音律故譜圖疑之不敢注斷作九字句此無足怪所怪者此調自何人下即前後相同如何將結伴句分作五字而以好字連下平頭句作八字乎豈後段可讀不道吳綾繡為句而下可作襪香泥乎以較前詞可讀了夏帷老故人乎緑蓋舞風輕九十七字周密玉立照新粧翠蓋亭亭凌波步秋漪真色生香明璫搖淡月舞袖斜倚耿耿芳心奈千縷晴絲縈繫恨開遲不嫁東風顰怨嬌蕊花底謾卜幽期素手採珠房粉艷初洗雨溼鉛腮碧雲深暗聚軟綃清淚訪藕尋蓮楚江逺相思誰寄棹歌回衣露滿身花氣袖字怨字艷字去聲不可依圖譜作平而凌波步謂可用仄仄平尢無理按漪字平聲想草窗偶作仄用亦誤也不然則是綺字之誤耳玉京謠九十七字吳文英蝶夢迷清曉萬里無家嵗晚貂裘敝載取琴書長安閒看桃李爛繡錦人海花場任客燕飄零誰計春風裏香泥九陌文梁孤壘微吟怕有詩聲翳鏡慵看但小樓獨倚金屋千嬌從他鵷暖秋被蕙帳移烟雨孤山待對影落梅清泚終不似江上翠微流水載取至春風裏與後段金屋至終不似同不按此詞結句亦似玉京秋或謂即是一調但他句合且陳隨隱謾録云先君號藏一夢窗吳先生為度彛則商犯無射宫製玉京謠一篇相贈則此調創於夢窗與玉京秋無涉故不敢連載於前也西子妝九十七字或加慢字吳文英流水麴塵艷陽酷酒畫舸遊情如霧笑拈芳草不知名乍凌波斷橋西堍垂楊謾舞總不解將春繫住燕歸來問綵繩纎手如今何許歡盟誤一箭流光又趂寒食去不堪衰鬢著飛花傍緑隂冷烟深樹𤣥都秀句記前度劉郎曽賦最傷心一片孤山細雨謾字秀字俱要去聲張叔夏作于謾舞用寸碧二字其詞是意字起韻碧字乃以入聲為叶者故知入聲不但可作平兼可作上聲而叶韻矣中州音韻原以碧叶比也細雨去上煞妙甚張亦用萬里若作平仄或上上或去去便落調矣凡詞結尾字皆不宜草草亂填可於此類推換頭起句叔夏用外字或謂可以不叶余云詞中多以外字叶支微韻作者自當用韻為是況叔夏原注效夢窗自度而作無不同之理也綜酷酒酷字無理汲古刻本集及圖譜詞等書皆相沿誤刻余謂是酤字之訛耳被花惱九十七字楊纘疏疏宿雨釀輕寒簾幕靜垂清曉寶鴨微溫睡烟少簷聲不動春禽對語夢怯頻驚覺欹珀枕倚銀牀半窗花影明東照惆悵夜來風生怕嬌香混瑤草披衣便起小徑回廊處處都行到正千紅萬紫競芳妍又還似年時被花惱驀忽地省得而今雙鬢老此楊守齊自度腔也以詞中語名題亦因山谷水仙詩坐對真成被花惱故取其三字耳詞律卷十四
