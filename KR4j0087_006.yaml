body:
  text: 詞律卷六宜興萬樹撰梁州令五十字梁一作涼晏幾道莫唱陽關曲泪溼當年金縷離歌自古最銷魂于今更有銷魂處南橋楊栁多情緒不繫行人住人情却似飛絮悠揚便逐春風去曲字音去查各詞俱首句用韻此乃以入聲作去蓋北音也又一體五十一字朝補之二月春猶淺去年櫻桃開遍今年春色怪遲遲紅梅常早未露胭脂臉東君遣春來緩似㑹人深願蟠桃新鏤雙盞相期似此春長逺紅梅以下比前多二字後起句只六字或日東君下恐落去一字又一體五十五字柳永夢覺紗窗曉殘燈黯然空照因思人事苦縈牽離愁别恨無限何時了憐深定是心腸小往往成煩惱一生惆悵情多感月不長圜春色易為老照前詞則應于何時了下分段而柳集係連刻且觀後二闋亦可合作一段故仍之又一體一百五字歐陽修翠樹芳條颭的的裙腰初染佳人攜手弄芳菲緑隂紅影共展雙紋簟插花照影窺鸞鑑只恐芳容減不堪零落春晚青苔雨後深紅㸃一去門閒掩重來却尋朱檻離離秋實弄輕霜嬌紅脉脉似見胭脂臉人非事往眉空斂誰把佳期賺芳心只願長依舊春風更放明年艷前後段同只芳心句七字恐長字是誤多耳晚字譜圖俱注叶韻不知此詞通篇用閉口音甚嚴豈誤插一旁韻况後段舊字不叶可證觀此詞則知前詞可合兩段為一而朝詞束君句或誠少一字矣梁州令疊韻百字朝補之田野閒來慣睡起初驚曉燕樵清走挂小簾鈎南園昨夜細雨紅芳遍平蕪一帶烟花淺過盡南歸雁俱遠憑欄送目空腸斷好景難常占過眼韶華如箭莫教鶗鴂送韶華多情楊柳為把長條絆清斟滿酌誰為伴花下提壺勸何妨醉臥花底愁容不上春風面此與前歐詞多同但題曰疊韻而本集分刻如右今不敢改也俱逺二字上尚有四字舊本遺落無可考增逺字亦非叶韻作者照歐詞不堪句換之可也觀此何妨句則前詞芳心句長字誤多可信西江月五十字又名步虛詞史達祖裙摺緑羅芳草冠梁白玉芙蓉次公筵上見山公紅綬欲銜雙鳯巳向冰奩約月更來玉界乘風凌波襪冷一尊同莫負彩舟涼夢平仄兩叶者又有前二平一仄後又換韻一平一仄山谷夢窗皆有此體録後又一體五十字吳文英枝裊一痕雪在葉藏幾豆春濃玉奴最晚嫁東風來結梨花幽夢香力添薰羅被瘦肌猶怯冰綃緑隂青子老溪橋羞見東鄰嬌小又一體五十六字趙以仁夜半沙痕依約雨餘天氣溟濛起行微月遍池東水影浮花花影動簾櫳量減難追醉白恨長莫盡題紅雁聲能到畫樓中也要玉人知道有秋風前後結俱一四一五不換仄叶乃按汲古刻書舟西江月三首一缺後半一缺前半以兩半合作烏夜啼别載誤矣其第三則全是烏夜啼只兩結六字余斷其亦是誤名必無此西江月體也但因烏夜啼各家與六字結者故不收錦堂春後附録于此備考水牆外雨肥梅子階前水繞荷花隂隂庭户薰風滿紋簟怯菱芽箇春盡難慿燕語日長惟有蜂衙沈香火冷珠簾暮人碧窗紗西江月慢一百三字吕渭老春風淡淡清晝永落英千尺桃杏散平郊晴蜂來往妙香飄擲傍畫橋煮酒青帘緑楊風外數聲長笛記去年紫陌朱門花下舊相識向寶帕裁書憑燕翼望翠閣烟林似織聞道春衣猶未整過禁烟寒食但記取角枕情題東窗休誤這些端的更莫待青子緑隂春事寂與西冮月本調無涉江月晃重山五十四字陸游芳草洲前道路夕陽樓上䦨干碧雲何處望歸鞍從軍客耽樂不思還洞裏仙人種玉江邉楚客滋蘭鴛鴦沙暖鶺鴒寒菱花晚不奈鬢毛斑用西江月小重山串合故名冮月晃重山此後世曲中用犯之嚆矢也詞中題名犯字者有二義一則犯調如以宫犯商角之類夢窗云十二宫住字不同惟道調與雙調俱上字住可犯是也一則犯他詞句法若玲壠四犯八犯王交枝等所犯竟不止一詞但未將所犯何調著于題名故無可考如四犯剪梅花下注小字則易明此題明用兩調名串合更為易曉耳此調因江月在前小重山在後故收于西江月後猶江城梅花引收于冮城子後也四碧雲鴛鴦二句兩調俱有此七言或云西江月止句小重山六句必各採其半余曰總之此句平仄相同不必太泥也近日圖譜收踏莎美人調而以梁汾之新犯實之亦自和協且作新犯差勝于自度然今人不諳當時宫調未便擅創此類甚多余皆不敢收入按夢窗所云道調雙調俱上字住可犯此上字非平上去入之上乃今絃管家所謂六工尺上之上也此不可不知四犯令五十字侯置月破輕雲天淡注夜悄花無語莫聽陽關牽離緒拚酩酊花深處明日江郊芳草路春逐行人去不似酴醿開獨步能著意留春住前後段同注題名四犯必犯四調者或每句犯一調然未明不知犯何調也說見前調下滿宫花五十字尹鶚月沈沈人悄悄一炷後庭香裊風流帝子不歸來滿地禁花慵掃離恨多相見少何處醉迷三島漏清宫樹子規啼愁鎖碧窗春曉前後段同又一體五十一字張泌花正芳樓似綺寂寞上陽宫裏鈿籠金鎖睡鴛鴦簾冷露華珠翠嬌艷輕盈香雪膩細雨黃鸝雙起東風惆悵欲清明公子橋邊沈醉後段起句七字細雨句圖譜失注叶又一體五十一字魏承班雪霏霏風凜凜王郎何處狂飲醉時想得縱風流羅帳香幃鴛寢春朝秋夜思君甚愁見繡屏孤枕少年何事負初心淚滴縷金雙袵玉郎句春朝句平仄各異留春令五十字髙觀國粉綃輕試緑裙微褪吳姬嬌小一㸃清香著芳魂便添起春懷抱玉臉窺人舒淺笑寄此情天渺酒醒羅浮角聲寒正月挂南枝曉梅溪于一㸃句作一涓春水㸃黃昏玉臉句作曾把芳心深相許平仄稍異然此詞前後整齊可從又一體五十字李之儀夢斷難尋酒醒猶困那堪春暮香閣深沈紅窗翠暗莫羡顛狂絮緑滿當時攜手路懶見同歡處何時却得低幃昵枕盡訴情千縷起句用平前後結俱兩四一五與前詞異又一體五十四字黃庭堅江南一雁橫秋水歎咫尺斷行千里回文機上字縱橫欲寄逺憑誰是謝客池塘春都未微微動短牆桃李半隂才暖却清寒是瘦損人天氣前後段同俱七字起與前詞異尾句不可于三字豆與前段稍有不同月中行五十字周邦彥蜀絲趂日染乾紅微暖口脂融博山細篆靄房櫳靜看打窗蟲愁多膽怯疑虛幕聲不斷暮景疏鐘團圍四壁小屏風淚盡夢啼中博山二句前後同鹽角兒五十字朝補之開時似雪謝時似雪花中竒絶香非在蘂香非在萼骨中香徹占溪風留溪月堪羞損山桃如血直饒更疏疏淡淡終有一般情别前段似栁梢青後則全異茶瓶兒五十字石孝友相對盈盈一水多聲價開名得字剛能見也還拋棄負了萬紅千翠留無計來無計成何况味而今若沒些兒事却枉了倣人一世又一體五十四字趙彥端淡月華燈春夜送東風栁烟梅麝寶叉宫髻連嬌馬似記得帝鄉遊冶悅親戚之情話况溪山坐中如畫凌波微步人歸也看酒醒鳯鸞誰跨前後同比石詞多四字愚謂石詞不全其前結負字上必落一辜字蓋此調前後皆七字也至成何况味上必落三字無疑蓋玩其語氣斷無單用此四字之理也又一體五十六字李元膺去年相送深院字海棠下曽歌金縷歌罷花如雨翠羅衫上㸃㸃紅無數今歲重尋攜手處空物是人非春暮回首青門路亂英飛絮相逐東風去前後段同絮字偶合非叶韻年字必係歲字之訛惜春令五十字杜安世春夢無憑猶懶起銀燭盡畫簾低垂小庭楊栁黃金翠桃臉兩三枝粧閣慵梳洗悶無緒玉簫拋擲絮飄紛紛人疏逺空對日遲遲此調惟此夀域兩首他無可證而叶韻復參差無定今并其又一首録後以俟覽者審定焉今夕重陽秋意深籬邊散嫩菊開金萬里霜天林葉墜蕭索動離心臂上茱茰新似舊年堪賞光隂百盞香醑且酬身牛山㑹難尋兩闋不同難以注定後愚謂前詞首句起字即是用韻與後深字起韻同段起句洗字亦是叶韻與後新字同乃平仄通叶也擲字亦是韻與後隂字用韻同乃以入為叶也但絮飄下與百盞下不合必有錯字不敢彊為之說惜分飛五十字陳允平釧閣桃腮香玉溜困倚銀牀倦繡雙燕歸來後相思葉底尋紅豆碧唾春衫還在否重理弓彎舞袖錦藉芙蓉皺翠腰羞對垂楊瘦前後同聖求雙燕句作簾映春窈窕窈窕二字誤或窈字之上尚有一平聲之字而寫者誤落因窈窕二字相連故遂訛書耳惜雙雙令五十二字劉弇風外橘花香暗度飛絮綰殘春歸去醖造黃梅雨冷烟曉占橫塘路翠屏人在天低處驚夢斷行雲無據此恨憑誰訴恁時却倩危絃語此調比惜分飛只前後次句各多一字雖查各家惜分飛無次句七字者然其格局音響鑿然即是惜分飛况惜字相同故取附于此而仍其名焉憶故人五十字即燭影搖紅王詵燭影搖紅向夜䦨乍酒醒心情懶尊前誰為唱陽關離恨天涯逺無奈雲沈雨散憑闌干東風泪眼海棠開後燕子來時黃昏庭院按能改齊漫録云此詞乃晉卿駙馬自度曲因憶故人作也徽宗喜其詞意但以不豐容宛轉命周美成增益而取其首句為名故余謂後之九十六字者名燭影搖紅而此則因其憶故人之名然本因憶故人而作後人即以名其詞其實晉卿作此時原未有名也或以晉卿此篇乃平仄通叶者其所用闌字關字干字俱是叶韻此則謂之穿鑿矣又一體四十八字毛滂老景蕭條送君歸去添淒斷贈君明月滿前溪直到西湖畔門掩緑苔應遍為黃花頻開醉眼橘奴無恙蝶子相迎寒窗日短此調美成增定雙疊第二句七字遂為定譜此詞澤民仍用王體九句而第二句則用七字耳毛又一首蝶子相迎句作水邊月底平仄偶誤不可從燭影搖紅九十六字吳文英秋入燈花夜深簷影琵琶語越娥青鏡洗紅埃山鬭秦眉嫵相間金茸翠畝認城隂春耕舊處晚舂相應新稻炊香疏烟林莽清磬風前海沈宿裊芙蓉炷阿香秋夢起嬌啼玉女傳幽素人駕海查未渡試梧桐聊分宴俎採菱别調留取蓬萊霎時雲住將前調加一疊此則南宋以後俱用之夜海二字須仄聲至若翠舊未宴尤須用仄得去聲更妙蓋此字仄而末句用林字雲字平聲方得抑揚聲響若前用平後反用仄便是落腔矣譜圖亂注莫從滴滴金五十字李遵朂帝城五夜宴遊歇殘燈外看殘月都來猶在醉鄉中聽更漏初徹行樂巳成閒話說如春夢覺時節大家同約探春行問甚花先發前後字句同而換頭平仄各異漏字仄花字平亦不同又一體五十字晏殊梅花漏泄春消息栁絲長草芽碧不覺星霜鬢邊白念時光堪惜蘭堂把酒留嘉客對離筵駐行色千里音塵便疏隔合有人相憶前後同白字隔字叶韻春字長字筵字用平聲與前詞異又一體五十字楊無咎相逢未盡論心素早容易背人去憶得歌翻腸斷句更惺惺言語萋萋芳草迷南浦正風吹打窗雨靜聽愁聲夜無眠到水村深處楊二首俱同憶得句叶而腸字平聲靜聽句用平不卟而夜無眠三字仄平平與前詞異按同甫介庵作前後俱用靜聽句句法兹不録又一體五十一字孫夫人月光飛入林前屋風䇿䇿度庭竹夜半江城擊柝聲動寒梢棲宿等閒老去年華促祗有江梅伴幽獨夢繞彝門舊家山恨驚回難續中兩七字句前後俱用平而舊家山與擊柝聲梢異祗有句七字更異桂華明五十字關注縹眇神仙開洞府遇廣寒宫女問我雙鬟梁漢舞還記得當時否碧玉詞章教仙女為按歌宫羽皓月滿窗人何處聲永斷瑤臺路墨莊慢録云宣和二年關注子東夢一髯翁使女子歌太平樂醒而記之後復夢翁問記否子東歌之翁以笛復作一弄是重頭小令後又夢月姊為歌前兩曲姊喜亦歌一調似昆明池醒不復憶惟髯翁笛聲尚在因倚其聲為調名日桂華明歸田樂五十字蔡伸風生蘋末蓮香細新浴晚涼天氣猶自倚朱欄波面雙雙彩鴛戲鸞叉委墜雲堆髻誰㑹此時情意冰簟玉琴橫還是明月人千里後結與前結平仄異又一體五十字朝補之春又去似别佳人幽恨積閒庭院翠隂滿添晝寂一枝梅最好至今憶正夢斷爐烟裊參差疏簾隔為何事年年春恨問花應㑹得與前調迥别又一體六十八字晏幾道試把花期數便早有感春情緒看即梅花吐願花更不謝春且長住只恐去春去花開還不語此意年年春㑹否絳唇青鬢漸少花前語對花又記得舊曽遊處門外垂楊未飄絮比前兩體亦各異然恐有誤處又一體七十三字黃庭堅對景還消受被箇人把人調戲我也心兒有憶我又喚我見我瞋我天甚教人怎生受看承幸則勾又是尊前眉峯皺是人驚怪寃我忒撋就拚了又捨了一定是這回休了及至相逢又依舊天甚句七字與前詞異然前詞此句必有脫落蓋此看承句比前詞少二字則前詞後起亦只花開還不語五字而春去二字乃前段尾中字耳只恐去三字必不全或是只恐春來又春去也一定是句比前多三字此則恐是誤多觀前段只用見我瞋我四字晏詞前用春且長住後用舊曽遊處亦皆只四字則此處不應獨加此三字也俳谷老又一詞止四十四字然查係殘缺不全又皆語難曉故不録為調首怨三三五十字李之儀清溪一泒瀉柔藍岸草毶毶記得黃鸝語畫簷喚狂裏醉重三春風不動重簾似三五初圓素蟾鎮泪眼廉纎何時歌舞再和池南狂裏字恐訛竹香子五十字劉過一項窗兒明快料想那人不在薰籠脫下舊衣裳件件香難賽匆匆去得忒㬠這鏡兒也不曽蓋千朝百日不曽來沒些兒箇采後第二第四句比前各多一字舊按詞統載升菴程馟誤佳期各一首四十六字查詞無此體或升菴自度或調僻考訂不及耳因其前段與此竹香子同附録于此以識余淺學疏漏之愧今誤佳期堪愛可惜那人不在臨行多是不曽留故夜風光意將人怪心雙木架鞦韆兩下深深拜條香燒盡紙成灰莫把兒壞思越人五十一字孫光憲古臺平芳草逺館娃宫外春深翠黛空留千載恨教人何處相尋綺羅無復當時事露花㸃滴香淚惆悵遙天橫淥水鴛鴦對對飛起前平韻後仄韻或曰首句平字即是起韻觀後趙二詞亦首句用韻者未審是否圖譜以露花句分作三字兩句查孫别作此句云紅蘭緑蕙愁死鹿䖍扆云玉纎慵整雲散張泌云黛眉愁聚春碧并後趙詞斑斑玉纎相連豈可于三字分斷耶又一體五十一字趙長卿情難托離愁重悄愁沒處安著那堪更一葉知秋天色兒漸冷落馬上征衫頻揾淚一半斑斑汚却别來為憶叮嚀話空贏得瘦如削通篇仄韻那堪句句法另異恐誤又一體五十字趙長卿好事客宫商內吟得風清月白主人幸有豪家意後堂煞有春色花壓金翹俏相映酒滿玉纎無力你若待我些兒酒儘喫得得得此與前詞又微不同尾句只五字恐儘喫得下是三個得字而今落去其一耳不然或儘喫得儘喫得本以三字疊兩句當時于得字下㸃了兩㸃故傳訛作兩得字耳因恐不全故雖五十字不列于前思逺人五十一字晏幾道紅葉黃花秋意晚千里念行客飛雲過盡歸鴻無信何處寄書得淚彈不盡臨窗滴就硯旋研墨漸寫到别來此情深處紅箋為無色前後第二句四句五句同旋字去聲念寄旋為四字皆用去聲字不可誤探春令五十一字宋徽宗簾旌微動悄寒天氣龍池冰泮杏花笑吐香紅淺又還是春將半清歌妙舞從頭按等芳時開宴記去年對著東風嘗許不負鶯花願按此調與留春令相似然是兩調勿誤又一體五十一字蔣捷玉窗蠅字記春寒滿茸絲紅處畫翠鴛雙展金蜩翅未抵我愁紅膩芳心一㸃天涯去絮濛濛遮住對花彈阮纎瓊指為粉靨空彈淚起句七字結處前後相合與前詞異翅膩指淚俱借叶畫翠鴛句八字對花句不應七字恐誤兩結六字皆于三字豆斷圖譜乃槩作六字讀且以我字為可平則人必于我愁二字相連用平平矣豈是此調哉圖此本竹山詞譜誤作東坡又一體五十二字趙長卿數聲回雁幾番疏雨東風回暖甚今年立得春來晚過人日方相見縷金幡勝教先辦著工夫裁剪到那時睹當須教滴惜稱得梅粧面第四句比徽宗詞多一字各家多如此又一體五十二字晏幾道緑楊枝上曉鶯啼報融和天氣被數聲吹入紗窗裏又驚起嬌娥睡緑雲斜軃金叉墜惹芳心如醉為少年溼了鮫鮹帕上都是相思淚前半同蔣體後半同徽宗體詞此調向來皆如此讀或曰起三句每句四字蓋各前殺皆三句四字起後換頭則七字也前蔣詞第二句亦應作記春寒滿余亦疑之及觀趙彥端笙歌間錯一首方知有此七字起句之格幾以穿鑿注差又一體五十二字楊無咎梅英粉淡栁梢金軟蘭芽依舊見萬家燈火明如晝正人脰圓時候挨香傍玉偷攜手儘輕衫寒透聽一聲畫角催殘漏惜歸去頻回首前半同趙體後半同蔣體只第三句多一字與前段見萬家句同又一首畫漏二字不叶兹不另録又一體五十二字楊無咎東風初到小梅枝上又驚春近料天台不比人間日月桃萼紅英暈劉郎浪迹憑誰問莫因詩瘦損怕桑田變海仙源重返老大無人認前後結處俱用一五一四一五相同與前各調異料天台下與怕桑田下九字亦可作三六亦可作五四總是一氣貫下者又一體五十二字趙長卿笙歌間錯華筵啓喜新春新歲菜傳纎手青絲輕細和氣人東風裏幡兒勝兒都姑媂戴得更忔戲願新春巳後吉吉利利百事都如意首句七字起韻菜傳兩句皆四字與前各異然此用俳體恐有誤處不便學又一首起處云新元才過漸融和氣先到簾幃幃字起韻是平聲下則以裏未棄淚等仄聲叶之想此句亦可平仄通叶觀其到字用仄是幃字之平不是偶誤也探春九十三字或加慢字吳文英苔徑曲深深不見故人輕敲幽戶細草春回目斷流光一羽重雲冷哀雁斷翠微空愁蝶舞逞鳴鞭遊蓬小夢枕殘驚寤還識西湖醉路向栁下並鞍銀袍吹絮事影難追那負燈床聞雨冰溪憑誰照影有明月乘興去暗相思梅孤瘦共江亭暮銀袍至相思與前段輕敲至鳴鞭同重雲二句疑皆于三字為豆後之冰溪句憑字恐是憑字仄聲此二句亦皆于三字豆耳又一體一百三字張炎銀浦流雲緑芳迎曉一抹牆腰月淡暖玉生香懸冰解凍碎滴瑶階如霰才放些晴意早瘦了梅花一半也知不作花香東風何事吹散搖落似成秋苑甚釀得春來怕教春見野渡舟回前村門掩應是不勝清怨次第尋芳去灞橋外蕙香波暖猶聽簷聲看燈人在深院此調句中平仄頗多不同一抹句或作平平平仄平仄怕教春見或作平仄平仄才放句與次第句或作平仄仄平平結句或作平平仄平平仄或作仄仄平平平仄皆與此詞稍異而君衡結云畫欄間立東風舊紅誰掃則上六下四矣總之數者皆可照填而白石詞中典型于腰教二字用旋泪兩仄聲從之可也人在二字與前段何事二字同白石用零亂其前段亦用閒共二字是也汲古及圖譜等刻作亂零大誤蓋旋淚共亂四去聲字發調白石所以為名家髙手正在此處改作亂零白石寃矣探新芳九十二字吳文英九街頭正軟塵潤酥雪消殘溜褉賞祗園花艷雲隂籠晝層梯空麝散擁凌波縈翠袖歎年端連環轉爛熳遊人如繡腸斷回廊竚久便寫意濺波傳愁蹙岫漸沒飄鴻空惹閒情春瘦椒杯香乾醉醒怕西窗人散後暮雲深遲回處自攀花栁層梯句照後椒杯句宜亦六字乃落一字也連環句有誤想轉字誤多耳按此調余向疑即是探芳信以新信二字音相近也探芳信首句皆三字仄韻起此以頭字平起後用仄卟故疑平仄通叶而正軟塵二句便寫意一句及兩結俱與探芳信相似但彼之四五兩句雖亦十字而句各五字此則一四一六彼之六七兩句雖亦十二字而一七一五此則各六字後段亦然因句法有别故不敢收入探芳信後今查與前夢窗苔徑曲一首頗為相合故附于此首句三字雖異而以下多同至縈翠袖人散後之平仄仄與前詞之愁蝶舞乘興去平仄尤合濺字去聲亦與前詞並字同至後段起處尾處一字無殊益信前結悮多轉字矣是則探芳新之即是探春慢無疑况俱以探字為題乎但雖附此于末而仍探芳新之名以質諸髙明者文層梯下必落一仄聲字椒杯下杳乾二字亦必誤理難解香字該仄聲字乾字或是朝字之訛此四句亦如前詞俱應于三字分句耳秋夜雨五十一字蔣捷黃雲水驛秋笳噎吹人雙鬢如雪愁多無奈處漫碎把寒花輕撧紅雲轉入香心裏夜漸深人語初歇此際愁更别雁落影西窗殘月鬢字語字仄聲更字尤必用去聲迎春樂五十一字秦觀菖蒲葉葉知多少唯有箇蜂兒妙雨晴紅粉齊開了露一㸃嬌黃小早是被曉風力暴更春共斜陽俱老怎得香香深處作個蜂兒抱後起二句七字與前兩七字句句法不同圖譜總作七字其露一㸃句亦總作六字人若照其所圖填之則句法誤者不少矣又一體五十一字栁永近來憔悴人驚怪為别相思㬠我前生負你愁煩債便苦恁難開解良夜永牽情無奈錦被裏餘香猶在怎得依前燈下恣意憐嬌態第二句五字第三句八字與前詞異汲古刻本集奈字訛計便失却一韻又一體五十一字楊無咎新來特特更門地都收拾山和水看明年事事如意迎福祿俱來至莫管明朝添一歲儘同向樽前沈醉且共唱迎春樂祝母千秋歲第二句同秦體第三句句法上三下四與秦異事事下恐落一字後起句法與前段同而平仄則異又一體五十二字方千里紅深緑暗春無跡芳心動冶遊客記搖鞭跋馬銅駝陌凝睇認珠簾隔絮滿愁城風捲白遞多少相思消息何處約歡期芳草外髙樓北何處句五字平兩結皆六字與前調異美成有一首于外字作平又一體五十三字晏殊長安紫陌春歸早軃垂楊染芳草被啼鶯語燕催清曉正好夢頻驚覺當此際青樓臨大道幽㑹處兩情多少莫惜明珠百琲占取長年少第三句後首句比秦詞各多一字瑤池燕五十一字蘇軾飛花成陳春心困寸寸别腸多少愁悶無人問偷啼自揾殘粧粉抱瑶琴尋出新韻玉纎趂南風未解幽愠低雲鬢眉峯斂暈嬌和恨東坡云琴曲有瑶池燕其詞不協而聲亦怨咽變其詞作閨怨寄陳季常此曲竒妙勿妄與人河傳五十一字張泌渺莽雲水惆悵暮帆去程迢遞夕陽芳草千里萬里雁聲無限起夢魂悄斷烟波裏心如醉相見何處是錦屏香冷無睡被頭多少淚此調體製最多通篇用一韻而字少者惟此調圖譜于起句渺莽雲三字注可平平仄非又一體五十一字張泌紅杏交枝相映密密濛濛一庭濃艷倚東風香融透簾櫳斜陽似共春光語蝶爭舞更引流鶯妒魂消千片玉樽前神仙瑶池醉暮天凡四換韻體亦異前唐詞多與此髣佛又一體五十三字孫光憲栁拖金縷著煙籠霧濛濛落絮鳳皇舟上楚女妙舞雷喧波上鼓龍爭虎戰分中土人無主桃葉江南渡襞花箋艷思牽成篇宫娥相與傳此兩換韻者體又異又一體五十三字閻選秋雨秋雨無晝無夜滴滴霏霏暗燈涼簟怨分離妖姬不勝悲西風稍急喧窗竹停又續膩臉懸雙玉幾回邀約雁來時違期雁歸人不歸各調如四字起者即以第四字為韻如前渺莽栁拖二首是也二字起者即以第二字為韻如後錦浦棹舉二首是也此詞雖兩雨字而下無叶者只作無韻句耳或謂尾句只五字雁歸不必用韻凡前後用一二字一五字結者俱同又一體五十三字韋莊錦浦春女繡衣金縷霧薄雲輕花深栁暗時節正是清明雨初晴玉鞭魂斷煙霞路鶯鶯語一望巫山雨香塵隱映遙見翠檻紅樓黛眉愁浦字是韻舊譜但注四字句于輕字始注起韻是一注而失三韻大謬花深下十字與後香塵下十字或作上六下四亦可見按此調與怨王孫同說後又一體五十三字顧敻曲檻春晚碧流紋細緑楊絲軟露華鮮杏枝繁鶯囀野蕪平似剪直是人間到天上堪遊賞醉眼疑屏幛對池塘惜韶光斷腸為花須盡狂檻字閉口音是借叶下露華兩句與前詞異直是句平仄小異對池塘以與前孫詞同此則作者多相合也字舊譜囀字失注卟韻連下作七句謬鮮繁二字亦失注叶又一體五十四字孫光憲花落煙薄謝家池閣寂寞春深翠蛾輕斂意沈吟沾襟無人知此心玉爐香斷霜灰冷簾鋪影梁燕歸紅杏晚來天空悄然孤眠枕檀雲髻偏寂寞下與前詞異後段同又一體五十四字顧敻棹舉舟去波光渺渺不知何處岸花汀草共依依雨微鷓鴣相逐飛天涯離恨江聲咽啼猿切此意向誰說艤蘭橈獨無憀魂銷小爐香欲焦處字叶上舉去依字換韻與前詞異後段同如按稼軒詞春水千里一首正與此合而刻夲多訛艤蘭橈以下刻本云太顛狂那邊栁線被風吹上天不知太狂顛乃四換平韻而誤倒顛狂那邊乃叶韻句該三字而誤落一字柳綿乃叶韻而誤寫柳線遂使讀者致疑甚矣梓書而不細校之為害也又一體五十四字顧敻燕揚晴景小窗屏暖鴛鴦交頸菱花掩却翠鬟欹慵整海棠簾外影繡幃香斷金鸂鶒無消息心事空相憶倚東風春正濃愁紅淚痕衣上重慵整下仍叶首韻與前異後段同不揚字雖去聲不用韻與渺莽雲水同圖譜于整字注叶連下作七字句大謬即如前顧詞囀字失注蓋不知為句中短韻也又一體五十四字孫光憲太平天子等閒遊戲疏河千里栁如絲畏倚緑波春水長淮風不起如花殿腳三千女爭雲雨何處留人住錦帆風烟際紅燒空魂迷大業中前段不換韻與柳拖金縷一首同而栁如絲以下則異後段同首句第二字雖不起韻而各詞多用仄聲想調應如是只此詞與栁拖金縷二句用平聲耳倚字或云非卟又一體五十五字孫光憲風颭波斂團荷閃閃珠傾露㸃木蘭舟上何處吳娃越艷藕花紅照臉大隄狂殺襄陽客烟波隔渺渺湖光白身巳歸心不歸斜暉逺汀鸂鶒飛木蘭二句一四一六體又異後段同篇愚謂前栁如絲下是落一字蓋與木蘭句同而全亦無弗同也又一體五十五字溫庭筠湖上閒望雨蕭蕭烟浦花橋路遙謝娘翠蛾愁不銷終朝夢魂迷晚潮蕩子天涯歸棹逺春巳晚鶯語空腸斷若耶溪溪水西栁隄不聞郎馬嘶而蕭蕭句即換韻又異後段同又一體五十五字李珣去去何處迢迢巴楚山水相連朝雲暮雨依舊十二峯前猿聲到客船愁腸豈異丁香結因離别故國音書斷絶想佳人花下對明月清風恨應同兩結皆與前各體異又一體五十五字李珣春暮微雨送君南浦愁斂雙蛾落花深處啼鳥似逐離歌粉檀珠泪和臨流更把同心結情哽咽後㑹何時節不堪回首相望巳隔汀洲櫓聲幽後㑹句五字不堪下與前異上前詞雨字叶上去聲連字起下前船後詞處字叶暮雨蛾字起下歌和乃連環叶韻不可不知對或云依此不堪回首以下句法前詞應是佳人想花下明月清風恨應同偶一字顛倒耳不知果否不敢以為據姑附于此又一體五十七字栁永翠深紅淺愁蛾黛蹙嬌波刀剪竒容妙伎互逞舞裀歌扇籹光生粉面坐中醉客風流慣樽前見特地驚狂眼不似少年時節千金爭選相逢何太晚樂章集題作河轉即河傳也但通首俱仄韻耳栁又一首于不似句作上四下六想所不拘互逞句汲古刻作露清江芳交亂清江二字乃影紅二字之訛其首句云淮岸漸晚則仍用唐體耳餘同又一體五十八字徐昌圖秋光滿目風清露白蓮紅水緑何處夢回弄珠拾翠盈盈倚蘭橈眉黛蹙採蓮調穩吳侶聲相續倚棹吳江曲鷺起暮天幾雙交頸鴛鴦入蘆花深處宿與前調迥别此則宋詞之濫觴也何處以下與後鷺起以下同夢暮二字去聲勿誤又一體六十一字秦觀恨眉醉眼甚輕輕覷著神魂迷亂常記那回小曲䦨干西畔鬢雲鬆羅襪剗丁香笑吐嬌無限語軟聲低道我何曽慣雲雨未諧早被東風吹散悶損人天不管按山谷亦有此調尾句好殺人天不管自注云因少游詞戲以好字易瘦字是此秦詞尾句該是瘦殺人矣輕那字未字去聲起調黃用燈字不及也又前甚輕下九字黃作對歌對舞猶是當時眼與秦異按怨王孫一調與唐腔河傳無異今載干右怨王孫五十三字張元幹小院春晝晴窗霞透著雨胭脂倚風翠袖芳意惱亂人多暖金荷多情不分羣葩後傷春瘦淺黛眉尖秀紅潮醉臉半掩花底重門怨黃昏院字必仄譜注可平大謬觀蘆川易安諸作可見紅潮至重門易安作上六下四不拘此與前韋莊錦浦一首字句平仄聲響俱同只此篇倚風句叶韻韋作花深栁暗不叶韻耳查李珣河傳此句原用叶韻是為一調何疑且韋莊又有錦里蠶市一首花間不載者原名作怨王孫其所用玉蟬金雀四字句亦不叶上里字市字之韻是此句可叶可不叶河傳與怨王孫正同也况院字用仄尤為顯而易見哉但宋人不作河傳而作怨王孫故列此而仍其名遙沈天羽刻收明人此調首句云深閨靜悄後起云望玉郎在何處于臉字用連字平聲末三字用不見君如此平仄真足絶倒前第五句云堪惜那小桃紅句法更竒成何言語而自謂和易安韻沈氏選之贊之可歎可憐矣又按月照梨花亦即此調並以附後月照梨花五十五字黃升晝景方永重簾花影好夢猶酣鶯聲喚醒門外風絮交飛送春歸修蛾畫了無人問幾多别恨淚洗殘粧粉不知郎馬何處嘶煙草萋迷鷓鴣啼比怨王孫只多别恨上加一幾字不知句下多一嘶字餘皆無異其聲響確是怨王孫即確是何傳也况加一嘶字此句遂拗恐原無此字而後人見溫詞有郎馬嘶句此亦用郎馬字其下又用迷啼韻因訛寫多此一字耳圖譜不注景字起韻誤又落去粧字止作四字又以不知句可作平仄仄平仄平平未審何據可為駭然詞律卷六
