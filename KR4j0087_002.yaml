body:
  text: 詞律卷二宜興萬樹撰憶王孫三十一字心又名豆葉黃欄杆萬里李重元萋萋芳草憶王孫柳外樓高空斷魂杜宇聲聲不忍聞欲黃昏雨打梨花深閉門詞林萬選云元人北曲一半兒即是此調蓋其末句云一半兒一半兒添兒字襯即曲調矣然元曲亦有憶王孫與此同者當是一調異名北曲末一字多用上聲詞則無之空深二字用平不字亦作平最起調雖不拘然名詞名曲多得此訣但可為知者道耳又一體雙調五十四字周紫芝梅子生時春漸老紅滿地落花誰掃舊年池館不歸來又緑盡今年草思量千里鄉關道山共水幾時得到杜鵑只解怨殘春也不管人煩惱前後字句同只後起平仄異一葉落三十一字後唐莊宗一葉落搴朱箔此時景物正蕭索畫樓月影寒西風吹羅幕吹羅幕往事思量著他無作者圖譜注平仄可換吾不敢信蕃女怨三十一字溫庭筠萬枝香雪開巳遍細雨雙燕鈿蟬筝金雀扇畫梁相見雁門消息不歸來又飛回巳字雨字俱必用仄聲觀其次篇用磧南沙上驚雁起飛雪千里可見乃舊譜中岸然竟注作可平不知詞中此等拗句乃故為抑揚之聲入于歌喉自合音律由今讀之似為拗而實不拗也若改之似順而實拗矣且此詞起于溫八乂餘鮮作者試問作譜之人從何處訂定其為可平乎調笑令三十二字轉應曲又名宫中調笑三臺令馮延巳明月明月照得離人愁絶更深影入空牀不道幃屏夜長長夜長夜夢到庭花隂下起二字疊後長夜二字即以上句尾二字顛倒而疊之凡三用韻此亦名三臺令然與二十四字者不同又一體三十八字毛滂隼旟珮馬昌門西泰娘紺幰為追隨河橋春風弄鬢影桃花髻暖黃蜂飛繡茵錦薦承回雪水犀梳斜抱明月銅駝夢斷江水長雲中月墮寒香歇香歇袂紅黦記立河橋花自折隼旟紺幰城西闕教妾驚鴻回雪銅駝春夢空愁絶雲破碧江流月詞前用七言古詩八句四平四仄即以詩尾二字為詞首二字句餘俱叶之蓋詩則誦而詞則歌猶董解元西廂先有詩句而後彈曲子也圖譜將起處作五字句失注第二字起韻大謬此調或題作頭子或作破子東堂有破子二首則單用後詞而無前詩句然酒美一首詞中皆言文君事蓋其前八首俱詠古美人前有詩八句詞後俱注右某某此首無之恐原亦有詩句而前後俱逸去耳又花好一首詞意似無所實指則為不用詩而止用詞之體也作又此二詞後載遣隊一詞乃七言絶句或謂本集詞應收于二十八字調內余曰宋時教坊演樂必有致語皆以文士之筆代為優人之辭致語用四六其下必有口號多作七言律亦有四句者或小兒或女弟子登演雜劇皆有問語答語隊名謂之勾隊演畢則放之使去謂之放隊此遣隊者即放隊也但放隊亦用四六數句不用絶句此詩必本是口號而誤刻作遣隊耳否則遣隊時或亦可作詩總于詞無涉也今附録于後歌長漸落杏梁塵舞罷香風捲繡䄄更擬緑雲弄清切樽前恐有斷腸人遐方怨三十二字溫庭筠憑繡檻解羅幃未得君書斷腸瀟湘春雁飛不知征馬幾時歸海棠花謝也雨霏霏湘字飛卿次章用悵字去聲想不拘也斷腸必用仄平譜謂可作平仄差又一體雙調六十字顧敻簾影細簟文平象紗籠玉指縷金羅扇輕嫩紅雙臉似花明兩條眉黛逺山橫鳯簫歇鏡塵生遼塞音書絶夢魂長暗驚玉郎經歲負娉婷教人怎不恨無情第三第四句前調用一四一七此調用兩五字各異餘俱同後假比前假只遼塞句塞字作仄書字作平與前紗字玉字異孫光憲則第三句前云為表花前意後云願早傳金盞全用遼塞句平仄更為有律但以其第五句此時更沒心腸只六字必刻本落去一字不全故收此詞耳思帝鄉三十三字韋莊雲髻墜鳯叉垂髻墜叉垂無力枕函欹翡翠屏深月落漏依依說盡人間天上兩心知又一體三十四字春日遊杏花吹滿頭陌上誰家年少足風流妾擬將身嫁與一生休總被無情棄不能羞比前起結俱異又一體三十六字溫庭筠花花滿枝紅似霞羅䄂畫簾腸斷卓金車回靣共人閒語戰箆金鳯斜惟有阮郎春盡不還家起句與戰箆句比前異箆平聲滿字仄紅字平定格如夢令三十三字宴桃源又名憶仙姿比梅秦觀遙夜月明如水風緊驛亭深閉夢破鼠窺燈霜送曉寒侵被無寐無寐門外馬嘶人起無寐疊上二字趙長卿作第四句目斷行雲凝竚下即用凝竚凝竚雖亦有此格然不多不宜從也又一體三十三字吳文英鞦韆爭閙粉墻閒看燕紫鶯黃啼到緑隂處喚回浪子閒忙春光春光正是拾翠尋芳此用平韻與前異西溪子三十三字牛嶠捍撥雙盤金鳯蟬鬢玉叉搖動畫堂前人不語絃解語彈到昭君怨處翠蛾愁不擡頭第二語字可用他字叶不必重上韻又一體三十五字毛文錫昨夜西溪遊賞芳樹竒花千樣鎖春光金樽滿聽絃管嬌妓舞衫香暖不覺到斜暉馬䭾歸比前翠蛾愁句上多不覺二字聽字平聲訴衷情三十三字又名一絲鳯溫庭筠鶯語花舞春晝午雨霏微金帶枕宫錦鳯凰帷柳弱燕交飛依依遼陽音信稀夢中歸第二字用韻起二三兩句連叶帷字以下俱叶微韻而枕錦二字換韻間于其中又一體三十三字韋莊碧沼紅芳烟雨靜倚蘭橈埀玉珮交帶裊纎腰鴛夢隔星橋迢迢越羅香暗銷墜花翹前調起七字三用韻此調起七字句不用韻倚蘭橈以下俱同前或云珮帶非叶韻不知韋相又用花欲謝深夜顧敻用羅帶重雙鳯香閣掩眉斂正與溫作枕錦合乃自謂知音者不識此義以垂玉珮香閣掩俱注作三字句交帶眉斂俱連下作五字句公然劃斷著圖作譜致悮後人豈不可怪哉又一體三十七字顧敻永夜拋人何處去絶來音香閣掩眉斂月將沉爭忍不相尋孤衾換我心為你心始知相憶深不相尋以上與韋作同怨孤衾句三字換我心句六字始知句五字與前異為字平妙前溫作音字韋作香字亦然譜于前詞作交帶裊纎腰猶可解也于此作眉斂月將沉如何解顧公何不幸哉又一體以下雙調水四十一字又名桃花魏承班春情滿眼臉紅消嬌妒索人饒星靨小玉鐺搖幾共醉春朝别後憶纎腰夢魂勞如今楓葉又蕭蕭恨迢迢魏詞又有于起句作銀漢雲情玉漏長者次句作風飄錦繡開者皆平仄互異又有于夢魂勞三字作重重囑用仄字住句而不叶上下韻者以句字同故末另收按此調各刻俱作雙調而前韋詞亦有于纎腰分假者唐詞多如此不必泥也花此體毛文錫首句云桃花流水漾縱橫故又名桃水圖譜等去訴衷情而改桃花水可厭况并前三十三字者後四十四字者亦俱曰桃花水豈不可笑又一體四十四字王益燒殘絳蠟淚成㾗街鼓報黃昏碧雲又阻來信廊上月侵門愁永夜拂香䄄待誰溫夢蘭憔悴擲果淒凉兩處銷魂宋人皆用此體碧雲又阻雖平仄有互異者然必如此詞方起調名詞多如此嚴仁第二句用人間無此愁平仄與諸人異雖唐詞此句亦有如此者然在此調中不可學也擲果句可用平平仄仄然如此詞者多宜從之木汲古栁詞第三句作不堪更倚蘭係誤刻乃蘭棹也又一體四十五字趙長卿花前月下㑹鴛鴦分散兩情傷臨行祝付真意臂間皓齒留香還更毒又何妨儘成瘡瘡兒可後㾗兒見在見後思量前假尾用六字與前調異又一體四十五字歐陽修清晨簾幕卷輕霜呵手試梅粧都緣自有離恨故畫作逺山長思往事惜流光易成傷擬歌先斂欲笑還顰最斷人腸前結亦六字而三字分豆者故按此調第三句凡從來作者皆作六字沈氏乃以字連上作七字句蓋祗知訴衷情前結五字而不知有六字體耳尤不通者并所選山谷一首云天然自有殊態供愁黛不須多蓋隋焬帝宫人多畫長蛾每日給螺子黛五斛故黛上用供字詞意言愁眉蹙損不必多供螺黛而自天然可愛也沈亦注于供字斷句試問殊態供如何解可笑極矣又按蘆川有漁父家風一詞查與訴衷情同只第三句七字圖譜收之不知此係傳訛多一新字其實即訴衷情也細玩自明今載其詞并說于後八漁父家風枝紅腸斷故園東風枝露張元幹採悵年不見荔葉誰新望冷香濃泠冰透骨玉開容想筠籠今宵歸夢滿頰天漿更御風詞格雖句法多有相同然未有如此全合者至過變處非訴衷情斷斷無此句法况蘆川因憶家鄉荔枝而作故云風枝露葉誰採意謂雖有枝葉在誰去採他何必加一新字乎讀詞須如此體認則詞意明詞律亦明故本譜不另收漁父調不然名甚新雅極冝收之以為譜中生色豈反刪却耶本譜以詳慎為貴諸皆如此訴衷情近七十五字柳永雨晴氣爽竚立江樓望處澄明逺水生光重疊暮山聳翠遙想斷橋幽徑隱隱漁村向晚孤烟起殘陽裏脉脉朱闌靜倚黯然情緒未飲先如醉愁無際暮雲過了秋風老盡故人千里竟日空凝睇圖譜收景闌晝永一首後假帝城信阻天涯目斷暮雲芳草分作兩六字句誤也本係三句每句四字如此詞豈可讀作暮雲過了秋風耶作此作雨晴句他作景闌句俱上平去上暮雲句他帝城句俱去平去上妙必如此方起調聳翠靜倚亦不可用平仄天仙子三十四字皇甫松躑躅花開紅照水鷓鴣飛繞青山嘴行人經嵗始歸來千萬里錯相倚懊惱天仙應有以第二句和學士作纎手輕拈紅豆弄次首亦然與此詞異千萬里二句皇甫别作皆同和則一作桃花洞瑶臺夢花瑶二字用平其次作懶燒金慵篆玉平仄俱異而北字平聲竟不用韻因字句同不另列又一體三十四字韋莊夢覺雲屛依舊空杜䳌聲咽隔簾籠玉郎薄幸去無踪一日日恨重重淚界蓮腮兩線紅此用平韻日字不叶又一律第二句七字與首句平仄同兹不另録又一體三十四字韋莊深夜歸來長酩酊扶入流蘇猶未醒醺醺酒氣麝蘭和驚睡覺笑呵呵長道人生能幾何此則前二句用仄後三句用平所首句次句第二字俱用仄則宋詞之本也又一體雙調六十八字沈㑹宗景物因人成勝槩滿目更無塵可礙等閒簾幕小䦨干衣未解心先快明月清風如有待誰信門前車馬隘别是人間閒世界座中無物不清涼山一帶水一𣲖流水白雲長自在比唐詞加一疊全用仄韻衣未解二句平仄多不拘故注于字左然觀張三影臨晚鏡傷流景後用風不定人初靜皆上句平仄仄下句平平仄最為起調宜從之第二句第二字必用仄聲不比唐詞可以兩用圖譜注此調云同第一體惟用雙調故不圖其所謂第一體即前皇甫詞而皇甫次句第二字乃用平者今注曰同則人將亦用平而此句相反矣豈不謬歟按草堂新集詞統等書收入小青詞通首平仄全然相反至後假原不是鴛鴦一𣲖休算做相思一槩兩句竟作上三下四句法古來有此天仙子乎夫著譜固以為學者範圍集選亦以供後人詠玩奈之何不察而引人入暗若此耶聞小青傳為陳元朋先生寓言先生本未工詞故作此遊戲豈可執以為實沈氏更引其不全之篇曰數盡懨懨深夜雨無多也只得一半工夫云是南鄉子結句且謂數言足千古異哉多與夫叶韻乃與卿不識字人爭竒既可大噱而也只得句上三下四之南鄉子尤聞所未聞沈氏自謂詞中名家今人亦翕然尊之古來有不解天仙子南鄉子之歐栁蘇辛否風流子三十四字孫光憲樓倚長衢欲暮瞥見神仙伴侶微傅粉攏梳頭隱約畫簾開處無語無緒慢曵羅裙歸去無語無緒乃兩句俱叶韻者譜中不識注作四字句可笑孫作本三首一云歡罷歸也一云聽織聲促譜因載其聽織一首必以織與促不叶故不察而亂注耳不知聽織一篇其首句用曲字起韻次句即用北字為叶此乃少監借織北以叶曲促正是用韻也况聽織之聽字是平聲譜亦不知作去聲讀而反注作可平若學者誤從讀作去聲而以四字為句則一個三十四字之小令而失一韻錯兩句矣豈不誤哉又一體雙調內一百一十字又名家嬌張耒亭臯木葉下重陽近又是搗衣秋奈愁入庾腸老侵潘鬢謾簪黃菊花也應羞楚天晚白蘋烟盡處紅蓼水邊頭芳草有情夕陽無語雁橫南浦人倚西樓玉容知安否香箋共錦字兩處悠悠空恨碧雲離合青鳥沉浮向風前懊惱芳心一㸃寸眉兩葉禁甚閒愁情到不堪言處分付東流調中四字四句者前二假後一假作者多用儷語但須于庾有懊三字必用仄聲方妙名作皆然換頭五字上須四平要緊楚天晚之仄平仄亦不可亂如審齊之淚盈盈友古之粉墻低不可學也此詞抑揚盡致不板不滯用字流轉可法真名手也古又首句第五字周美成新緑小池塘孫惟信三疊陽關用平字起韻吳彥高前後俱用平字起韻與此不同因字句相合不另立一體美成友古等于離合之合言處之處作平聲則語氣當于碧雲與不堪下讀斷耳愁入庾腸有作平平仄仄風前懊惱有作仄平平平不若此詞有紀律此句亦可同愁入句香箋至悠悠句語氣或作上三下六或作上五下四不拘審齊作塵埃盡留白雪長黃芽又云空搔首還是憶舊青氊則竟作三字三句矣雖不拘不宜從也至于張翥止有入字乃傳寫之訛非有此體夢窗集二首于楚天晚句以下十三字一作窈窕繡窗人睡起臨砌脉無言一作自别楚嬌天正逺傾國見吳宫則是上七字下五字句矣或亦係脫落不敢另收一格也升庵云于驪山見石刻一詞必元人作即詞統所選三郎年少客一首也圖譜竟于風流子外另收此詞别加一名曰驪山石因而分字句處與風流子兩樣以此作譜可怪之極又詞統收沈天羽起句云對洛陽春色不惟洛字仄春字平而對字領句句法與風流子河干至換頭云溜波窺艷蝶不知四平之說又不足怪矣如此詞手而僭厠名壇難矣詞統且評之曰可友楊狀元而奴唐解元是何言歟歸國謠三十四字謠一作遙國一作自歐陽修何處笛深夜夢回情脉脉竹風簾雨寒窗隔離人幾嵗無消息今頭白不眠特地重相憶離人句歐别作香閨寂寂門半掩又作蘆花千里霜月白半字月字俱用仄聲不拘按趙介菴有思佳客令一首即係此詞雖後假起句平仄不同然必為一調無疑今録于左幅不另列思佳客令之名又鷓鴣天亦别名思佳客不可混也天思佳客令芙三十四字芙蓉窗與黃趙彥端歷歷似水秋到蓉如亂綺花倚黃花矜酒美清露委山間有箇閒人喜平平平仄仄前換頭用平平仄仄平平仄此用仄仄似乎各異不知詞調各有風度如此篇風度與前恰合豈有兩格之理况歐公别作此句平仄亦有變者又一體四十二字溫庭筠雙臉小鳯戰箆金颭艷舞衣無力風斂藕絲秋色染錦帳繡幃斜掩露珠清曉簟粉心黃蕊花靨黛眉山兩㸃首句二字起後起句溫又作畫堂照簾殘燭稍不同又一體四十三字韋莊春欲晚戲蝶遊蜂花爛熳日落謝家池館柳絲金縷斷睡覺緑鬟風亂畫屏雲雨散閒倚博山長嘆淚流沾皓腕首句三字起與溫異前調舞衣粉心二句用仄平平仄平仄此調日落閒倚二句用平仄仄平平仄不同作者勿誤定西番三十五字孫光憲帝子枕前秋夜霜幄冷月華明正三更何處戍樓寒笛夢殘聞一聲遙想漢關萬里淚縱橫韋相作與此同但不分假合作一調耳連理枝三十五字淺畫雲垂帔㸃滴昭陽淚咫尺宸居君恩斷絶似遙千里望水晶簾外竹枝寒守羊車未至此唐調也宋詞俱加後疊晶圖譜收此調不識即宋詞小桃紅之半竟將望水簾外作五字句竹枝寒守作四字句羊車未至作四字句可嘆毋論句字長短注差致誤學者試問竹枝寒守有此文理乎異哉又一體雙調子七十字花又名小桃紅紅娘灼灼程垓不恨殘花軃不恨殘春破只恨流光一年一度又催新火縱青天白日繫長繩也留春得麼花院從教鎖春事從教過燒笋園林嘗梅臺榭有何不可已安排珍簟小胡牀待日長閒坐比前加後疊故虛舟集名小桃紅同叔集名連理枝其實一也圖譜兩收誤嘯餘譜又收灼灼花一調圖譜諸書因之亦即是此體總未致審耳乃詞綜收倪雲林小桃紅即王秋國名為平明樂者北曲非詞也說見發凡江城子三十五字簾城一作神又名水晶牛嶠鵁鶄飛起郡城東碧江空半灘風越王宫殿蘋葉藕花中簾捲水樓魚浪起千片雪雨濛濛此唐調也宋調俱加後疊首句韋莊作千重嬌多情易蕩平仄互異宋調俱依此起句矣越王至花中本九字句故語氣㦯于四字斷或于六字斷不拘而宋詞俱依後所載謝無逸體矣作雙調者多誤又一體三十六字張泌浣花溪上見卿卿臉波秋水明黛眉輕緑雲高綰金簇小蜻蜓好是問他來得麼和笑道莫多情前詞碧江空三字此調臉波秋水明五字餘俱同牛給事亦有此體起句作極浦烟消水鳥飛平仄互異正與韋莊恩重句同也又一體三十七字歐陽炯晚日金陵岸草平落霞明水無情六代繁華暗逐逝波聲空有姑蘇臺上月如西子鏡照江城結句七字與前異又一體以下雙調七十字謝逸杏花村館酒旗風水溶溶揚殘紅野渡舟橫楊柳緑隂濃望斷江南山色逺人不見草連空夕陽樓外曉烟籠粉香融淡眉峯記得年時相見畫屏中只有關山今夜月千里外素光同比前牛詞加後疊人不見千里外俱平仄仄如石林之前用試攜手東坡之後用便憔悴又如友古之後用瑤臺路皆偶然之筆不必從也人題本名江城子城或作神至别名水晶簾者乃後因詞中有此三字故巧取立名因使人易混易訛最為可厭今人好竒者皆厭常喜新多從之致誤不少如此調圖譜作水晶簾第一第二等體竟忘却江城子本來矣其他尚多皆去舊易新甚屬無謂至于上西平之即金人捧露盤一籮金之即蝶戀花等則原因不識而兩收之嘯餘之病亦坐此愚謂不識而兩收之猶可本知而故改之則不可也此類甚多聊記其槩于此又一體七十字黃庭堅新來又被眼奚搐不甘伏怎拘束似夢還真煩亂損心曲見面暫時還不見看不足惜不足不成歡笑不成哭戲人目逺山蹙有分看伊無分共伊宿一貫一文饒十貫千不足萬不足此首韻腳全用入聲作平聲也豫謂詞中字多以入作平人或未信得此詞足證豫言之不謬快絶快絶蓋入聲作平北音皆然故豫謂不通曲理不可言詞也至于入既作平亦仍可作仄但于口中調之其音自見其理自明如此詞看不足千不足兩足字原作仄用音調未嘗不諧叶耳江城梅花引八十七字康與之娟娟霜月冷侵門怕黃昏又黃昏手撚一枝獨自對芳樽酒又不禁花又惱漏聲逺一更更總斷魂斷魂斷魂不堪聞被半溫香半薰睡也睡也睡不穩誰與溫存惟有牀前銀燭照啼㾗一夜為花憔悴損人瘦也比梅花瘦幾分此詞相傳為前半用江城子後半用梅花引故合名江城梅花引蓋取江城五月落梅花句也但前半自首至花又惱確然為江城子而後全不似梅花引至過變以下則并與兩調俱不相合止惟有至憔悴損十六字同耳未知以為梅花引是何故也竹山荆溪阻雪一首遵此而作足知此調無誤但無可訂定梅花二字耳路又按梅花引如客衣單客衣單千里斷魂空歌行難與江城子第二三四句平仄聲嚮原相似或腔有可通未可知也調此詞又誤刻書舟詞中題曰攤破江神子然則此祗應名為攤破江城子可耳因相沿巳久不便議改竹山集于此調又竟作梅花引益與五十七字之梅花引相混故今以此附于江城子之後而梅花引仍另列云又一體八十七字又名江梅引洪皓天涯除館憶江梅幾枝開使南來還帶餘杭春信到燕臺凖擬寒英聊慰逺隔山水應銷落赴訴誰空恁遐想笑摘蘂斷回腸思故里謾彈緑綺引三弄不覺魂飛更聽胡笳哀怨淚沾衣亂插繁華須異日待孤諷怕東風一夜吹與前作字句俱同只蘂字里字以上聲叶平而綺字亦叶韻故録之以備證按此又刻作江梅引不過節去二字耳又一體八十六字又名明月引陳允平雨餘芳草碧蕭蕭暗春潮蕩雙橈紫鳯青鸞舊夢帶文簫綽約珮環風不定雲欲墮六銖香天外飄相思為誰蘭恨銷渺湘魂無處招素紈猶在真真意還倩誰描舞鏡空懸羞對月明宵鏡裏心心裏月君去矣舊東風新畫橋鏡裏心心裏月只六字與前異但恐有誤故不取列于康詞之前按西麓詞凖繩可法如此作森然典型其後起句及素紈句殊有墻壁因康蔣俱用疊字難學故收于此使作者可以取法云又按此詞陳稿題曰明月引愈令人難查可見新立異名之不便然其自注和趙白雲自度曲不知何謂也又一體八十七字吳文英江頭何處帶春歸玉川迷路東西一雁不飛雪壓凍雲低十里黃昏成曉色竹根籬分流水過翠微帶書傍月自鉏畦苦吟詩生鬢絲半黃細雨翠禽語似說相思惆悵孤山花盡草離離半幅寒香家住逺小簾垂玉人誤聽馬嘶此又與康蔣所作各異籬字垂字叶韻一異也水字誤字仄聲二異也後假起句與前起平仄同三異也玉人誤聽馬嘶似是六字一句故并前分流水處未敢注斷江城子慢一百零九字吕渭老新枝媚斜日花徑霽晚碧泛紅滴近寒食蜂蝶亂㸃檢一城春色倦遊客門外昏鴉啼夢破春心似遊絲飛逺碧燕子又語斜檐行雲自沒消息當時烏絲夜語約桃花時候同醉瑤瑟甚端的看看是榆莢楊花飛擲怎忘得斜倚紅樓回淚眼天如水沉沉搖翠璧想伊不整啼粧影簾側與江城本調全異前按此調字句圖譜隨意注之今細察改正蓋詞調後每有相同處今按近寒食至飛逺碧三十字與後假甚端的至搖翠璧三十字平仄吻合也而譜于近寒食字不注叶韻後之甚端的又注叶韻蜂蝶亂作三字句後之看看是又連下作九字句是因不知前後相同之說固無足怪只食字一韻失叶豈不誤人至第三句滴字叶韻其上第二句應在霽字為豆豈可不知而乃以花徑霽晚碧為叶韻火誤蓋花字即上新枝字意也霽字即上日字意也而晚字又應上斜字謂徑草碧色花枝紅色紅滴則泛于碧上矣是豈得以碧字作叶韻乎且泛紅滴亦不成語况後有飛逺碧句豈一詞叶兩碧字乎蔡松年亦有此體起云紫雲㸃楓葉崖樹小婆娑歲寒節可證豈娑字亦可叶葉字耶末句乃九字亦不可于粧字注斷字蔡詞于甚端的處萬選刻作種種陳迹誤多一想種種二字乃總字之訛耳望江怨三十五字牛嶠東風急惜别花時手頻執羅幃愁獨入馬嘶殘雨春蕪溼倚門立寄語薄情郎粉香和淚泣或于入字分假然此小令必不分也近此調作者絶少是應以此詞為凖繩矣而詞統選時人呂沈二首于羅幃句皆作仄仄平平仄倚門立皆作平仄仄余嘗謂時流必不肻效古人而自相附和于此可見然此乃嘯餘舊譜亂注誤之可嘆者不肻依原詞而偏依誤注耳如手頻執必注可作平仄仄字字如此可恨相見歡三十六字西又名烏夜啼瓜上西樓夜月憶真妃樓子月上州秋南唐後主無言獨上西樓月如鈎寂寞梧桐深院鎖清秋剪不斷理還亂是離愁别是一般滋味在心頭寂寞至清秋别是至心頭皆是九字句語氣亦可于第四字略斷斷亂二字是換仄韻如昭藴之幕閣稼軒之轉斷希真之事淚友古之路處等俱同各譜俱失注是使學者落去二韻其誤甚矣各家惟友古後起兩句不叶韻夢窗一首云一顆顆一星星是秋情星字叶平韻竟似訴衷情換頭矣因句字同不另録名按此調本唐腔薛昭藴一首正名相見歡宋人則為烏夜啼而錦堂春亦名烏夜啼因致傳訛不少今斷以此調從唐人為相見歡而錦堂春亦仍其名俱不以烏夜啼亂之庶為畫一嘯餘既收相見歡復收烏夜啼誤圖譜既收烏夜啼復收上西樓且又收憶真妃尤誤何滿子三十六字和凝寫得魚箋無限其如花鎖春暉目斷巫山雲雨空教殘夢依依却愛薰香小鴨羡他長在屛幃單調六句每句六字中按唐崔令欽教坊記何滿作河滿但此調因開元滄洲歌者臨刑進此曲以贖死竟不免而世傳其曲故白香山詩世傳滿子是人名臨就刑時曲始成是則應作何字又一體三十七字孫光憲冠劍不隨君去江河還共恩深歌䄂半遮眉黛慘淚珠旋滴衣襟惆悵雲愁雨怨斷魂何處相尋單詞六句第三句七字餘俱六字平仄處同上又一體雙調七十四字毛熙震無語殘粧淡薄含羞嚲袂輕盈幾度香閨眠過曉綺窗疏日微明雲母帳中偷惜水精枕上初驚笑靨嫩疑花坼愁眉翠斂山橫相望只教添悵恨整鬟時見纎瓊獨倚朱扉閒立誰知别有深情即前調加一疊東坡作幾度句相望句平仄同而夀域二首前後俱用平平平仄平平仄與此相反恐是杜君誤筆不可從汲古刻其前一首于後起第二句誤少二字乂所刻尊前集尹鶚一首前七字句止六字後則七字亦係誤少一字六按碧雞漫志云此詞屬雙調兩假各六句五句各字一句七字調蓋舞曲也樂天亦云一曲四詞歌八疊從頭都是斷腸聲是本為雙調而前之單調者止得其半也宋人多從雙疊雲唐詩紀事載文宗時宫人沈翹翹善舞此曲歌浮蔽白日之句上曰此文選古詩語是則詩句亦可歌作何滿子之音節不必如此詞然世逺聲湮不可訂矣長相思三十六字憶又名雙紅豆山新青多嬌白居易汴水流泗水流流到瓜洲古渡頭吳山㸃㸃愁思悠悠恨悠悠恨到歸時方始休月明人倚樓後首句可不叶韻又一體三十六字劉光祖玉樽涼玉人涼若聽離歌須斷腸休教成鬢霜畫橋西畫橋東有淚分明清漲同如何留醉翁前後兩韻又一體一百字楊無咎急雨回風淡雲障日乘閒攜客登樓金桃帶葉玉李含朱一樽同醉青州福善橋頭記檀槽淒絶春笋纎柔窗外月西流似潯陽商婦鄰舟况得意情懷倦粧模樣尋思可奈離愁何妨乘逸興任征帆直抵蘆洲月怯花羞重相見歡情更稠問何時佳期卜夜綢繆逃禪自注此詞乃用賀方回韻而淮海鐡甕城髙一首與此韻腳相同想揚州懷古秦賀同作也秦尾句汲古刻作鴛鴦未老不悮也詞滙刻鴛鴦未老綢繆為是但此詞第二句是蒜山渡濶蒜渡二字作去聲甚妙正與楊詞淡障二字合詞滙乃作金山金字平聲一字之訛相去河漢矣又一體一百三字柳永畫鼓喧街蘭燈滿市皎月初照嚴城清都絳闕夜景風傳銀箭露暖金莖巷陌縱橫過平康欵轡緩聽歌聲鳯燭熒熒那人家未掩香屏向羅綺叢中認得依稀舊日雅態輕盈嬌波艷冶巧笑依然有意相迎墻頭馬上謾遲留難寫深誠又豈知名宦拘檢年來減盡風情比前大同小異風光好三十六字陶榖好因緣惡因緣祗得郵亭一夜眠㑹神仙琵琶撥盡相思調知音少安得鸞膠續斷絃是何年此調音甚妥卟而宋人作者甚少天機餘錦所載栁隂隂一闋正與此同望梅花三十八字和凝春草全無消息臘雪猶餘踪跡越嶺寒枝香自折冷艷竒芳堪惜何事夀陽無處覓吹入誰家橫笛此詞及下詞俱實詠梅花者是知此調未可作他用也又一體雙調三十八字孫光憲數枝開與短墻平見雪蕚紅跗相映引起誰人邊塞情簾外欲三更吹斷離愁月正明空聽隔江聲用平韻花草堂舊收望梅一調亦詠梅之作論例應收望梅之後但查望梅即是解連環草堂亦誤作兩收耳今本譜但存解連環于後說見本調下此不復收望梅非變例脫落也上行杯三十八字鹿䖍扆草草離亭鞍馬從逺道此地分襟燕宋秦吳千萬里無辭一醉野棠開江草溼佇立沾泣征騎駸駸又一體三十九字鹿䖍扆離棹逡巡欲動臨極浦故人相送厺住心情知不共金船滿捧綺羅愁絲管咽回别帆影滅江浪如雪後調與前異者五首句即起韻一只換兩韻二不用平韻三帆影滅作三字四尾句不叶首韻五或謂前一首當以後假起句屬于前尾為是一則凡詞無半截內不自相叶韻者今草草至萬里各自為韻無此體也以下四字合之則叶矣其下半自另起一韻耳二則無辭一醉正以足上語氣言當逺别一醉不可辭文義貫串上假言情下假言景若以此句領下半則贅矣後調金船句亦當屬上假亦是臨行勸酒之意下假則言愁思也若冠此四字于下假亦不相接余曰此論最明但恐人疑前長後短以余斷之只是單調小調原不宜分作兩假也合之為妥若譜圖并兩處後起醉字捧字俱失注用韻則尤錯矣至謂金船可仄浪可平如可仄更誤又一體四十一字韋莊芳草灞陵春岸柳烟深滿樓絃管一曲離暘寸寸斷今日送君千萬紅縷玉盤金鏤盞須勸珍重意莫辭滿通篇一韻金縷盞韋又作勸和淚用仄平仄勸和淚不解恐誤鏤去聲音漏醉太平三十八字戴復古長亭短亭春風酒醒無端惹起離情有黃鸝數聲芙蓉繡䄄江山畫屏夢中昨夜分明悔先行一程各譜注有悔二字可用平聲謬又一體四十五字辛棄疾態濃意逺眉顰笑淺薄羅衣窄絮風軟鬢雲欺翠捲南園花樹春光暖香鏡裏榆錢滿欲上鞦韆又驚懶且歸休怕晚仄韻與前調迥異無第二首可證不敢注平仄感恩多三十九字牛嶠兩條紅粉淚多少香閨意彊攀桃李枝斂愁眉陌上鶯啼蝶舞柳花飛柳花飛願得郎心憶家還早歸仄平兩韻栁花飛疊一句又一體四十字牛嶠自從南浦别愁見丁香結近來情轉深憶鴛衾幾度將書托烟雁淚盈襟淚盈襟禮月求天願君知我心後起比前調多一字餘同長命女三十九字又名薄命女和凝天欲曉宮漏穿花聲繚繞窗裏星光少冷霞寒侵帳額殘月光沉𣗳杪夢斷錦幃空悄悄彊起愁眉小霞字疑是露字霞不可言冷亦不可言侵帳也相按此調或不分假愚謂夢斷二句與上宫漏二句合宜分如右譜注天欲可作仄平誤春光好四十字又名愁倚欄令和凝紗窗暖畫屏閒嚲雲鬟睡起四肢無力半春間玉指剪裁羅勝金盤㸃綴酥山窺宋深心無限事小眉彎又一體四十一字歐陽炯蘋葉軟杏花明畫船輕雙浴鴛鴦出緑汀棹歌聲春水無風無浪春天半雨半晴紅粉相隨南浦晚幾含情雙浴句用七字又叶平韻與前異半晴之半字若無現成佳句定宜用平按歐陽别作三首一與此同一于雙浴句云堤上採花筵上醉醉字用仄不叶與後假同一云飛絮悠揚遍虛空虛字平稍異因字句同于此注明不另録又一體四十一字張元幹疏雨洗細風吹淡黃時不分小亭芳草緑映簾低樓下十二層梯日長影裏鶯啼倚遍䦨干看盡柳憶腰肢不分句用仄不卟與歐異而後假首句用平叶韻與前俱異其次篇第四第五句作翠被眠時要人暖著懷中要字仄人字平因字句皆同不另録或曰此十字當于眠時斷句然于本調不合故不敢彊注又一體四十二字曾覿心下事不思量自難忘花底夢回春漠漠恨偏長閒日多少韶光雕䦨靜芳草池塘風急落紅留不住又斜陽後假第二句七字與前調異作圖譜此體收書舟詞後起云玉窗明暖烘霞注三字兩句謬甚又一體四十二字張元幹花恨雨柳嫌風客愁濃坐久霜刀飛碎雪一樽同勞煩玉指春葱未放筯金盤巳空更與箇中尋尺素兩情通後假第二句七字同而金盤已空用平平仄平與前芳草池塘又異又一體四十八字葛立方禁烟却釀春愁正繫馬清淮渡頭後日清明催疊鼓應在揚州歸時元巳臨流要綺陌芳郊恣遊三月羇懷當一洗莫放觥籌前後假同首句六字起韻次句七字前後兩結句四字與前調異清淮渡頭芳郊恣逰正與前金盤句平仄相合天按此曲一名愁倚闌令不知誰人又名之曰鶴中夫喜遷鶯之所以名鶴冲天者因韋莊詞尾三字也與此春光好何與好換調名者之可獻極矣圖譜收春光好又收愁倚闌令誤詞律卷二
