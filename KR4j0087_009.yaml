body:
  text: 詞律卷九宜興萬樹撰花上月令五十八字吳文英文園消渴愛江清酒腸怯怕深觥玉舟曾洗芙蓉水瀉清冰秋夢淺醉雲輕庭竹不收簾影去人睡起月空明瓦瓶汲井和秋葉薦吟醒夜深重怨遙更後起用仄不叶餘同七娘子五十八字蔡伸天涯觸目傷離緒登臨況值秋光暮手撚黃花憑誰分付雍雍落雁蒹葭浦憑髙目斷桃溪路屏山樓外青無數緑水紅橋鎖窗朱戶如今總是銷魂處前後段同又一體六十字向子諲山圍水繞髙唐路恨密雲不下陽臺雨霧閣雲窗風亭月戶分明攜手同行處而今不見生塵步但長江無語東流去滿地落花漫天飛絮誰知總是離愁做前後第二句俱八字風謝無逸一首起句云風剪冰花飛零絮此必冰花剪誤刻也查諸家無此拗句繫裙腰五十八字魏夫人燈花耿耿漏遲遲人别後夜涼時西風瀟灑夢初回誰念我就單枕皺雙眉錦屏繡幌與秋期腸欲斷淚偷垂月明還到小窗西我恨你我憶你你爭知前後同又一體六十一字張先濃霜淡照夜雲天朦朧影畫勾欄人情縱似長情月算一年年又能得幾畨圓欲寄西江題葉字流不到五亭前東池始有荷新緑尚小如錢問何日藕幾時蓮前第四句後第一第四句俱用仄聲不叶而年錢二字轉叶與前詞異前詞兩結俱三字三句此前段多算字後段多尚問二字但此問字係誤多者此句宜與前又能得同朝玉階五十九字杜安世春色欺人拂眼清栁條緑絲軟雪花輕黃金才鉞掩銀屏隂沈深院靜語嬌鶯美人春困寶叉橫惜花芳態泪盈盈風流何處最多情千金一笑須信傾城緑絲恐是絲緑才鉞二字不可解必誤惜花句比前段少一字恐是落去尾句應上五下三此乃兩四不審此體當如是或是誤也作者從後載一體可耳又一體六十字杜安世簾捲春寒小雨天牡丹花落盡悄庭軒髙空雙燕舞翩翩無風輕絮墜暗苔錢擬將幽怨寫香箋中心多少事語難傳思量真箇惡因緣那堪長夢見在伊邊前後一樣只後起句平仄不同觀前詞則換頭例應平仄起選聲旁注平仄謂可與前段首句同不知所據而圖譜竟注後段同前矣一剪梅五十九字李清照紅藕香殘玉簟秋輕解羅裳獨上蘭舟雲中誰寄錦書來雁字來時月滿樓花自飄零水自流一種相思兩處間愁此情無計可消除才下眉頭却上心頭月滿樓或作月滿西樓不知此調與他詞異如裳思來除等字皆不用韻原與四段排比者不同雁字句七字自是古調何必強其入俗而添一西字以湊八字乎人若欲填排偶之句自有另體在也又一體六十字蔣捷一片春愁帶酒澆江上舟搖樓上簾招秋娘容與泰娘嬌風又飄飄雨又瀟瀟何日雲帆缷浦橋銀字箏調心字香燒流光容易把人拋紅了櫻桃緑了芭蕉此則通篇用韻四段四字八句皆排偶者矣其七字句有四須記前後第一句之第二字俱是仄第四句之第二字俱用平不可誤也後村于後起句誤用酒酣耳熱説文章不可從至鳳洲四七字句第二字俱用平尤誤而天羽之謬又不足言矣又一體六十字吳文英逺目傷心樓上山愁裏長眉别後蛾鬟暮雲低壓小欄杆教問孤鴻因甚先還瘦倚溪橋梅夜寒雪欲消時泪不禁彈剪成叉勝待歸看春在西窗燈火更闌眉鴻時窗四字不叶韻又一體六十字盧炳燈火樓臺萬斛蓮千門喜笑素月嬋娟幾多急管與繁絃巷陌喧闐畢獻芳筵樂與民偕五馬賢綺羅叢裏一簇神仙傳柑雅宴約明年盡夕留連滿泛金船笑字裏字仄聲韓東浦作前後第二句亦用仄聲與此盧詞同而第五句并用平不叶與後周詞同兹不另録誰友古前尾用姑且自寬自字仄坦庵用問誰似他字平似字仄俱不可學如夢窗之春到一分花瘦一分兩一字則以入作平也又一體六十字周邦彥一剪梅花萬樣嬌斜插疏枝略點梅梢輕盈微笑舞低回何事樽前拍手誤招夜漸寒深酒漸消袖裏時聞玉釧輕敲城頭誰恁促殘更銀漏何如且慢明朝回字更字俱不叶韻不友古一首止後第四句叶冉冉雲五十九字盧炳雨洗千紅又春晚留牡丹倚欄初綻嬌婭姹偏賦精神君看算費盡工夫點染帶露天香最清逺太真妃院粧體段拚對花滿把流霞頻勸怕逐東風零亂尾句比前結少一字餘同又春晚最清逺用去平上須從之不可杜撰愚謂前後段宜同怕逐句乃誤落一字也接賢賔五十九字毛文錫香韉鏤襜五色驄值春景初融流珠噴沫躞蹀汗血流紅少年公子能乘馭金鑣玉轡瓏璁為惜珊瑚鞭不下驕生百步千蹤信穿花從拂栁向九陌追風此小令可不分段觀後栁詞可知今仍其舊集賢賔一百十六字栁永小樓深巷狂遊遍羅綺成叢就中堪人屬意最是蟲蟲有畫難描雅態無花可比芳容幾回飲散良宵永鴛衾鳳枕香濃算得人間天上惟有兩心同近來雲雨每西東誚惱損情悰縱然偷期暗會長是匆匆爭似和鳴諧老免教斂翠啼紅眼前時暫疏歡宴盟言在更莫忡忡待作真箇宅院方信有初終與前詞同調只前是單調此以前調合為一段而加後疊耳調名接集二字北音相同實一字也論花間在前該從接字但自北曲相沿至南曲皆有集賢賔俱作集字不便作接故並列于此按此詞除後起東字叶韻外前後俱宜相同羅綺句不應少一字恐係脫落比前毛詞亦應五字盟言句比鴛衾句不應多一字若此句七字則鴛衾句亦應加一字矣其與前毛詞較異者則首句不起韻有畫爭似二句少一字惟有誚惱方信三句比前值字向字領句者稍不同而前信穿花下六字作兩句此合為一句是則宋體耳散天花六十字舒亶雲淡長空落葉秋寒江煙浪盡月隨舟西風偏解送離愁聲聲南去雁下汀洲無奈多情去復留驪歌齊唱罷泪爭流悠悠别恨幾時休不堪殘酒醒憑髙樓前後同圖譜于悠悠下注叶韻愚謂此調前後相合無此處分二字之理其為七字句無疑此係詞理自應如此非本譜于别處譏人失注叶韻此詞注叶而反改去也圖譜又于寒江句落一江字遂注七字句且注此調共五十九字遂與後段驪歌句兩樣誤矣按此調與朝玉階同只後起平仄同前段是兩體少年心六十字黃庭堅對景惹起愁悶染相思病成方寸是阿誰先有意阿誰薄幸斗頓恁少喜多嗔合下休傳音問你有我我無你分似合歡桃核真堪人恨心兒裏有兩個人人似合歡句比前少一字心兒裏下比前多一字則按後段雖字有多少然語氣音響前後相同或前阿字誤多後則有字誤多耳沈氏乃于末句作有兩個人少一人字大謬人人乃詞家常用語如有個人人心裏人人之類況前用多真是平平煞此用個人去平煞于聲調全拗矣此詞用平仄兩叶者又一體六十六字黃庭堅心裏人人暫不見霎時難過天生你要憔悴我把心頭從前鬼著手摩挲抖擻了百病銷磨見説那厮脾鱉熱大不成我便與拆破待來時鬲上與厮噷則箇溫存著且教推磨俳體字或有誤前詞惟兩結尾用平叶此前段用挲磨二字平後末磨字又去聲可見通叶者總不拘也後庭宴六十字無名氏千里故鄉十年華屋亂魂飛過屏山簇眼重眉褪不勝春菱花知我銷香玉雙雙燕子歸來應解笑人幽獨斷歌零舞遺恨清江曲萬樹緑低迷一庭紅撲􅉡前段同踏莎行後段全異圖注重字低字可仄撲字可平不解撥棹子六十字尹鶚風切切深秋月十朵芙蓉繁艷歇小檻細腰無力空贏得目斷魂飛何處説寸心恰似丁香結看看瘦盡胸前雪偏挂恨少年拋擲羞覩見繡被堆紅間不徹又一體六十一字尹鶚丹臉膩雙靨媚冠子縷金裝翡翠將一朵瓊花堪比窠窠繡鸞鳯衣裳香窣地銀臺蠟燭滴紅泪醁酒勸人教半醉簾幕外月華如水特地向寶帳顛狂不肯睡兩詞相同只醁酒句與前詞看看句平仄異然前段冠子句與前詞十朵句與醁酒句合雖或不拘從此為妥至于將一朵句與後簾幕外同七字前詞偏挂恨亦七字其小檻句上定落一憑字是則前詞缺而此調全也又一體六十一字黃庭堅歸去來歸去來攜手舊山歸去來有人共對月樽罍橫一琴甚處逍遙不自在間世界無利害何必向世間甘幻愛與君釣晚煙寒瀨蒸白魚稻飯溪童供筍菜此體雖大約與尹詞相合而用韻異首以平聲起韻結句即換仄叶後段俱仄此又一平仄兩叶者後起三字兩句異前詞與前段起處合而何必向比前多一字蒸白魚三字即同上橫一琴該三字尹詞亦皆三字句此則宜于稻飯分句或十字一氣不拘蝶戀花六十字鳯栖梧又名一籮金明月生南浦黃金縷捲珠簾鵲踏枝歡魚水同張泌六曲闌干偎碧樹楊栁風輕展盡黃金縷誰把鈿筝移玉柱穿簾燕子雙飛去滿眼遊絲兼落絮紅杏開時一霎清明雨濃睡覺來鶯亂語驚殘好夢無尋處夀域首句新月羞花影庭樹末三字仄平仄此係偶然不可從又有一首前第四句畫閣巢新燕聲喜後第四句苒苒光隂似流水又一首前第四句衰栁搖風尚柔軟後第四句獨倚闌干暮山逺則全用仄平仄或有此體然作詞但從其多者可耳又兩首後起句一云近來早是添憔悴一云新翻歸翅雲間雁平仄全異此則唐以後無此格詞統收明詞二首人間玉簫起者誤矣譜圖既收蝶戀花又收一籮金誤其起句云武陵春色濃如酒平仄全反初謂因其全反故疑是另體而收之也及觀所圖則仍注可平仄仄平平仄仄又曰後段同是亦明知其與蝶戀花一樣矣何必兩收之耶又一體六十字石孝友别來相思無限期欲説相思要見終無計擬寫相思持送伊如何盡得相思意眼底相思心裏事從把相思寫盡憑誰寄多少相思都做泪一齊泪損相思字期字平聲起韻第四句伊字平叶則此詞又一平仄兩叶者矣或曰期字恐是際字伊字恐是你字然舊刻如此期伊二字正是韻腳不敢議改故另列一體于此又或云前後第二句兩思字亦是叶則未必耳唐多令六十字樓唐一作糖又名南令陳允平何處是秋風月明霜露中算淒涼未到梧桐曾向垂虹橋上看有幾樹水邊楓客路怕相逢酒濃愁更濃數歸期猶是初冬欲寄相思無好句聊折贈雁來紅前後對待無參差者夢窗一首第三句誤刻縱芭蕉不雨也颼颼因多一字詞統遂注縱字為襯襯之一説不知從何而來詞何得有襯乎況此句句法上三下四亦止可注也字為襯而不可注縱字襯也著譜示人而可率意為之耶愚謂也字必是誤多無疑即不然亦竟依其體而填之不可立襯字一説以混詞格也鞓紅六十字無名氏粉香尤嫩霜寒可慣怎奈向春心已轉玉容别是一般間婉悄不管桃紅杏淺月影玲瓏金隄波面漸細細香風滿院一枝折寄故人雖逺莫輒使江南信斷前後同只換頭首句用平凝按鞓紅乃牡丹名放翁桃源憶故人詞一朵鞓紅露東坡西江月詞蓬萊殿後鞓紅鞓音汀帶革也西廂角帶傲黃鞓宋待制服紅鞓犀帶蓋以花色如帶鞓之紅耳今所繫亦曰鞓帶而字書音為丁誤也感皇恩六十字張先廊廟當時共代工睢陵千里約逺相從欲知賔主與誰同宗枝內黃閣舊有三公廣樂起雲中湖山看畫軸兩仙翁武陵佳話幾時窮元豐際德星聚照江東後起五字與前段異兩結同而譜注前六字後兩三字且于舊字注可平若作者依之于舊有二字作兩字相連語如廊廟賔主之類豈不大錯又一體六十五字趙長卿碧水浸芙蓉秋風楚岸三嵗光隂轉頭換且留都騎未許匆匆分散更持杯酒殷勤勸休作等間别離人看且對笙歌醉須判如君才調掌得玉堂詞翰定應不久勞州縣此用仄韻而格調亦與前異轉頭換醉須判用仄平仄是此調定格而譜圖注可作平仄仄甚怪若此三字作平仄仄豈成其為感皇恩乎試問古作家亦有用平仄仄者乎且前段不注吾又不知其何説也又一體六十七字周邦彥小閣倚晴空數聲鐘定斗柄垂寒暮天靜朝來殘酒又被春風吹醒眼前猶認得當時景往事舊歡不堪重省自嘆多愁更多病綺窗依舊敲遍闌干誰應斷腸明月下梅搖影兩結八字與前異去後段起句或作洞房見説或作繁枝髙蔭或作此常恨想所不拘因不係叶韻句不另録舊歡舊字多用去聲者不可不知又一體六十八字周紫芝無事小神仙世人誰會著甚來由自縈繫人生須是做些間中活計百年能幾許無多子近日謝天與片間田地作箇茅堂好打睡酒兒熟也贏取山中一醉人間如意事只此是與片間田地五字然各家俱用前六十七字體荷華媚六十字蘇軾霞苞霓荷碧天然地别是風流標格重重青蓋下千嬌照水好紅紅白白每恨望明月清風夜甚低迷不語妖邪無力終須放船兒去清香深處住看伊顔色霓字必霓字乃入聲然此句難解恐有誤因他無作者可證也妖應作夭音歪出自長慶詩自注玉堂春六十一字晏殊斗城池館二月風和煙暖繡戶珠簾日影初長玉轡金鞍繚繞沙堤路幾處行人映緑楊小檻朱闌回倚千花濃露香脆管清絃欲奏新翻曲依約林間坐夕陽脆管下與前玉轡下同珠玉三詞如一規矩森然學者不可依圖譜所注平仄破陳子六十二字又名十拍子晏殊燕子來時新社梨花落後清明池上碧苔三四點葉底黃鸝一兩聲日長飛絮輕巧笑東鄰女伴采桑徑裏逢迎疑怪昨宵春夢好元是今朝鬬草贏笑從雙臉生前後同飛雙二字平而上用日笑二字仄妙日笑或有用平者然不如此發調四點夢好鬬草等去上俱妙好女兒六十二字晏幾道緑遍西池梅子青時儘無端盡日東風惡更霏微細雨惱人離恨沸路春泥應是行雲歸路有間泪灑相思想旗亭望斷黃昏月又依前誤了紅箋香信翠袖歡期想旗亭下與前同餘説見繡帶兒下而儘字想字上聲而盡字望字去聲更字又字去聲細雨與誤了去上聲如此發調豈非作家楊用修一首于霏微細雨作紅拂當筵後段又依前句止四字又一首前段第三句止七字俱誤明詞往往有差處勿錯從贊成功六十二字毛文錫海棠未坼萬點深紅香包緘結一重重似含羞態邀勒春風蜂來蝶去任繞芳叢昨夜微雨飄灑庭中忽聞聲滴井邊桐美人驚起坐聽晨鐘快教折取戴玉瓏璁前後同夜字不妨用平漁家傲六十二字周邦彥灰暖香融銷永晝蒲萄架上春藤秀曲角闌干羣雀鬬清明後風梳萬縷亭前栁日照叉梁光欲溜循階竹粉霑衣袖拂拂面紅新著酒沈吟久昨宵正是來時候前後同惜香一首後段三字句不叶韻乃誤也用修誤于拂拂句用仄平平仄平平仄天羽選徐小淑作前後首句俱反作次句平仄前次句反作首句平仄大誤雖閨人所作當恕然以入選作後人矜式則不可也又一體六十二字杜安世疏雨才收淡淨天微雲綻處月嬋娟寒雁一聲人正逺添幽怨那堪往事思量遍誰道綢繆兩意堅水萍風絮不相緣舞鑑鸞腸虛寸斷芳容變好將憔悴教伊見前後首次句俱平韻餘用仄叶此調亦平仄通叶者杜詞又一首第一句每到春來長如病第五句奈向後期全無定後第三句天賦多情翻成恨俱拗兹不另録而其前第三句不慣被人拋擲日竟不叶韻則更係傳訛矣定風波六十二字歐陽炯暖日間窗映碧紗小池春水浸晴霞數樹海棠紅欲盡爭忍玉閨深掩過年華獨憑繡牀方寸亂腸斷淚珠穿破臉邊花鄰舍女郎相借問音信教人羞道未還家平一韻仄三韻是定格也圖譜因收葉石林詞其第一仄用見淺第二仄用伴斷第三仄用暮雨遂注伴斷叶前見淺之韻是使人必于後起兩句叶前三四兩句矣悮甚悮甚定風波作者最廣何竟不一閲而輒作譜耶用修于首句用客中冬至夜偏長平仄誤學者勿因沈選謂有此格又一體六十二字蘇軾好睡慵開莫厭遲自憐冰臉不時宜偶作小紅桃杏色間雅尚餘孤瘦雪霜姿休把間心隨物態何事酒生微暈沁瑶肌詩老不知梅格在吟詠更看緑葉與清枝仄句俱不換韻坡按定風波調自五代迄宋作俱無不換仄韻之體公九首亦惟此一詞不叶作者不必從之又一體六十三字孫光憲簾拂疏香斷碧絲泪衫還滴繡黃鸝上國獻書人不在凝黛晚庭又是落紅時春日自長心自促翻覆年來年去負前期應是秦雲兼楚雨留住向花枝誇説月中枝後結多一字多按此依花間舊刻録之但恐花枝枝字誤作者只依前歐陽體可耳又一體九十九字張翥恨行雲特地髙寒牢籠好夢不定婉娩年華淒涼客況泥酒渾成病畫欄深碧窗靜一樹瑶花可憐影低映怕明月照見青禽相並素衾正冷又寒香枕上薰愁醒甚銀牀霜凍山童未起誰汲牆隂井玉笙殘錦書迥應是多情道薄幸爭肯等間孤負西湖春興山童下與前段淒涼下同只等間句比前少一怕字後栁詞亦然又一體一百字栁永自春來慘緑愁紅芳心是事可可日上花梢鶯穿栁帶猶壓香衾卧暖酥銷膩雲嚲終日厭厭倦梳裹無那恨薄情一去音書無箇早知恁般麼悔當初不把雕鞍鎖向雞窗只與鸞箋象管拘束教吟詠鎮相隨莫拋躲針線間拈伴伊坐和我免使少年光隂虛過比前詞只後起句多一字詠字不叶韻免使少年作仄仄仄平三處異耳余斷以為即是前調後起句應從栁作蓋如膩雲嚲等仄平仄句篇中多用之則此恁般麼亦不誤也麼字去聲免使句應從張作蓋照前段薄情一去平仄可也至詠字無不叶之理必是和字去聲而訛寫詠字無疑也又竹坡有定風波令查係琴調相思引故此不列又一體一百四字栁永佇立長堤淡蕩晚風起驟雨歇極目蕭疏栁萬株掩映箭波千里走舟車向此人人奔名競利念蕩子終日驅馳爭覺鄉關轉迢遞何意繡閣輕拋錦字難逢等間度嵗奈泛泛旅迹厭厭病緒近來諳盡宦遊滋味此情懷總寫香箋憑誰與寄算孟光爭得知我繼日添憔悴與前體又别何意二字向刻前尾今改正為後起句玩走舟車至競利似對後此情懷至與寄該于車字豆人字句然亦一氣貫下也蘇幕遮六十二字鬆令又名鬢雲周邦彥鬢雲鬆眉葉聚一闋離歌不為行人駐檀板停時君看取數尺鮫鮹半是梨花雨鷺飛遙天尺五鳯閣鸞坡看即飛騰去今夜長亭臨别處斷梗飛雲盡是傷情緒結句不惟定格如此而聲響亦不得不然譜于前結注云可用平平平仄仄真天下之大竒也且此調前後皆同而美成隴雲沈一闋末句云斷雨殘雲只怕巫山曉嘯餘譜落去雨殘二字作斷雲只怕巫山曉謂有六十字一體而以此六十二字者命為第二體無論此調作者頗多無七字尾者若七字則竟與蝶戀花同矣有何難辨況片玉本集原有雨殘二字而各譜竟將不全之句列為一格何其率略也且斷雲亦不成語故明中葉以後詞調廢閣間有為之者原未究心故吳純叔于此調末句云薔薇著雨胭脂瘦正坐舊刻譜之誤也沈氏不能辨正取以入選陋矣因此詞故又名鬢雲鬆明月逐人來六十二字張元幹花迷珠翠香飄羅綺簾旌外月華如水暖紅影裏誰會王孫意最樂升平景致長記宫中五夜春風鼓吹遊仙夢輕寒半醉鳯幃未暖歸去薰濃被更問陰晴天氣遊仙夢下與前簾旌外下同李持正作誰會句用暗塵香拂面鳯幃句用玉輦待歸平仄各異然此等句前後相同從蘆川此詞為正别怨六十三字趙長卿嬌馬頻嘶曉霜濃寒色侵衣鳯帷私語處翻成離怨不勝悲更與叮嚀祝後期素約諧心事重來了比看相思如何見得明年春事濃時穩乘金腰裊來爛醉玉東西别怨二字恐係詞題而非調名然他無作者莫可考證矣殢人嬌六十四字毛滂雲做屛風花為行帳屏帳裏見春模樣小晴未了輕隂一餉酒到處恰如把春拈上官栁黃輕河堤緑漲花多處少停蘭槳雪邊花際平蕪疊嶂這一段淒涼為誰悵望這一段淒涼宜作一句但此調前後相同各家多于三字一豆故如此注然此九字一氣或三或五作豆不拘也又一體六十八字蘇軾滿院桃花盡是劉郎未見於中更一枝纎軟仙家日月笑人間春晚濃睡起驚飛亂紅千片密意難窺羞容易見平白地為伊腸斷問君終日怎安排心眼須信道司空自來見慣第二句比前調多二字笑人間怎安排二句俱多一字珠玉詞于兩結句作平仄仄平平仄或仄仄平平平仄可以不拘但别家俱與蘇詞同耳蘇又于盡是句作滿城燈火無數恐是燈火滿城之誤也又栁詞于仙家二句如前毛詞俱作四字而問君二句上四下五字此調前後一樣無參差之理或前段悮少或後段悮多故不另列六十三字之體黃鐘樂六十四字魏承班池塘煙暖草萋萋惆悵間宵含恨愁坐思堪迷遙想玉人情事逺音容渾似隔桃溪偏記同歡秋月低簾外論心花畔和醉暗相攜何事春來君不見夢魂長在錦江西後起平仄與前異意舊譜俱于宵字心字斷句其下七字太拗今以愚注之如右此調他無可考然如此讀亦不錯也輥繡毬六十四字趙長卿流水奏鳴琴風月淨天無星斗翠嵐堆裏蒼巖深處滿林霜膩暗香凍了那禁頻嗅馬上再三回首因記省去年時候十分全似那人風韻柔腰弄影冰腮退做成消瘦輥音滚曲調因有滚繡毬異按冰腮退句比暗香凍了少一字或定體兩結互或係誤落或前誤多了字無他詞可證也侍香金童六十四字蔡伸寶馬行春緩轡隨油壁念一瞬韶光堪重惜還是去年同醉日客裏情懷倍添悽惻記南城錦徑名園曾遍歷更栁下人家似織此際憑欄愁脈脈滿目江山莫雲空碧此際下與前還是下同又一體六十五字趙長卿一種春光占斷東君惜算穠李昭華爭並得粉膩酥融嬌欲滴端的尊前舊曾相識向夜闌酒醒霜濃寒又力但只與冰姿添夜色繡幕銀屏人寂寂只許劉郎暗傳消息但只與句比前詞更栁下句多一字該愚謂前詞恐人家下落一字蓋此句照前段八字也握金叉六十四字呂渭老風日困花枝晴蜂自相趂晚來紅淺香盡整頓腰肢暈殘粉絃上語夢中人天外信青杏巳成雙新樽薦櫻笋為誰一和銷損數著歸期又不穩春去也怎當他清晝永前後同所用四箇仄平仄處俱是去平上聖求他作俱同不可擅改和字去聲不可作平讀醉春風六十四字趙德仁陌上清明近行人難借問風流何處不歸來悶悶悶回雁峰前戲魚波上試尋芳信夜永蘭膏燼春睡何曾穩枕邊珠泪幾時乾恨恨恨惟有窗前過來明月照人方寸悶恨二字三疊去譜圖注平仄謂後段與前段同不知春睡句睡字曾字平與前行人句相反只可云不拘不可云相同也又或謂兩段宜同非俱照前即俱照後亦是明髙深甫于回雁二句惟有二句皆先用平平仄仄後用仄仄平平顛倒矣何沈氏新集必愛之耶行香子六十四字趙長卿驕馬花驄栁陌經從小春天十里和風箇人家住曲巷牆東好軒窗好體面好儀容燭灺歌慵斜月朦朧夜新寒斗帳香濃夢回畫角雲雨匆匆恨相逢恨分散恨情鍾前後同結句多作三排又一體六十六字蔣捷紅了櫻桃緑了芭蕉送春歸客尚蓬飄昨宵穀水今夜蘭臯奈雲溶溶風淡淡雨瀟瀟銀字笙調心字香燒料芳蹤乍整還凋待將春恨都付春潮過窈娘堤秋娘渡泰娘橋比前多奈字過字作者多宗此體送春歸料芳蹤二句平仄有不拘者然正體是仄平平且亦易填故不旁注詞此後起兩句與前俱是叶韻者又一體六十六字蘇軾攜手江村梅雪飄裙情何限處處消魂故人不見舊曲重聞向望湖樓孤山寺湧金門尋常行處題詩千首繡羅衫與拂輕塵别來相憶知有人人有湖中月江邊栁隴頭雲此後起兩句俱用仄不叶韻者不望湖樓下三句湖中月下三句皆用偶句然散亦妨若石屏于望湖樓作文章公與前蔣詞雲溶溶三平聲字雖不拘亦到底不宜學也樓字照後月字用仄亦不拘又一體六十六字黃升寒意方濃暖信才通是晴陽暗拆花封冰霜作骨玉雪為容看體清癯香淡濘影朦朧孤城小驛斷角殘鐘又無邊散與春風芳心一點幽恨千重任雪霏霏雲漠漠月溶溶此後起首句仄次句叶韻者又一體六十六字朝補之前嵗裁桃今嵗成蹊更黃鸝久住相知微行清露細履斜暉對林中侶間中我醉中誰何妨到老常間常醉任功名生事俱非衰顔難強拙語多遲但酒同行月同坐影同歸此首句不起韻次句方韻者琴趣二首皆同侣字仄聲不拘又一體六十八字杜安世黃金葉細碧玉枝纎初暖日當乍晴天向武昌溪畔於彭澤門前陶潛影張緒態兩相牽數株堤面幾樹橋邊嫩垂條絮蕩輕綿繫長江舴艋拂深院秋千寒食下半和雨半和煙此首句用仄不起韻者其中間四字四句前後俱加一字陶潛影寒食下二句上少一領句字與前趙詞同獻衷心六十四字歐陽炯見好花顔色爭笑東風雙臉上晚粧同閉小樓深閣春景重重三五夜偏有恨月明中情未巳信曽通滿衣猶自染檀紅恨不如雙燕飛舞簾櫳春欲暮殘絮盡栁條空閉小樓下前後同恨不如下九字即前段閉小樓下九字亦即後詞被嬌娥下九字譜乃前注一五一四後注九字而後詞又注一五一四何也又一體六十九字顧敻繡鴛鴦枕暖畫孔雀屏欹人悄悄月明時想昔年歡笑恨今日分離銀釭背銅漏永阻佳期小爐煙細虛閣簾垂幾多心事暗地思惟被嬌娥牽役魂夢如癡金閨裏山枕上始應知前段次句第四句各五字與前詞異後段起四句皆四字亦異麥秀兩岐六十四字和凝涼簟鋪斑竹鴛枕並紅玉臉蓮紅眉栁緑胸雪宜新浴淡黃衫子裁春縠異香芬馥羞道交回燭未慣雙雙宿樹連枝魚比目掌上腰如束嬌嬈不爭人拳局黛眉微蹙前後同蓮字舊刻訛邉字今改正爭字宜仄此亦訛因未確審不敢改風中栁六十四字劉因我本漁樵不是白駒空谷對西山悠然自足北窗疏竹南窗叢菊愛村居數間茅屋風煙草屨滿意一川平緑問前溪今朝酒熟幽泉歌曲清泉琴築欲歸來故人留宿前後同只風煙句用平平仄仄與首句仄仄平平不同想調當如此即如謝池春前後起句亦平仄全異此所謂過變也又一體六十六字孫夫人銷減芳容端的為郎煩惱鬢慵梳宫妝草草别離情緒待歸來都告怕傷郎又還休道利鎖名韁幾阻當年歡笑更那堪鱗鴻信杳蟾枝髙折願從今須早莫辜負鏡中人老前後第四句不叶五句多一字後起與首同與前詞異按此篇與謝池春一字無異因前詞第四句前後叶韻而謝池春無此體故另列焉然細諷玩確是同調也如此則後起或是名韁利鎖耳譜注平仄謬甚喝火令六十五字黃庭堅見晚情如舊交疏分巳深舞時歌處動人心煙水數年夢魂無處可追尋昨夜燈前見重題漢上襟便愁雲雨又難禁曉也星稀曉也月西沈曉也雁行低度不會寄芳音後段比前多曉也二句九字魂按此調前後相同不應中多二句恐前有脫落夢當是魂夢則可斷句與後結相同矣或謂前後自是各異前段原于數年分句夢魂下乃七字句耳然觀兩起處相同而無處下五字與不會下五字亦合當以魂夢為是芭蕉雨六十五字程垓雨過涼生藕葉晚庭消盡暑渾無熱枕簟不勝香滑爭奈寶帳情生金尊意愜玉人何處夢蝶思一見冰雪須寫個帖兒丁寧説試問道肯來麼今夜小院無人重樓有月結語二句前後同解珮令六十五字蔣捷春晴也好春隂也好著些兒春雨越好春雨如絲繡出花枝紅裊怎禁他孟婆合皂梅花風悄杏花風小海棠風驀地寒峭嵗嵗春光被二十四風吹老楝花風爾且慢到繡出句即同後被二十句不應前六後七恐繡字上落一字也今姑照舊列之若是史詞則全矣又一體六十六字史達祖人行花塢衣沾香霧有新詞逢春分付屢欲傳情奈燕子不曾飛去倚珠簾詠郎秀句相思一度濃愁一度最難忘遮燈私語淡月梨花借夢來花邉廊廡指春衫淚曾濺處前後同又一體六十七字晏幾道玉階秋感年華暗去掩深宮團扇無情緒記得當時自剪下機中輕素點丹青畫成秦女涼襟猶在朱絃未改忍霜紈飄零何處自古悲涼是情事輕如雲雨倚么絃恨長難訴前起一句後起二句不用韻掩深宫句多一字王千秋一首前結落一字非有此體淡黃栁六十五字薑夔空城曉角吹入垂楊陌馬上單衣寒惻惻看盡鵝黃嫩緑都是江南舊相識正岑寂明朝又寒食強攜酒小橋宅怕梨花落盡成秋色燕燕飛來問春何在唯有池塘自碧正岑寂不應屬在上段乃過變處首句也無論體裁一定如此可玩味而得之即論文理一正字一又字恰是相呼應語相連何疑此姑照舊録之作者不可泥刻本而仍其謬也圖譜刻是垂絲釣六十六字吳文英聽風聽雨春殘花落門掩乍倚玉闌旋剪天豔攜醉靨放遡溪遊纜波光掩映燭花黯淡碎霞澄水吳宫初試菱鑑舊情頓減孤負深杯灔衣露天香染通夜飲問漏移幾點按此調本宜如此分段而各家集中俱是訛刻如龍川詞千里詞則于遊纜處分段逃禪詞則于光掩處分段尤可笑者片玉詞于澄水分段則竟不是叶韻矣于是圖譜以波光掩三字為前結且平仄亂注而作此調者遂遵而弗改矣可嘆哉今將各家對明而為定之曰第一聽字必仄第三聽字必去第四雨字可以起韻亦可不必次句春殘花門必平落字必仄第三句必三仄一平而乍玉二字用去尤妙第四句剪字必仄只逃禪用平結句黯字必仄只龍川用平當從其多者後段起處亦同舊字頓字夜字漏字幾字俱必仄去聲尤妙歷觀諸家無不如此乃所謂譜者皆必取而混之果何意耶通夜飲句周調本作梁燕語現有片玉詞可據千里和周亦曰無限語而譜妄增一字作梁間燕語遂使失調且因而注題下作六十七字豈不大謬乎刻遡字應作溯掩字不宜重出飲字不是韻此亦誤也首句花落亦誤刻落花查各家前後段六字句俱平平平仄平仄此必係花落故為正之龍川于通夜飲作遐夀身亦誤刻若如遐夀身之不通龍川當時亦不能中狀元矣一笑詞律卷九
