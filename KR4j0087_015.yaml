body:
  text: 詞律卷十五宜興萬樹撰玉簟涼九十七字史達祖秋是愁鄉自錦瑟斷絃有淚如江平生花裏活奈舊夢難忘藍橋雲樹正緑料抱月幾夜眠香河漢阻但鳳音傳恨欄影敲涼新妝蓮嬌試曉梅瘦破春因甚却扇臨窗紅巾銜翠翼早弱水茫茫柔指各自未剪問此去莫負王昌芳信凖更敢尋紅杏西廂平生至漢阻與後紅巾至信凖同指各二字照前橋雲二字宜用平聲想皆借用耳若認是用仄填入去聲字便拗矣平生二句同是五字但上句平生二字連與五言詩句同下則奈字領句而舊夢二字相連不可比而同之也紅巾二句亦然月邊嬌九十七字周密疏雨烘晴早栁盼嬌嚬蘭芽愁醒九街月淡千山夜暖十里寶光花影塵凝步襪送艷笑爭誇清俊笙簫迫曉翠幕捲天香宫粉少年顧曲疏狂絮花縱跡夜蛾心性戲叢圍錦燈簾轉玉􅍆却舞勾歌引前歡謾省又輦路東風吹鬢醺醺倚醉任夜深春冷九街至迫曉與後戲叢至倚醉同省字照前襪字不必叶韻暗香九十七字又名紅情吳文英縣花誰葺記滿庭燕麥朱扉斜闔妙手作新公館青紅曉雲溼天際疏星趂馬畫簾隙冰絃三疊盡換却吳水吳烟桃李靚春靨風急送帆葉正雁水夜清卧虹平帖軟紅路接塗粉闈深早催入懷暖天香宴果花隊簇輊軒銀蠟便問訊湖上栁兩堤翠匝公館至換却與後塗粉至問訊同此調惟堯章創之君待填之耳觀其步趨原曲如此謹嚴所謂斷髭踏醋令人有擊鉢揮毫之懼姜詞首句第三字是月字譜俱作仄觀此誰字則知可用平吳水姜作竹外可知竹字可平送帆葉姜作正寂寂可知第二箇寂字作平卧虹姜作夜雪可知雪字作平有此一闋姜遂不孤矣至圖譜所注於作字靚字送字夜字軟字問字兩字俱作可平而花隊簇輊軒五字謂可用仄平平仄仄則其見太廣其說太𤣥非愚之淺鄙所識矣按詞調有紅情緑意二體向原疑為巧立名色近校之即暗香疏影二詞也詳見疏影調下夜合花九十七字朝補之百紫千紅占春多少共推絶世花王西都萬家俱好不為姚黃謾腸斷巫陽對沈香亭北新粧記清平調詞成進了一夢仙鄉天葩秀出無雙倚朝暉半如酣酒成狂無言自有檀心一點偷芳念往事情傷又新艷曽說滁陽縱歸來晚君王殿後别是風光西都下與無言下同但西都句六字無言句四字稍異然此十字句分豆可上可下而他家則俱用上四下六耳又一體一百字周密月地無塵珠宫不夜翠籠誰煉鉛霜南州路杳仙子誤入唐昌零露滴溼微粧逗清芬蝶夢空忙梨花雲暖梅花雪冷應妒秋芳虛庭夜氣方涼曽記幽叢採玉素手相將青蕤嫩萼指痕猶映瑤房風透幕月侵牀記夢回粉艷爭香枕屏金絡叉梁絳縷都是思量作者多用此體南州下與後青㽔下同零露滴二句風透幕二句各三字與前謾腸斷念往事句五字異詞按梨花句枕屏句他家多於中二字相連如前朝清平二字歸來二字史用共淒涼處向銷凝裏吳用共追遊處高用隔花隂淺想體當如此家按夢窗一首於曽記句作似西湖燕去五字查各俱六字故不另收附記於此梅溪栁鎖鶯魂一首於逗清芬三字原作早窺春而譜圖相沿俱誤刻早去窺春遂謂此句八字蓋未審其後段之是當初三字及將他家詞相校故竟作一百一字調耳路嫩二字妙在去聲注作可平全然沒味矣醉蓬萊九十七字吕渭老任落梅鋪綴雁齒斜橋裙腰芳草閒伴遊絲過曉園庭沼厮近清明雨晴風軟稱少年尋討碧縷牆頭紅雲水面栁堤花島誰信而今怕愁憎酒對著花枝自疏歌笑鶯語丁寧問甚時重到夢筆題詩帊綾封淚向鳳簫人道處處傷懷年年逺念惜春人老對著下與前雁齒下俱同任過稱問向諸字定用仄聲且須去聲方妙歷覽古人作者無不如此蓋此一字領句必去聲方喚得起下面也此亦易明之理況舊詞篇篇可證而譜俱注可平一字之訛便失一調之體豈得如此率意乎而庭花憎人等字翻注可仄且將過曉園句不注叶韻嘯餘既誤圖譜再誤必欲去此一韻矣此調凡五字句者皆一字領下四字不可上二下三作五言詩句法查楊無咎作有用況是當佳致嵗嵗稱眉夀者竟與念奴嬌中三語同此乃其誤處不可從也夢窗首句作碧天書信斷雖或第一句可通用然亦是敗筆後起四句每句四字係定格坡公作此㑹應須爛醉仍把紫菊茱萸細看重嗅上二句六字下一句四字而醉字又用去聲定難協律亦不可從又朝無咎於稱少年句作與花爭艷乃落去一字非有此體晴字坡作飲綾字坡作我栁作輦上可借作平不得用去聲聖求此詞汲古刻本於懷字作上又多一念字誤燕春臺九十七字張先麗日千門紫烟雙闕瓊林又報春回殿角風微當時去燕還來五侯池館屏開探芳菲走馬重簾人語轔轔車幰逺近輕雷雕觴霞灔翠幕雲飛楚腰舞栁宫面粧梅金猊夜暖羅衣暗裛香煤洞府人歸笙歌院落燈火樓臺下蓬萊猶有花上月清影徘徊此詞疑有訛脫惜無他篇可證愚謂探芳句下或尚有叶韻語蓋走馬句與重簾人語詞意不連也或謂微字飛字歸字亦是叶韻詞中微灰原通用未知是否按嘯餘譜於春字題內收燕臺春又於宫室題內收燕春臺將下二字顛倒遂收兩調又兩處所載俱即張子野此篇豈不貽笑千古當日欲作譜示人寧竟未一考邪又於燕春臺內少却院落二字至所注之可平可仄兩處互異又不必言矣真竒絶竒絶則此調沈氏作燕春臺圖譜作燕臺春若作燕春臺燕字當作燕㑹之燕若作燕臺春則是黃金臺事當作幽燕之燕但舊草堂所載是燕春臺合當從之也又按夏初臨一調與此相同即載此後以便考訂夏初臨九十七字洪咨䕫鐵甕栽荷銅彞種菊膽瓶萱草榴花庭户深沈畫圖低映窗紗數枝竒石谽谺染宣和瑞露明霞於菟長嘯風林囗囗霜草先斜雪絲香裏冰粉光中興來進酒睡起分茶輕雷急雨銀篁迸插簷牙涼入琵琶枕幃開又送蟾華問生涯山林朝市取次人家此詞缺二字照後結應是平仄三按此調與燕春臺聲響句法俱同只染宣和句上下四與前探芳菲下不同余反覆玩之而斷其為一調何也蓋前探芳菲下原有闕文今以此相較是走馬之下當有二字落去竊恐是歸來二字也其詞意謂五侯之家同諸閨人出遊至暮則探芳菲者走馬而歸來矣其閨人則在車上簾中將到第宅故簾中有語而其時宅中迎候故池館屛開耳後段則言歸後重整筵宴歌舞之景故用夜字燈字月字也若上無歸來二字則接不下矣笙歌句必上落一字而下誤多院落二字是因笙歌歸院落燈火下樓臺二句成語而誤寫耳此句即同前探芳菲句亦宜上三下四蓋探芳菲即洪詞之染宣和七字笙歌即洪詞之枕帷開七字前後相同也查草堂舊刻止笙歌燈火樓臺六字是雖缺上一字而原無院落二字汲古所刻亦同愈可徵余說之不謬自嘯餘收作兩調於燕春臺內作笙歌燈火樓臺六字燕臺春內作笙歌院落燈火樓臺八字於是沈氏刻仍其八字反注云一本缺院落二字而圖譜則竟作八字矣豈不謬歟猶有花上月亦誤多一字此即洪詞之山林朝市也玩其節奏豈不吻合乎是則前洞府人歸句果是叶韻正與涼入琵琶合矣蓋他處猶可謂偶同若換頭處四字四句斷無兩調而如此相符者愚見如此然以五六百年後尚論而獨創異說其能免於時俗之駭怪乎又一體九十八字劉涇泛水新荷舞風輕燕園林夏日初長庭樹隂濃雛鶯學弄新簧小橋飛蓋入橫塘跨青蘋緑藻幽香朱欄斜倚霜紈未搖衣袂先涼歡歌稀遇怨别多同路遙水逺烟淡梅黃輕衫短帽相攜洞府流觴況有紅粧醉歸來寶蠟成行拂牙牀紗厨半開月在回廊舊刻此詞俱作小橋飛入橫塘沈天羽云飛字下缺蓋字愚謂據此調風範小橋句當以六字為正況有前洪詞可據但天羽或有所考故收此九十八字體然作者只從洪平齊可耳此篇霜紈未搖紗厨半開用平平去平比洪詞山林朝市句用平平平仄者不同想所不拘也瑤臺第一層九十七字張元幹寶歷祥開飛練上青冥萬里光石城形勝秦淮風景威鳳來翔臘餘春色早兆釣璜賢佐興王對熙旦正格天同德全魏分疆熒煌五雲深處化鈞獨運斗魁旁繡裳龍尾千官師表萬事平章景鍾文瑞世醉尚方難老金漿慶垂裳看雲屏間坐象笏堆牀石城至興王與後繡裳至金漿同釣字即同後尚字圖注可平誤垂裳是用韻其别作亦以觴字叶長光等字圖失注璜方二字似叶而非觀别作後用旦字也按圖譜收其别作臘餘二句云豆花初秀雨散暑空洗出秋涼亦於雨字斷句正與其後段舊山同梓里荷月旦久巳平章同此正前後相合處如此篇後段景鍾二句也上五下七甚明何乃後作上五下七而前則另讀為四字三句邪長亭怨慢九十七字或無慢字姜䕫漸吹盡枝頭香絮是處人家緑深門户逺浦縈回暮帆零亂向何許閲人多矣誰得似長亭樹樹若有情時不㑹得青青如此日暮望高城不見只見亂山無數韋郎去也怎忘得玉環分付第一是早早歸來怕紅萼無人為主算只有并刀難剪離愁千縷按此調為白石所創其字句自應守之但前結此字不是韻乃白石借叶者後人不知遂將後起句日暮二字割連前尾如沈氏别集詞統圖譜等書皆遞相傳誤加以圈㸃注其平仄而不知其非也周公謹張叔夏皆南宋人去白石最近其所作長亭怨周詞用處字韻前結云歎轉眼嵗華如許後起云凝佇張一首是絶字韻前結云誰為主都成消歇後起云凄咽一首是處字韻前結云應笑我飄零如羽後起云同去是端端正正兩箇韻腳豈可硬判日暮二字連上而使此調前結少却一韻乎但有不可曉者第一是句上三下四周乃作燕樓鶴表半飄零與姜不合而張詞則合又誰得似句六字樹若句五字張一作渾忘了江南舊雨七字不擬重逢四字一作愁千折心情頓别七字露粉風香四字與姜不合而周詞則合此二者又不知何以參差如此後人但依姜填之可耳枝字周張作仄是處是字張作平暮帆暮字周作平不㑹只玉第一是早只等字張兩首內或作平想不拘也又張一首於首句不起韻閲人句周張俱叶韋郎句張一首叶黃鸝繞碧樹九十七字周邦彥雙闕寵佳氣寒威日晚嵗華將暮小院閒庭對寒梅梅照雪淡烟凝素忍當迅景動無限傷春情緒猶賴是上苑風光漸好芳容將煦草莢蘭芽漸吐且尋芳更休思慮這浮世甚驅馳利祿奔競塵塵縱有魏珠照乘未買得流年住爭如􅓑引榴花醉偎瓊樹平仄照填好或云上苑風光漸為一句帝臺春九十七字李甲芳草碧色萋萋遍南陌飛絮亂紅也似知人春愁無力憶得盈盈拾翠侣共攜賞貝鳳城寒食到今來海角逢春天涯行客愁旋釋還似織淚暗拭又偷滴謾遍倚危欄儘黃昏也只是匹暮雲凝碧􅍆則而今巳􅍆了忘則怎生便忘得又還問鱗鴻試重尋消息宋人作此調者絶少向來譜圖相傳俱首作三字句以碧字起韻色萋萋作一句遍南陌作一句不知後有暮雲凝碧斷無復韻之理況春草碧色乃江文通别賦中語此正用之其為色字起韻無疑詞綜於飛字作暖字也似知人句無似字必有所考但從來舊刻如右故仍之嘯餘所注平仄皆以意為之遍南謂可平仄至忘則怎生便五字逐字反注蓋欲字字改順幾於變盡本來面目矣本譜則不敢也珍珠簾九十八字珍一作真吳文英蜜沈爐暖餘烟裊竚立行人官道麟帶壓愁香聽舞簫雲渺恨縷情絲春絮逺悵夢隔銀屏難到寒峭有東風垂栁學得腰小還近緑水清明歎孤身如燕將花頻繞細雨溼黃昏半醉歸懷抱蠧損歌紈人去久謾淚沾香蘭如笑書杳念客枕幽單看春漸老麟帶以下前後相同但東風垂栁與客枕幽單平仄異麟帶二句細雨二句雖皆五字但上句是上二下三下句是上一下四不可誤作一樣又一體一百一字張炎雲深别有深庭宇小簾櫳占取芳菲多處花暗曲房春潤幾番酥雨見說蘇堤晴未穩便好趂踏青人去休去且料理琴書彞猶今古誰見靜裏閒心縱荷衣未葺雪巢堪賦醒醉一乾坤任此情如許茂樹石牀同坐久又却被春風留住欲住奈簾影籹樓剪燈人語比前詞多小簾櫳三字詞家多宗此體去住二字即用上韻此玉田巧筆非必要疊韻也此詞用料理琴書簾影籹樓草窗用鮫人織就歸時人在平仄相反而前夢窗詞前用東風垂栁與周同後用客枕幽單與張同前後互異想亦不拘然他家俱用草窗體可從之坐字竹山作珠字係誤刻此字無用平理又一體一百一字陸游燈前月下嬉遊處向笙歌錦繡叢中相遇彼此知名才見便論心素淺黛嬌蟬風調别最動人時時偷顧歸去想閒窗深院調絃促柱樂府初翻新譜謾裁紅點翠閒題金縷燕子入簾時又一番春暮側帽燕脂坡下過料也記前年崔護休訴待從今須與好花為主彼此知名四字才見便論心素六字比前二詞兩句五字者不同或以為誤渭南又一首亦云掠地穿簾知是竟歸何處是知另有此體也其後段首句兩字叶韻次句四字叶韻亦與前六字用平者不同其又一首亦云自古儒冠多誤是圖譜前收珍珠簾後又收真珠簾不知珍即真本一調也而後起二字句亦失注叶韻玲瓏玉九十八字姚雲文開嵗春遲早贏得一白瀟瀟風窗淅簌夢驚錦帳春嬌是處貂裘透暖任尊前回舞紅倦柔腰今朝虧陶家茶鼎寂寥料得東皇戲劇怕蛾兒街栁先鬭元宵宇宙低迷倩誰分淺亞深凹休嗟空花無據便真箇瓊雕玉琢總是虛飄且沈醉趂樓頭零片未消首句或云五字雪舫曰非也蓋因春遲故雨雪耳亞字恐是凸字寂寥未消是定格不可照圖譜作平揚州慢九十八字姜夔淮左名都竹西佳處解鞍少駐初程過春風十里盡薺麥青青自吳馬窺江去後廢池喬木猶厭言兵漸黃昏清角吹寒都在空城杜郎俊賞算如今重到須驚縱豆蔲詞工青樓夢好難賦深情二十四橋仍在波心蕩冷月無聲念橋邊紅藥年年知為誰生查鄭覺齊有此調於淮佳吳喬清吹等字作仄竹十薺去聲杜俊夢四等字作平又李彭老於漸黃昏二句作歎而今杜郎還見應付悲春句法平仄皆有異然此係石帚自度腔從之為妥月下笛九十八字周邦彥小雨收塵涼蟾瑩徹水光浮碧誰知怨抑靜倚官橋吹笛映宫牆風葉亂飛品高調側人未識想開元舊譜柯亭遺韻盡傳胸臆闌干四繞聽折栁徘徊數聲終拍寒燈陋館最感平陽孤客夜沈沈雁啼正哀片雲盡卷清漏滴黯凝魂但覺龍吟萬壑天籟息水光至未識與後數聲至漏滴同葉字是以入作平不可泛用仄聲字人未識清漏滴定格不可用平平仄并觀其所用品字調字片字及盡卷之盡字皆仄可知此句有定格也怨陋籟三字亦不可平他如靜映亂最夜正等去聲字皆妙宜玩之館字即前抑字應叶不叶觀後陶張二詞俱叶可見雖美成如此學者還當用韻為是不然或室字之訛耳圖譜注光誰橋風寒平可仄水映品側想數夜片卷黯可平我所不解又一體九十八字曽允元吹老楊花浮萍點一溪春色閒尋舊迹認溪頭浣紗磧柔條折盡成輕别向空外瑤簪一擲算無情更苦鶯巢暗葉啼破幽寂凝立闌干側記露飲東園聨鑣西陌容消鬢減相逢應是難識東風吹得愁如海謾點染空階自碧獨歸晚解說心中事月下短笛浮萍點只三字認溪頭浣紗磧雨三字句柔條句上四下三向空外句丄三下四東風二句亦然後起首句二字次句三字叶韻末句一五一四以丄俱與前不同相逢句平仄亦異又一體九十九字陶宗儀東閣詩慳西湖夢淺好音難托香銷玉削早孤標頓非昨阿誰底事頻橫笛不道是江南搖落向空階閒砌天寒日暮病鶴輕啄情薄東風惡試快覓飛瓊共翔寥廓冰魂漠漠誰憐金谷離索有時巧綴雙蛾緑天做就宫粧綽約待一點脆圓成須信和羹問却西湖句四字同周詞餘同曽詞尾句兩三一四與前二體異又一體九十九字張炎萬里孤雲清遊漸逺故人何處寒窗裏曽記經行舊時路連昌約略無多栁第一是難聽夜雨謾驚回悽悄相看燭影擁衾誰語張緒歸何暮伴冷落依依短橋鷗鷺天涯倦旅此時心事良苦只愁重灑西州淚問杜曲人家在否恐翠袖正天寒猶倚梅花那樹上二詞於第四句四字叶韻而此用寒窗下十字大異或曰寒窗裏裏字誤必有兩字用韻與前合蓋窗裏不可云經行路也天涯二句則與前同矣那字去聲妙妙陶南村學宋人者故亦用問字至其搖字不若曽詞一字自字張詞夜字在字兩仄聲矣蓋此二字即周詞未字漏字也三部樂九十八字蘇軾美人如月乍見掩暮雲更增妍絶算應無恨安用隂晴圓缺嬌甚空只成愁待下牀又懶未語先咽數日不來落盡一庭紅葉今朝置酒彊起問為誰減動一分香雪何事散花却病維摩無疾却低眉慘然不答唱金縷一聲怨切堪折便折且惜取少年花發暮字用去各家皆同惟龍川用平應從其多者為是語字用仄亦是定格堪折便折用平仄仄仄各家同數日句各家皆作仄平仄仄抑或另有此體歟事字各家皆平恐是時字又一體九十八字周邦彥浮玉飛瓊向邃館靜軒倍增清絶夜窗垂練何用交光明月聞道官閣多梅趂暗香未逺凍蕊初發倩誰折取特贈情人桃葉回紋近傳錦字道為君瘦損是人都說祅如染紅著手膠脫黏髮轉思量鎮長墮睫都只為情深意切欲報信息無一句堪喻愁結首句不起韻倩誰句比蘇詞數日句異襖字恐誤如字用平可從按千里和詞於聞道句云奈相送行客將歸多一字但觀夢窗龍川此句皆作七字或此周詞偶落一字亦未可知而前蘇詞亦只六字故不敢擅定至方詞於何用句作天際留殘月則留字上落一字是人句作到見時難說多一字查此句吳詞五字蘇詞陳詞四字未知誰是想不拘也又一體九十九字吳文英江鶂初飛蕩萬里素雲際空如沐詠情吟思不在秦箏金屋夜潮上明月蘆花傍釣簑夢逺句清敲玉翠罌汲曉欸乃一聲秋曲片蓬障雨乘風半竿渭水伴鷺汀幽宿那知暖袍挾錦低簾籠燭鼓春波載花萬斛帆鬛轉銀河可掬風定浪息滄茫外天浸寒緑夜潮上句伴鷺汀句各多一字後起句用平與前異雲仙引九十八字馮偉壽紫鳳臺高紅鸞鏡裏馡馡幾度秋聲黃金重緑雲輕丹砂鬢邊滴粟翠葉玲瓏烟剪成含笑出簾月香滿袖天霧縈身年時花下逢迎有遊女翩翩如五雲亂擲芳英為簪斜朵事事關心長向金風一枝在手嗅蕊悲歌雙黛顰逺臨溪樹對初絃月露下更深無他作可證學者依其平仄可也聲一作馨烟如雙等字用平乃詞中起調處勿循圖注可仄之說芰荷香九十八字趙彥端燕初歸正春隂暗淡客意凄迷玉觴無味晚花雨退凝脂多情細栁對沈腰渾不勝衣垂别袖忍見離披江南陌上彊半紅飛樂事從今一夢縱錦囊空在金碗誰揮舞裙歌扇故應閒瑣幽閨練江詩就算檥舟寧不相思腸斷莫訴離杯青雲路穩白首心期正春隂下與後縱錦囊下同但垂别袖句七字腸斷句六字恐無此理必腸斷下少一仄聲字無疑作者宜照前填之孤鸞九十八字馬莊父沙堤香軟正宿雨初收落梅飄滿可奈東風暗逐馬蹄輕捲湖波又還漲緑粉牆隂日融烟暖驀地刺桐枝上有一聲春喚任酒帘飛動畫樓晚便指數燒燈時節非逺陌上呌聲好是賣花行院玉梅對妝雪栁鬧蛾兒象生嬌顫歸去爭先戴取倚寶叉雙燕除兩起句外前後皆同旁注照各家查定畫字朱敦儒亦用水字時節亦用難寄尢覺發調宜從至正有任便倚等乃領句虛字喚起下語斷無用平之理譜圖概作可平湖波玉梅二句除首一字外平仄定須如此乃注波可仄又可平漲可平謬甚又漲用平則全然無調矣又謂粉可平蛾可仄同語而異注所不解也又一體九十八字趙以夫江頭春早問江上寒梅占春多少自照疏星冷祗許春風到幽香不知甚處但迢迢滿河烟草回首誰家竹外有一枝斜好記當年曽共花前笑念玉雪襟期有誰知道喚起羅浮夢正參橫月小淒涼更吹塞管謾相思鬢華驚老待覓西湖半曲對霜天清曉自照二句喚起二句俱各五字與前詞異譜於正字注可平誤祗許句五字應如後段正字領句此不足法又一體九十八字張矩荆溪清曉問昨夜南枝幾分春到一點幽芳不待隴頭音耗亭亭水邊月下勝人間等閒花草此際風流誰似有孏窩詩老且向虛簷淡然索笑任雪壓霜欺精神越好最喜庭除下映紫蘭嬌小孤山好喜舊約況和羮用功宜早移傍玉階深處趂天香繚繞後段起處二句與前異但恐誤不宜從蓋藝窗别一首原與前趙詞同也一點二句上四下六同馬詞最喜二句各五字同趙詞又與前異宜按一點二句用一四一六與兩五者似是各體自前後相合前兩家可證此篇後段或宜於除字分句便與前同蒼崖曰既有趙詞在不妨即注兩五故從之然作者以照合為妥朱敦儒作譜圖俱注前云淡濘新粧淺點夀陽宫額後云試問丹青手是怎生描得前後互異余則斷之曰淡濘新粧淺為一句也晝夜樂九十八字栁永洞房記得初相遇便只合長相聚何期小㑹幽歡變作别離情緒況值闌珊春色暮對滿目亂花狂絮直恐好風光盡隨伊歸去一場寂寞憑誰訴算前言總輕負早知恁地難􅍆悔不當初留住其奈風流端正外更别有繫人心處一日不思量也攢眉千度前後段同暮字叶外字不叶山谷一首亦然而栁别作則前後皆叶作者自當皆叶為妥色字别作用平甚拗或誤不必從兩結各五字二句須知上句如五言詩下句上一下四此二句正如石州慢之結耳八節長歡九十八字毛滂名滿人間記黃金殿舊賜清閒才高鸚鵡賦風凛惠文冠濤波何處試蛟鰐到白頭猶守溪山且做龔黃樣度留與人看桃溪栁曲隂圓離唱斷旌旗却捲春還襦袴寄餘溫雙石畔唯聞吏膽長寒詩翁去誰細繞屈曲欄干從今後南來幽夢應隨月渡雲湍溫字宜叶此借韻耳逍遙樂九十八字黃庭堅春意漸歸芳草故國佳人千里信沈音杳雨潤烟光晚景澄明極目危欄斜照夢當年少對樽前上客鄒枚小鬟燕趙共舞雪歌塵醉裏談笑花色枝枝爭好鬢絲年年漸老如今遇風景空瘦損向誰道東君幸賜與天幕翠遮紅繞休休醉鄉歧路華胥蓬島只此一闋平仄宜遵並蒂芙蓉九十八字朝端禮太液波澄向檻中照影芙蓉對蒂千柄緑荷深並丹臉爭媚天心眷臨聖日殿宇分明敞嘉瑞弄香嗅蕊願君王壽與南山齊比池邊屢回翠輦擁羣仙賞醉憑闌凝思萼緑攬飛瓊共波上遊戲西風又看露下更結雙雙新蓮子鬭粧競美問鴛鴦向誰留意向檻中至嗅蕊與後擁羣仙至競美同但前用敞字仄後用新字平想可通用他無可考圖譜乃謂太向緑臉眷殿弄夀與屢共又更鬭等字可平芙同丹天分君池邊憑西雙鴛等字可仄試問據何詞而較定邪至嗅字本仄而圖作凝字本平而圖作何邪芙蓉同蒂憑闌凝思必平平平仄殿字分明更結雙雙必仄仄平平弄香嗅蕊鬭粧競美必仄平仄仄何得信意改竄更怪者千柄緑荷深與後萼緑攬飛瓊同並丹臉爭媚與後共波上遊戲同皆五字句乃以千柄緑荷深並為六字一句丹臉嬌媚為四字一句豈非異事繡停針九十八字陸游歎半紀跨萬里秦吳頓覺衰謝回首鵷行英俊竝遊咫尺玉堂金馬氣凌嵩華負壯略縱橫王霸夢經洛浦梁園覺來淚流如瀉山林定去也却自恐說著少年時話靜院焚香閒倚素屏今古總成虛假趂時婚嫁幸自有湖邊茅舍燕歸應笑客中又還過社後段定去也用去去上即與首句歎半紀同次句說著二字作平與前次句秦吳二字亦同前第三句覺字作平與後少年句同是換頭只多山林二字耳過字讀作平並素二字必用去聲二郎神九十八字吕渭老西池舊約燕語栁梢桃萼向紫陌秋千影下同綰雙雙鳳索過了鶯花休則問風共月一時閒却知誰去喚秋隂滿眼敗紅藥飄泊江湖載酒十年行樂甚近日傷高念逺不覺風前淚落橘熟橙黃堪一醉斷未負晚涼池閣只愁被僚撥春心煩惱怎生安著向紫陌至閒却與後段甚近日至池閣同藥字刻本作葉葉字非韻今改正或曰上用秋隂非紅藥時矣余謂不更有桃萼在前乎桃尚是萼春景可知或曰後有橘熟橙黃是又何時余笑曰晚涼池閣又是夏景四時都來極像嶺南風景僕亦難以斷定請公去與吕家那漢理㑹又一體一百四字栁永炎光謝過暮雨芳塵瀟灑乍露冷風清庭户爽天如水玉鈎遙挂應是星娥嗟久阻叙舊約飈輪欲駕極目處微雲暗度耿耿銀河高瀉閒雅須知此景古今無價運巧思穿針樓上女擡粉面雲鬟相亞鈿盒金叉私語處算誰在回廊影下願天上人間占得歡娛年年今夜乍露冷至欲駕同後運巧思至影下此調與前後體原是各異首句向來傳刻皆三字沈氏謂光字下缺初字蓋欲添入一字以凑成四字句而不知此字不宜作平聲初字之杜撰不辨而自露也且此句必欲彊之使同則後段許多不同處能使之俱同乎古人所謂本無事而自擾之也嘯餘依本集作炎光謝矣而亦欲凑四字竟將下一字補上作炎光謝過其下只作六字句誤失一韻尤為可笑且以露冷風清為四字句庭户至遙挂為十字句蓋謂爽天二字相連故又注爽字可平竒極竒極又一體一百五字郎又名十二湯恢瑣窗睡起閒竚立海棠花影記翠楫銀塘紅牙金縷杯泛梨花凍冷燕子銜來相思字道玉瘦不禁春病應蝶粉半銷鴉雲斜墜暗塵侵鏡還省香痕碧唾春衫都凝悄一似荼䕷玉肌翠被消得東風喚醒青杏單衣楊花小扇閒却晚春風景最苦是蝴蝶盈盈弄晚一簾風靜此為本調正格作者多從之嘯餘載徐幹臣詞亂注平仄此篇乃和徐韻者故收之以為證睡字徐用彈乃去聲是彈弓之彈意謂鵲本報喜之物今乃無憑凖因以丸彈之故曰悶來彈鵲也此字不可作平聲觀夢窗首句亦作素天際水是也銜來相思徐云愁端如何譜以其四箇平聲注何字可仄觀夢窗又是賓鴻重來後來字亦平豈徐湯吳三公皆笨伯不能作七言詩一句乎又以記翠楫下作九字句鴉雲下作八字句香痕下作八字句悄一下作九字句最苦下作九字句而凡用仄處皆可作平人若依之使一調音響俱索然無味至凍冷喚醒弄晚等去上正同徐詞燼冷未醒遍倚所以為妙夢窗亦云過艇照影數㸃若皆作平仄不成調矣半字亦必仄聲末句或於盈盈處豆或於弄晚處豆總之語氣相貫可不拘收按夢窗此詞題曰十二郎圖譜不知即此調又續之首句便作七字讀次句作四字讀所謂從頭差起安得不直差到底乎相又馬莊父一首記翠楫下九字止作倩說與年年挽七字其餘皆同若謂用前吕詞法則其餘又與吕不同恐係脫兩字不録又一體一百五字楊無咎炎光欲謝更幾日薰風吹雨共說是天公亦嘉神貺特作澄清海宇灌口擒龍離堆平水休問功超前古當中興護我邊陲重使四方安堵新府祠庭占得山川佳處看曉汲雙泉晚除百病奔走千門萬户嵗嵗生朝勤勤稱頌可但民無災苦囗囗囗願得地久天長協佐皇都灌口以下兩四一六與後嵗嵗以下同此即前湯詞後段青杏以下三句句法而前後通用之者也尾句都字初疑是誤然玩上用佐字則下宜以平字應之此乃又一平仄互用之體也陌上花九十九字張翥關山夢裏歸來還又嵗華催晚馬影雞聲諳盡倦郵荒館緑箋密記多情事一看一回腸斷待殷勤寄與舊遊鶯燕水流雲散滿羅衫是酒香痕凝處唾碧啼紅相半只恐梅花瘦倚夜寒誰暖不成便沒相逢日重整叉鸞箏雁但何郎縱有春風詞筆病懷渾懶此詞風流婉約在淺深濃淡之間真絶唱也吾安得起蛻巖於九亰而北面事之還又下與後唾碧下同圖注起處兩六字待殷勤句七字鶯燕連下作六字更以香字連上酒字作六字痕凝至相半作九字而又因凝處唾碧四仄乃注凝處二字云可平是苦苦要將好詞讀壞惜哉玲瓏四犯九十九字周邦彥穠李夭桃是舊日潘郎親試春艷自别河陽長負露房烟臉憔悴鬢點吳霜細念想夢魂飛亂歎畫闌玉砌都換才始有緣重見夜深偷展香羅薦暗窗前醉眠蔥蒨浮花浪蕊都相識誰更曽擡眼休問舊色舊香但認取芳心一點又片時一陳風雨惡吹分散細念想句本七字觀徽宗梅溪松山等作皆同而方千里和此詞正作顧鬢影翠雲零亂其為七字何疑舊譜去一細字各書多仍其誤故汲古刻片玉詞有按譜宜是六言無細字之注也各家惟竹屋一首六字或亦脫落或有此體然謂有此體則可謂周詞六字則不可蓋有千里和詞為證也又片時一陳應是五字各家皆同舊刻於又字上多一奈字不惟失調於文義亦贅至尾句譜圖俱注又片時一陳風雨為七字句惡吹分散為四字句今考方詞是仗夢魂一到花月底休飄散是知上句五字於陳字分斷下以風雨惡為一句吹分散為一句方詞上句於到字佳下以花月底為一句休飄散為一句耳又查草窗結云倚畫闌無語春恨逺頻回首更可以為據向來原有所疑考至此不覺爽然又思人之所以誤讀者乃因玲瓏四犯又另有四字煞尾一體故人欲彊而同之遂致誤耳但覽後載史詞可知其分别較然矣譜於五字句謂可用平平平仄仄下句可用仄仄平平平仄惡字竟作可平豈不大謬又一體九十九字吳文英波暖塵香正嫩日輕隂搖蕩清晝幾日新晴初展綺窗紋繡年少忍負才華儘占斷艷歌芳酒奈翠簾蝶舞蜂喧催趂禁烟時候杏腮紅透梅鈿皺燕歸時海棠厮勾尋芳較晚東風約還約劉郎歸後憑問栁陌情人比似垂楊誰瘦倚畫闌無語春恨逺頻回首前詞玉砌都換換字是韻千里亦和之此篇喧字用平不叶徽宗用翔字竹屋用情字亦然還約句比前誰更句多一字比似句比前但認句少一字又一體一百一字史達祖雨入愁邊翠樹晚無人風葉如剪竹尾通涼却怕小簾低捲孤坐便怯詩慳念後賞舊曽題遍更暗塵偷鎖鸞影心事屢羞團扇賣花門館生秋草悵弓彎幾時重見前歡盡屬風流夢天共朱樓逺聞道秀骨病多難自任從來恩怨料也和前度金籠鸚鵡說人情淺影字仄草字不叶韻與前二詞異幾時重見高竹屋作怨恨誰訴恨字亦用去聲與前第三句同想亦有此體可從因餘同不録有又按史别作於聞道二句云方悔翠袖易分難聚玉香花笑論語氣則當於聚字斷句論調格則當於分字句有字豆或謂另一體非也蓋此二句一氣貫串故梅溪巧筆作此借渡句法本體定當上六下七與前孤坐二句相同勿謂有史詞可倚而作兩四一五也又一體九十九字姜䕫疊鼓夜寒垂燈春淺匆匆時事如許倦遊歡意少俯仰悲今古江淹又吟恨賦記當時送君南浦萬里乾坤百年身世惟有此情苦揚州栁垂官路有輕盈換馬端正窺户酒醒明月下夢逐潮聲去文章信美知何用謾贏得天涯羇旅教說與春來要尋花伴侣此與前各體不同乃别是一調故雖九十九字另列於百一字之後倦遊至南浦與後酒醒至羇旅同只江淹句六字文章句七字耳燕山亭九十九字曽覿玉立明光才業冠倫漢歷方承休運江左奏功塞壘宣威紫綬幾垂金印嵗晚歸來望丹極新清氛祲忠憤著撓節朋儔便成嘉遁千載雲海茫茫記舉目新亭壯懷難盡蝴蝶夢驚化鶴飛還榮華等閒一瞬七十樽前算疇昔都無可恨休問長占取朱顔緑鬢冠奏夢三字俱宜用仄聲且以去為妙是此調定格觀徽宗用數靚地樵隱用夜錦共海野别作用夜乍競張伯雨用翠素可見圖譜俱注可平誤江左至忠憤與後蝴蝶至休問同但各家於前紫綬句有用後榮華句法者後則不用紫綬句法也各刻載徽宗裁剪氷綃一首於蝴蝶夢驚句作天遙地逺誤也宜作天逺地遙乃合此即同前段之新樣靚粧句而圖且謂可作仄平平仄相反到底矣余嘗謂紅拂傳竒一江風試語良人道句以平平仄仄平作仄仄平平仄五字皆反令歌者捩折嗓子今見圖注此句乃知反古者蓋多耳汲古刻樵隱詞塞壘下二句云密映窺亭亭萬枝開遍乃窺字下脫一字尾句云愁酒醒緋千片亦於緋字上下落一字無此九十七字體也張伯雨第二句作蝟肌粟聚與此調異恐不可以為法字按徽宗詞第三句冷淡胭脂勻注或作微注本六詞統落一字止作冷淡胭脂注誤也不可從又此調本名燕山亭恐是燕國之燕詞滙刻作宴山亭非也大有九十九字周邦彥仙骨清羸沈腰憔悴見旁人驚怪消瘦栁無言雙眉盡日齊鬭都緣薄幸賦情淺許多時不成歡偶幸自也總由他何須負這心口令人恨行坐咒斷了更思量沒心永守前日相逢又早見伊仍舊却更被溫存後都忘了當時僝僽便搊撮九百身心依前待有賦字潘希白作聽字圖譜讀作平聲誤又以言都緣須令思相為可仄日幸坐待為可平俱非前結潘作十分衛郎清瘦郎字可用平聲却更被溫存後似應在被字豆而潘詞作彊整帽檐欹側則是六字相連想亦不拘待有應去上聲潘作雁後可見九百風魔也金元曲多用之鳳池吟九十九字吳文英萬丈巍臺碧罘罳外衮衮野馬遊塵舊文書几閣昏朝醉暮覆雨翻雲忽變清明紫垣敕使下星辰經年事靜公門如水帝甸陽春長年父老相語幾百年見此獨駕冰輪又鳳鳴黃幕玉霄平遡鵲錦輕恩事省中書半紅梅子薦鹽新歸來晚待慶吟殿閣南薰舊文書至星辰與後段又鳳鳴至鹽新同紫玉簫九十九字朝補之羅綺叢中笙歌隊裏眼狂初認輕盈無花解比似一鈎新月雲際初生算不虛得郎占與第一佳名卿歸去那知有人别後牽情襄王自是春夢休謾說東牆事更難憑誰教慕宋要題詩曽倚寶柱低聲似瑤臺曉空暗想衆裏飛瓊餘香冷猶在小窗一到魂驚無花以下與後誰教以下同國香慢九十九字周密玉潤金明記曲屏小几剪葉移根經年人重見瘦影娉婷雨帶風襟零落步雲冷鵝管吹春相逢舊京路素靨塵緇仙掌霜凝國香流落恨正冰綃翠薄誰念遺簪水空天逺應念礬弟梅兄渺渺魚波望極五十絃愁滿湘雲淒涼耿無語夢入東風雪盡江清前後惟起句異餘同經年句上六下四水空句上四下六似乎有異然十字語氣相連作者句法不妨前後一轍也舊京洛耿無語俱用仄平仄勿誤此調惟草窗有之題作彞則商國香慢愚謂彞則商三字乃是宫調非詞名也故刪之詞律卷十五
