body:
  text: 詞律卷二十宜興萬樹撰賀新郎一百十六字縷郎一作涼換又名乳燕飛金曲貂裘酒毛幵風雨連朝夕最驚心春光晼晚又過寒食落盡一番新桃李芳草南園似積但燕子歸來幽寂況是單棲饒惆悵儘無聊有夢寒猶力春意逺恨虛擲東君自是人間客暫時來匆匆却去為誰留得走馬插花當年事池畹空餘舊迹奈老去流光堪惜杳隔天涯人千里念無憑寄語長相憶回首處暮雲碧又一體一百十六字髙觀國月冷霜袍擁見一枝年華又晚粉愁香凍雲隔溪橋人不度的皪春心未縱清影怕寒波搖動更沒纖毫塵俗態荷高情預得春風寵沈凍蝶挂么鳳一杯正要吳姬捧想見那柔酥弄白暗香偷送回首羅浮今在否寂寞煙迷翠壠又爭奈桓伊三弄開遍西湖春意爛算羣花正作江山夢吟思怯暮雲重此與前調俱同但前調兩段中七字四句末三字如新桃李饒惆悵當年事人千里俱用平平仄是拗句也此篇用平仄仄竟與七言詩句相同查此四字或順或拗隨意不拘各家于一篇中參差不一不能悉録今止列前毛詞係全拗者此髙詞係全順者以為式作者隨筆填之可耳前後第二句年華又晚柔酥弄白可用仄仄平平如竹山前用千樹髙低文溪後用黃菊猶葩藝窗前用放浪江湖後用尊酒論詩皆不拘然十中之一耳又如善扛于人字用半字文溪于塵字用也字東坡于今字用細字石屏于春意之春字用與字是七字句之末用仄平仄皆係偶然不可從也又如文溪于想見那下十一字云便三台兩地也只等間如拾又云訝銀杯羽化折取戲浮醽醁夢窗于雲隔下十三字云紅日闌干鴛鴦枕畔枉裙腰褪了皆不必學梅溪前第二句云是天地中間愛酒能詩之社後第二句云為狂吟醉舞毋失晉人風雅雖另一體然他無同者亦不必學若蘆溪于態字爛字叶韻或效之亦可然此體亦無同者至李南金于前第二句云我亦三生杜牧為秋娘著句是誤筆不可謂有此體他如藝窗後起句不叶韻夢窗雲隔句用千尺晴虹映碧漪烘堂後第二句用更撩人情興異香藝馥少却二字以上皆係訛錯勿誤認也至若坡公乳燕飛一詞妙絶古今而失體處亦有但傳誤已久人不細解耳如人不度作白團扇今在否作細看取白細二字原有用仄者前已指明况白字原可作平無害酥字作蕊上可代平亦無害寂寞句用芳心千重似束心字一本作意字即係心字亦不甚害至開遍二句作若待得君來向此花前對酒不忍觸花前上少了一字或公偶失填或原有一字而傳刻遺落不復可知若不忍二字則可借作平亦無害于歌喉但後人不宜學耳嘯餘譜雖作一百十五字然于此二句亦作兩七字至圖譜則并不知此義竟以若待得君來作五字句向此花前作四字句對酒不忍觸作五字句則大謬可怪而以此誤人使坡公亦貽譏千古豈不可嘆哉至于兩結三字用仄平仄是此調定格歷觀各家可見其間或有一二用平平仄者乃是敗筆如坡公前尾之風敲竹是也譜不以此為失反于後尾之兩簌簌注兩字為可平則誤甚矣第一箇簌字原是入聲作平譜謂可平亦誤夫謂之可平者本身是仄也今以簌字本身是仄則將使人于此句用仄仄仄或平仄仄矣豈不失調哉嘯餘因坡詞兩句七字故收李玉詞上七下八者為第二體注云前段與第一體同惟後段第九句作八字是也而又收劉克莊詞為第三體尾句本云聊一笑弔千古乃落去聊字作五字句收為第三體可笑甚矣更奇者圖譜收劉詞為第二既知添入聊字而于題下仍舊譜之注云第九句作八字末句作六字夫此調末句誰非六字乎但因添聊字故改注五字為六而忘其前後皆六字耳既于劉詞添聊字則體已盡無所用第三體矣乃又仍收李玉詞倒作第三奈李玉與劉字字皆同無可注其相異處遂注曰惟後第四句分作四三蓋李云月滿西樓憑欄久端端正正七字而忽然分作兩句讀遂謂上句四字下句三字與劉體有異于此而奇絶矣本調因坡詞乳燕飛華屋又名乳燕飛圖譜既收賀新郎又收乳燕飛選聲亦復兩列且以前後第二句皆分作兩句而所收竹齋詞清影句云但莫賦緑波南浦本七字誤以賦字為叶韻惜哉圖譜于二體外又收金縷曲更奇子夜歌一百十七字彭元遜視春衫篋中半在浥浥酒痕花露恨桃李隨風吹盡夢裏故人如霧臨穎美人秦川公子却共何人語對誰家花柳池臺回首故園咫尺未成歸去昨宵聽危絃急管酒醒不知何處漂泊情多衰遲感易無限堪憐許似尊前眼底紅顔消幾寒暑年少風流未諳春事追與東風賦待他年君老巴山共君聽雨彭係元人此調宋詞無之作者須遵此平仄圖以首句作五字次句作八字誤又以半在浥浥疊四仄字遂改浥浥二字為可平更誤似尊前二句作上七下四亦誤事字注叶甚竒此句毋論不用叶事字亦並非同韻夜共君聽雨恐是共聽雨聽字平聲金明池一百二十字秦觀瓊苑金池青門紫陌似雪楊花滿路雲日淡天低晝永過三點兩點細雨好花枝半出墻頭似悵望芳草王孫何處更水繞人家橋當門巷燕燕鶯鶯飛舞怎得東君長為主把緑鬢朱顔一時留住佳人唱金衣莫惜才子倒玉山休訴况春來倍覺傷心念故國情多新年愁苦縱寶馬嘶風紅塵拂靣也只尋芳歸去余謂詞中有以上聲作平聲用者人多不信如此詞兩點二字鑿然以上作平也雲日淡以下與佳人唱以下同過三點句即後才子倒句比對自明仲殊天濶雲髙一首前段云朱門掩鶯聲猶嫩後段云厭厭意終差人問鶯聲二字即兩點二字應用平也人不知此義見此句連用五箇仄聲便以為難而自以為知者又亂將去聲字填入則拗而不叶律矣歐公亦用三點兩點雨霽注見越溪春為主為字讀作去聲言為人作主也若作平則拗觀仲殊用鬬字可見似悵望九字與念故國九字一氣分豆不拘按詞滙失收夏雲峯本調而以仲殊金明池詞題曰夏雲峯大謬若不校正不幾令學者名實相乖乎送征衣一百二十一字柳永過昭陽璿樞電繞華渚虹流運應千載會昌罄寰宇薦殊祥吾皇誕彌月瑤圖纘慶玉葉騰芳並景貺三靈眷祜挺英哲掩前王遇年年嘉節清和頒率土稱觴無間要荒華夏盡萬里走梯航彤庭舜張太樂禹會羣方鵷行趨上國山呼鰲抃遙爇爐香竟就日瞻雲獻壽指南山等無疆願巍巍寶厯鴻基齊天地遙長吾皇下與後鵷行下同宇按此調六字句凡四用皆中三字一豆者如慶寰宇字挺英哲哲字盡萬里里字皆用仄聲則指南山山字亦應用仄恐是嶽字之誤也笛家一百二十一字柳永花發西園草薰南陌韶光明媚乍晴輕暖清明後水嬉舟動褉飲筵開銀塘似染金堤如繡是處王孫幾多遊妓往往携纖手遣離人對嘉景觸目盡成感舊别久帝城當日蘭堂夜燭百萬呼盧畫閣春風十千沽酒未省宴處能忘絃管醉裏不尋花柳豈知秦樓玉簫聲斷前事難重偶空遺恨望仙鄉一餉泪沾襟袖按此調他無可考惟屯田此一篇耳舊刻以别久二字屬在前段之末余力斷之曰凡兩字句多用于換頭之首或用于一段之中未有前半巳完而贅加兩字者况上説離人對景而感舊矣又加别久二字真為蛇足若作感舊别久語氣不成文四字疊仄音韻亦不和協且舊字明明用韻顯而易見前尾觸目句六字後尾一餉句亦六字端端正正兩結相同而人竟不察沿習訛謬可歎也然于舊字用韻而加兩字于下猶為不妨乃將感舊别久四字合成一串選聲連上作八字句時人因有作轉嘆離索者豈不截寉添鳬哉且因此句讀錯并將上觸目盡成四字岸然作一句而為無奈間愁矣異哉又按凡長調詞起結前後互異而中幅每每相同此詞恐有顛倒今以臆見附此蓋别久帝城當日是換頭起語其下當移入未省至花柳十四字而以蘭堂四句對前水嬉四句豈知八字對前是處八字前事難重偶對前往往携纖手空遺恨以下兩三字一六字對前遣離人以下三句句法字法相同豈不恰當蓋謂因别久而追思當日在帝城之時宴處即聽絃管醉裏必尋花柳從未有忘此二事者故上加未省二字未省者不解如此也下即以蘭堂四句實注彼時歡會之勝而下以豈知二字接之言不料如今若此寂寥也如此則意順調協矣嗟嗟安得起屯田于遮須國芙蓉城而證其説乎總之舊集中惟樂章最多差訛脫落難于稽核然後人亦宜將舊詞詳審妥確而後填之寧得躁率而自謂作家耶如此詞論改易前後處人或以古調傳久不便議改若别久二字則斷斷不可繫之于前尾舊字斷斷不可不叶韻任人間詈我狂妄哂我穿鑿而余必硜硜守是鄙説矣白苧一百二十一字蔣捷正春晴又春冷雲低欲落璚苞未剖早是東風作惡旋安排一雙銀蒜鎮羅幕幽壑水生漪皺嫩緑潛鱗初躍愔愔門巷桃樹紅才約略知甚時霽華烘破青青蕚憶昨引蝶花邊近來重見身學垂楊瘦削問小翠睂山為誰攢却斜陽院宇任朱絲罥遍玉筝絃索戶外唯聞放剪刀聲深在粧閣料想裁縫白苧春衫薄首句本集是正春晴而他刻多作春正晴觀柳詞則正春晴平仄為是而首用正字次用又字恰相喚應故知他刻之誤也又一體一百二十五字柳永繡簾垂畫堂悄寒風淅瀝遙天萬里黯淡同雲羃䍥漸紛紛六花零亂散空碧姑射宴瑤池把碎玉零珠拋擲林巒望中髙下瓊瑤一色嚴子陵釣臺歸路迷蹤迹追惜燕然畫角寶簥珊瑚是時丞相虛作銀城換得當此際偏宜訪袁安宅醺醺醉了任金叉舞困玉壺傾側又是東君暗遣花神先報南國昨夜江梅漏泄春消息蔣柳二詞相同只換頭二字句下柳比蔣多燕然畫角四字故另作一體愔愔門巷巷字柳作中字平聲稍異然此字用平拗恐是裏字偶按蔣用欲落作惡約略俱兩箇入聲字相連初謂然乃柳詞亦用淅瀝羃䍥一色六入聲因思此調或宜如此用字不然何其相符也然此論大微未知得免于穿鑿之誚否以譜誤不一備摘于此畫堂悄即蔣之又春冷也乃三字盡改平仄平蓋其意欲連下作七言詩也畫堂正與上繡簾相對有何不解遙天萬里即蔣之璚苞未剖也萬里未剖去上最妙乃以遙作仄萬作平漸紛紛即蔣之旋安排也三字盡改平仄仄林巒望中即蔣之愔愔門巷也此句惟中字不合乃以平平仄仄翻改作仄仄平平而中字偏不注可仄嚴子陵下十字宜于三字為豆下作七字句乃分兩五字嚴子陵釣臺即蔣之知甚時霽華也乃作仄仄仄平平當此際九字宜上五下四乃分上三下六偏宜即蔣之睂山也乃作仄仄金叉正對下玉壺以任字領下二句頂上言醉後光景蔣亦以任字頂下朱絲玉筝也乃金字訛作他字而以任字作平叉字作仄困玉二字作平傾字作仄蓋意欲將任他二字領句而下作七言詩句也并其餘平仄改注者共五十二字尤不便者散報二字即蔣之鎮在二字必用去聲今亦作平射字音亦正叶韻二字句蔣亦用幽壑今只作五字句失注叶韻如此注法何不别名此調為黃麻緑葛而仍曰白苧乎秋思耗一百二十三字又名畫屏秋色吳文英堆枕香鬟側驟夜聲偏稱畫屏秋色風碎串珠潤侵歌板愁壓睂窄動羅箑清商寸心低訴敘怨抑映夢窗零亂碧待漲緑春深落花香泛料有斷紅流處暗題相憶歡夕簷花細滴送故人粉黛重飾漏侵璚瑟丁東敲斷弄晴月白怕一曲霓裳未終催去驂鳯翼嘆謝客猶未識謾瘦却東陽燈前無夢到得路隔重雲雁北或云自潤侵至春深與後丁東至東陽相同動羅箑以下十二字于商字分豆怕一曲以下十二字于終字分豆然總之十二字一氣平仄不差分豆語句不拘也或謂客字亦是叶韻燈前無夢四字句與前落花香泛同到得二字句叶韻路隔亦二字句叶韻重雲雁北四字句叶韻俱用去入二聲正此調促拍淒緊之處此説甚新然不敢從姑採其説于此春風裊娜一百二十五字馮艾子被梁間雙燕話盡春愁朝粉謝午花柔倚紅欄故與蝶圍蜂繞柳綿無數飛上搔頭鳯管聲圓蠶房香暖笑挽羅衫須少留隔院蘭馨趂風逺鄰牆桃影伴煙收些子風情未減眉頭眼尾萬千事欲説還休薔薇露牡丹毬殷勤記省前度綢繆夢裏飛紅覺來無覓望中新緑别後空稠相思難偶嘆無情明月今年已是三度如鈎雲月自度曲當悉依其平仄翠羽吟一百二十五字蔣捷紺露濃映素空樓觀峭玲瓏粉凍霽英冷光搖蕩古青松半規黃昏淡月梅氣山影溟濛有麗人步依修竹瀟然態若遊龍綃袂微皺水溶溶仙莖清瀣淨洗斜紅勸我浮香桂酒環佩暗解聲飛芳靄中弄春弱柳垂絲慢按翠舞嬌童醉不知何處驚剪剪淒緊霜風夢醉尋痕訪蹤但留殘挂穹梅花未老翠羽雙吟一片曉峯此調只此一詞難以考定恐有訛字但留殘句必有脫落意謂殘月挂蒼穹也十二時一百三十字三疊柳永晚晴初淡煙籠月風透蟾光如洗覺翠帳涼生秋思漸入微寒天氣敗葉敲窗西風滿院睡不成還起更漏咽滴破憂心萬感並生都在離人愁耳天怎知當時一句做得十分縈繫夜永有時分明枕上覷著孜孜地燭暗時酒醒元來又是夢裏睡覺來披衣獨坐萬種無憀情意怎得伊來重諧雲雨再整餘香被祝告天發願從今永無拋棄此係三疊後兩段相同各譜于天怎知作三字睡覺來又作七字分明下作九字重諧下又作一四一五字真所謂隨意亂填何以作譜其按朱敦儒有小令四十六字者亦名十二時因查即是憶少年故不收列此調之前蘭陵王一百三十字史達祖漢江側月弄仙人珮色含情久搖曵楚衣天水空濛染嬌碧文漪簟影織涼骨時將粉飾誰曽見羅襪去時點點波間冷雲積相思舊飛鷁謾想像風裳追恨瑤席涉江幾度和愁摘記雪映雙腕刺縈絲縷分開緑蓋素袂溼放新句吹入寂寂意猶惜念淨社因緣天許相覓飄蕭羽扇搖團白屢側臥尋夢倚欄無力風標公子欲下處似認得平仄如此無字可移如以為不便而欲出已意改之則奉勸不須作此調可也欲作此調則未有出此範圍者譜于弄珮楚染粉去冷舊恨映素放許等字俱作可平至以染嬌冷雲映雙放新許相俱作平仄全與蘭陵王風馬矣至以屢側臥分作三字句尋夢連下讀而末句作七字蓋其所收蘆川詞末句本云相思除是向醉裏暫忘却譜乃改相思前事除夢魂裏暫忘却不惟作七字而一句之中有三謬焉除字是上靣移下來一也魂字是添出二也忘字讀作平聲三也意欲湊成末句七字移了上文下來故相思下補前事二字耳不知此調尾句六字俱是仄聲自有蘭陵王以來即便六仄字無一平者而譜何冒昧若此耶汲古刻片玉亦作似夢魂裏泪暗滴何其所見略同豈夢字之下必應聨魂字耶稼軒只合化夢裏蝶詞統亦以裏字訛中字是則凡遇夢字即做夢矣一笑劉須溪于後兩段俱用春去二字起句查第二段相思字他家無用仄叶者可不必從且劉詞用字多出入總不足法也涼骨是叶韻二字句觀蘆川捲珠箔一首云吹落梢頭嫩蕚可見或初見余此注訝然指為穿鑿余檢美成柳隂直詞示之曰誰識京華倦客而千里和周者亦曰曽識傾城幼客詞綜載彭履道詞云飛去黃鸝自語雖他家或有不叶者不可謂此非叶也破陳樂一百三十二字柳永露花倒影煙蕪蘸碧靈沼波暖金柳搖風木木繫彩舫龍船遙岸千步虹橋參差雁齒直趨水殿繞金堤曼衍魚龍戲簇嬌春羅綺喧天絲管霽色榮光望中似覩蓬萊清淺時光鳯輦宸遊鸞觴褉飲臨翠水開鎬宴兩兩輕舠飛畫楫競奪錦標霞爛聲歡娛歌魚藻徘徊宛轉别有盈盈遊女各明珠爭收翠羽相將歸去漸覺雲海沉沉洞天日晚此調無考證處轉木木二字無理金柳至水殿似對後段兩兩至宛但聲歡娛歌魚藻六字比千步二句少二字必係差落蓋聲歡娛不成語也各明珠句各字下落採字但别有以下直至尾才叶韻亦必有訛脫不可考也瑞龍吟一百三十三字三疊張翥鰲溪路瀟灑翠壁丹崖古藤髙樹林間猿鳥欣然故人隱在溪山勝處久延佇渾似種桃源裏白雲窗戶燈前素瑟清樽開懷正好連牀夜語應是山靈留客雪飛風起長松掀舞誰道倦途相逢傾蓋如故陽春一曲總是關心句何妨共磯頭把釣梅邊徐步只恐匆匆去故園夢裏長牽别緒寂寞間針縷還念我飄零江湖煙雨斷腸嵗晚客衣誰絮此調以清真章臺路一曲為鼻祖向讀千里和詞愛其用字相符今此蛻巖詞亦和周韻者平仄亦復字字俱合信知樂府之調板如鐵古賢之心細如髮也花庵云前兩段屬正平調謂之雙拽頭後屬大石尾十七字再歸正平故近刻周詞皆分三段愚謂既以尾為再歸正平則該分四疊而清真及此詞應在縷字再分一段矣若夢窗甲稿二首猶刻作兩段誤也夢窗丁稿一首于誰道二句落兩字其下亦多訛錯而三首俱以第一字作去聲若較第二段首字或可不拘然作者當依周為妥也佇字吳用梯字平叶恐誤連牀句五字亦誤周處靜一首亦與此字字皆同但于途字用幕字飄零用曲曲二字此雖借入為平然此調以周詞作準繩用入終屬第二著人不可以其仄聲而亂填上去也圖譜于此詞只長松句失注叶韻其平仄全不議改妙甚妙甚大酺一百三十三字方千里正夕陽間秋光淡鴛瓦參差華屋髙低簾幕逈但風搖環珮細聲頻觸瘦怯單衣涼生兩袖零亂庭梧窗竹相思誰能會是歸程客夢路諳心熟况時節黃昏間門人靜憑欄身獨歡情何太速嵗華似飛馬馳輕轂謾自歎河陽青鬢苒苒如霜把菱花悵然凝目老去疏狂減思墮䇿小坊幽曲趂遊樂繁華國回首無緒清泪紛於紅菽話愁更堪剪燭方和周詞平仄如一此旁注者依劉須溪任瑣窗寒一首載之因字同不另列隨作者取法而填之但或學周方則依周方或學劉則依劉不可相混也譜注斷不可從笫一字喚起用去聲領句妙甚豈可作平乎趂遊樂句周云况蕭索青蕪國國字乃借叶即如借北字同詞人亦有不拘者故千里和之詞統云國字不通一作園又失韻此論甚謬園字可笑豈不失韻便可作青蕪園乎青蕪國頗有意味但可謂借韻不可謂不通也間字必是閉字之訛周用夢字去聲方必不作平也歌頭一百三十六字唐莊宗賞芳春暖風飄箔鶯啼緑樹輕煙籠晚閣杏桃紅開繁蕚靈和殿禁柳千行斜金絲絡夏雲多奇峯如削紈扇動微涼輕綃薄梅雨霽火雲爍臨水檻永日逃繁暑泛觥酌露華濃冷髙梧雕萬葉一霎晚風蟬聲新雨歇惜惜此光隂如流水東籬菊殘時嘆蕭索繁隂積嵗時莫景難留不覺朱顔失却好容光且且須呼賓友西園長宵宴雲謠歌皓齒且行樂後半叶韻甚少必有訛處不敢擅注句豆即前半亦未必確然原注大石調姑存其體為餼羊而已多麗一百三十九字又名緑頭鴨張翥晚山青一川雲樹冥冥正參差煙凝紫翠斜陽畫出南屏館娃歸吳臺遊鹿銅仙去漢苑飛螢懷古情多憑髙望極且將尊酒慰漂零自湖上愛梅仙逺鶴夢幾時醒空留得六橋疏柳孤嶼危亭待蘇堤歌聲散盡更須携妓西冷藕花深雨涼翡翠菰蒲軟風弄蜻蜓澄碧生秋閙紅駐景採菱新唱最堪聽見一片水天無際漁火兩三星多情月為人留照未過前汀詞品以此詞為石孝友作今查金谷遺音不載而張仲舉蛻巖樂府自注云西湖泛舟席上以晚山青為起句各賦一詞且玩其字句非蛻巖無此手筆其為張詞無疑此調作者雖多求其諧協婉麗無踰此篇者或起句他家多不用韻惟盧炳李漳有之他家平仄有不齊者今注明然如本詞可謂精當之至學者所當摹仿也一片上汲古缺見字今補正侯置于疏柳二字作是誰留照二字作化爐平仄異或不拘然他家無之若詹玉于空留得作夜沉沉更須句作却孤劔水雲鄉火字作封俱不可從詞統載鳯凰簫一首云是柳詞于歸字深字用仄樂章不載必非柳作也聲字次山作里字天遊作絮字想不拘天遊于採菱句云隔墻又唱謝秋娘沈氏選詞落一謝字遂注題下云後段少一字不知自巳誤脫而謂另有此體謬哉又一體一百三十九字朝補之新秋近晉公别館開筵喜清時銜杯樂聖未饒緑野堂邊繡屏深麗人乍出坐中雷雨起鵾絃花暖間關冰凝幽咽寶叉搖動墜金鈿未彈了昭君遺怨四坐已淒然西風裏香街駐馬嬉笑微傳算從來司空見慣斷腸初對雲鬟夜將闌井梧下葉砌蛩收響悄林蟬賴得多愁潯陽司馬當時不在綺筵前競嘆賞檀槽倚困沉醉倒觥船芳春調紅英翠蕚重變新妍起三字用仄與前調不同坐中句砌蛩句雖亦七字而用上四下三與七言詩句同比前調兩句相對者異是另一體也又一體一百四十字聶冠卿想人生美景良辰堪惜向其間賞心樂事古來難是并得况東城鳯臺沁苑泛清波淺照金碧露洗華桐煙霏絲柳緑隂搖曵蕩春一色畫堂迥玉簪瓊佩髙會盡詞客清歌久重然絳蠟别就瑤席有翩若驚鴻體態暮為行雨標格逞朱唇緩歌妖麗似聽流鶯亂花隔慢舞縈回嬌鬟低軃腰肢纖細困無力忍分散彩雲歸後何處更尋覓休辭醉明月好花莫慢輕擲用仄韻與前異此詞相傳如此豈敢他議然竊有疑者凡詞之平仄可兩用者其調本同但叶字用仄耳如聲聲慢絳都春之類甚多可證即今南曲中畫眉序髙陽臺等曲亦然雖韻不同而中間字句則合即此理也此篇與前平韻詞自是一樣蓋想人生三字為領美景句為接是起韻語向其間下十三字與況東城句亦皆同泛清句向讀作上三下四今疑是七言詩句法蓋用朝詞體故後段似聽流鶯句亦七言詩句四不然無前後兩般之理但似聽句該仄平平仄仄平平而此乃相反因思聽字必讀平聲而流鶯乃鶯語之誤耳露洗二句每句四字緑隂句該七字愚謂一字乃誤多者且蕩春一色亦難解其為七字句無疑原調平聲者一百三十九字此仄聲者今作一百四十字恰是誤多此一字也自來選家譜家從未留心體察耳畫堂迥下字句皆相同明月好花必是好花明月此句對前重然絳蠟也如此相對豈非此篇只換得韻腳其餘皆相符乎可嘯餘不收前平聲調惟收此詞又欲改六十六字怪圖譜亦依之乃後添又一體注云前段八句九句并作七字蓋指緑隂搖曵句也又云十句十一句亦并作七字蓋指畫堂迥句此句原七字不知何以謂之并作七字其詞又不載真無從摸索也又云用平韻餘俱同前既云用平則安得餘俱同前乎玉女搖仙佩一百三十九字柳永飛瓊伴侣偶别珠宫未返神仙行綴取次梳粧尋常言語有得幾多姝麗擬把名花比恐傍人笑我談何容易細思算奇葩艷卉惟是深紅淺白而已爭如這多情占得人間千嬌百媚須信畫堂繡閣皓月清風忍把光隂輕棄自古及今佳人才子少得當年雙美且恁相偎倚未消得憐我多才多藝願奶奶蘭心蕙性枕前言下表余深意為盟誓從今斷不負鴛被偶别至而巳與後皓月至深意同但枕前言下四字平仄與惟是深紅不同此調圖譜不收嘯餘于表余深意句不知是叶韻竟連下為盟誓作七字句豈如此著譜而能禁人之指摘乎哉六醜一百四十字方千里看流鶯度柳似急響金梭飛擲護巢占泥翩翩飛燕翼昨夢前迹暗數歡娛處艷花幽草縱冶遊南國芳心蕩漾如波澤繫馬青門停車紫陌年華轉頭堪惜奈離襟别袂容易疏隔人間春寂謾雲容暮碧逺水沉雙鯉無信息天涯漸老羇客嘆良宵漏斷獨眠愁極吳霜皎半侵華幘誰復省十載勻香暈粉髻傾鬟側相思意不離潮汐想舊家接酒巡歌計今再難得與清真詞平仄無異篇中諸去聲字俱妙而占易離尤喫緊夢窗漸新鵝映柳一首亦皆相合只春字作翠字去聲家字作永字上聲耳汲古刻于春寂分段非今查夢窗詞于隔字分則當如右所録也譜中字字亂注而于縱冶遊南國云可平平平仄仄芳心蕩漾如波澤云可仄仄平平平仄仄尤為怪異不知何所見而云然也且此調楊升庵以其名不雅改曰箇儂已為無謂圖譜乃于六醜之外又收箇儂一詞兩篇相接何竟未一點勘耶且楊本和周韻而兩詞分句大異可怪之甚是則升庵和詞而誤其誤者十之三圖譜創立新調而誤其誤者十之七矣今據圖譜所書備列于後以見愚非敢謗先賢與時賢爾恨箇儂無賴箇儂嬌賣眼春心偷擲楊慎苔花蒼落樹一雙先印下月樣春迹羅襦聞氣不知名仙御香水邊韓國襟解聞香澤似雌蝶雄蜂宋玉鄰墻東城南陌巫山寧隔何人輕憐痛惜尋尋覓覓又窺暮雲凝碧留客愛良夜千金長袖風流繁華一息鍾情何極楚宫盼睞唱道是鳯幃深處附素足春夕顫裊周旋惡别憐伊儘傾側何呌檀郎莫枉恐佳期後青天樣由再得和周韻而合于周者擲迹國澤陌惜隔碧息右詞本客極側得十三韻其失和而自用韻者寂字以覓字代叶汐字以夕字代叶其忘為韻腳而失和者翼字幘字二韻其句法誤者逺水句上五下三楊因周作靜繞珍叢底成嘆息誤讀底成相連因為四字兩句矣艷花二句周云夜來風雨葬楚宫傾國楊誤讀葬字屬上句因作上五下四矣十載句周云一朵叉頭顫裊向人欹側本上六下四楊誤讀一朵叉頭為四字句因作顫裊周旋矣其他平仄誤處則箇無蒼聞石名樹香輕痛暮凝楚袖風流鍾唱道附憐伊儘呌郎舊等字俱平仄相反而窺宋玉句全差矣然夢字楊用樣字離字楊用枉字猶知用仄也至圖譜之注則并此一槩改抹且以翩翩句作九字吳霜皎句作十字更異者楊作顫裊周旋二句不過誤作上四下六而圖譜乃注作五字兩句以顫裊周旋惡分斷又楊本蒼苔落花圖譜改為花落豈非誤而又誤乎哉玉抱肚一百四十字楊旡咎同行同坐同携同臥正朝朝暮暮同歡怎知終有拋軃記江臯惜别那堪被流水無情送輕舸有愁萬種恨未説破知重見甚時可見他渾間堪嗟處山遙水逺音書也無箇這眉頭強展依前鎖這泪珠強收依前墮我平生不識相思為伊煩惱忒大你還知麼你知後我也甘心受摧挫又只恐你背盟誓似風過共别人忘著我把洋瀾左都捲盡與殺不得這心頭火此詞姑照本集録之分段恐不確惜無可引證也句按那堪被十字是對你知後十字因思正朝朝二可對我平生二句但你還知麼比記江臯句少一字是則這眉頭二句乃是換頭配首起坐卧二韻而見也至無箇尚屬前段耳不然前短後長矣六州歌頭一百四十一字程珌向來抵掌未必總談空難遍舉質三事試從公記當年賦得一丘一壑天鳶濶淵魚靜莫擊磬但酌酒儘從容一水西來他日會從公曵杖其中問前回歸去笑白髮成蓬不識如今幾西風蒙莊多事論虱豕推羊蟻未辭終又驟記魚得計孰能通嘆如雲罔罟龍伯啖眇難窮凡三惑誰使我釋然融豈是匏瓜繫者把行藏悉付鴻濛且從頭檢校想見國迎公湖上千松會從公公字或謂亦是叶玩此調及語氣應是偶合者况前後有公字叶豈復三韻乎此體惟程此篇恐有誤姑列于此作者自從辛張等調可耳又一體一百四十二字韓元吉東風著意先上小桃枝紅粉膩嬌如醉倚朱扉記年時隱映新妝面臨水岸春將半雲日暖斜陽轉夾城西草軟沙平驟馬垂楊渡玉勒爭嘶認蛾眉凝笑臉薄拂胭脂繡戶曽窺恨依依昔携手處香如霧紅隨步怨春遲消瘦損憑誰問只花知泪空垂舊日堂前燕和煙雨又雙飛人自老春長好夢佳期前度劉郎幾許風流地也應悲但茫茫暮靄目斷武陵溪往事難追按此調較辛張等詞惟也應悲句少一字認蛾眉下十字他家作兩五字句餘同但其所用三字句皆逐段自相為叶凡換五韻此則他家俱無此體獨此首為然然余亦細玩而得之人多未察也前度句他家俱作六字風流以下作七字與此亦異又一體一百四十三字張孝祥長淮望斷關塞莽然平征塵暗霜風徑悄邊聲黯銷凝追想當年事殆天數非人力洙泗上絃歌地亦羶腥隔水氊鄉落日牛羊下區脫縱橫看名王宵獵騎火一川明笳鼓悲鳴遣人驚念腰間箭匣中劒空埃蠧竟何成時易失心徒壯嵗將零渺神京干羽方懷逺靜烽燧且休兵冠蓋使紛馳騖若為情聞道中原遺老常南望翠葆霓旌使行人到此忠憤氣填膺有泪如傾此則稼軒後村龍洲諸家俱用此體旁注照各家作龍洲又一篇首段起句云鎮長淮一都會古楊州升平日朱簾十里春風小紅樓後段云悵望金陵宅丹陽郡山不斷綢繆與此篇又異兹注明不另録又按此調或于亦羶腥處分為首段且休兵處分為次段共成三疊未知孰是譜不知何故將征塵暗六字殆天數六字洙泗上六字看名王十字匣中劔六字時易失九字冠蓋使九字皆各合為一句然此猶不大害也復將悄邊聲二句合而為一則失去聲字一韻笳鼓二句合而為一則失去鳴字一韻渺神京至懷逺合而為一則失去京字一韻一調而使人失叶三韻尚得為譜乎作圖者尚從之而弗敢變填詞者亦從之而弗敢易真所不解矣然圖譜不議改字甚善念字領句腰間相連勿誤夜半樂一百四十四字三疊柳永凍雲黯淡天氣扁舟一葉乘興離江渚渡萬壑千巖越溪深處怒濤漸息樵風乍起更聞商旅相呼片帆髙舉泛畫鷁翩翩過南浦望中酒斾閃閃一簇煙村數行霜樹殘日下漁人鳴榔歸去敗荷零落衰楊掩映岸邊兩兩三三浣紗遊女避行客含羞笑相語到此因念繡閣輕拋浪萍難駐歎後約丁寧竟何據慘離懷空恨嵗晚歸期阻凝泪眼杳杳神京路斷鴻聲逺長天暮此調三疊首段渡萬壑以下與中段殘日以下同雖渡萬壑二句上五下四殘日句應三字豆然語氣一貫不拘也中段起亦六字圖于斾字分句誤閃閃而動正言酒斾不可指煙村中段尾笑相語正對首段尾過南浦同仄平仄而各刻俱作相笑語誤甚不特失調而笑相語比相笑語用字遒俊豈淺人所知後段杳杳神京路是叶韻後詞亦用暮字圖以斷字連上而下鴻聲逺長天暮作三字兩句誤又一體一百四十六字柳永艷陽天氣煙細風暖芳草郊燈明間凝佇漸籹點亭臺參差佳樹舞腰困力垂楊緑映淺桃穠李夭夭嫩紅光數度綺燕流鶯鬬雙語翠蛾南陌簇簇躡影紅隂緩移嬌步擡粉面韶容花光相妒絳綃袖舉雲鬟風顫半遮檀口含羞背人偷顧競鬭草金斂笑爭睹對此嘉景頓覺銷凝惹成愁緒念解珮輕盈在何處忍良時辜負少年等間度空望極回首斜陽暮嘆浪萍風梗如何去比前多二字其大略相同然恐有訛字而芳草下數字尤差斂字亦差應是叉字之訛光數應是無數之訛首節應在鬬雙語分段次節應于笑爭睹分段兹姑照原本録之寶鼎現一百五十五字三疊康與之夕陽西下暮靄紅隘香風羅綺乘麗景華燈爭放濃熖燒空連錦砌覩皓月浸嚴城如畫花影寒籠絳蕊漸掩映芙蕖萬頃迤邐齊開秋水太守無限行歌意擁麾幢光動珠翠傾萬井歌臺舞榭瞻望朱輪軿鼓吹控寶馬耀貔貅千騎銀燭交光數里似亂簇寒星萬點擁入蓬壺影裏宴閣多才環艷粉瑤簪珠履恐看看丹詔催奉宸遊燕侍便趂早占通宵醉緩引笙歌妓任畫角吹老寒梅月滿西樓十二首段乘麗景下與次段傾萬井下同此調作者各有參差向疑此篇有誤蓋宴閣多才比他家少二字恐看看句亦有誤但思伯可名擅一時此篇尤為膾炙當時元夕必歌此曲故竹山女冠子云緑鬟鄰女綺窗猶唱夕陽西下則此篇傳世最盛不應有訛落也及查惜香樂府則字數適與此同宴閣句亦四字恐看看二句亦一五一六始信此詞自有此體只惜香于芙蕖萬頃作巷陌連甍吹老寒梅作恁時恁節平仄稍異耳因考此調結處如漸掩映下十三字三段皆同有作上七下六者有作一五兩四者可以不拘也靄隘二字俱仄各家多同惜香于隘字作平恐誤譜并紅字俱作可仄則萬無此理太守二字注作可平以及通篇俱亂注無謂之甚必不可從也騎字偶合不必叶按石孝友雪梅清瘦一首汲古刻以次段尾句為三段首句誤而第三段多錯字竟不可讀且止存一百五十一字故不敢録又一體一百五十八字劉辰翁紅粧春騎踏月呼影千旗穿市望不見璚樓歌舞習習香塵蓮步底簫聲斷約綵鸞歸去未怕金吾呵醉甚輦路喧闐且止聽得念奴歌起父老猶記宣和事抱銅仙清泪如水還轉盼沙河多麗滉漾明光連邸第簾影動散紅光成綺月浸蒲桃十里看往來神仙才子肻把菱花撲碎腸斷竹馬兒童空見説三千樂指等多時春不歸來到春時欲睡又説向燈前擁髻暗滴鮫珠墜便當日親見霓裳天上人間夢裏與前詞大槩相同只笫三段六字起等多時二句上七下五與前詞恐看看二句上五下六者異三結與前同騎字止字麗字綺字子字偶合可不叶文按程珌録楊欲舞一首亦一百五十八字雖多闕而字皆相合只未怕句作問元功誰燮理月浸句作恬然如談笑耳等多時二句則依康詞為稍異也又一體一百五十八字張元幹山莊圖畫錦囊吟咏胸中丘壑年少日如虹豪氣吐鳯詞華渾忘却便袖手向巖前溪畔種滿煙梢霧籜想别墅平泉當時草木風流如昨瘦藤間倚看鉏藥雙芒鞋雨後常著目送處飛鴻滅沒誰問蓬蒿爭燕雀乍霽月望松雲南渡短艇欹沙夜泊正萬里青冥千林虛籟從渠矰繳携幼尚有筠丁誰會得人生行樂岸幘綸巾歸去深戶香迷翠幕恐未免上凌煙閣好在秋天鶚念小山叢桂今宵狂客不勝杯勺三結俱用一五兩四者岸幘二句俱六字又與前二體不同囊藤各家俱仄此恐誤穆護砂一百六十九字宋􅀢底事蘭心苦便淒然泣下如雨倚金臺獨立搵香無主斷腸封家如妒亂撲簌驪珠愁有許向午夜銅盤傾注便不是紅冰綴頰也溼透仙人煙樹羅綺筵中海棠花下淫淫常怕鳯脂枯比雒陽年少江州司馬多少定誰似照破别離心緒學人生有情酸楚想洞房佳會而今寥落誰能暗收玉筯算只有金叉曽巧補輕拭了粉痕如故愁思減舞腰纖細清血盡媚臉膚腴又恐嬌羞絳紗籠却緑窗伴我撿詩書更休教鄰壁偷窺幽蘭啼曉露倚金臺至脂枯與後想洞房至詩書同此調以枯腴書為叶是平仄通用者似字係借韻稍遍二百三字稍一作哨蘇軾為米折腰因酒棄家口體交相纍折棄二字須仄聲纍字起韻各家俱同以後韻腳平仄通叶不拘歸去來亦有叶者然可以不必誰不遣君歸坡公春詞云洗出碧蘿天不叶韻細考坡春詞一篇與本調多不合處不必從也稼軒此句云翠藻青萍裏用上聲叶但不可去覺從前皆非今是各家同露未晞稼軒方秋崖用上聲叶王初寮不叶征夫指豫歸路有叶者然不必稼軒莊周談兩事句乃談字上落一嘗字或曽字耳門前笑語喧童稚各家同坡春詞以上三句云一霎晴風逈芳草榮光浮動卷皺銀塘水與本調不合不必從嗟舊菊都荒新松暗老各家同吾年今已如此初寮後村同稼軒云之二蟲又何知用平叶秋崖同稼又云又説於羊棄意坡又云園林翠紅排比與此稍異但小窗容膝閉柴扉各家同秋崖云凡三千五百草年餘草字本音溼詞滙刻作二十年餘多一字便雖讀而失調矣窗字坡又作燕不如用平䇿杖看孤雲暮鴻飛各家同稼軒末三字云為得計用仄叶為得二字不合此雖不拘依坡為妥雲出無心鳥倦知還各家同稼于鳥倦句又云冰蠶語熱平仄異方亦然或可不拘也本非有意各家同稼軒非作我上聲噫一字句譜俱連下讀誤各家如稼軒三首兩用噫字一用嘻字後村秋崖亦用噫字初寮用嗟字是知此一字為起語而坡春詞便乘興携將佳麗深入芳菲裏不但無此一字其下句亦非一四一七者故云與本調不合也至稼軒池上主人一首本用噫字下云子固非魚而圖譜偏改作子固非魚噫注為五字句毋論失韻失調試問子固非魚噫文理如何解得去稼軒于千載下冒此不通之名亦寃矣或曰凡詞調從無一字句者子安得創為此説余曰十六字令已用一字為首句况詞為曲祖北曲之上馬嬌九條龍貨郎兒山坡羊閲金經等一字句甚多噫字正用論語噫斗筲之人句而梁伯鸞五噫歌亦用于詩中詩曲可用一字豈詞獨不可用乎蘇辛劉方等皆用支微齊韻故皆以噫字領句若用他韻即以此本韻一字叶之但須通得去耳歸去來兮或有不叶者不拘我今忘我兼忘世初寮同辛劉方俱用平叶親戚無浪語辛劉同初寮秋崖浪作平琴書中有真味初寮同方辛用平叶中有二字可分豆亦可相連坡春詞此二句作上四下六與本調不合步翠麓﨑嶇泛溪窈窕泛字恐是清字各家同涓涓暗谷如流水各家同稼軒云過而留泣計應非用平叶觀草木欣榮幽人自感各家同坡春詞及後村于上句少觀字乃誤落也方于上句榮字亦叶韻可以不必吾生行且休矣各家同後村云采于山釣于水上三字分豆念寓形宇內復幾時不自覺皇皇欲何之此二句即同前但小窗二句蓋自涓涓至此六句與前段門前至鴻飛同也初寮後村及坡春詞俱與此合辛云看一時魚鳥忘情喜會我已忘機更忘已用仄叶方亦然坡春詞任滿頭紅雨落花飛各刻俱于飛字下增一墜字人遂謂九字句誤也劉云大丈夫不遇之所為刻亦于遇字下誤多一時字委吾心去留難計各家同辛云似鵾鵬變化囗幾幾是叶韻各刻俱于幾字上落一字譜因注似鵾鵬變化為五字句而以幾字連下作幾東遊入海亦注為五字句而下更注為七字句矣可嘆可嘆神仙知在何處各家同坡春詞云君看今古悠悠與本調不合富貴非吾願此句各家俱叶舊刻作非吾願願字乃誤也蓋此詞乃櫽括歸去來辭故因成語差刻愚謂必志字或事字之訛人未細考故相傳城誦耳各家俱仄叶獨辛一首于此二句云東遊入海此計直以命為嬉嬉字平叶但此計二字恐有誤處圖譜因東遊四字連上幾字故以此計字連下作七字句尤無此體例也嬉字恐是戲字之誤但知臨水登山嘯詠自引壺觴自醉此十四字一氣讀如此詞應作上八下六而臨水登山又應相連方云幾時明潔幾時昏暗畢竟少晴多雨則明是兩四一六坡春詞亦然辛一首亦同而又一首云大方達觀之家未免長見悠然笑耳觀音貫此則句法不同若王劉則一六兩四故知平仄不異分豆可不拘耳辛又一首云古來謬算狂圖五鼎烹死囗為平地各刻為字上一字或作柏或作恆此必有誤譜不置辨而又不注斷止于第二體題下注云十五句作七字十六句六字十七八句四字竟如夢囈雖智者亦不能明其故也此生天命更何疑且乘流遇坎還止各家同此調長而多訛故逐句注釋以便省覽戚氏二百十二字三疊柳永晚秋天一霎微雨灑庭軒檻菊瀟疏井梧零亂惹殘煙淒然望江關飛雲黯淡夕陽間當時宋玉悲感向此臨水與登山逺道迢遞行人淒楚倦聽隴水潺湲正蟬鳴敗葉蛩響衰草相應聲喧孤館度日如年風露漸變悄悄至更闌長天靜絳河清淺皓月嬋娟思綿綿夜永對景那堪屈指暗想從前未名未祿綺陌紅樓往往經嵗遷延帝里風光好當年少日暮宴朝歡况有狂朋怪侣遇當歌對酒競留連别來迅景如梭舊遊似夢煙水程何限念利名憔悴長縈絆追往事空慘愁顔漏箭移稍覺輕寒聽嗚咽畫角數聲殘對間窗畔停燈向曉抱影無眠圖譜于然字不注叶失一韻矣逺道迢遞譜云可平平平平蛩響衰草譜云可仄平仄仄風露漸變譜云可仄平平仄誤觀後坡詞可知又一體二百十三字蘇軾玉龜山東皇靈嫓統羣仙絳闕岧嶤翠房深迥倚霏煙幽間志蕭然金城千里鎖嬋娟當時穆滿巡狩翠華曽到海西邊風露明霽鯨波極目勢浮輿蓋方圓正迢迢麗日玄圃清寂瓊草芊綿爭解繡勒香韉鸞輅駐蹕八馬戲芝田瑤池近畫樓隱隱翠鳥翩翩肆華筵囗間作管鳴絃宛若帝所釣天稚頭皓齒緑髮方瞳圓極恬淡髙妍盡倒瓊壺酒獻金鼎藥固大椿年縹眇飛瓊妙舞命雙成奏曲醉留連雲璈韻響瀉寒泉浩歌暢飲斜月低河漢漸綺霞天際紅深淺動歸思回盼塵寰爛熳遊玉輦東還杏花風數里響鳴鞭望長安路依稀柳色翠點春妍刻本漸字下誤重一字盼字誤兮字今改正餘雲璈句七字叶韻與前調别來句六字不叶異其俱同人每謂坡公詞不協律試觀如此長篇字字不苟何常不協乎故備録之且李方叔云此是因妓歌此調詞不佳公適讀山海經乃令妓復歌隨字填去歌完詞就然則坡仙豈非天人而奈何輕以失律譏之歟囗間作管鳴絃作管二字必誤此句對前詞夜永句應改間作囗管鳴絃為是鶯啼序二百四十字四疊吳文英殘寒正欺病酒掩沉香繡戶燕來晚飛入西城似説春事遲暮畫船載清明過却晴煙冉冉吳宫樹念羇情遊蕩隨風化為輕絮十載西湖傍柳繫馬趂嬌塵軟霧遡紅漸招入仙溪錦兒偷寄幽素倚銀屏春寬夢窄斷紅溼歌紈金縷暝堤空輕把斜陽總還鷗鷺幽蘭旋老杜若還生水鄉尚寄旅别後訪六橋無信事往花萎瘞玉埋香幾番風雨長波妒盼遙山羞黛漁燈分影春江宿記當時短楫桃根渡青樓倣佛臨分敗璧題詩泪墨慘淡塵土危亭望極草色天涯嘆鬢侵半苧暗點檢離痕歡唾尚染鮫綃嚲鳯迷歸破鸞慵舞殷勤待寫書中長恨藍霞遼海沈過雁謾相思彈入哀筝柱傷心千里江南怨曲重招斷魂在否詞調最長者惟此序而最難訂者亦惟此序蓋因作者甚少惟夢窗數闋與詞林萬選所收黃在軒一首耳其中句法字法多有不一今細細校定大約從其合者可也起句六字合矣次句五字句法上一下四吳之引鴛鴦戲水凝春空燦綺凝去聲黃之卧長龍一帶合也次七次六亦合但説字吳他作用紗字碧字説碧入作平而黃用市字仄然照後段兒字應作平聲耳次七字人多因橫塘棹穿艷錦一曲云潤玉瘦冰輕倦浴疑是七言詩一句于冰字讀斷作上四下三句法而黃作芳草岸灣環半玉似亦可兩借不知此作畫船載又别作綵翼曵扶搖宛轉則顯然上三下四是本無不合而人誤讀也次七字俱合次念羇情至輕絮十一字可作上五下六讀亦可作一三兩四讀觀吳他作聽銀水聲細梧桐漸攪涼思吳作看碧天連水翻成箭樣風快則當為上五下六而觀第二段之結及吳他作怕因循羅扇恩疏又生秋意黃作黛眉修依約霧鬟在秋波外則是一三兩四者夢窗天吳駕雲閬海一篇首段云近玉虛髙處天風笑語飛墜次段云步新梯藐視年華頓非塵世或者因謂前必上五下六次必一三兩四乃是定格余曰非也總之此十一字意義相貫但平仄聲響不誤便是難訂難從處不在此也第二段起句四字次句四字次句五字乃一定之體蓋起二句為換頭而五字句仍與前段合也人因橫塘曲內次句用冉冉迅羽乃上上去上四仄字故讀作窗隙流光冉冉一句迅羽訴空梁燕子一句不知四仄乃此調定格此詞傍柳繫馬四字亦然不可截傍柳連上作西湖傍柳亦不可截繫馬連下作繫馬趂嬌塵也况吳他作清濁緇塵快展曠眼傍危欄醉倚黃作白露橫江一葦萬頃問靈槎何在快展句一葦句皆四仄尤為明證考此則不惟句法該兩四一五而四仄字萬無夾一平聲如時人所作薄鉛不御之理矣所用趂字傍字問字領起五字句正與首段掩沉香句法同次七次六與前合但遡紅漸黃作平仄仄幽字吳他作金字平聲不字亦作平聲黃作沆字去聲然照前段遲字應作平耳遡紅漸七字本上三下四黃作空翠溼衣不勝寒人多讀空翠溼衣此誤認也但觀前段燕來晚句上三下四原無不合次七字上三下四四詞皆合但夢字黃作襯吳他作雨俱仄聲且前段此句吳用過倦宛三字黃用半字則此字宜仄乃詞統詞滙於吳橫塘曲刻云記琅玕新詩陳迹搯香痕纖蔥玉指陳字乃是平聲可疑及查吳本稿則記琅玕新詩細搯早陳迹香痕纖指是細字本是仄聲而各書誤刻耳因一字之差遂致參差不合甚矣書之不可不細校也次又七字句此句最為可疑論前段晴煙冉冉句則上四下三該如七言詩一句四詞皆合而此句獨黃作瓊田湧出神仙界與前段合若此首斷紅溼歌紈金縷與他作早陳迹香痕纖指又燕泥動紅香流水則用上三下四矣此則依吳依黃可以不拘也次十一字與前合不必再論只斜字吳他作恩字年字平聲與前段合而黃作霧字去聲此則當依吳為是還字與前為字皆平聲而吳他作二首與黃作皆前結用仄次結用平想皆可不拘其難訂難從處猶不在此也第三段起處兩四一五四詞皆同只水鄉句句法稍異若作尚水鄉寄旅則與前段合觀他作嘆幾縈夢寐可見黃作飛蓋蹴鰲背亦不合不必從也乃詞統詞滙于橫塘曲第三段誤刻云西湖舊日畫舸頻移不定嘆幾縈夢寐霞佩冷飛雨乍溼鮫綃暗盛紅泪比前段于頻移下多不定二字于霞佩冷下少五字讀之再三不解及查本稿則頻移下原無不定二字而霞佩冷下乃疊瀾不定麝靄飛雨乍溼鮫綃暗盛紅泪與前段原合其他作翁笑起離席而語敢詫京兆以後為功落成奇事字字相同奈為後人訛亂耳黃作萬選刻云燈火暮相輪倒景隃睇别浦片片歸帆共十五字以燈火暮三字抵别後訪則其下少四字且失一叶韻句其誤不必言矣事往花萎萎字平聲亦可作仄讀麝靄飛雨敢託京兆等皆仄仄平仄至後之尚染鮫綃則各篇俱用仄仄平平想不拘然用平為有調也次兩四字相對下以七字句承之四詞皆合只黃作于漁燈句汲古刻云有人剪取江水此乃江字上落一字或吳字或淞字耳次八字上三下五四詞皆合次四字次六字又次六字皆合只臨分之分字吳他作用頭字街字而黃用見字去聲不必從也第四段兩四一五與前合四詞皆同只嘆鬢侵句橫塘曲云也感紅怨翠翠字仄聲與此相合而黃作寄語休見猜吳他作正午長漏遲猜遲二字想可以平叶仄但寄語二字亦如飛蓋二字句法不如上一下四也暗點檢以下至慵舞與前段合黃作于首三字句止有洗却二字乃脫去一字吳他作詞滙于省慣二字上乃脫一念字也次殷勤至過雁十五字與前段俱合四詞亦皆同過字宜仄聲讀吳他作浪字褉字黃作我字俱仄聲不可平也次謾相思下二十二字四詞俱合但汲古刻吳他作御爐香分染朝衣袂脫染字耳據此結該六字與兩四字或因謂前結亦應以六字領句青樓倣佛臨分可以讀斷不知黃與吳他作不可讀斷詞于結處另異乃是常格第四段尾只還他一六兩四可耳總之作詞須從其多者須從其全者尤須從其前後相同者便無差謬故以愚見論次如右不知時流肯謂余之狂言為然否也又汲古載夢窗稿附絶筆一首即天吳一曲而殘闕幾半毛氏未訂并載于帙耳之按楊升庵先生于詞道原不甚精究但喜用新穎字故人多愛而仿之不知天下未有眉目不全之女人而以脂粉為絶色者如此調六字起句用平平去平去上是定格也升庵作碧雞唱曉四字次句五字用去平平去上定格也升庵作霞散綺重關憕畫全不相涉時流不以古人為法而偏學升庵未審何意且于碧雞唱曉之仄平仄仄又變而為仄仄平平則尤不解矣至畫船載二句升庵亦未錯也學之者乃誤作兩句七言相對如滿江紅中語豈不大誤隨風二字升庵作聨翩亦未錯也學之者乃誤作兩去聲豈不大誤傍柳繫馬升庵作雨信頃刻亦未錯也學之者乃誤于柳字用平豈不大誤春寬夢窄升庵作洛神襯襪亦未錯也學之者乃誤作平仄平平杜若還生升庵作文石錦沙只錦字用上聲猶可借也學之者用仄仄仄平平仄六字豈不大誤事往花萎下該有瘞玉二句升庵只有五字叶韻一句桃根渡下反多一七字叶韻句青樓下只有一五一六兩句共少五字誤矣學之者于别後訪作五字其下四句四字不叶韻即用七字叶韻句接之而七字又作仄仄平平仄平仄豈不大誤暗點檢句升庵只作六字寫字誤平藍海句誤上三下四學之者于嘆鬢侵半苧用仄仄平平仄其第二段亦然俱作五言詩句法豈不大誤春秋責備賢者故余後學鄙人不禁娓娓髙明定能諒之然則既欲作詞何不一斟酌于古人而必擇一失調者為式且更于其失調之外更多失調耶至圖譜之亂分字句亂注平仄不可枚舉又不足論乃收升庵明人之詞二百三十五字者為式已為可怪又續收一夢窗詞杜撰一名命之曰添字鶯啼序則又安得怪人之吹毛索瘢也哉琰青曰余初讀此調即疑有誤然數詞並列未能確辨其是非及閲紅友稿見其逐句逐字論定胸次疑團不覺冰釋因嘆不具此眼光心血豈能使五百餘載之傳訛一日剖去蔓藤瑩為明鏡乎前此哨遍一篇訂釋已嘆希有至此尤不能不為心悅誠服矣天下有不心悅誠服者非庸妄之夫即偽為支飾者矣將付梓時紅友必欲于此注另加刪定蓋謂談及時流恐以賈怨也余曰風雅一道于今淪亡有志于此者正願有同志之人疑義相晰有疵謬處正望有人為我糾正若護短飾非反咎人之針砭豈名流賢者之心哉况欲訂正此調不得不援古證今臚列而加考論詎可慮及賈怨而不詳明剖白猶仍作葫蘆提語耶故亟索原稿授梓而蒼崖雪舫守齋藥庵韓若諸同人亦以余言為韙云詞律卷二十
