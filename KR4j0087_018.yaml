body:
  text: 詞律卷十八宜興萬樹撰喜朝天一百二字朝補之衆芳殘海棠正輕盈緑鬢朱顔碎錦繁繡更柔柯映碧纎搊勻殷誰與將紅間白采薰籠仙衣覆斑爛如有意濃粧淡抹斜倚闌干妖嬈向晚春後慣困欹晴景愁怕朝寒縱有狂雨便離披損不奈幽間素來禽總俗謾遮映終羞格疏頑誰來顧斜風教舞月下庭間此調他無可證然據鄙意揣之乃披字素字下各落一字蓋緑鬢下與後愁怕下俱同也碎錦繁繡用仄仄平仄而縱有狂雨有字恰與錦字合也更柔柯二句九字對後便離披二句則豈非披字下少一字乎況離披損不成語必是滴損或折損也誰與句六字素來禽句五字必素字下落一奈字蓋此詞咏海棠故以素奈來禽兩種花為比云此兩花相較但見其俗即共相遮映而此兩花之體格終覺疏頑可羞耳終羞格疏顔恰對前仙衣覆斑斕同是平平仄平平豈非前後如一乎至兩結各三句尤合矣故敢入二于字間此但據理論斷未知識者宜見俞否也竹馬兒一百三字兒一作子葉夢得與君記平山堂前細栁幾回同挽又征帆夜落危檻依舊遙臨雲巘自笑來往匆匆朱顔漸改故人俱遠橫笛想遺聲但寒松千丈傾崖蒼蘚世事終何已田隂縱在歲隂仍晚稽康老來尤懶只要蓴羮菰飯却欲便買茆廬短蓬輕楫尊酒猶能辦君能過我水雲聊為伴柳詞起句云登孤壘荒涼危亭曠望圖譜以為上五下四而此篇平山堂前四字相連但寒松九字栁云指神京非霧非煙深處應作上三下六而此篇該上五下四二處想皆不拘檻字栁作平恐是欄字之訛尾句栁云又逐殘陽去比此尾較順或曰此尾是雲水誤倒水雲或曰栁用逐字亦是以入作平未敢臆斷作者依栁仍用入聲可也若細又夜漸故縱歲便畫等字須用去聲栁詞正同譜不足據至云幾回可平仄自笑却欲可平平稽康可仄仄則改得愈為無謂征部樂一百三字栁永雅歡幽會良夜可惜虛拋擲追念狂蹤舊迹長秪恁愁悶朝夕慿誰去花街覔細説與此中端的道向我轉覺厭厭夢役勞魂苦相憶須知最有風前月下心事始終難得但願我蟲蟲心下把人看待長似初相識況逢春色便是有舉場消息待這回好好憐伊更不輕折或曰惜字是起韻非也勞魂當作魂勞不然上是役夢湘江靜一百三字史達祖暮草堆青雲浸浦記匆匆倦篙曾駐漁榔四起沙鷗未落怕愁沾詩句碧袖一聲歌石城怨西風隨去滄波蕩晚菰蒲弄秋還重到斷魂處酒易醒思正苦想空山桂香懸樹三年夢冷孤吟意短屢煙鐘津鼓屐齒厭登臨移橙後幾番涼雨潘郎漸老風流頓減間居未賦記匆匆至蕩晚與後想空山至漸老同圖譜于此調只改得二十一字可云善矣只漁榔二句三年二句皆平平仄仄何後則免改而前以漁沙二字為可仄四字為可平耶重改仄猶可斷豈可改平至怕字屢字領句其下四字為平平平仄圖譜欲讀作五言詩句故于愁煙二字改作可平便使此句不響矣雙聲子一百三字栁永晚天蕭索斷蓬蹤迹乘興蘭棹東遊三吳風景姑蘇臺榭牢落暮靄初收夫差舊國香徑沒徒有荒丘繁華處悄無覩惟聞麋鹿呦呦想當年空運籌決戰圖王取霸無休江山如畫雲濤煙浪翻輸范蠡扁舟驗前經舊史嗟謾載當日風流斜陽暮草茫茫盡成萬古遺愁後起或讀作三字兩句是以籌字似叶韻也不知此句該在決戰住句蓋後段之圖王至風流即與前段之乘興至荒丘相同況圖王句連上決戰二字文義亦不妥也覩字上疑有落字驗前經句比前多一驗字或夫差上缺一字耳惜餘歡一百三字黃庭堅四時美景正年少賞心頻啓東閣芳酒載盈車喜朋侣簮合杯觴交飛勸酬獻正酣飲醉主公陳榻坐來爭奈玉山未頽興尋巫峽歌闌旋燒絳蠟況漏轉銅壺煙斷香鴨猶整醉中花借纎手重插相將扶上金鞍腰裊碾春焙願少延歡洽未須歸去重尋艷歌更留時霎以閣合峽蠟同叶是江西音也正年少以下與後况漏轉以下同啓侣未斷手艷等字仄聲不可依圖用平頻山歌闌煙纎等字平聲不可依圖作仄其餘亂注亦皆不可從如玉山未頽正與重尋艷歌前後相對通篇照合甚是森然且别無他作相證何以見其為可平可仄乎旋焙二字乃去聲讀作平亦誤況焙字對前飲字豈可作平至杯觴以下七字乃落去一字兼有訛錯蓋此句即對後段相將以下八字該每句四字愚謂必係飛觴交勸為一句杯酬獻為一句或杯觴飛勸交酬獻必是平聲字而刻本顛倒脫落也圖因之作七字句無論前後不侔而上四字疊四平下三字勸酬獻更可笑谷老豈若是不通耶且因四平相疊岸然注杯觴二字為可仄則更竒矣醉主公陳榻亦差愚謂公字是人字之訛蓋以主人比陳蕃耳若主公陳榻則除非戲場上有主公之稱豈非笑語春雲怨一百三字馮偉壽春風惡劣把數枝香錦和鶯吹折雨重栁腰嬌困燕子欲扶扶不得軟日烘煙乾風收霧芍藥荼䕷弄顔色簾幕輕隂圖書清潤日永篆香絶盈盈笑靨宫黃額試紅鸞小扇丁香雙結團鳳眉心倩郎貼教洗金罍共看西堂醉花新月曲水成空麗人何處往事暮雲萬葉此係雲月自度曲平仄當依之弄顔色篆香絶倩郎貼皆用去平入此一調之音響所關也圖譜隨意亂注至以日永句謂可用平仄平平仄共看二句共醉謂可平西新謂可仄往事句往暮萬謂俱可平按雨重下十三字譜作兩四一五選聲仍之余謂嬌困不對兩重且困字去聲不響只作燕子欲扶有理有致還京樂一百三字方千里歲華慣每到和風麗日歡再理為妙歌新調粲然一曲千金輕費記夜闌沉醉更衣換酒珠璣委悵畫燭搖影易積銀盤紅泪向笙歌底問何人能道平生聚合歡娛離别興味誰憐露浥煙籠盡栽培艷桃穠李謾縈牽空坐隔千山情遙萬水縱有丹青筆應難摹畫憔悴再字畫燭畫字積字夢窗用平桃字夢窗作翳雖或不拘然千里和美成則兩首如一也悵畫燭以下周作任去遠中有萬點相思清泪當于點字為豆此篇則搖影易積四字不可相連藎搖屬燭積屬泪也吳作風吹遠河漢去槎天風吹冷則用周句法想一氣貫下分豆不拘雨霖鈴一百三字黃裳天南遊客甚而今却送君南國西風萬里無限吟蟬暗續離情如織秣馬脂車去即去多少人惜望百里煙慘雲山送兩城愁作行色飛帆過浙西封域到秋深且艤荷花澤就船買得鱸鱖新榖破雪堆香粒此興誰同須記東秦有客相憶願聽了一闋歌聲醉倒􅍆今日此係詞綜所載與屯田曉風殘月詞相符只君字栁用雨字或可不拘不如依栁為是而飛帆句栁云多情自古傷離别如七言詩句此則上三下四不同自應從栁詞所以取此者欲廣見聞也甚而今八字栁云對長亭晚驟雨初歇是晚字斷句此應於今字作豆藎此八字總一氣亦于却字借豆耳秣馬以下十一字栁云執手相看泪眼竟無語凝咽譜分上作六字句下作五字句大差而語凝二字注可用平仄送兩城句栁云暮靄沉沉楚天濶注可用平平仄仄平平仄鱸字注可仄須記下八字栁云應是良辰好景處設注謂良辰好景可用仄仄平平更差眉嫵一百三字又名百宜嬌王沂孫漸新痕懸栁淡影穿花依約破初暝便有團圓意深深拜相逄誰在香徑畫眉未穩料素娥猶帶離恨最堪愛一曲銀鈎小寶簾挂秋冷千古盈虧休問嘆謾磨玉斧難補金鏡太液池猶在凄涼處何人重賦清景故山夜永試待他窺戶端正看雲外山河還老桂花舊影便有至離恨與後太液至端正同畫眉未穩故山夜永用去平去上真名筆也觀石帚翠尊共欵亂紅萬點可見圖譜奈何以意竄定乎其餘破在帶挂補賦戶等字俱用仄是定格石帚後起云無限風流疏散譜因注二字叶韻起觀此篇則知非叶也此按石帚于前尾五字云愛良夜微暖是上一下四則上二下三句法各異又石帚後結云又爭似相攜乘一舸鎮長見乘一舸下與此篇不同想亦可如此然石帚在前定宜從之此所以載碧山此篇者正欲人兩相對勘以見用字之法也愚又疑此或是還老桂舊花影于桂字豆本與薑同而誤以桂花連寫耳百按此調俱作百宜嬌不知百宜嬌另有一體係一五字情久長一百三字或作情長久吕渭老鎖窗夜永無聊盡作傷心句甚近日帶紅移眼梨臉擇雨春心償未足怎忍聽啼血催歸杜宇暮帆挂沉沉暝色衮衮長江流不盡來無據點檢風光歲月今如許趂此際浦花汀草一棹東去雲窗霧閣洞天曉同作煙霞伴侣算誰見梅簾醉夢栁陌晴遊應未許春知處盡作至擇雨與後歲月至東去同怎忍聽以下與後洞天曉以下同只雲窗霧閣一句四字與春心償未足五字異是必雲窗句下缺一字故以補之擇字必係揮字之訛此調止聖求二首平仄相同不可亂改其第二首于棹字作平必係誤刻此字對上臉字也至梨臉句作天外飄逐其通篇用里睡等韻逐字失叶亦必誤刻或是飄逐天外倒寫耳迎新春一百四字栁永嶰管變青律帝里陽和新布晴景回輕煦慶喜節當三五列華燈千門萬戶遍九陌羅綺香風微度十里燃絳樹鰲山聳喧喧簫鼓漸天如水素月當午香徑裏絶纓擲果無數更闌燭影花隂下少年人往往竒遇太平時朝野多歡民康阜堪隨分良聚對此爭忍獨醒歸去按此調必係雙疊或當于簫鼓下分段或曰漸天如水二句似對此爭忍一句恐于當午下分段總無他詞可證難以臆斷也合歡帶一百四字杜安世樓臺高下玲瓏鬭芳樹緑隂濃芍藥孤栖香艷晚見櫻桃萬顆初紅巢喧乳燕珠簾鏤曵滿戶香風罩紗幃象牀屏枕晝眠才似朦朧起來無語更兼慵念分明事成空被你厭厭牽繫我怪纎腰繡帶寬鬆春來早是分飛兩處長恨西東到如今扇移明月簟鋪寒浪與誰同鬬芳樹至屏枕與後念分明至明月同然觀前結與後載栁詞恐尾句誤多與字也分明明字疑誤此字即前段樹字恐原係分手分袂分别之類耳此篇調明字穩可學又一體一百五字栁永身材兒早是妖嬈算舉措實難描一箇肌膚渾似玉更都來占了千嬌妍歌艷舞鶯慚巧舌栁妒纎腰自相逢便覺韓娥價減飛燕聲銷桃花零落溪水潺湲重尋仙徑非遙莫道千金酬一笑便明珠萬斛須邀檀郎幸有凌雲詞賦擲果風標況當年便好相攜鳳樓深處吹簫首句比前調多一字自相逢下前詞一四一六此一六一四後起兩四一六亦與前異後結與前調之前結同而便好相攜四字平仄亦異月中桂一百四字趙彥瑞露醑無情送長歌未終己醉離别何如暮雨釀一襟涼潤來留佳客好山侵座碧勝昨夜疏星淡月君欲翩然去人間底許員嶠問帆席詩情病非疇昔賴親朋對影且慰良夕風流雨散定幾回腸斷能禁頭白為君煩素手薦碧藕輕絲細雪去去江南路猶應水雲秋共色已醉至然去與後且慰至南路同長歌未終用平平去平己醉句且慰句用仄仄平仄問帆席用去平仄皆不可擅改暮字雨散雨字皆仄淡細皆去妙送釀勝賴定薦等為領句字尤須去聲影字不可用去陽春一百四字或加曲字楊旡咎蕙風輕鶯語巧應喜乍離幽谷飛過北窗前迎清曉麗日明透翠幃縠篆臺芬馥初睡起橫斜簮玉因甚自覺腰肢瘦新來又寬裙幅對清鏡無心欣梳裹誰問著餘酲帶宿尋思前歡往事似驚回好夢難續花亭遍倚檻曲厭滿眼爭春凡木儘憔悴過了清明候愁紅慘緑按此調與梅溪杏花煙一首同只因甚二句上七下六史云還是寶絡雕鞍被鶯聲喚來香陌乃上六下七無他作可證作者隨所擇從之可也至其平仄處與史皆合如麗日明透史云舊火銷處圖譜乃謂可用平仄仄平對清鏡句史云記飛蓋西園寒猶疑圖謂飛西猶三字可仄又謂思字回字可仄夢字并厭滿過了慘字俱可平不知何據遍倚檻曲四仄史云故里信息亦改信字可平皆出自新裁者儘憔悴句八字愁紅句四字無可疑也史云奈芳草正鎖江南夢春衫怨碧上云故里信息俱無故此句言江南之夢亦被芳草鎖住耳圖乃讀作上七字下五字夢春衫如何解按麗日句史云舊火銷處近寒食愚謂火字與此篇日字恐是作平高明者試于口中調之以為何如欣字應是忺字綺羅香一百四字張翥燕子梁深秋千院冷半溼垂陽煙縷怯試春衫長恨踏青期阻梅子後餘潤留寒藕花外嫩涼鎖暑漸驚他秋老梧桐蕭蕭金井斷蛩暮薰篝須待被暖催雪新詞未穩重尋笙譜水閣雲窗總是慣曾經處曾信有客裏關河又怎禁夜深風雨一聲聲滴在疏篷做成情味苦怯試至梧桐與後水閣至疏篷同催雪句六字舊刻梅溪做冷欺花一首此句作還被春潮急蓋急字上落一晚字也歷查他家俱作六字可證後起六字須用三平三仄間有用平平仄平平仄者十中之一耳前結金井斷蛩暮必用平仄仄平仄後尾味苦二字必用去上聲更有細處如秋千院冷新詞未穩則用平平仄仄垂楊煙縷重尋笙譜則用平平平仄踏青期阻嫩涼銷暑慣曾經處夜深風雨則用仄平平仄此則詞中用字關鍵處如謂鄙言為鑿請驗諸古人名詞可也按前結句後起句後結二句俱與齊天樂平仄吻合不可為譜注淆惑情味二字必須相連説見齊天樂下霜花腴一百四字吳文英翠微路窄醉晚風慿誰為整欹冠霜飽花腴燭銷人瘦秋光做也都難病懷強寬恨雁聲偏落歌前記年時舊宿淒涼暮煙秋雨野橋寒妝壓鬢英爭艷度清商一曲暗墜金蟬芳節多隂蘭情稀會晴暉稱拂吟箋更移畫船引珮環邀下嬋娟算明朝未了重陽紫萸應耐看霜飽至淒涼與後芳節至重陽同病懷句更移句用仄平仄平圖以懷字可仄誤也至認煙字為叶而以記年時舊宿為五字句淒涼暮煙為四字句尤誤晚風慿圖謂可平仄仄猶可若雁字珮字改平而偏字改仄則此二句失調矣此腔是夢窗自製惟有此曲何所見為可改乎西湖月一百四字黃子行初弦月挂林梢又一度西園探梅消息粉牆朱戶苔枝露蕊淡勻輕飾玉兒應有恨為悵望東昏相記憶便解珮飛入雲階長伴此花傾國還嗟瘦損幽人記立馬攀條倚欄橫笛少年風味拈花弄蕊愛香憐色揚州何遜在試點染吟箋留醉墨謾贏得疏影寒窗夜深孤寂此調二首黃注自度商調查他家别無同作者其平仄二首如一自當恪守不可亂填别一首謾贏得句刻本作消瘦沈約詩腰乃消瘦上落了一字故圖譜收作一百三字誤也況此詞兩段字句相同只前結六字後結四字比前少長伴二字耳前起句六字即同後起句六字圖譜見其别作云湖光冷浸玻璃蕩一餉薰風小舟如葉竟不及觀其此篇而遽録之遂以蕩字連上讀不知此蕩字蓋指下小舟非指上湖光有何難明處乎豈此篇亦可讀作初弦月挂林梢又乎其别作之後段又注六字何不亦讀作殢人小摘墻榴為乎異哉異哉譜圖等書每遇四字槩作平平仄仄與仄仄平平不知此中正有大分别處如此篇探梅句倚欄句是仄平平仄此是上三句住語其下三句亦俱四字而第一句用仄平平仄第二句必須用平平仄仄第三句則仍用仄平平仄抑揚頓挫方為有調此是詞中深微處而亦是詞中明顯處須悟此理便可操鑰以開各調之關鎖矣彼亂填亂注者豈解此哉如圖譜所收此調即黃子行首作其餘字字相同不必言矣所謂四字三句者前云藕花十丈雲梳霧洗翠嬌紅怯後云舊遊如夢新愁似織泪珠盈睫豈不與此篇一轍故不憚饒舌而詳録之以證鄙言之不妄云綺寮怨一百四字周邦彥上馬人扶殘醉曉風吹未醒映水曲翠瓦朱簷垂楊裏乍見津亭當時曾題敗壁蛛絲罩淡墨苔暈青念厺來歲月如流徘徊久嘆息愁思盈去去倦尋路程江陵舊事何曾再問楊瓊舊曲淒清斂愁黛與誰聽樽前故人如在想念我最關情何須渭城歌聲未盡處先泪零查宋詞止此一首無可據正元人王學文有一詞字句與此俱同只平仄稍異今取注于旁學文首次句云忽忽東風又老冷雲吹晚隂圖譜以忽忽東風為首句又老冷雲為次句起韻吹晚隂為三句叶韻竒乎不竒其詞所用韻乃隂林禁深尋臨沉心吟音皆十二侵閉口字豈起韻用一雲字况又老冷雲如何解乎當時二句學文云江南庾郎憔悴睡未醒病酒愁怎禁本上六下八圖以江南庾郎為一句憔悴睡未醒為一句病酒愁怎禁為一句又讀庾平聲遂以江南庾郎四字疊平竟注江南二字可仄又以憔可仄酒可平竒乎不竒斂愁黛六字總讀作一句故于黛字云可平而其餘之亂圖者更不可勝舉矣竒乎不竒送入我門來一百四字胡浩然荼壘安扉靈馗挂戶神儺烈竹轟雷動念流光四序式周回須知今歲今宵盡似頓覺明年明日催向今夕是處迎春送臘羅綺筵開今古遍同此夜賢愚共添一歲貴賤仍偕互祝遐齡山海固難催石崇富貴籛鏗壽更潘嶽儀容子建才仗東風盡力一齊吹送入此門來動念以下與後互祝以下同向今夕句五字即同後仗東風句夕字入作平譜圖不識以向今夕分句謂可作平仄仄是字翻作可平竟與後全異矣明日明字妙後子字上聲亦可大約調中此等句此一字得平為佳用去聲便下乘矣下按詞統載此調七十八字一體前段無向今夕以後段無仗東風以下各十三字乃明人吳鼎芳作不知其何所本歷查唐宋金元皆無此體不足為法選聲收之又誤刻吳鼎南恐人不知其為明人而學之轉謂本譜失載故備注于此憶瑤姬一百四字蔡伸微雨初晴洗瑤空萬里月挂冰輪廣寒宫闕望素娥縹眇丹桂亭亭金盤露冷玉樹風輕覺秋思清念厺年曾共吹簫侣同賞蓬瀛奈此夜旅泊江城謾花光眩目緑酒如澠幽懷終有恨恨綺窗清影虛照娉婷藍橋杳楚館雲深擬慿歸夢去強就枕無奈孤衾夢易驚此調有訛缺觀其前後則洗瑤空至風輕與謾花光至雲深相合但藍橋下落一字耳覺下與擬慿下未知確否又一體一百九字史達祖嬌月籠煙下楚領香分兩朵湘雲花房漸密時弄杏箋初會歌裏殷勤沉沉夜久西窗屢隔蘭燈幔影昏自綵鸞飛入芳巢繡屏羅薦粉光新十年未始輕分念此飛花可憐柔脆銷春空餘雙泪眼到舊家時郎謾染愁巾袖止説道凌虛一夜相思玉樣人但起來梅發窗前哽咽疑是君此與前調甚異亦有訛缺姑為句豆未必果然也起二句倣佛與前同花房句時字宜仄或花房時漸密而誤倒也沉沉以下與前詞全異至後段空餘雙泪眼之下竟不可讀愚謂可憐句對前香分句空餘句對前花房句郎字乃是節字到舊家時節五字對前弄杏句五字其下漫染愁巾四字對前歌裏殷勤四字則與蔡詞之望素娥九字恨綺窗九字合矣袖止二字係訛字此六字乃對前沉沉六字而一夜句七字對前段屢隔句七字亦相合矣但起來七字亦對前段自綵鸞七字哽咽句則尾也永遇樂一百四字又名消息趙師使日麗風暄暗催春去春尚留戀香褪花梢苔侵栁徑密幄清隂展海棠零亂梨花淡濘初聽閙空鶯燕有輕盈妍姿靚態緩步䦘風仙苑緑叢紅蕚芳鮮柔媚約略試粧深淺細葉來禽長梢戲蝶簇簇枝頭見酡顔鬒髮春愁無力困倚畫屏嬌軟只應怕風欺雨恨落紅萬點香褪至靚態與後細葉至雨恨同尚字多用仄聲用平者十中二三而已步字可平風字可仄不拘尾句仄平仄仄是定格舊詞無不同者萬點去上猶妙若譜所收淡煙細雨正是名詞妙處而注作可用平平平仄不知何解正如一絶色美人乃必欲矐其目髠其鬟而以之示人曰此美人也有是理哉竹山于隂字用逝字頭字用幾字兩五字句俱拗查趙以夫亦用點字萬字想有此體也耆卿二首于梨花淡濘句皆作平仄平平後起第二句皆作六字第三句皆作四字而鮮字作仄媚字作平它顔三句一首作藩侯瞻望彤庭親攜僚吏竟歌元首是一六二四一首于春愁無力作槐府登賢與此篇異因他家無此不必從之故不另列知朝旡咎題名消息注云自過腔即越調永遇樂故入某調即異其腔因即異其名如白石之湘月即念奴嬌而腔自不同此理今不傳矣又一體一百四字陳元平玉腕籠寒翠欄憑曉鶯調新簧暗水穿苔遊絲度栁人靜芳晝長雲南歸雁樓西飛燕去來慣認炎涼王孫遠青青草色幾回望斷柔腸薔薇舊約樽前一笑等間辜負年光鬭草庭空拋梭架冷簾外風絮香傷春情緒惜花時候日斜尚未成妝聞嬉笑誰家女伴又還採桑用平韻與前調異觀此篇晝字絮字仄聲可知前調竹山以夫用仄字非拗矣拜星月慢一百四字或無慢字星或作新吳文英絳雪生涼碧霞籠夜小立中庭蕪地昨夢西湖老扁舟身世歎遊蕩暫賞吟花酌露樽俎冷玉紅香罍洗眼眩意迷古陶州十里翠參差淡月平芳砌甎花滉小浪魚鱗起霧盎淺障青羅洗湘娥春膩蕩蘭煙麝馥濃侵醉吹不散繡屋重門閉又怕便緑減西風泣秋檠燭外作此調者甚少今按片玉夜色催更一首于暫賞至罍洗云似覺瓊枝玉樹相倚暖日明霞光爛其本集原是十四字嘯餘及圖譜詞統詞綜諸書俱去相倚二字論其順拗則去此二字便于讀便于填然查夢窗此篇及周草窗膩葉隂清一首俱作十四字惟詞綜載元人彭泰翁一首云怕似流鶯歷歷惹得玉銷瓊碎止十二字但彭詞後于蕩蘭煙句少一字必係殘闕且其尾句云月明天似水用五言詩句法與本調不合不足以為程式則其十二字者愈不足據矣蓋美成詞意以似覺二字領起下二句倣佛相對言相遇之人如瓊玉之潤如日霞之光故言似覺也夢窗亦以暫賞二字領起樽俎正與罍洗相對洗亦是酒器故言暫賞也相倚二字正用蒹葭倚玉故事今若去此二字則此篇亦可去樽俎二字矣豈得謂全調哉至草窗詞云想人在絮幕香塵凝望誤認幾許煙檣風幔想人在即此嘆遊蕩三字其下于凝望分斷而誤認以下為一句比周句法各異或可不拘然其字數平仄則未有異耳此詞用五字句者四皆須上一下四不可上二下三且皆是仄平平平仄愚疑此五字四句當分四段首于老扁舟身世住次為換頭于古陶洲十里住蓋不惟結句相同而并上四字句且并上六字句亦皆相似也三段于洗湘娥春膩住後為末段蓋翠參差八字句與蕩蘭煙八字同甎花滉八字句與吹不散八字同只又怕句比霧盎句多一字耳平又按四八字句亦有别翠參差與蕩蘭煙是仄平甎花滉與吹不散是平平仄但草窗于甎花滉作砑箋紅不如周吳紀律也醉字本集作酒此字該叶韻今改正舊譜注末句于西風泣處分作八字而尾作四字大謬一圖譜收美成拜星月又收草窗拜星月慢調竟未校對何怪其句字之各亂乎向湖邊一百四字江緯退處鄉關幽棲林藪舍宇苐須茅蓋翠巘清泉啓軒窗遙對遇等間鄰里過從親朋臨顧草草便成歡會䇿杖攜壺向湖邊栁外旋買溪魚便砍銀絲鱠誰復欲痛飲如長鯨吞海共惜醺酣恐歡娛難再矧清風明月非錢買休追念金馬玉堂心膽碎且鬭尊前有阿誰身在只此一首平仄宜遵似或謂此調略似剪牡丹非也余謂酷前拜星月慢瀟湘逢故人慢一百四字王安禮薰風微動方榴花弄色萱草成窩翠帷敞輕羅試冰簟初展幾尺湘波疏簷廣厦稱瀟湘一枕南柯引多少夢魂歸緒洞庭雨棹煙簑驚回處間晝永更時時燕雛鶯友相過正緑影婆娑況庭有幽花池有新荷青梅煮酒幸隨分贏取高歌功名事到頭終在歲華忍負清和翠帷敞下與後正緑影下同帷字平緑字仄似不合不知此句在三字略豆其第二字平仄可不拘況緑字入可作平或曰帷字是帳字之訛亦未可知也若圖譜云可作平平仄仄平則無此理也此調凡叶韻句俱平平住豈有忽插一仄平住者乎此亦理之最淺近者展字亦以上作平歌者不干此字住拍故不拘耳鬼按詞統載王秋英一首用仄韻另為一體因是女所作又明時小説故不敢收列而附載其詞于注云暮見嫩栁拖煙嬌花帶霧頃刻間風雨把堂春光將上深思閨中遺事鑽火留餳都付却落花飛絮又何心挈罍提壺鬭草踏青盈路子規啼蝴蝶舞遍南北山頭紙灰緑醑奠一丘黃土嘆海角飄零湘隂凄楚無主泉扃也能得有情雞黍畫角聲吹落梅花又帶離愁歸去有所本而愚偶未及見耳事字應用韻調甚悠揚或此借叶也春從天上來一百四字王惲羅綺深宫記紫袖雙垂當日昭容錦封香重彤管春融帝座一點雲紅正臺門事簡更捷奏清晝相同聽鈞天侍瀛池內宴長樂歌鍾回頭五雲雙闕恍天上繁華玉殿珠櫳白髮歸來昆明灰冷十年一夢無蹤寫杜娘哀怨和泪點彈與孤鴻淡長空看五陵何似無樹秋風帝座下與後十年下同只後空字叶而前天字不叶耳吳彥高作亦然年字若照前座字不宜作平或可通用吳作前用歌吹後用風雪能細心者亦以不用平為佳也譜圖平仄不必言其所收吳詞于看五陵句本作對一軒涼月乃落一對字遂收此調為一百三字竟不見吳詞前段此句云似林鶯嚦嚦有一似字也花心動一百四字史達祖風約簾波錦機寒難遮海棠煙雨夜酒未蘇春枕猶欹曾是誤成歌舞半褰薇帳雲頭散奈愁味不隨香去儘沈靜文園更渴有人收否懶記溫柔舊處偏只怕臨風見他桃樹繡戶鎖塵錦瑟空絃無復畫眉心緒待拈銀管書春恨被雙燕替人言語意不盡垂楊幾千萬縷未蘇鎖塵俱宜仄平譜圖注可平平大錯觀美成之褪香鳳慵蘆川之乍間未平竹山之貫簾叩冰惜香之乍濃繫心又一首半開繡裀竹屋之舊家徑松阮氏之乍晴繡衾黃于行之乍零泪乾無不同者且俱用去聲尤妙豈得杜撰謂可平平耶垂楊幾千萬縷亦宜平平仄平去上此乃定格上所引各家亦無不同者譜乃云可用仄平平仄平仄如念奴嬌尾句豈非杜撰耶至沈天羽續集收風裏楊花一首謂是謝無逸所作查溪堂集內並無此詞余以為必非無逸所作蓋于海字作高未字作懸更字作花鎖字作雙已皆失調而待拈句作猛期月滿會姮娥不知此句即配前段半褰句乃會字用去娥字用平垂楊句作甚日于飛時節甚日二字用仄于飛二字用平全失體格矣豈有無逸大名家而作此落腔詞乎且其語鄙陋不堪沈氏亟賞之并引惡濫可笑歪娼傖卒口中之桂枝句以為嫓美何其村醜至此可為一嘆縷字誤刻里今改正歸朝歡一百四字又名菖蒲緑張先聲轉轆轤聞露井曉引銀瓶牽素綆西園人語夜來風叢英飄墮紅成徑寶猊煙未冷蓮臺香蠟殘痕凝等身金誰能得意買此好風景粉落輕粧紅玉瑩月枕橫叉雲墜領有情無物不雙栖文禽只合常交頸晝夜歡豈定爭如翻作春宵永日曈曨嬌柔懶起簾壓捲花影猊字平夜字仄此二字不拘如稼軒東坡前後俱平耆卿則前仄後平馬莊父則前平後仄可通用也此調前後符合起二句第二字俱用仄三四兩句第二字俱用平各家皆同只莊父于後起句用團團寶月慿纎手此乃誤筆必不可從或本是寶月團團慿素手亦未可知斷無與前段首句兩樣之理若譜注并首句亦改從團團句平仄則尤為無理矣好字捲字間有作平者然不如仄聲起調子野用字緻密自在蘇辛上耳西河一百四字三疊又名西湖周邦彥長安道瀟灑西風時起塵埃車馬晚遊行灞陵煙水亂鴉棲鳥夕陽中參差霜樹相倚到此際愁如葦冷落關河千里追思唐漢昔繁華斷碣殘記未央宫闕己成灰終南依舊濃翠對此景無限愁思繞天涯秋蟾如水轉使客情如醉想當時萬古雄名盡作往來人淒涼事清真集誤作兩段今分正際字偶合非叶觀各家可知此體他無作者按如葦當作似葦此字各家皆作仄況後如水如醉二句相承此不宜更復又一體一百四字王彧天下事問天怎忍如此陵圖誰把獻君王結愁未已少豪氣概總成塵空餘白骨黃葦千古恨吾老矣東遊曾吊淮水繡春臺上一回登一回揾泪醉歸撫劒倚西風江濤猶壯人意只今袖手野色裏望長淮猶二千里縱有英心誰寄近新來又報烽煙起絶域張騫歸來未首三字即起韻第三段起句上四下三及後結俱與前詞不同而未已之未字揾字用去聲亦異袖手野色裏五字疊仄且宜去上去去上方佳不可不知張騫歸來四字疊平勿誤又一體一百五字吳文英春乍霽清漣畫舫融泄螺雲萬點暗凝秋黛蛾照水謾將西子比西湖溪邊人更多麗步危徑攀艷蕊掬霞到手紅碎青蛇細折小回廊去天半咫畫欄入暮起東風棋聲吹下人世海棠藉雨半繡地殘寒褪初卸羅綺除酒消春何計向沙頭更續斜陽一醉雙玉杯和流光洗向沙頭句比前詞多一字美成千里皆用此體照半亦如前詞用去聲其餘乍畫舫萬黛謾更步徑艷細去畫暮下藉半繡卸向更諸去聲俱與周方張無異圖譜亂注謬矣又謂步危徑二句是六字句攀字光字可仄俱背謬之甚且以前二段合而為一尤未體察也按稼軒西江水一首俱與前長安道一調同只後結用此篇體但于醉字不叶韻步危徑六字用會君難别君易平仄稍異因注明不另録又玉田一首于畫闌上多一字此段宜同首段不應多一字故本譜不收一百六字體其原刻題作西河圖譜另收西湖一調誤且螺雲下十一字本上七下四玉田云閙紅深處小秦筝斷橋夜飲是也圖譜分作上四下七青蛇下十一字亦上七下四與前段同美成云空餘舊迹鬱蒼蒼霧沉半壘是也圖譜亦分作上四下七真顛倒錯亂可嘆也後結云且脫巾露髮飄然乘興一葉愁香天風冷興字乃叶韻正與吳詞醉字同尾句乃七字也以飄然乘興一葉為一句以尾為五字尤誤按此篇汲古刻于細折分斷咫作尺向作高俱誤今改正百宜嬌一百四字吕渭老隙月垂篦亂蛩催織秋晚嫩涼房戶燕拂簾旌鼠窺窗網寂寂飛螢來去金鋪鎮掩謾記得花時南浦約重陽萸糝菊英小樓遙夜歌舞銀燭暗佳期細數簾幕漸西風午窗秋雨葉底翻紅水面皺碧燈火裁縫砧杵登髙望極正霧鎖官槐歸路定須將寶馬鈿車訪吹簫侣燕拂至菊英與後葉底至鈿車同此按眉嫵亦作百宜嬌實與此調全異不可混也調微似氐州第一夢橫塘一百五字劉一止浪痕經雨鬢影吹寒晚來無限蕭瑟野色分橋剪不斷前溪風物船繫朱藤路迷煙寺遠鷗浮沒聽疏鐘斷鼓似近還遙驚心事傷羇客新醅旋壓鵝黃􅀈清愁在眼酒病縈骨繡閣嬌慵爭解説短封傳憶念誰伴塗妝綰髻嚼蕊吹花弄秋色恨對南雲此時淒斷有何人知得平仄宜悉依之病字不可從譜作平尉遲杯一百五字吳文英垂楊徑洞鑰啓時遣流鶯迎涓涓暗谷流紅應有緗桃千頃臨池笑靨春色滿桐華弄粧影記年時試酒湖隂褪花曾采新杏蛛窗繡網玄經才石研開奩雨潤雲凝小小蓬萊香一掬愁不到朱嬌翠靚清樽伴人間永日斷琴和棊聲竹露冷笑從前醉卧紅塵不知仙在人境臨池以下與後人間以下同此篇比片玉隋堤路一首平仄相合只時字作密窗字作念石字作隈耳其餘旁注者則依詞綜所載元人尹公遠詞也六才石研九字周云長偎傍疏林小檻歡聚上三下此是一氣分豆不拘圖譜將此調改圖三十七字幾不似尉遲杯矣又一體一百五字無名氏歲云暮嘆光隂冉冉能幾許江梅尚怯餘寒長安信音猶阻東風無據憑欄久欲去還凝佇憶溪邊月夜徘徊暗香疏影庭戶朝來凍解霜消南枝上香英數點微露把酒看花無言有泪還是那時情緒花依舊晨粧何處謾贏得花前愁千縷儘髙樓畫角頻吹任教紛紛飛素此篇與樂章寵嘉麗一首平仄同但前結栁用自有憐才深意與此平仄不同然此句當如念奴嬌之結此篇是也栁詞恐是憐才自有深意霜消二字栁用鴛被似叶韻者或云被字係衾字之訛原與此無異也其與前調異處首一字用仄據字叶韻還字平把酒下四字兩句還是句止六字花依舊句叶韻此數處不同另一體也教字栁用肻字自不宜用平聲又一體一百六字朝補之去年時正愁絶過却紅杏飛沉吟杏子青時追悔負好花枝今年又春到傍小闌日日數花期花有信人却無慿故教芳意遲遲及至待得融怡未攀條拈蕊又嘆春歸怎得春如天不老更教花與月相隨都將命􅍆與酬花似峴山落日客猶迷儘歸路拍手攔街笑人沉醉如泥用平韻句法與仄韻多同只更教句對上如七言偶句秋霽一百五字即春霽史達祖江水蒼蒼望倦栁愁荷共感秋色廢閣先涼古簾空暮雁程最嫌風力故園信息愛渠入眼南山碧念上國誰是鱠鱸江漢未歸客還又歲晚瘦骨臨風夜聞秋聲吹動岑寂露蛩悲清燈冷屋翻書愁上鬢毛白年少俊遊渾斷得但可憐處無奈冉冉魂驚採香南浦剪梅煙驛此與草堂舊載胡浩然詞平仄如一而夢窗作亦同甚矣古人守律之嚴也西麓一首國字失叶乃係誤刻此公精密絶倫必不誤也又字亦誤作思乃是念字之訛草窗一首于倦栁愁荷作芳園載酒恐是載酒芳園誤倒嫌字作舊字仄聲或不拘故園句宜仄平去仄草窗故字作年誤又字作蛩聞字作眼可字作遊亦俱誤或係傳訛或係敗筆皆不可從作者但守胡史吳足矣按草堂收胡詞以此為春霽又收秋霽一調與此一字無殊甚為無謂且題下注陳後主作怪甚陳後主于數百年前先為此調而字句多學浩然豈非竒事今查史陳周俱作秋霽故題名從之譜圖以首句為七字念上國連誰是為一句俱竒至調中平仄除旁注外一字不可移譜注乃無一字不可移尤竒之竒也曲玉管一百五字栁永隴首雲飛江邊日晚煙波滿目憑欄久一望關河蕭索千里清秋忍凝眸杳杳神京盈盈仙子别來錦字終難偶斷雁無慿苒苒飛下汀洲思悠悠暗想當初有多少幽歡佳會豈知聚散難期翻成雨恨雲愁阻追遊悔登山臨水惹起平生心事一場銷黯永日無言却下層樓此調亦平仄通叶者思悠悠三字疑是後疊起句因無他作可證依舊録之泛清波摘遍一百五字晏幾道催花雨小著栁風柔都是去年時候好露紅煙緑儘有狂情鬭春早長安道秋千影裏絲管聲中誰放艷陽輕過了倦客登臨暗惜光隂恨多少楚天渺歸思正如亂雲短夢未成芳草空把吳霜鬢華自悲清曉帝城杳雙鳳舊約漸虛孤鴻後期難到且趂朝花夜月翠樽頻倒此詞丰神婉約律度整齊作者何寥寥耶而各譜中失收更不可解愚按此調當是四段合成催花至春早為一段秋千至多少為二段而長安道三字乃換頭語也只露紅句與倦客句平仄異耳楚天渺至清曉為三段帝城杳至末為四段此則字數俱齊者華字照後月字宜仄恐是影字之訛抑或後月字是作平皆未可知然此等不歇拍處原不拘也如前露紅倦客二句唱字皆平平帶過其勢趨向下句于鬭字恨字兩去聲著力縱激而以早字少字兩上聲收之空把且趂二句亦然故後二段煞句亦皆用上聲而自字翠字先用去聲也管見如此知天下人莫不以為迂且怪矣前結句詞滙作暗惜花光飲恨多少甚無義理原疑其誤及查汲古刻小山詞又作暗惜花光隂恨多少花光飲與花光隂皆不通因恍然悟後結又用花月則此花字乃誤多而詞滙又因隂字訛作飲字耳詞律卷十八
