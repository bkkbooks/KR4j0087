body:
  text: 詞律卷三宜興萬樹撰昭君怨四十字宴西園又名一䀶沙万俟雅言春到南樓雪盡驚動燈期花信小雨一番寒倚闌干莫把闌干頻倚一望幾重煙水何處是京華暮雲遮凡用四韻出詞統等書收添字昭君怨于第三句上添兩字乃湯義仍牡丹亭傳竒者查唐宋金元未有此體不宜載入怨回紇四十字皇甫松祖席駐征棹開帆候信潮隔筵桃葉泣吹管杏花飄船厺鷗飛閣人歸塵上橋别離惆悵淚江路溼紅蕉或曰此本是五言律一首不宜混入詞譜余曰此因尊前集載入故仍之且題名與曲意不合正是詞體若謂律體不入詞則清平調獨非七絶瑞鷓鴣獨非七律乎酒泉子四十字毛熙震間卧繡幃慵想萬般情寵錦檀偏翹股重翠雲欹莫天屏上春山碧映香煙霧隔蕙蘭心魂夢役斂蛾眉凡三換韻用溫飛卿又一首于春字用仄想所不拘香字亦有仄者因不關韻腳不另録舊譜收鈿匣舞鸞一首本鸞寒韻末三字對殘粧不叶韻注云不知何謂余謂此蓋粧殘倒寫傳訛耳詞豈有末字不叶者乎其第二句隱映艷紅修碧三句月梳斜四句雲鬢膩膩字應叶碧字觀唐詞二十三首皆同可見此碧字乃北音作去聲閉字讀譜不知此義但注六字句此等須知以入作平之説非妄語也其後假役字叶上碧隔鈿匣一首用卷字叶上展軟譜亦失注是一調而失四韻矣如此篇若落去寵重役眉四箇韻腳豈成詞乎又一體四十字孫光憲斂態窗前裊裊雀叉拋頸燕成雙鸞對影耦新知玉纎淡拂眉山小鏡中瞋共照翠連娟紅縹眇早粧時與前字句同只首句不起韻又一體四十字顧敻羅帶縷金蘭麝煙凝魂斷畫屏欹雲鬟亂恨難任幾回垂淚滴鴛衾薄情何處厺月臨窗花滿樹信沉沉後假起句叶前假平韻又一體四十字溫庭筠楚女不歸樓枕小河春水月孤明風又起杏花稀玉叉斜篸雲鬟髻裙上金縷鳯八行書千里夢雁南飛後假起句叶前假仄韻又一體四十一字顧敻楊柳舞風輕惹春煙殘雨杏花愁鶯正語畫樓東錦屏寂寞思無窮還是不知消息鏡塵生珠淚滴損儀容同羅帶一首而後假弟二句用六字又一體四十一字韋莊月落星沉樓上美人春睡緑雲欹金枕膩畫屏深子規啼破相思夢曙色東方才動柳煙輕花露重思難任後假同斂態一首而次句用六字又一體四十二字顧敻黛薄紅深約掠緑鬟雲膩小鴛鴦金翡翠稱人心錦鱗無處傳幽意海燕蘭堂春又厺隔年書千點淚恨難任後假第二句用七字去字借叶又一體四十二字牛嶠記得去年煙暖杏園花正發雪飄香江草緑柳絲長鈿車纎手卷簾望眉學春山樣鳯叉低裊翠鬟上落梅粧第二句七字後鳯叉句七字叶舊譜謂此詞子長字起韻誤凡詞無一假內不相者蓋因作譜者用前調句法讀以雪飄香江草緑為對故緑字不可叶發字而一假無叶韻矣不知此與前異雪飄香三字乃足上語氣謂花發而飄香也其下江草緑栁絲長乃自為對語而長字正叶香字耳或謂望字是平聲叶長字未審是否又一體四十二字李珣秋月嬋娟皎潔碧紗窗外照花穿竹冷沉沉印池心凝露滴砌蛩吟驚覺謝娘殘夢夜深斜傍枕前來影徘徊第三句七字後起兩三字結又換韻無舊譜注首句六字次句四字誤此調俱首四次六首用六字者又一體四十三字張泌紫陌青門三十六宫春色御溝輦路暗相通杏園風咸陽沽酒寶叉空笑指未央歸厺插花走馬落殘紅月明中前假與李詞同後假七字叶平起而通篇止用一韻又一體四十三字顧敻掩却菱花收拾翠鈿休上靣金蟲玉燕鎖香奩恨厭厭雲鬟半墜懶重簪淚侵山枕溼銀燈背帳夢方酣雁飛南第二句七字異餘俱同前詞通篇一韻又一體四十三字顧敻水碧風清入檻細香紅藕膩謝娘斂翠恨無涯小屏斜堪憎蕩子不還家謾留裙帶結帳深枕膩炷沉煙負當年末二句換韻又一體四十三字顧敻小檻日斜風度緑窗人悄悄翠幃間掩舞雙鸞舊香寒别來情緒轉難拌韶顔看却老依稀粉上有啼䀶暗消魂後假第二句叶前假第二句仄韻叶按此詞以老叶悄恐前篇結字亦是音計蓋以前假膩字也又一體四十三字李珣寂寞青樓風觸繡簾珠碎撼月朦朧花黯淡鎖春愁尋思往事依稀夢淚臉露桃紅色重鬢欺蟬叉墜鳯思悠悠後起兩句皆七字另韻又一體四十三字李珣秋雨聫綿聲散敗荷叢裏那堪深夜枕前聽酒初醒牽愁惹思更無停燭暗香凝天欲曙細和煙冷和雨透簾旌後假首句叶平第二句換仄韻韻汲古刻及舊譜訛曙作曉遂使冷和雨一句無叶處矣又傳訛以末旌字為中字正與毛詞殘粧同無此理也今改正或曰煙字卟首句綿字未必然又一體四十二字張泌春雨打窗驚夢覺來天氣曉畫堂深紅焰小背蘭釭酒香噴鼻懶開缸惆悵更無人共醉舊巢中新燕子語雙雙前假同寂寞青樓闋後假同秋雨聨綿闋譜蘭釭之釭從金旁燈也開缸之缸從缶旁罌也舊不識缸字注云後假首句即用前假末句韻為叶是欲以此為式而使人遵守必宜疊用前尾字矣可為噴飯又失注醉字換韻子字叶韻誤又一體四十四字顧敻黛怨紅羞掩映畫堂春欲暮殘花微雨隔青樓思悠悠芳菲時節看將度寂寞無人還獨語畫羅𥜗香粉汚不勝愁前同小檻日斜後同寂寞青樓又一體四十五字毛文錫緑樹春深燕語鶯啼聲斷續惠風飄蕩入芳叢惹殘紅柳絲無力裊煙空金盞不辭須滿酌海棠花下思朦朧醉春風此則前後整齊宋之同叔稼軒皆用此體矣又一體四十九字潘閬長憶孤山山在湖心如簇黛僧房四靣向湖開輕棹厺還來芰荷香細連雲閣閣上清聲簾下鐸别來塵土汚人衣空役夢魂飛前後結語俱用五字又一體五十二字又名憶餘杭潘閬長憶西湖湖水上盡日憑欄樓上望三三兩兩釣魚舟島嶼正清秋笛聲依約蘆花裏白鳥成行忽驚起别來間想整綸竿思入水雲寒首句七字起韻者按潘作此詞三首前四十九字者二此五十二字一舊原係酒泉子即石曼卿取作畫圖錢希白自書于玉堂屏風者尾句雖稍變實是酒泉子而詞統收此一篇作憶餘杭誤也縱有此别名亦應附入酒泉子不得另立一調蝴蝶兒四十字張泌蝴蝶兒晚春時阿嬌初著淡黃衣倚窗學畫伊還似花間見雙雙對對飛無端和泪拭胭脂惹教雙翅垂倚字惹字上聲學字雙翅雙字平聲妙兒字即起韻譜失注誤玉蝴蝶四十一字溫庭筠秋風淒切傷離行客未歸時塞外草先衰江南雁到遲芙蓉凋嫩臉楊柳墮新眉搖落使人悲斷腸誰得知此調及後孫詞名玉蝴蝶然與張泌蝴蝶兒相近決是一調故類聚于此又一體四十二字孫光憲春欲盡景仍長滿園花正黃粉翅兩悠揚翩翩過短墻解颷暖牽遊伴飛厺立殘陽無語對蕭娘舞衫沉麝香起三字兩句與前異滿園句平仄亦異後起三字兩句又改用仄韻亦異圖譜注云與第一體同惟後假首句作六字故不圖不譜此言甚混後首句兩三字且換韻相叶豈可不指明即前起雖亦六字而作二句分者豈可云與第一體同乎又一體九十八字李之儀坐久燈花開盡暗驚風葉初報霜寒冉冉年華催暮顔色非丹攪回腸蛩吟似織留恨意月彩如攤慘無歡篆煙縈素空轉雕盤何難别來幾日信沉魚鳥情滿關山耳邉依約常記巧語綿蠻聚愁窠蜂房未密傾淚眼海水猶慳掩茰關漸移銀漢低泛簾顔與唐調全異攪回腸二句聚愁窠二句俱用對偶暗驚下與後信沉下俱同耳邊依約應作依約耳邉然此十字語氣一貫故上四字可不拘耳鳥字恐是鴈字又一體九十九字史逹祖晚雨未摧宫樹可憐間葉猶抱涼蟬短景歸秋吟思又接愁邊漏初長夢魂難禁人漸老風月俱寒想幽歡土花庭甃蟲網闌干無端啼蛄攪夜恨隨團扇苦近秋蓮一曲當樓謝娘懸泪立風前故園晚強留詩酒新雁逺不致寒暄隔窗煙楚香羅袖誰伴嬋娟前後起處結處俱與前調同只謝娘句用七字異作者多宗此體短景下十字乃一氣貫下者可上四下六亦可上六下四觀此詞及前詞冉冉下十字可見凡詞中此種句法皆然可以類推一曲當樓至風前十一字栁詞作見了千花萬栁比並不如伊是于萬栁斷句而下作五字與此不同然亦是一氣貫下不拘耳但此調作者甚多俱同史體即耆卿亦有五首獨此一篇小異不宜從也太平時四十字又名賀聖朝影賀鑄蜀錦塵香生襪羅小婆娑箇儂無賴動人多見橫波按角雲開風卷幕月侵河纎纎持酒艷聲歌奈情何此調一名賀聖朝影因原名太平時故列于此不附賀聖朝之後勿謂例有不同也圖譜方收賀聖朝影于前旋收太平時于後豈不一玩其腔調平仄耶醉公子四十字又名四換頭顧敻河漢秋雲淡紅藕香侵檻枕倚小山屏金鋪向晚扄睡起橫波慢獨坐情何限衰栁數聲蟬魂銷似厺年凡二句一韻四換韻又一體四十字無名氏門外猧兒吠知是蕭郎至剗襪下香階寃家今夜醉扶得入羅幃不肻脫羅衣醉則從他醉還勝獨睡時此亦唐詞前半用仄韻後半用平韻與前調異又一體一百零六字神仙無臯澤瓊琚珠佩卷下塵陌秀骨依依誤向山中得與相識溪岸側倚高情自鎖煙翠時點空碧念香襟沾恨酥手剪愁今後夢魂隔相思暗驚清吟客想玉照堂前樹三百雁翅霜輕鳯羽寒深誰護春色詩鬢白總多因水村擕酒煙墅留屐更時帶明月同來與花為表德長調與前體迥異秀骨至空碧與後雁翅至留屐相同上林春四十字或加令字楊無咎穠李夭桃堆繡正暖日如薰芳袖少年未用稱遐夀願來歲如今時候相將得意皇都同攜手上林春晝手字或云是叶韻又一體五十三字毛滂蝴蝶初翻簾繡萬玉女齊回舞袖落花飛絮濛濛長憶著灞橋别後濃香斗帳自永漏任滿地月深雲厚夜寒不近流蘇祗憐他後庭梅瘦前後假同只後起七字上林春慢一百二字朝沖之帽落空花衣惹御香鳯輦晚來初過鶴降詔飛龍銜燭戲端門萬枝燈火滿城車馬對明月有誰間坐任狂遊更許傍禁街不扄金鎖玉樓人暗中擲果珠簾下笑著春衫裊娜素蛾繞叉輕蟬撲鬢垂垂柳絲梅朵夜闌飲散但贏得翠翹雙軃醉歸來又重向曉窗梳裹鳯輦至狂遊與後笑著至歸來同依鶴降詔飛補之用孟陬歲好想不拘然照後疊當此詞更許傍九字補之用暫燕處共仰赤松高轍分句平仄不同想亦不拘蛾字宜用仄聲御字詔字逺字補之用淡字歲字衮字須知此等字不可用平生查子四十字魏承班煙雨晚晴天零落花無語難話此時情梁燕雙來厺琴韻對薰風有限和情撫腸斷斷絃頻淚滴黃金縷五言八句四韻作者平仄多有參差此詞八句第二字俱用仄者按韓偓詞前第三句那知本未眠後第四句和煙墜金穗此乃初創之體故只如五言古詩至五代而宋漸加紀律故或亦依此魏體而前後首句第二字用平者為多雖間有一二拗句者然名流則如出一軌也圖譜注生查子名改作美少年可笑夫美少年三字因晏小山此調首句金鞍美少年故也彼牛張孫魏四公乃五代時人百餘年之前豈即預知宋朝晏氏有此一句而取以自名其調乎又按生查子本樝梨之樝省筆作查今有讀作查考之查且取浮查事以為解者若是所乘之查如何加一生字耶又一體四十一字牛希濟春山煙欲收天淡稀星小殘月臉邊明别淚臨清曉語已多情未了回首猶重道記得緑羅裙處處憐芳草後起三字兩句與前詞異孫少監一首作繡工夫牽心緒玉爐寒香燼滅是有此體也詞統刪去巳字豈以生查子必五字起耶又一體四十二字孫光憲暖日策花驄嚲鞍垂楊陌芳草惹煙青落絮隨風白誰家繡轂動香塵隱映神仙客狂殺玉鞭郎咫尺音容隔後假起句用七字又一體四十二字張泌相見稀喜相見相見還相逺檀畫荔枝紅金蔓蜻蜓軟魚雁疏芳信斷花落庭隂晚可惜玉肌膚消瘦成慵懶前後起處皆用三字兩句圖譜于喜相見不注韻而于逺字注韻起何也紗窗恨四十一字毛文錫新春燕子還來至一雙飛壘窠泥溼時時墜涴人衣後園襄看百花發香風拂繡户金扉月照紗窗恨依依又一體四十二字毛文錫雙雙蝶翅塗鉛粉咂花心綺窗繡户飛來穩畫堂隂二三月愛隨風絮伴落花來拂衣襟更剪輕羅片傳黃金更剪句比前多一字韻前墜字叶至字此穩字叶粉字兩首既同自當用故比舊增注勿謂穿鑿也女冠子四十一字牛嶠含嬌含笑宿翠殘紅窈窕鬢如蟬寒玉簪秋水輕紗捲碧煙雪肌鸞鏡裏琪樹鳯樓前寄語青蛾伴早求仙首二句仄協下皆平年按嘯餘譜選刻韋莊詞前假云四月十七正是去今日别君時忍泪佯低靣含羞半斂眉首句乃以七字起韻次句以日字叶之下時字換平韻也譜中不解注首句四字次句九字而以時字為起韻一注而失兩韻句字錯調亦隨錯大可噴飯至詩餘辨體自謂考證明白矣而但知于今日斷句仍謂時字起韻不猶然大盲乎自唐以來作此調者不知凡幾如此小體尚不能辨而自以為辨體耶夜韋作四月十七月字仄又一首昨夜半夜字亦仄想不拘然不必從又一體一百七字康與之火雲初布遲遲永日炎暑濃隂高樹黃鸝葉底羽毛學整方調嬌語薰風時漸動峻閣池塘芰荷爭吐畫梁紫燕對對銜泥飛來又厺想佳期容易成辜負共人人同上畫樓斟香醑恨花無主卧象牀犀枕成何情緒有時魂夢斷半窗殘月透簾穿户厺年今夜扇兒扇我情人何處女冠長調字句參差不一如漢老伯可耆卿美成勝欲皆詞人宗匠而各詞多不相同此作字止百七較他人為少然細玩之實係完整非有差落也薰風以下前後假相符圖譜于暑字不注叶大謬又一體一百十二字蔣捷蕙風香也雪晴池館如畫春風飛到寶叉樓上一片笙簫琉璃光射而今燈謾挂不是暗塵明月那時元夜况年來心懶意怯羞與閙蛾爭耍江城人悄初更打問繁華誰解再向天工借剔殘紅灺但夢裏隱隱鈿車羅帕吳箋銀粉砑待把舊家風景寫成間話笑緑鬟鄰女倚窗猶唱夕陽西下此比康詞較多五字但按竹山此作字字依李漢老帝城三五一首平仄舊家上比李多待把二字今細訂之待把句即同前假不是句此二字不可少而李詞落去也沈本草堂集于李詞不如趂早句上注云一本此處多到字不知非多一字乃尚少一字也故不敢另收一百十字之體若康詞則前後俱無此兩字并無况字笑字而于換頭上加一想字與此相異且康詞于挂砑二字不用韻一片笙簫反作羽毛學整故另録于前作一格耳韻又按春風飛到句漢老用叶伯可亦叶此獨不用想所不拘况年來下十三字照本尾及康詞前後結俱應作三句而漢老作見許多才子艷質携手並肩低語竹山亦步亦趨故此假亦作兩句讀於意怯下分假然此假語氣連貫作二句作三句俱不礙也只李之質字蔣之怯字皆是入聲可以作平若去聲則不可耳即此心懶意怯欲仿才子艷質四字用平上去入又一首用千載舊迹亦同古人心細如髮若此而今人翻謂不妨假借豈不毫釐千里哉閙蛾諸本多作蛾兒觀此尾句夕字仄聲李詞前後俱仄聲作閙蛾為是且閙蛾是上元之物去閙字則晦矣有刻作閙蛾兒三字更謬夕陽西下係伯可上元寶鼎現詞首句故云猶唱又一體一百十一字柳永淡煙飄薄鶯花謝清和院落樹隂密翠葉成幄麥秋霽景夏雲忽變竒峰倚寥廓波暖銀塘漲新萍緑魚躍想端憂多暇陳王是日嫩苔生閣正鑠石天高流金晝永楚榭光風轉蕙披襟處波翻翠幕以文會友沉李浮瓜忍輕諾别館清間避炎蒸豈須河朔但樽前隨分雅歌艷舞盡成歡樂此與前調只兩結同其餘絶不相類麥秋以下十三字圖譜強分作一四一九波暖下十字強分作兩五余眇識之人不敢妄注緑魚躍三字無理過變至幕字方叶亦恐未確而譜以蕙字為惡字謂是叶韻幕字翻不注叶想讀作暮音矣但光風轉蕙乃招魂句改為轉惡無理之甚栁七雖俗未必如此村煞也總之樂章集差訛最多實難勘定寧甘闕陋之嘲不能為柳氏功臣亦不敢為栁氏罪人也作此調者亦只從康蔣可矣端憂多暇月賦中語圖譜作憂端非又一體一百十四字栁永同雲密布撒梨花栁絮飛舞樓臺悄似玉向紅爐暖閣院宇深沉廣排筵會聽笙歌猶未徹漸覺寒輕透簾穿户亂飄僧舍密灑歌樓酒簾如故想樵人山徑迷蹤路料漁人收綸罷釣歸南浦路無伴侣見孤村寂寞招颭酒旗斜處南軒孤雁過嚦嚦聲聲又無書度見臘梅枝上嫩蘂兩兩三三微吐諸刻或以此詞為周待制作然其語確是栁屯田待制縝密不作此踈枝濶葉也故其字句亦傳訛難考樓臺以下三十二字至户字方叶韻斷無此理或云玉字音裕以入作叶亦未確字字似韻而上既不可連暖閣下深沉又不可連廣排其為差錯無疑圖譜乃以會字為叶韻甚竒後假雖較前稍明然亦未必確然因無今人率意造譜之膽未敢論定中興樂四十一字毛文錫豆蔻花繁煙艷深丁香軟結同心翠鬟女相與共淘金紅蕉葉裏猩猩語鴛鴦浦鏡中鸞舞絲雨隔荔枝隂或云女字是換韻後假叶之又一體四十二字牛希濟池塘暖碧浸晴暉濛濛柳絮輕飛紅蕊凋來醉夢還稀春雲空有雁歸珠簾垂東風寂寞恨郎拋擲淚溼羅衣與前全異為按此調因此詞尾三字好異者遂名為溼羅衣巳可厭選聲即以溼羅衣立名至圖譜則又訛而為羅衣溼且并前毛司徒詞亦謂之羅衣溼矣豈不大誤此類甚多作者但須詞佳何必務立異名以為新乎詞統選沈自炳詞于醉夢還稀作孤燈漏長春雲空有作夢入花庭俱誤選聲因而收之沈明人原于詞道不工何可取以為譜哉又一體八十四字李珣後庭寂寂日初長翩翩蝶舞紅芳繡簾垂地金鴨無香誰知春思如狂憶蕭郎等間一厺程遙信斷五嶺三湘休開鸞鏡學宮粧可能更理笙簧倚屏凝睇淚落成行手尋裙帶鴛鴦暗思量忍辜前約教人花貌虛老風光即前調合為一假後加一疊但繡簾垂地倚屏凝睇平仄與牛詞紅蕊凋來不同醉花間四十一字毛文錫深相憶莫相憶相憶情難極銀漢是紅墻一帶遙相隔金盤珠露滴兩岸榆花白風搖玉佩清今夕為何夕珠露圖譜誤作露珠又一體四十一字毛文錫休相問怕相問相問還添恨春水滿塘生鸂鷘還相趂昨日雨霏霏臨明寒一陳偏憶戍樓人久絶邊庭信前假同後假平仄異正按嘯餘注云生查子與醉花間相近不知生查子體前後皆五字起間有用六字兩句者醉花間正體則前必六字後必五字也又一體五十一字馮延巳林鶴歸棲撩亂語階前還日暮屏掩畫堂深簾捲蕭蕭雨玉人何處厺鵲喜渾無據雙眉愁幾許漏聲看却夜將闌點寒燈扄繡户起結俱異點絳唇四十一字趙長卿雪霽山橫翠濤擁起千重恨砌成愁悶那更梅花褪鳯管雲笙無不縈方寸叮嚀問淚䀶羞揾界破香腮粉翠字去聲妙甚砌字淚字亦去俱妙凡名作俱然作平則不起調近見時人有于翠字用平而砌成句用平平仄仄是不深于詞者也前沈氏别集選韓魏公病起懨懨一首次句云對庭花樹添憔悴此誤多對字沈不能辨明乃注題下云前假多一字是使後人誤認有此四十二字體矣謬哉戀情深四十二字毛文錫滴滴銅壺寒漏咽醉紅樓月宴餘香殿會鴛衾蕩春心真珠簾下曉光侵鶯語隔瓊林寶帳欲開慵起戀情深此詞兩首俱以戀情深為結想因此名題也醉紅樓月紅樓二字相連其第二首作簇神仙伴神仙二字亦連須知之寶帳句第二首云永願作鴛鴦伴則在作字一豆與此微不同贊浦子四十二字毛文錫錦帳添香睡金爐換夕薰懶結芙蓉帶慵拖翡翠裙正是柳夭桃媚那堪暮雨朝雲宋玉高唐意裁瓊欲贈君後起二句各六字與前假異浣溪沙四十二字張曙枕障薰爐冷繡帷二年終日苦相思杏花明月爾應知天上人間何處厺舊歡新夢覺來時黃昏微雨畫簾垂詞統收匏庵一首起二句云晚來疏雨過柴關還我斜陽屋滿間平仄全誤此等明朝先輩之作原弄筆適興未嘗究心選以為世模楷反揚其短矣是非作者之過而選者之過也更有大怪者圖譜注此調于杏花舊歡黃昏三句俱作可用仄仄平平仄仄平天上句作可用平平仄仄平平仄幾將此調全首平仄俱改則真為太甚矣渡按此調有起用仄聲次句方韻者如薛昭藴紅蓼頭秋正雨是也兹注明不録又一體四十二字南唐後主紅日已高三丈透金爐次第添香獸紅錦地衣隨步皺佳人舞點金叉溜酒惡時拈花蕊嗅别殿遙聞簫鼓奏用仄韻後起亦叶攤破浣溪沙四十八字子又名山花南唐元宗菡萏香銷翠葉殘西風愁起緑波間還與韶光共憔悴不堪看細雨夢回雞塞逺小樓吹徹玉笙寒多少淚珠何限恨倚闌干此調本以浣溪沙原調結句破七字為十字故名攤破浣溪沙後又另名山花子耳後人因李主此詞細雨小樓二句膾炙千古竟名為南唐浣溪沙然則唐詞沿至宋人改新調而仍舊名者甚多如喜遷鶯長相思之類皆添字成調豈可名北宋喜遷鶯北宋長相思耶按調名沙字與浪淘沙不同義應作紗或又作浣沙溪則尤當為紗今姑仍諸刻浣溪沙慢九十三字周邦彥水竹舊院落櫻笋新蔬果嫩英翠幄紅杏交榴火心事暗卜葉底尋雙朵深夜歸青鎖燈盡酒醒時曉窗明叉橫鬢嚲怎生那被間阻時多奈愁腸數疊幽恨萬端好夢還驚破可怪近來傳語也無箇莫是嗔人呵真個若嗔人却因何逄人問我紅杏以下與後好夢以下同意按多字乃以平叶仄不然直至破字方韻矣且語亦在此頓住下奈愁腸三句自一串而下也是此詞亦為平仄通叶之體但無第二首可對恐人不信故不敢竟注識者當自辨之清商怨四十二字又名傷情怨晏幾道庭花香信尚淺最玉樓先暖夢覺香衾江南依夢逺回文錦字暗剪謾寄與也應歸晚要問相思天涯猶自短前後起皆三平三仄觀片玉枝頭風信漸小江南人去路杳可見錦字上聲可借作平不可用去聲也尚淺夢逺暗剪自短皆去上妙妙片玉亦然無怪兩公之樹幟騷壇也按此調乂名傷情怨圖譜兩收誤又一體四十三字沈會宗城上鴉啼斗轉漸玉壺冰滿月淡寒梅清香來小院誰遺鸞箋寫怨翻錦字疊疊和愁卷夢破胡笳江南煙樹逺遺照首句上字應作去聲照前後二詞亦可作平後假次句多一字又一體四十三字又名關河令晏殊關河愁思望處滿漸素秋向晚雁過南雲行人回淚眼雙鸞衾禱悔展夜又永枕孤人逺夢未成歸梅花聞塞管首句比前調多一字作按此調因此詞首二字故又名關河令片玉詞亦關河令其首句秋隂時晴漸向暝正與此同而趙坦菴作一云亭臯霜重飛葉滿一云江頭伊軋動柔櫓不如依此為是處滿泪眼悔展塞管亦皆去上可知元獻家風亦可知詞眼定格矣雪花飛四十二字黃庭堅擕手青雲路穩天聲迤邐傳呼𫀆笏恩章乍賜春滿皇都何處難忘酒瓊花照玉壺歸嫋絲稍競醉雪舞街衢後起二句比前假各少一字醉垂鞭四十二字張先酒靣灔金魚吳娃唱吳潮上玉殿白麻書待君歸後除勾留風月好平湖曉翠峰孤此景出關無西州空畫圖凡三用韻前後結處二句同傷春怨四十三字王安石雨打江南樹一夜花開無數緑葉漸成隂下有遊人歸路與君相逄處不道春將暮把酒祝東風且莫恁匆匆厺荆公自注夢中作應是創調他無作者兩結雖俱六字須知語氣不同霜天曉角四十三字又名月當忩辛棄疾吳頭楚尾一棹人千里休説舊愁新恨長亭樹今如此宦途吾倦矣玉人留我醉明日落花寒食得且住為佳耳兩結六字句定體也自嘯餘于亭字下誤落一樹字圖譜等因之注作五字句毋論將詞注差但即長亭今如此五字如何解法蓋此句本用枮樹賦樹猶如此一語也乃不知而妄注何哉而圖譜又改調名作月當廳吾不知霜天曉角四字有何不佳而必改之也况東澤寓名月當窗非廳字且月當廳自有正調又一體四十三字趙長卿雪花飛歇好向前村折行至斷橋斜處寒蕊瘦不禁雪韻絶香更絶歸來人共説最愛夜堂深迥疏影占半窗月後假兩字叶韻起高賔王作望極連翠陌香更二字可作仄平又一體四十三字蔣捷人影窗紗是誰來折花折則從他折去知折去向誰家簷牙枝最佳折時高折些説與折花人道須插向鬢邊斜用平韻後起亦兩字叶又一體四十三字黃幾玉粲冰寒月䀶侵畫欄客裏安愁無地為徙倚到更殘問花花不言嗅香香欲闌消得箇溫存處山六曲翠屏間用平韻而後起非兩字叶者又一體四十四字趙長卿閣兒幽靜處圍爐面小窗好似鬬頭兒坐梅煙炷返魂香對火怯夜冷猛飲消漏長飲罷且收拾睡斜月照滿林霜前起五字不用韻後亦同又一體四十四字程垓幾夜瑣窗揭素蟾光似雪恰恨照人欹枕紗厨爽簟紋滑迤邐篆香裛好懷誰共説若是知人風味來分付半牀月五字起用仄韻匆書舟又一首前起玉清冰樣潔幾夜相思切後起匆休惜别還有來時節平仄與此詞又異因句字同不另録卜算子四十四字又名百尺樓蘇軾缺月挂疏桐漏斷人初定時見幽人獨往來縹眇孤鴻影驚起却回頭有恨無人省㨂盡寒枝不肻棲寂寞沙洲冷毛氏云駱義烏詩用數名人謂為卜算子故牌名取之按山谷詞似扶著賣卜算蓋取義以今賣卜算命之人也圖因秦詞極目煙中百尺樓故巧名百尺樓譜刪卜算子而用百尺樓無謂又一體四十四字石孝友見也如何暮别也如何遽别也應難見也難後會難憑據去也如何去住也如何住住也應難去也難此際難分付首句即起仄韻後起亦叶與前詞異又一體四十五字徐俯胸中千種愁挂在斜陽樹緑葉隂隂自得春草滿鶯啼處不見凌波步空想如簧語門外重重疊疊山遮不斷愁來路首句平仄與蘇詞異不起韻後結六字亦俱異譜圖俱注石詞異而後起叶仄首句不叶韻未審何故者按詞統注云遮字是襯字大謬此調多用六字結觀李之儀定不負相思意趙長卿山不似長眉好此類甚多豈皆襯字乎豈他句不可襯獨此句可襯乎若謂詞可用襯則詞中多少一兩字者甚衆皆可以襯之一説槩之而不必分各體矣又一體四十五字黃公度薄宦各東西往事隨風雨先是離歌不忍聞又何况春將暮愁共落花多人逐征鴻厺君向瀟湘我向秦後會知何處此又前結六字後結五字者又一體四十六字黃庭堅要見不得見要近不得近試問得君多少憐管不解多于恨禁止不得淚忍管不得悶天上人間有底愁向箇裏都諳盡兩結皆六字而兩起句皆仄而不叶韻者又一體四十六字杜安世樽前一曲歌歌裏千金意才欲歌時淚巳流恨應更多於淚試問緣何事不語如癡醉我亦情多不忍聞怕和我成憔悴首句平後起叶而兩結皆六字者又一體四十六字杜安世深院花鋪地淡淡隂天氣水榭風亭朱明景又别是愁情味有情奈無計謾惹成憔悴欲把羅巾暗傳寄細認取斑點淚前後第三句俱用仄聲而後竟叶韻者後又按姑溪云我住長江頭君住長江尾上長字平村云朝見樹頭繁暮見樹頭少下樹字仄皆係偶然不必學卜算子慢八十九字柳永江風漸老汀蕙半凋滿目敗紅衰翠楚客登臨正是暮秋天氣引疏砧斷續殘陽裏對晚景傷懷念逺新愁舊恨相繼脈脈人千里念兩處風情萬重煙水雨歇天高望斷翠峰十二儘無言誰會憑高意縱寫得離情萬種奈歸鴻誰寄楚客至念逺與後雨歇至萬種同半字恨字定格去聲後張詞亦用去絮二字漸老到晚念逺念兩縱寫萬種等用六箇去聲妙絶又一體九十三字張先溪山别意煙樹去程日落采蘋春晚欲上征鞍更掩翠簾回靣相盻惜彎彎淺黛長長眼奈畫閣歡遊也學狂風飛絮輕散水影橫池館對靜夜無人月高雲逺一餉凝思兩眼淚䀶還滿難遣恨私書又逐東風斷縱夢澤層樓萬尺望湖城那見比柳作多相盻難遣四字圖譜讀更掩翠簾為一句回靣相盼為一句且注回靣云可用仄平怪絶怪絶又有傖父讀作相盼惜者不知靣字與後假滿字是六字句叶韻盼與遣亦二字句叶韻者也無知妄讀何哉歡遊下十字據後假及栁詞應于學字分句人謂歡遊也學不可斷句不知此本十字句歌者原不于學字歇拍正不妨略住即如水龍吟之結誤讀坡詞而謂另一體者相類甚矣拘墟者之未可與權也諸仄字皆宜玩而去翠淚等去聲妙妙觀前栁詞可知詞律卷三
