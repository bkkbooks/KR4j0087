body:
  text: 詞律巻十二宜興萬樹撰過澗歇八十字晁補之歸去奈故人尚作青眼相期未許明時歸去放懷處買得東臯數畝靜愛園林趣任過客剝啄相呼書扃戸堪笑兒童事業華顛向誰語草堂人悄圓荷過微雨都付邯鄲一枕清風好夢初覺砌下槐影方停午草堂舊刻及各選俱載栁七淮楚曠望極一首久而傳訛于後段落去二字嘯餘乃因而作譜硬註字句圖譜因之遂為千古貽誤今以无咎詞為據并録栁作于後以証訛脫之說淮楚曠望極千里火雲燒空盡日西郊無雨厭行旅數幅輕帆旋落艤棹蒹葭浦避畏景兩兩舟人夜深語首此際爭可便恁奔利名九衢塵裏衣冠冒炎暑囘江鄉月觀風亭水邊石上幸有散髮披襟處首句兩字起韻次句三字千里句六字盡日句六字晁詞明明可証也而譜註云首句七字以里字為起韻是一註而破亂三句失一楚字韻反妄添一里字韻豈不大誤且此闋是魚虞韻豈首句便借支字韻乎而淮字註可仄避字可平夜深註可平仄必欲改盡此調而後巳矣後段九衢以下與前詞草堂以下字字相同則九衢之上該有十一字今落去二字止存九字因而不可句豆據愚揣之必奔字與名字下各落一字或是奔馳利名路耳故下便接九衢冒暑等語于理為當而譜乃硬註此際爭可便為一句恁奔至塵裏為一句豈不大誤又自以恁奔利名為拗因註此四字平仄皆可反用豈不誤而又誤盖以裏字為卟即首句里字起韻之說栁七縱有俳俗之謗豈意至五六百年後又以不識韻之罪加之乎況恁奔是何言語夫舊刻傳訛非後人之過但闕疑則可若彊不知以為知則自誤不可況以誤人乎安公子八十字栁永長川波瀲灔楚鄉淮岸迢逓一霎烟汀雨過芳草青如染驅驅攜書劍當此好天好景自覺多愁多病行役心情厭望處曠野沉沉暮雲黯黯行侵夜色又是急槳投村店認去程將近舟子相呼遙指漁燈一㸃惟耆卿有此詞他無可証相按此調當作三疊長川至如染驅驅至情獻字句同宜分作兩段所謂雙拽頭也又一體一百二字陸游風雨初經社子規聲裏春光謝最是無情零落盡薔薇一架況我今年憔悴幽牕下人盡怪詩酒消聲價向藥爐經卷忘却鶯牕栁榭萬事收心也粉痕猶在香羅帕恨月愁花爭信道如今都罷空憶前身便面章臺馬因自來禁得心腸怕縱遇歌逢酒但說京都舊話此調整順可從前後段同又一體一百四字晁補之栁老荷花盡夜來霜落平湖淨征雁横天鷗舞亂魚遊清鏡又還是當年我向江南興移画船深渚蒹葭映對半篙碧水滿眼青山魂凝一番傷華髩放歌狂飲猶堪逞水驛孤帆明夜此歡重事省夢囘處詩塘春草愁難整宦情與歸思終朝競記他年相訪認取斜川三逕又還是句與夢囘處句十字與模魚兒中語同比前詞各多一字番字詞人常作仄聲用明夜句該上三下四今此字不可豆而歡重事省亦難解必係訛錯又一體一百六字栁永逺岸收殘雨雨殘稍覺江天暮拾翠汀洲人寂靜立雙雙鷗鷺望幾㸃漁燈掩映蒹葭浦停画橈兩兩舟人語道去程今夜遙指前村烟樹遊宦成羇旅短檣吟倚閒凝竚萬水千山迷逺近想鄉闗何處自别後風亭月榭孤歡聚剛斷腸惹得離情苦聴杜宇聲聲勸人不如歸去雙雙上多一立字鄉闗上多一想字與前兩詞異栁又一首前用四字後用五字乃前段落一字也杜宇聲聲應作仄平平仄人字應仄或是偶誤或是不拘然後學宜從其前段式為妥又一體一百六字杜安世又是春將半杏花零落閒庭院天氣有時陰淡淡緑楊輕軟連画閣繡簾半捲招新燕殘黛斂獨倚闌干遍暗思前事月下風流狂蹤無限惜恐鶯花晩更堪容易相抛逺離恨結成心上病幾時消散空際有斷雲片片遙峰暖聞杜宇終日哀啼怨暮烟芳草寫望迢迢甚時重見天氣句離恨句與前稍異連画閣二句與後空際有二句各止七字亦與前異兩結各四字三句更不同與或曰天氣與離恨句原可作四字照前讀連画閣空際有亦可照前捲字片字不是叶韻乃偶合耳此論亦是然其結則固是另一體也早梅芳近八十字或無近字呂渭老畫簾深粧閣小曲徑明花草風聲約雨暝色啼鴉暮天杳染眉山對碧勻臉霞相照漸更衣對客微坐自輕笑醉紅明金葉倒恣看還新好瑩注粉泪滴爍波光射庭沼犀心通宻語珠唱翻新調佳期定約秋了霞相照翻新調以上前後同尾句恐誤聖求詞每多訛字又一體八十二字周邦彦花竹深房櫳好夜閴無人到隔牕寒雨向壁孤燈弄餘照泪多羅袖重意宻鶯聲小正魂驚夢怯門外巳知曉去難留話未了早促登長道風披宿霧露洗初陽射林表亂愁迷逺覽苦語縈懷抱謾囘頭更堪歸路杳後結謾囘頭下比前詞多二字但查片玉此調二闋及姑溪詞俱八字則前詞必是脫落作者只依此填之可也姑溪于路字作人字周又一首于堪字作滿字總不如依此為妥瑤堦草八十字程垓空山子規叫月破黄昏冷簾幙風輕緑暗紅又盡自從别後粉消香膩一春成病那堪晝閒日永恨難整起來無語緑萍破處池光淨悶理殘粧照花獨自憐瘦影睡來又怕飲來越醉醒來却悶看誰似我孤另自從下與後睡來下同一或曰我字註可平閒字何以不註可仄余曰平則途仄兼兩義詞中細處上去原不可混凡于平字註可仄者原當詳審可上去通用則不妨隨填若止可上而不可去者自宜還他或平或上不可以去字混入註不便細分上去故不得巳只以仄字概之也如此我字可以用平閒字亦不妨用上然若註可仄則人謂去聲亦可用而調乖矣通部皆然偶記于此鬬百花八十一字又名夏州晁補之臉色朝霞紅膩眼色秋波明媚雲度小釵濃鬢雪透輕綃香臂不語凝情教人喚得囘頭斜盼未知何意百態生珠翠低問石上鑿井何由及底微向耳邊同心有緣千里飲散西池涼蟾正滿紗牕一語繫人心裏楊誠齋有云詞須擇腔如鬬百花之無味是知此調當時原不以為佳故作者寥寥且其調中多有參差今細考註之如起句晁三首俱起韻栁三首一韻二不韻第三句晁二作俱同仄聲一則叶韻栁一與此同其二則一云池塘淺蘸烟蕪平聲一云長門深鎖悄悄第四句栁二同一云滿庭秋色將晩平仄皆㕘差後段起十字晁一云教展香裀看舞霓裳促遍香裀用平與此石上二字異一云與問堦上簸錢時節記微笑但把纎腰向人嬌倚人多讀于節字斷句下作記微笑甚誤此乃記字上落一猶字或應字也記字是叶韻微笑但把乃四字句栁亦作年少傳粉平仄正合是此調原無八十字格也栁換頭一與教展香裀同一云無限幽恨寄情空殢紈扇一云爭奈心性未㑹先憐佳壻亦皆㕘差與此篇異微向耳邊耳字必要仄聲或作平仄仄平或作平仄仄上慎勿用去仄平平按不語凝情以下三句一四兩六前後相同對照為結不宜前尾拖一五字句愚謂此必係後段起句而誤移耳然傳之巳久不敢遽改知音者請自玩味或以鄙言為諒乎韻又栁一首于次句亦不起韻直至第四句方起恐是誤也不必從有有令八十一字趙長卿前山減翠疎竹度輕風日移金影碎還又年華暮看看是新春至那更堪有箇人人似花似玉温柔伶俐準擬恩情忔戲拈弄上則人難比我也埋根𥪡柱你也爭些氣大家一捺頭地美中更美厮守定共伊百嵗此等俳詞為北曲之先聲矣皂羅特髻八十一字蘇軾采菱拾翠算如此佳名阿誰消得采菱拾翠稱使君知客千金買采菱拾翠更羅裙滿把真珠結采菱拾翠正髻鬟初合真箇采菱拾翠但深憐輕拍一雙手采菱拾翠繡衾下抱著俱香滑采菱拾翠待到京尋覔疊用采菱拾翠字凡七句或此調格應如此或是坡仙遊戲為之未可考也稱使君下與後但深憐下同彩鳳飛八十一字陳亮人立玉天如水特地如何撰海南沈燒著欲寒猶煖算從頭有多少厚徳陰功人家上一一舊時香案㬠經慣小駐吾州纔爾依然歡聲滿莫也教公子王孫眼見這些兒潁脱處髙出書巻經綸自入手不了判斷中多難明所當闕疑九玩前後相合處則特地句與依然句各五字次各字于三字一豆又次各三字又次各七字于三字一豆但此句照後段巻字叶韻則前功字平聲不合不可解也次人家至香案九字比後經綸下九字而㬠經慣三字當為後段換頭起句誤屬前尾耳字雖多訛其段落定應如此㬠宜作煞音㬠忒煞也㬠則為日曬字坡詞江南父老時與㬠漁簑最髙樓八十一字劉克壯周郎後直數到清真君莫是前身八音相應諧韶樂一聲未了落梁塵笑而今輕郢客重巴人只少箇綠珠横玉笛更少箇雪兒彈錦瑟欺賀晏壓黄秦可憐樵唱并菱曲不逢御手與龍巾且酣眠篷底月甕間春後段起兩句換仄韻稼軒一首第四五句用是夢松後追軒冕是化鶴後去山林夢化二字去聲因使丁氏故事而用之不可學也後起二句元司馬昻父作按秦箏學弄相思調寫幽情恨殺知音少平仄全反甚誤雖詞綜載之不可學又一體八十二字毛滂微雨過深院芰荷中香冉冉繡重重玉人共倚闌干角月華猶在小池東入人懷吹髩影可憐風分散去輕如雲與夢剰下了許多風與月侵枕簟冷簾櫳剛能小睡還驚覺畧成輕醉早醒鬆仗行雲將此恨到眉峰香冉冉三字兩句與前異後段起處兩句仄韻不自相叶愚意謂夢字乃是雪字與下月字為叶也而毛又一首作謾良夜月圓空好意恐落花流水終寄恨落花流水必流水落花之訛然恨字亦不叶意字或另有此格亦未可知但其侵枕簟兩句作悲歡往往相隨則竟作六字連句大與前體不合定係差誤不可從矣作者于仄聲韻必叶為是倒垂栁八十一字楊无咎曉來烟露重為重陽増勝致記一年好處無似此天氣東籬白衣至南陌芳筵啟風流曽未逺登臨都在眼底人生如寄謾把茱萸看仔細擊節聴髙歌痛飲莫辭醉烏㡌任教顛倒風裏墜黄花明日縱好無情味无咎又一首記一年至天氣十字作而今精神傾下越樣風措必係訛謬烏㡌任教作情山曲海平仄不同或亦不拘栁初新八十一字栁永東郊向曉星杓亞報帝里春來也栁臺烟眼花勻露臉漸覺綠嬌紅姹妝㸃層臺芳榭運神功丹青無價别有堯堦試罷新郎君成行如画杏園風細桃花浪暖競喜羽遷鱗化遍九陌相將遊冶驟香塵寶鞍嬌馬栁臺下與杏園下前後皆同只遍九陌句多一字必粧㸃上落一字今姑照舊錄之作者添字與後同可也圖譜于相將遊冶落相字遂致前段六字相連後段三字兩句不合矣運神驟香俱作可用平仄何據新荷葉八十二字趙彦端欲暑還涼如春有意重歸春若歸來任他鶯老花飛輕䨓澹雨似晩風欺得單衣簷聲驚醉起來新綠成圍囘首分攜光風冉冉菲菲曽幾何時故山疑夢還飛鳴琴再撫將清恨都入金徽永懷橋下繫船溪栁依依前後俱同只後段起句叶韻查稼軒諸作皆用韻孏窟惜香介庵亦有不叶者可不拘也因餘同不另錄此詞乃和稼軒者曽幾何時非叶韻仲殊一首于輕䨓二句云波光艶粉紅相間脈脈嬌羞圖譜收之乃于艷字讀斷而下作八字句誤矣曽幾下十字永懷下十字俱不分斷總不解查照前段故也夢玉人引八十二字呂渭老上危梯望画閣迥繡簾垂曲水飄香小園鶯喚春歸舞袖弓彎正滿城烟草萋迷結伴踏青趂蝴蝶雙飛賞心歡計從别後無意到西池自撿羅囊要尋紅葉留詩懶約無憑據鶯花都不知怕人問彊開懷細酌酴醿汲古刻作八十四字望字作盡盡二字蝴蝶下有一字無憑下少據字細酌下有一字與此不同未知孰是毛刻固多訛處而此亦未必確然也酴醿二字宜從酉旁謂酒也故上有酌字詞綜作荼䕷非是栁腰輕八十二字栁永英英妙舞腰肢軟章臺栁昭陽燕錦衣冠盖綺堂筵宴是處千金爭選顧香砌絲管初調倚輕風珮環微顫乍入霓裳促遍逞盈盈漸催檀板慢垂霞袖急趨蓮步進退竒容千變笑何止傾國傾城暫囘眸萬人腸斷錦衣以下前後相同依後段步字則前段宴字乃是偶合韻脚而非叶也作者可以不叶爪茉莉八十二字栁永每到秋來轉添甚況味金風動冷清清地殘蟬噪晚甚聒得人心欲碎更休道宋玉多悲石人也須下泪衾寒枕冷夜迢迢更無寐深院靜月明風細巴巴望曉怎生捱更迢逓料我兒只在枕頭根底等人睡來夢裏孤調他無可援証所可辨者金風動句即後深院靜殘蟬句即後巴巴句則怎生句比前應于更字上加一字舊譜總作六字則捱更迢逓不成語矣捱字去聲更者更漏之更或是三更落三字譜却認作去聲若是去聲則迢逓者何物兩結俱作六字余謂尾句該分斷盖所憶之人纔入夢即見之如隠于枕底者但等人睡熟即來也如睡來連讀便不通矣審爾則前結亦是兩句以也字作虚字用耳祭天神八十二字栁永歎笑筵歌席輕抛嚲背孤城幾舍烟村停画舸更深釣叟歸來數㸃殘燈火被連綿宿酒醺醺愁無那寂寞擁重衾卧又聞得行客扁舟過蓬牕近蘭棹急好夢還驚破念生平單栖蹤跡多感情懷到此厭厭披衣坐前後各異只數㸃句與好夢句相似宿酒句與到此句相似耳又一體八十五字栁永憶繡衾相向輕輕語屏山掩紅蠟長明金獸盛燻蘭炷何期到此酒態花情頓辜負愁腸斷還是黄昏那更滿庭風雨聴空堦和漏碎聲鬭滴愁眉聚算伊還共誰人爭知此寃苦念千里烟波迢迢前約舊歡省一向無心緒與前調迥别字句亦不確風雨處應是分段然不敢彊註也按毛氏填詞名解述因話錄所載北方季冬二十四日以板畫一人有形無口人各佩之謂可辟𤯝時有作謔詞名祭袄神而祭天神反失註解驀山溪八十二字又名上陽春張元幹一番小雨陡覺添秋色桐葉下銀牀又送箇淒涼消息故鄉何處搔首對西風衣線斷帶圍寛衰髩添新白錢塘江上冠盖如雲積騎馬傍朱門誰肻念塵埃墨客佳人信杳日暮碧雲深樓獨倚鏡頻看此意無人識前後同又一體八十二字石孝友鶯鶯燕燕搖蕩春光嬾時節近清明雨初晴嬌雲弄煗醉紅溼翠春意釀成愁花似染草如剪巳是春彊半小鬟微盼分付多情管痴騃不知愁想怕晩貪春未慣主人好事應試玳筵開歌眉歛舞腰軟怎向輕分散前詞次句起韻後段亦次句叶韻此則前後首句俱用韻者外又有前首句起韻後起不叶者有前首不起韻後起叶者總不拘也前詞衣帶斷等三字四句俱不叶此則俱叶者其餘各體㕘差摘列于後有前上下句俱叶後上仄下平者如山谷李氣韻前斜枝倚風塵裡後書謾寫夢來空也前後俱上仄不叶下叶者如易袚語宇韻前梨花雪桃花雨後吳姬唱秦娥舞也前上平下仄不叶後上仄不叶而下叶者如于湖近印韻前繡工慵圍棋倦後禽聲喜流雲盡也前上仄下平後上平下仄俱不叶者如无咎檜翠韻前將風調改荒涼後汝南周東陽沈也前上平下仄後上仄下平俱不叶者如姑溪戸處韻前泛新聲催金盞後歡暫歇酒微醺也前兩叶後上仄不叶而下叶者如美成水尾韻前山四倚雲漸起後因箇甚烟霧底也前後俱上平下仄不叶者如澤民絮去韻前葉依依烟鬱鬱後隔斜陽㸃芳草也前上平下仄不叶後俱叶者如永叔滿晚韻前駕香輪停寶馬後春宵短春寒淺也前上平下叶後上平下仄不叶者如盧炳旦宴韻前倩雙哦敲象板後髩長青顔不老也前兩仄不叶後上仄下平者如惜香翠碎韻前髙一餉低一餉後不妒富不憎貧也前上仄下平後俱仄不叶者如曹組樹暮韻前風細細雪埀埀後消瘦損東陽也也前上仄俱仄不叶後上平下叶者如無咎可我韻前我心裡忡忡也後天天天不曽麽也前上仄不叶下叶後上仄不叶下平者如惜香了到韻前笙簧奏星河曉後一嵗裡一翻新也前後俱上叶下平者如惜香士戲韻前三徑裡四時花後爾富貴爾榮華也其三字中平仄亦不畫一總可隨填不拘耳拂霓裳八十二字晏殊笑秋天晩荷花綴露珠圓風日好數行新鴈貼寒烟銀簧調脆管瓊柱撥清絃捧􅘑船一聲聲齊唱太平年人生百嵗離别易㑹逢難無事日剩呼賓友啟芳筵星霜催綠鬢風露損朱顔惜清歡又何妨沉醉玉樽前風日好下前後同又一體八十三字晏殊喜秋成見千門萬戸樂昇平金風細玉池波浪縠文生宿露霑羅幕微涼入画屏張綺宴傍薰爐蕙炷和新聲神仙雅㑹㑹此日象蓬瀛管弦清旋翻紅袖學飛瓊光陰無暫住歡醉有閒情祝辰星願百千為壽獻瑤觥次句比前多一見字宿霧二句與前詞平仄相反按晏詞三首前後共六用五字對句惟此一聨獨異前後兩樣恐亦不宜作者但學前調可也宴字不叶清字轉叶與前篇及别作異作者亦當依前秋夜月八十二字栁永當初聚散便喚作無由再逢伊面近日來不期而㑹重歡宴向尊前閒暇裏斂著眉兒長嘆惹起舊愁無限盈盈泪眼謾向我耳邊作萬般幽怨奈你自家心下事難見待音信真箇恁别無縈絆不免收心共伊長逺中多㕘差不確觀後尹詞則此篇必有訛脱又一體八十四字尹鶚三秋佳節罥晴空凝碎露茱萸千結菊蕋和烟輕撚酒浮金屑徵雲雨調絲竹此時難輟歡極一片艶歌聲揭黄昏慵别炷沉烟薫繡被翠帷同歇醉並鴛鴦雙枕暖偎春雪語丁寧情委曲論心正切夜深牕透數條斜月此比前詞整齊可學句或曰極字是叶韻二字句余曰照後結該四字兩極字乃以入作平而于片字分句耳況極字不是通篇同韻洞仙歌八十二字或加令字又名羽仙歌吳文英花中慣識壓架瓏璁雪可見湘英間琅葉恨春風將了染額人歸留得箇裊裊垂香帶月鵝兒真似酒我愛幽芳還比荼䕷又嬌絶自種古松根待黄龍亂飛上蒼髯五鬛更老仙添與筆端香敢喚起桃花問誰優劣歴查此調待黄龍句俱用四字惟此詞三字或有脱落亦未可知作者只作四字句可也各家仙字用仄與字作平如此雖或不妨然當從其多者大約此調宜從八十三字之體如竹山于還比句作燭心懸小紅豆乃燭字上落一字克齋于留得箇作捺地二字初寮于更老仙少一更字皆係脫誤非有此等格也又蒲江于首句即用韻起他家所少亦不必從又一體八十三字蘇軾冰肌玉骨自清涼無汗水殿風來暗香滿繡簾開一㸃明月窺人人未寢欹枕釵横髩亂起來攜素手庭戸無聲時見疎星渡河漢試問夜如何夜巳三更金波淡玉繩低轉但屈指西風幾時來又不道流年暗中偷換此乃常用之體而其間句法多有不齊今不能徧錄聊摘採附後以備考擇第二句以自字領句亦有如五言詩者如稼軒大半成新貴是也繡簾開至窺人九字一氣此詞三字豆亦有于五字豆者如竹山此時無一醆此時二字相聨也如稼軒記平沙鷗鷺以一記字領句也欹枕句可七字如竹坡偏守定東風一處是也然此恐誤多一字不宜從之後段起二句可上四字下五字如初寮迎人巧笑道好箇今宵是也然他家無此亦不宜從試問二句可上三下六如劉一止腸斷處天涯路逺音稀是也又可作四字兩句如竹坡病來應怕酒眼常醒是也友古亦有之又試問夜如何可用仄聲住如稼軒任掀天事業是也又可用六字如初寮見淡淨晩粧殘是也至如克齋一首于繡簾開下九字用向曉開簾凌亂重寒光則絶無此體是誤也不可從嘯餘註欹枕釵横髩五字云可用仄平仄仄平字字相反余曰幸而亂字是叶韻不然亦註可平矣危哉又一體八十四字辛棄疾松闗桂嶺望菁葱無路費盡銀鈎榜佳處悵空山嵗晩窈窕誰來須著我醉卧石樓風雨仙人瓊海上握手當年笑許君攜半山去劖疊嶂巻飛泉洞府淒涼又却怕先生多取怕夜半羅浮有時還好長把雲烟再三遮住劖疊嶂二句比前試問句多一字小山東堂皆同又李元膺云記當年得意處亦是六字而上句平下句仄與此不同想不拘也因餘同不錄又阮閱作前結云便江北也何曽慣見比此少一字恐誤不可從又東堂于悵空山嵗晩句用相看露涼時平仄不合他家無之亦不必從又一體八十五字李元膺雪雲散盡放曉晴庭院楊栁於人便青眼更風流多致一㸃梅心相映逺約畧嚬輕笑淺一年春好處不在穠芳小艶疎香最嬌軟到清明時候百紫千紅花正亂巳失春風一半早占取韶光共追遊但莫管春寒醉紅自暖花正亂下比前多巳失二字竹屋蒲江皆同逺字亂字偶合不必叶也山谷于更風流下九字作望中秋纔有九日十分圓共十字友古云但人心堅固後天也憐人亦十字又各不同兹不另錄又一體八十六字吳文英芳辰良宴人日春朝並細縷青絲裹銀餅更玉犀金綵沾座分簮歌圍暖梅靨桃唇鬭勝露房花曲折鶯入新年添箇宜男小山枕待枝上飽東風結子成陰藍橋去還覔瓊漿一飲料别館西湖最情濃爛画舫月明醉袍宮錦待枝上十字同辛詞還覔句六字同李詞刻按嘯餘于八十六字收林外詞今載于左且照舊句字録之以為訂訛之証飛梁壓水虹影清光曉橘里漁村半烟草嘆今來古往物換人非天地裏惟有江山不老雨中風㡌龍四海誰知我月冷波一劍横空幾番過按洞門玉嘶未斷寒歸去也林屋無鎖年年不掃苔認雲屏烟障是吾廬字任滿地蒼按宋林外題此詞于垂虹橋不書姓名人疑仙作傳入禁中孝宗笑曰以鎖字叶老字則鎖當音掃乃閩音也後訪之林果閩人舊草堂收之極為無識然我過鎖林原借用三韻何嘗是更韻如譜註豈不誤使今人錯認可用兩韻乎且一劍句體當七字過字正是叶韻而譜竟罔知註作八字不但使此句多了一字且使此調少了一韻矣況幾番過按如何解說文理乃至如此乎月冷句亦不可作七字當以月冷波寒為一句沈天羽改我為道改過為到圖譜因之而仍不註叶韻則是作譜者到底要使人滅却此一韻而後快也嗚呼豈不怪哉又一體八十七字康與之若耶溪路别岸花無數欲斂嬌紅向人語與綠荷相倚恨囘首西風波淼淼三十六陂烟雨新粧明照水汀渚生香不嫁東風被誰誤遣踟蹰騷客意千里綿綿仙浪逺何處凌波微步想南浦潮生画橈歸正月曉風清斷腸凝竚與綠荷下十字作五字兩句龍川亦有此體若謝勉仲則與綠荷下仍用兩三一四又稍不同又一體八十八字趙長卿廣寒宮殿不在人間世分付天香與巖桂向西風搖曳處數十里知聞金翠裏别有出羣標致東園盛事五畝濃陰芘必以詩書取榮貴況一門三秀才未足欽崇那更是異姓同居兄弟更細把繁英祝姮娥看禹浪飛騰定應來嵗數十里句多一字後段起處同前段亦與他體異芘字應是庇字才字宜仄聲趙詞又有于後結作要趂他橘綠橙黄時候是上用三字豆下用六字句亦稍異潘牥此調題曰羽仙歌于況一門下六字用莫閒愁金杯㶑灔與此詞稍異圖譜不知即洞仙歌另收羽仙歌一調盖數十里二句潘詞作落日平蕪行雲斷幾見花開花謝作譜者誤讀落日平蕪行雲斷為一句又自以為拗因註平字雲字可仄意中口中想竟無洞仙歌聲調在故不覺也又更竒者正集既仍嘯餘之舊收洞仙歌四體而續集又收洞仙歌令即前康詞乃以恨囘首下作八字句以不嫁東風為四字句被誰誤連下遣踟蹰騷客意為九字句且謂意字叶韻千里綿綿仙浪逺為七字句讀至此有不噴飯滿案者乎又一體一百十九字栁永嘉景況少年彼此爭不雨沾雲惹奈傅粉英俊夢蘭品雅金絲帳暖銀屏亞並燦枕輕倚綠嬌紅姹算一笑百琲明珠非價閒暇每只向洞房深處痛憐極寵似覺些子輕孤早恁背人沾灑從來嬌縱多猜訝更對剪香雲深要深心同寫愛印了雙眉索人重画忍負豔冶斷不等閒輕捨鴛衾下願常恁好天良夜此以下三調與洞仙歌全不相涉而字句多有訛錯難以訂定且三詞又是三樣不知何故未敢彊論也此篇只金絲句七字似後段從來句七字若以並燦枕句配更對剪句則後多二字想深要二字是誤多耳算一笑至非價似後愛印了至重畫其餘前後俱不合閒暇二字似後段起句然不應前短後長如此闕疑可也又一體一百二十三字栁永乘興閒泛蘭舟𣺌𣺌烟波東去淑氣散幽香滿蕙蘭江渚綠蕪平畹和風輕暖曲岸垂楊隠隠隔桃花塢芳樹外閃閃酒旗遙舉羇旅漸入三吳風景水村漁浦閒思更逺神京抛擲幽㑹小歡何處不堪獨倚危樓凝情西望日邊繁華地歸程阻空自嘆當時言約無據傷心最苦竚立對碧雲將暮闗河逺怎奈向此時情緒羇旅二字亦似換頭語總有訛錯不敢彊定或曰綠蕪四字對後不堪四字和風四字對後危樓四字情字或是想字之訛曲岸四字對後西望四字隠隠隔三字豆桃花塢三字句對後繁華地三字豆歸程阻三字句芳樹至遙舉對後空自至無據此說亦通然前後亦不合也又一體一百二十六字栁永佳景留心慣況年少彼此風情非淺有笙歌巷陌綺羅庭院傾城巧笑如花面恣雅態明眸囘美盼同心綰算國艶仙材翻恨相逢晩繾綣洞房悄悄繡被重重夜永歡餘共有海約山盟記得翠雲偷剪和鳴彩鳳于飛燕間栁徑花陰攜手遍情眷戀向其間宻約輕憐事何限忍聚散況巳結深深願願人間天上暮雲朝雨長相見繾綣二字亦似後段語此調只傾城至美盼與後和鳴至手遍相似餘亦前後㕘差傾城句似前一百十九字内金絲句而起處佳景少年彼此字亦似相同然他處又别不可比而同之耳長壽樂八十三字栁永花紅殢翠近日來陡把狂心牽繫羅綺叢中笙歌筵上有箇人人可意解嚴妝巧笑次姿則成嬌媚知幾度宻約秦樓盡醉仍攜手眷戀香衾繡被情漸美算好把夕雨朝雲相繼便是仙禁春深御爐香裊臨軒親試對此調句字多訛分段處亦錯後亦必不全無可考矣圖譜何據而論定其可平可仄也迷仙引八十三字栁永才過笄年初綰雲鬟便學歌舞席上尊前王孫隨分相許算等閒酬一笑但千金慵覷常只恐容易瞬華偷換光陰虚度巳受君恩顧好與花為主萬里丹霄何妨攜手同去去永棄却烟花伴侶免教人見妾朝雲暮雨只席上二句與後萬里二句相合餘各不同瞬字應是蕣字第二去字必訛或誤多此一字大約此調定有訛脱處無他詞可証也與迷神引無涉黄鶴引八十三字方失名先逢垂拱不識干戈免田隴士林書圃終年庸非天寵才初闒茸老去支離何用浩然歸算是黄鶴秋風相送塵事塞翁心浮世莊生夢漾舟遙指烟波羣山森動神閒意聳囘首利鞿名鞚此情誰共問幾許淋浪春甕宋方匀泊宅編云先子晩官鄧州于紹聖改元致政歸隠遂為此詞序曰因閱阮田曹所製黄鶴引詞調清髙寄為一闋命稚子歌焉存按方勻父名無可考阮田曹亦未知為誰錄之以其調士林至何用與後漾舟至名鞚同漾應作颺盖取歸去來辭舟搖搖以輕颺也滿路花八十三字二字或加捉拍方千里鶯飛翠栁搖魚躍浮萍破斑斑紅杏子交榴火池臺晝永繚繞花陰裹山色遙供座枕簟清涼北牕時喚髙卧翻思年少走馬銅駝左歸來敲鐙月留闗鎖年華老矣事逐浮雲過今吾非故我那日樽前袛今問有誰呵魚躍下與後走馬下同今吾句宜同前山色句而平仄相反但千里是和周作片玉此詞亦前後各異至金花落燼燈一首則前反用玉人新間濶後反用除共天公說想所不拘耳呵上聲那日樽前二句周用不成也還似伊無箇分别盖此句貫下十字相連可以協于歌板故不妨如此句法所謂通乎音理不必拘也若不能者惟守繩尺為是又一體八十三字秦觀露顆添花色月彩投牕隙春思如中酒恨無力洞房咫尺曽寄青鸞翼雲散無蹤跡羅帳薫殘夢囘無處尋覔輕紅膩白步步薫蘭澤約腕金環重宜裝飾未知安否一向無消息不似尋常憶憶後教人片時存濟不得前起句用韻平仄各異後起句亦用韻俱與前詞不同思字去聲中字如字讀乃平仄平平仄與後約腕句合與周方詞異也譜圖因周詞遂註思可平中可仄不知用周體則依周用秦體則依秦不可互從恨字還宜用平為是恨無力恐亦誤耳又一體八十三字栁永香靨融春雪翠鬟嚲秋烟楚腰纎細正鳳幃夜短偏愛日髙眠起來貪顛俊只恁殘却黛眉不整花鈿有時攜手閒坐偎倚綠牕前温柔情態儘人憐画堂春過悄悄落花天長是嬌痴處尤殢檀郎未教拆了鞦韆用平韻與前調異字此雖以其與他詞另格收列于此然恐有訛處正下舊失二字觀後段人憐二字應是七字句叶韻語顛俊二字誤至兩結各十字則一氣貫下前之上六下四非誤也又一體八十三字呂渭老西風秋日短小雨菊花寒斷雲低古木暗江天星娥尺五佳約悞當年小語憑肩處猶記西園画橋斜月闌干鳥啼花落春信遣誰傳尚容清夜夢小留連青樓何處寶鏡注嬋姢應念紅牋事微暈春山背牕愁枕孤眠此亦用平韻而整齊可從後段只起句換頭餘同又一體八十六字趙師使連枝蟠古木瑞蔭映晴空桃江江上景古今同忙中取靜心地儘從容掃盡荆榛蔽結屋誅茒道人一段家風任烏飛兔走匆匆世事亦何窮官閒民不擾更年豐簟瓢雲水時與話西東真樂誰能識兀坐忘言浩然天地之中前調後起四字此調七字兼増一韻結屋句兀坐句前叶此不叶山谷亦有此詞整齊可學其刻本不分段誤花又按周美成有歸去難一詞與滿路全同故合為一調錄後備証佳歸去難知背地伊先變惡㑹稱停事周邦彦如今約人未看深淺信我委的論長逺好彩無可怨自合教伊推些事後分散宻意都休待說先腸㫁此恨除非是天相念堅心更守未死終須見多少閒磨難到得其間知他做甚頭眼滿園花八十七字一向沉吟久泪珠盈襟袖我當初不合苦撋就慣縱得軟頑見底心先有行待痴心守甚捻著脈子倒把人來僝僽近日來非常羅皂醜佛也須眉皺怎掩得衆人口待收了孛羅罷了從來斗從今後休道共我夢見也不能得勾此調既與前調牌名相似而句法亦多相合前段竟同只多一慣字與甚字耳後段稍異然佛也句罷了句及結處二句俱與前調彷彿故以附于滿路花之後而一枝花尤為脗合故并類列焉一枝花九十字辛棄疾千丈擎天手萬巻懸河口黄金腰下印大如斗任千騎弓刀揮霍遮前後百計千方久似鬭草兒童贏箇他家偏有算枉了雙眉長皺白髪空囘首那時閒說向山中友看邱隴牛羊更辨賢愚否且自栽花栁怕有人來但只道今朝中酒此與滿路花定是一調其後起七字即與前趙詞同彼用平此用仄耳但較多任似看但四個虛字其為同調何疑況調名亦有花字乎鶴冲天八十四字栁永閒牕漏永月冷霜華墮悄悄下簾幙殘燈火再三思往事離魂亂愁腸鎖無語沉吟坐好天好景未省展眉則箇從前早是多成破何況經嵗月相抛嚲假使重相見還得似當初麽悔恨無計那迢迢良夜自家只恁摧挫後段換頭七字起迥别故另列于此按此調名鶴冲天然與喜遷鶯又按此體亦與滿園花相似或亦一調異名也其用字平仄前後稍有不同作者審而自填兹不旁註又一體八十六字杜安世清明天氣永日愁如醉臺榭綠陰濃薫風細燕子巢方就盆池小新荷蔽恰是逍遙際單夾衣裳半攏軟玉肌體石榴美艶一撮紅綃比牕外數脩篁寒相倚有箇闗心處難相見空凝睇行坐深閨裏懶更妝梳自知新來憔悴前後俱同與前詞換頭者異又一體八十八字栁永黄金榜上偶失龍頭望明代暫遺賢如何向未遂風雲便爭不恣遊狂蕩何須論得喪才子詞人自是白衣卿相烟花巷陌依約丹青屏障幸有意中人堪尋訪且恁偎紅倚翠風流事平生暢青春都一餉忍把浮名換了淺斟低唱依約句且恁句各多一字踏青游八十四字周邦彦金勒狨鞍西城嫩寒春曉路漸入垂楊芳草過平堤穿綠徑幾聲啼鳥是處裏誰家杏花臨水依約靚粧斜照極目髙原東風露桃烟島望十里紅圍翠遶更相將乘酒興幽情多少待向晩從頭記將歸去說與鳳樓人道前後段同又有贈妓崔念四一首吳虎臣云政和間士人作都下盛傳詞統載為東坡詞而坡集無之于過平堤下十字作向巫山重重去如魚水只有九字後段則云􅍆三入清齋望永同鴛被雖十字而句法却非兩三一四者殆有誤字不可從也故此譜不收八十三字格蕙蘭芳引八十四字周邦彦寒瑩晩空㸃青鏡斷霞孤鶩對客館深扄霜草未衰更綠倦遊厭旅但夢遶阿嬌金屋想故人别後盡日空疑風竹塞北氍毹江南圖障是處温燠更花管雲牋猶寫寄情舊曲音塵迢逓但勞逺目今夜長爭奈枕單人獨瑩鏡㫁對未更倦厭但夢故後障是處更寄舊逓俱夜奈等字俱用去聲妙絶而瑩下用晚厭下用旅夢下用繞奈下用枕俱去上草未想故寫寄又俱上去且用鏡則上隔字用㸃用館則上隔字用對用管則上隔字用更此種乃詞中抑揚發調之處所以美成為詞壇宗匠而製律造腔稱再世周郎也向讀方氏和詞驚愛其一字不改反閱夢窗集取以相較亦一字不改愈信定格之不可輕亂如此不然填詞亦文人末技有何棘手而古人傳者寥寥哉他調莫不皆然偶于此及之清波引八十四字姜䕫冷雲迷浦倩誰喚玉妃起舞嵗華如許野梅弄眉嫵屐齒印蒼蘚漸為尋花來去自隨秋雁南來望江國𣺌何處新詩謾與好風景長是暗度故人知否抱幽恨難語何時共漁艇莫負滄浪烟雨況有清夜啼猿怨人良苦惟石帚有此調平仄無可証當皆依之然自嵗華以下即與後故人以干字句同至尾少二字耳時字平聲前段齒字上聲上原可作平但斷不可用去聲盖此字或平或上而下以去聲字接之如印字共字故妙勿謂是仄聲而隨意用去也詞中此類甚多不能枚舉亦不能細註髙明熟玩自當得之抱幽恨句與野梅句句法異不拘詞律巻十二
