body:
  text: 詞律卷七宜興萬樹撰鳳來朝五十一字史達祖暈粉就粧鏡掩金閨綵絲未整趂無人學指鴛鴦頸恨誰踏蘚花徑一夢蒲香葵冷墮銀瓶脆繩挂井扇底并團圓影只此是沈郎病整井二字上聲而上用未挂二字去聲妙美成用兩個未字清真集此調于扇底句作待起又如何拚片玉詞又作待起難捨拚今按此詞亦六字則載于清真者為準故不另收五十字一體然玩扇底句上七字句下六字句俱與前段同則此句該如前段趂無人八字豈并字上下有落字乎蓋扇底井三字義理欠明也雨中花五十一字晏殊剪翠粧紅欲就折得清香滿袖一對鴛鴦眠未足葉下長相守莫傍細條尋嫩藕怕緑刺罥衣傷手可惜許月明風露好恰在人歸後後起三句比前段各多一字又一體五十二字歐陽修千古都門行路能使離歌聲苦送盡行人花殘春晚又到東君去醉藉落花吹暖絮多少曲堤芳樹且攜手留連良辰美景留作相思處前後第三句以下與前詞異五按送盡句查各家俱前後段相同此前四後或誤多誤少耳又一體五十四字楊無咎早已是花魁柳冠更絶唱不容同伴畫鼓低敲紅牙隨應著個人勾喚漫引鶯喉千樣囀聽過處幾多嬌怨換羽移宫偷聲減字不怕人腸斷起句七字乃上三下四語氣與他家不同楊共三首知此有刻首句缺早字者非第二句七字畫鼓句換羽句皆四字又一體五十四字程垓聞説海棠開盡了怎生得夜來一笑顰緑枝頭落紅點裏問有愁多少小院間門春悄悄禁不得瘦腰如嫋豆蔲濃時酴醿香處試把菱花照起句七字如七言詩句而前後整齊者又一體五十六字王觀百尺清泉聲陸續映瀟灑碧梧翠竹面千步回廊重重簾幕小枕欹寒玉試展鮫鮹看畫軸是一片瀟湘凝緑待玉漏穿花銀河垂地月上欄杆曲前後第三句俱五字整齊詞圖譜注此為第二體云後段同第一體蓋以前歐為第一也然歐次句六字此七字豈得為同乎又一體五十六字掉或加令字夜行船又名明月孤舟即趙長卿緑鎖窗紗梧葉底麥秋時曉寒慵起宿酒懨懨殘香冉冉渾似那時天氣别日不堪頻屈指回頭早一年不啻搔首無言欄杆十二倚了又還重倚前後結句俱六字此按黃在軒有明月棹孤舟詞逃禪亦有四首俱與趙詞一字無異汲古注云向誤作夜行船今按譜正之改為明月棹孤舟蓋逃禪四詞載于雨中花之後夜行船之前故毛氏以為訂正如此也不知此調即是夜行船試將四詞與他處夜行船對校無不相同必因夜行船三字而以明月代夜字棹代行字孤舟代船字也是則夜行船與明月棹孤舟為一調無疑矣而觀此趙詞則夜行船亦即雨中花令今恐人致疑將夜行船長短數調俱列于後龜夜行船輕裊甲爐煙簾櫳靜乳鴉啼曉趙長卿粧拂掠新時宜頭面中繡草冠兒小雙丸衫子揉藍初著了朵身材稱就恰好手撚菱花重照帶宜男草五十三字與前楊詞同此短又一體排辦了棹輕舟歌聲斷晚霞殘照趙長卿坡頭紅蓼緑楊堤外來離恨知多少譙門别後莫教音信杳嘆光隂自堪笑畫角槐溪歸路正是楚天曉十四字與前程詞同此五鴉又一體歸逺樹帶斜陽無人聽數聲鐘暮吳文英愁長日與路心灰香斷夢月冷竹房扄戶西池畫扇青山吳苑傍懷袖飛不去憶别紅綃盛泪腸斷粉蓮啼露字與前趙詞同此五十六其外夜行船尚有又字句異者亦并載入以憑考證一體趙長卿泪眼江頭看錦樹扁别離又還秋暮江細水浮浮輕風冉冉穩送舟去歸去山應得助新詩定須多賦人句有雁南來槐溪千萬寄我驚又此五十二字前後整齊次句六字前晏歐有之一體石孝友漏永迢迢清夜月露華濃洞房寒乍念愁人早是不成眠奈無端窺窗罅心心念都緣那被相思悶損人也今權罷寃家你若不知人這歡娛自此五十五字可露華濃等四句上三字可作平平仄寃家句作仄仄平平平平仄此句七字又前宴體有之一體歐陽修憶昔西都歡縱舊自别後有誰能共日伊川山水洛川花細尋思遊如夢記今相逢情愈重殢愁聞唱畫樓鐘動誰相送白髮天涯逢此景倒金尊又此亦五十六字而後起八字者一體趙長卿緑蓋紅幢籠碧水聲漁跳處浪痕勻碎一惜别殷勤留連無計歌與泪和柔脆葉扁舟煙浪裏雲曲灘頭此情無際雨想翠峯十二窈窕眉山暮霞紅處此五十八字雨中花慢九十六字京鏜玉局祠前銅壺閣畔錦城藥市爭奇正紫茰綴席黃菊浮巵巷陌連鑣共轡樓臺吹竹彈絲登髙望逺一年好景九日佳期自憐行客猶對嘉賔留連豈是貪癡誰會得心馳北闕興寄東籬惜别未催鷁首追歡且醉蛾眉明年此會他鄉今日總是相思綴共北鷁字不可用平未字用平方佳于圖譜既收稼軒馬上三年一首作雨中花慢矣又續譜收此調作雨中花淆訛重復真不可解而後起次句作六字又因嘉賔留連四字皆平遂注嘉字連字可仄真無可奈何矣又一體九十七字辛棄疾舊雨常來新雨不來佳人偃蹇誰留幸山中芋栗今嵗全收貧賤交情落落古今吾道悠悠怪新來却見文友離騷詩發秦州功名只道無之不樂那知有更堪憂怎奈向兒曹抵死喚不回頭石卧山前認虎蟻喧床下聞牛為誰西望憑欄一餉却下層樓前段新雨句後段無之句俱與京詞平仄異怪新來句比前多一怪字按稼軒又于無之句作有酒盈樽與京詞同惜香于幸山中二句作倚欄無語羞辜負年華想皆不拘以其句字同不另録竹屋于幸山中句作六字其餘皆同兹亦不録又一體九十八字蘇軾今嵗花時深院盡日東風蕩揚茶煙但有緑苔芳草栁絮榆錢聞道城西長廊古寺甲第名園有國艷帶酒天香染袂為我留連清明過了殘紅無處對此淚灑樽前秋向晚一枝何事向我依然髙會聊追短景清商不暇餘妍不如留取十分春態付與明年起處與前詞不同或云可以讀作兩四一六若聞道至名園十二字前詞作兩句相對此則作三句單行全不侔矣後段髙會二句又仍作偶語未審何也又一體九十八字秦觀指點虛無征路醉乘斑虯逺訪西極見天風吹落滿空寒皇女明星迎笑何苦自淹塵域正火輪飛上霧捲煙開洞觀金碧重重觀閣橫枕鼇峯水面倒銜蒼石隨處有奇香幽火杳然難測好是蟠桃熟後阿環偷報消息在天碧海一枝難遇占取春色此用仄聲韻虯字即虬字韻舊刻見天風八字句余細玩之寒字下應有一叶字而落去耳此二句正同前辛詞幸山中九字也後段舊刻在天碧海無理余謂亦有一青字此句五字與前正火輪句同也因一時無秦集可查姑記于此又一體一百字柳永墜髻慵梳愁蛾懶畫心緒是事闌珊覺新來憔悴金縷衣寬認得這疏狂意下向人誚譬如間把芳容陡頓恁地輕孤爭忍心安依前過了舊約甚當初賺我偷剪香鬟幾時得歸來香閣深關待伊要尤雲殢雨纒鴛衾不與同歡儘更深款款問伊今後更散無端認得這兩句即後待伊要兩句該十四字今少一字且難解恐冇誤耳儘更深下照前該在款款斷句而語氣則該更深處略豆總之一氣貫下不拘也望江東五十二字黃庭堅江水西頭隔煙樹望不見江東路思量只有夢來去更不怕江欄住燈前寫了書無數算沒個人傳與直饒尋得雁分付又還是秋將暮前後字句同只後起平仄與前起異漢沈氏云此調用平韻即醉紅粧可笑兩者相去河寧得牽合夢來去雁分付皆去平去乃此調定格圖譜以雁字可平既差而末句落去還字竟注作五字句則更甚矣醉花陰五十二字李清照薄霧濃氛愁永晝瑞腦噴金獸佳節又重陽寶枕紗廚半夜秋初透東籬把酒黃昏後有暗香盈袖莫道不消魂簾捲西風人比黃花瘦有暗香句以有字領句與瑞腦句語氣異然查各家如稼軒東堂逃禪等前後皆用瑞腦句法後段起句與前段起句平仄相反東堂亦然餘家前後俱用東籬句法因字同韻同不另立體圖譜謂兩結皆九字而紗字西字可仄何也竟沈氏選詞首句云似忘似變似無已寶枕二句云不念人約梅花香裏後起云相望相思窗遍倚莫道句云願風將此意末二句云背人吹入他合歡杯底如此平仄句法謂是醉花陰沈氏亟賞之密圈到底且加雙層圈嗚呼此豈有目者耶入塞五十二字程垓好思量正秋風半夜長奈銀釭一點耿耿背西窗衾又涼枕又涼露華淒淒月半牀照得人真個斷腸窗前誰浸木犀黃花也香夢也香或云釭字亦是叶韻而一點下為七字句與後結同未知果否然如此則未免穿鑿也青門引五十二字張先乍暖還輕冷風雨晚來方定庭軒寂寞近清明殘花中酒又是去年病樓頭畫角風吹醒入夜重門靜那堪更被明月隔牆送過秋千影輕字譜作乍字注可平不知何據圖譜合前結為九字無謂中字本平聲徐邈中聖人對魏武曰臣今時復一中之是也圖譜讀作去聲反云可平誤矣前沈氏選明詞于那堪下二句云口脂紅逗鸚鵡窗難數春歸恨作兩四一五如此選詞尚可謂知詞者乎鋸解令五十二字楊無咎送人歸後酒醒時睡不穩衾翻翠縷應將别泪灑西風盡化作斷腸夜雨卸帆浦溆一種悽惶兩處尋思却是我無情便不解寄將夢去結二句前後同木蘭花五十二字毛熙震掩朱扉鈎翠箔滿院鶯聲春寂寞勻粉泪恨檀郎一去不歸花又落對斜暉臨小閣前事豈堪重想著金帶冷畫屏幽寶帳慵薰蘭麝薄前後同又一體五十四字魏承班小芙蓉香旖旎碧玉堂深情似水閉寶匣掩金鋪倚屏拖袖愁如醉遲遲好景煙花媚曲渚鴛鴦眠錦翅凝然愁望靜相思一雙笑靨嚬香蕊前段與前詞同只倚屏句平仄異耳圖譜竟注同前體誤後段四句七字乃大異又一體五十五字韋莊獨上小樓春欲暮愁望玉關芳草路消息斷不逢人却斂細眉歸繡戶坐看落花空嘆息羅袂濕斑紅淚滴千山萬水不曽行魂夢欲教何處覓前後兩韻只第三四句用三字餘俱七字圖譜云後段同魏詞誤魏後起句尾句平仄與此皆反安得云同又一體五十六字又名玉樓春牛嶠春入橫塘搖淺浪花落小園空惆悵此情誰信為狂夫恨翠愁紅流枕上小玉窗前瞋燕語紅泪滴穿金線縷雁歸不見報郎歸織成錦字封過與前後兩韻而第三句仍用七字者過字恐誤作者于惆字用仄過字用平可也又一體五十六字惜春容又名春曉曲葉夢得花殘却似春留戀幾日餘香吹酒面溼煙不隔栁條青小雨池塘初有燕波光縱使明如練可奈落紅紛似霰解將心事訴東風只有啼鶯千種囀前後俱七字四句此宋體也者按唐詞木蘭花如前所列四體是矣其七字八句名玉樓春至宋則皆用七言而或名之曰玉樓春或名之曰木蘭花又或加令字兩體遂合為一想必有所據故今不立玉樓春之名而載注前三體之後蓋恐另立玉樓春則如此葉詞無所附而體同名異不成畫一耳按唐玉樓春如家臨長信往來道等句中平仄不拘顧敻魏承斑為有紀律然不如宋人平仄整齊蓋首句第二字用平次句第二字用仄三平四仄五平六仄七平八仄是有定格可從也其顧魏詞惟于前後第三句第二字用平餘六句第二字皆仄而魏詞後起叶韻顧詞後起用仄聲而不叶韻又自不同今不備録者因此調雖宋人合之曰木蘭花而本譜不敢以唐之玉樓春改名木蘭花也若欲作顧魏唐腔仍名曰玉樓春可耳六按步蟾宮亦五十六字八句每句七字然第二四八句皆上三下四不可為圖譜等書混列所誤減字木蘭花四十四字呂渭老雨簾髙捲芳樹陰陰連别館涼氣侵樓蕉葉荷枝各自秋前溪夜舞化作驚鴻留不住愁損腰肢一桁香銷舊舞衣四段四換韻偷聲木蘭花五十字張先雲籠瓊苑梅花瘦外院重扉聨寶獸海月新生上得髙樓沒奈情簾波不動銀釭小今夜夜長爭得曉欲夢荒唐祇恐覺來添斷腸前後起句七字與前異木蘭花慢一百一字蔣捷傍池闌倚遍問山影是誰偷但鷺斂瓊絲鴛藏繡羽礙浴妨浮寒流暗衝片響似犀椎帶月靜敲秋因念涼荷院宇粉丸曽泛金甌粧樓曉澀翠罍油倦鬢理還休更有何意緒憐他半夜瓶破梅愁紅稠泪乾萬點待穿來寄與薄情收只恐東風未轉誤人日望歸舟此調作者如林至竹山此詞規矩森然可謂毫髮無憾矣首句傍字領句下用兩平兩仄此正格也他如稼軒老來情味減亦平仄不礙若花庵鶯啼啼不盡之鶯字竹齋問功名何處之何字畢竟不如仄聲故不旁注可平而鶯啼不以一字領句他家無之不可從也寒流暗衝片響必用平平仄平仄仄紅稠句亦同而暗片泪萬去聲尤妙但細觀古人名作莫不皆然院宇之院未轉之未亦妙此字間有用平者然不如用仄片響萬點用去上甚為發調觀其又一首作自老片腦可見流字稠字乃藏短韻于句中亦他人所不能及惟夢窗有之圖譜乃于流字注可仄真可嘆也粧樓亦必須叶韻方是猶之滿庭芳後起二字雖有不叶者然不如依此蓋作詞本求推敲精當若可援以自恕執以自辨則但須閣筆誰來相強既欲求廁于作者之林而不肻稍費心力竟率焉脫稿不思取法乎上耶又按海野于似犀椎八字作繁華清勝兩兩無窮此誤也不可從又一體一百一字黃機政征塵滿野問誰與作堅城有老子行年平頭六十無限聲名向來試陳大略便羣兒啁唽耳邊鳴爭識規模先定破羌終屬營平吾心惟有忠誠羞媚嫵做逢迎謂干戈鋒鏑動關民命此不宜輕聽渠自分勇怯奈何他天地若持衡只把從前不殺也應換得長生後起六字一句三字兩句與前調異竹齋又一首云神仙之説朦朧鉛與汞亦何功同此而夢窗蒲江亦有此體尋芳草五十二字又名王孫信辛棄疾有得許多泪更間却許多鴛被枕頭兒放處都不是舊家時怎生睡更也沒書來那堪被雁兒調戲道無書却有書中意排幾個人人字此調只後起用平聲不叶與前稍異餘句皆同沈氏及圖譜誤以枕頭兒放處作五字都不是舊家時作六字怎生睡作三字怪極豈意必欲使學者失填一韻耶夫前後段字句一樣明若列眉且是字端端正正叶韻有何難辨而偏如此注也醉紅妝五十二字張先瓊林玉樹不相饒薄雲衣細栁腰一般妝樣百般嬌眉兒秀總如描東風搖草雜花飄恨無計上青條更起雙歌郎且飲郎未醉有金貂前後字句同只更起句用仄不叶雙雁兒五十二字楊無咎窮陰急景暗推遷減緑鬢損朱顔利名牽役幾時間又還驚一嵗圓勸君今夕不須眠且滿滿泛觥船大家沈醉對芳筵願新年勝舊年按此調或云即醉紅籹考其後段大家沈醉句乃叶韻者醉紅籹此句用仄聲不叶未必是一調也今兩列之玉團兒五十二字周邦彥鉛華淡濘新粧束好風韻天然異俗彼此知名雖然初見情分先熟爐煙淡淡雲屏曲睡半醒生香透肉賴得相逢若還虛度生世不足前後段同分字世字不可平聲盧炳詞亦然成按此詞又載惜香樂府內然據盧炳注云是和美韻則知此是周作矣傾杯令五十二字呂渭老楓葉飄紅蓮房肥露枕席嫩涼先到簾外蟾華如掃枝上啼鴉催曉秋風又送潘郎老小窗明疏螢淺照登髙送逺惆悵白髮至今未了或謂悵字恐誤應同前掃字叶韻不知呂别作亦前叶後否也傾杯樂九十四字栁永樓鎖輕煙水橫斜照遙山半隱愁碧片帆岸逺行客路杳簇一天寒色楚梅映雪數枝艷報青春消息年華夢促音信斷聲逺飛鴻南北算伊别來無緒翠銷紅減雙帶長拋擲但泪眼沈迷看朱成碧惹間愁堆積雨意雲心酒情花態辜負髙陽客又一體九十五字栁永離宴殷勤蘭舟凝滯看看送行南浦情知道世人難使皓月長晝彩雲鎮聚人生悲莫悲於輕别最苦正歡娛便分鴛侣泪滴瓊臉梨花一枝春帶雨慘黛别臨行猶自再三問道君須厺頻耳畔低語知多少他日深盟平生丹素從此盡把憑鱗羽以上二調字句參差栁集最訛莫可訂正次首尤多錯亂分句未確且長調應分兩段原刻如右姑仍之又一體一百四字栁永木落霜洲雁橫煙渚分明畫出秋色暮雨乍歇小楫夜泊宿葦村山驛何人月下臨風處起一聲羌笛離愁萬緒聞岸草切切蛩吟如織為憶芳容别後水遙山逺何計憑鱗翼想繡閣深沈爭知憔悴損天涯行客楚峽雲歸髙陽人散寂寞狂蹤迹望京國空目斷逺峯凝碧此首較明據此則前樓鎖輕煙一首是于末處遺缺望京國以下十字而此闋照前則當在如織下分段耳爭知二句人皆讀上五下四不知此與前看朱二句相同乃上四下五損天涯行客正如惹間愁堆積是以惹字損字領句也前詞簇一枝寒色報青春消息此篇前段宿葦村山驛起一聲羌笛皆上一下四句法其何計寂寞二語與前詞雙帶辜負二語乃如五言詩句耳詞中五字句最易淆訛而此爭知憔悴損像五字一句尤易誤讀故詳注于此他詞皆可類推又一體一百六字楊無咎瑞日凝暉東風解凍峭寒猶淺正池館梅英粉淡栁枝金軟蘭芽香暖滕城誰種芙蕖滿浸銀蟾影一夜萬花開遍翠樓朱戶是處重簾競捲羅綺簇歡聲一片看五馬行春旌旆逺擁襦袴千里歌謠都入太平絃管且莫厭瑶觴屢勸聞鳳詔催歸非晚願嵗嵗今夜裏端門侍宴此詞整齊查栁詞亦有此百六字調字句正與此同學者可從也程珌曽覿俱同此格只曽詞于翠樓句上多一仄字因其餘皆同不另録旁可平可仄俱取栁程曽三詞對注但程尾句云來嵗却笑羣仙月寒空冷上六字平仄不同或亦不拘但查楊詞本步趨栁作如前結栁云是處層城閬苑後結栁云願嵗嵗天仗裏常瞻鳳輦楊俱依樣畫之而曽云但殢飲香霧捲壺天不夜亦軌轍相符固知淵源矩矱如此學者但遵此三公可耳必又按浸銀蟾影程作迤邐笙歌與栁楊曽異亦不從此四字乃銀蟾二字相連者栁云聳皇居麗曽云杳旗亭路三匂一般所宜遵效可異者栁云聳皇居麗佳氣瑞煙蔥蒨嘯餘不識竟注聳皇居三字句麗佳氣三字句瑞煙蔥蒨四字句可笑圖譜沈氏因之然則楊詞可以浸銀蟾為一句影一夜為一句乎且將佳氣瑞煙四字拆開分屬上下試問麗佳氣三字有此文理否而願嵗嵗全注可平尤奇又一體一百七字原題作古傾杯栁永凍水消痕曉風生暖春滿東郊道遲遲淑景煙和露偏潤長堤芳草斷鴻隱隱歸飛江天杳杳遙山變色粧眉淡掃目極千里間倚危檣迥眺動幾許傷春懷抱念何處韶陽偏早想帝里看看名園芳榭爛熳鶯花好追思往昔年少繼日恁把酒聽歌量金買笑别後頓負光陰多少字句又異前數篇注亦未確又一體一百八字傾杯二字原題止作栁永水鄉天氣灑蒹葭露結寒生早客館更堪秋杪空階下木葉飄零颯颯聲乾狂風亂掃當無緒人靜酒初酲天上征鴻知送誰家歸信穿雲悲叫蛩響幽窗風窺寒硯一點銀釭間照夢枕頻驚愁衾半擁萬里歸心悄悄往事追思多少贏得空使方寸撓斷不成眠此夜厭厭就中難曉姑注未確又一體一百八字栁永金風淡蕩漸秋光老清宵永小院新晴天氣輕煙乍斂皓月當軒練淨對千里寒光念幽期阻當殘景早是多愁多病那堪細把舊約前歡重省最苦碧雲信斷仙鄉路杳歸鴻難倩每髙歌強遣離懷奈慘咽翻成心耿耿漏殘露冷空贏得悄悄無言愁緒終難整又是立盡梧桐清影又與前異是按金風起至練淨似是一段對千里起至重省似一段蓋兩段相比而對字為換頭領句且漸秋光老句法正與念幽期阻同是則此調應分三段然天氣不叶韻亦不敢確以為然也又一體一百十六字栁永皓月初圓暮雲飄散分明夜色如晴晝漸消盡醺醺殘酒危樓迥涼生襟袖追舊事一餉憑欄久如何媚容艷態底死孤歡偶朝思暮想自家空恁添清瘦算到頭誰與伸剖向道我别來為伊牽繫度嵗經年偷眼覷也不忍覷花栁可惜恁好景良宵未曽略展雙眉暫開口問甚時與你深憐痛惜還依舊調更長句亦更亂愈難分晰矣強以上惟一百六字可學餘但臚列以備體格不能為論定也或云栁集一百六字禁漏花深一首屬仙呂宮皓月金風二首屬大石調木落一首屬雙調樓鎖凍水離宴三首屬林鐘商水鄉一首屬黃鐘調因調異故曲異也然又有同調而長短大殊者總之世逺音亡字訛書錯祇可闕疑而巳引駕行五十二字朝補之梅梢瓊綻東君次第開桃李痛年年好風景無事對花垂泪園裏舊賞處幽葩柔條一一動芳意恨心事春來間阻憶年時把羅袂雅戲此調有不可解處人皆讀舊賞處為句幽葩柔條為句一一動芳意為句然照後詞則當于幽葩斷為五字柔條連下為七字或曰雅戲二字為結則園裏二字亦應屬之前段蓋以柔條七字對前東君七字也而恨心事句比痛年年句多一字憶年時六字句法與無事句稍異且查後栁詞則此説非是明矣愚謂此五十二字與栁之前半適同恐此只引駕行之半曲耳或曰此如王晉卿之燭影搖紅本是小令分二段而後人又加一疊者愚謂朝栁同時又非此例可比總之此詞或逸去後段決非全璧世逺調湮又作者甚少無可考矣又一體一百字栁永虹收殘雨蟬嘶敗栁長堤暮背都門動銷黯西風片帆輕舉愁覩泛畫鷁翩翩靈鼉隱隱下前浦忍回首佳人漸逺想髙城隔煙樹幾許秦樓永晝謝閣連宵竒遇算贈笑千金酬歌百琲盡成輕負南顧念吳邦越國風煙蕭索在何處獨自箇千山萬水指天涯厺前段與朝全篇同是則幾許二字即前雅戲二字宜屬于前尾者蓋前詞既然後所載一首亦用銷凝二字于末雖用平韻而體格則相似耳吳邦越國疑是越國吳邦此四字即前畫鷁翩翩也又一體一百二十五字栁永紅塵紫陌斜陽暮草長安道是誰人斷魂處迢迢匹馬西征新晴韶光明媚輕煙淡薄和氣暖望花村路隱映搖鞭時過長亭愁生傷鳳城仙子别來千里重行行又記得臨岐泪眼溼蓮臉盈盈銷凝花朝月夕最苦冷落銀屏想媚容耿耿無限屈指已算回程相縈空萬般思憶爭如歸去覩傾城向繡幃深處並枕説如此牽情用平韻此調更難核訂自首起至西征方起韻無此詞格或云人字是韻無理不確也和氣下更有訛字村字作叶亦未必確然且前段比前詞多二十餘字其訛無疑只自搖鞭至盈盈與後屈指至末確是相合耳噫引駕行有此三詞長短平仄俱備而不能訂正殊怏怏也天下樂五十三字楊無咎雪後雨兒雨後雪鎮日價長不歇今番為寒忒太切和天地也來厮鱉睡不著身心自暗攧況味頻誰説枕衾冷得渾似鐵祇心頭些箇熱他無作者莫可訂正望逺行五十三字李珣露滴幽庭落葉時愁聚蕭娘栁眉玉郎一去負佳期水雲迢遞雁書遲屏半掩枕斜欹蠟泪無言對垂吟蛩斷續漏頻移入窗明月鑒空帷後起換頭兩句餘同又一體五十五字南唐後主碧砌花光照眼明朱扉長日鎮長扄餘香欲去夢難成爐香煙冷自亭亭遼陽月秣陵砧不傳消息但傳情黃金臺下忽然驚征人歸日二毛生前第二句後第三句俱七字與前異除兩起韻餘六句平仄皆同又一體六十字韋莊欲别無言倚畫屏含恨暗傷情謝家庭樹錦雞鳴殘月落邊城人欲别馬頻嘶緑槐千里長堤出門芳草路萋萋雲雨别來易東西不忍别君後却入舊香閨前後兩用平韻雲雨句拗然此調惟有此詞無可校勘想應如是耳圖譜以别來别字為可平無妨乃以東為可平則自我作古矣又一體七十六字黃庭堅自見來虛過却好時好日這訑尿粘膩得處煞是律據眼前言定也有十分七八寃我無心除告佛管人間底且放我快活冔便索􅞫别茶祇待又怎不遇偎花映月且與一斑半點只怕你沒丁香核後山謂今詞家惟黃九秦七此語大不可解樂府或用諺語詩餘亦多俳體然未有如此可笑者即云是當時坊曲優伶之言而至此俗褻如何可入風雅乎且經傳訛巳久字畫亦差愈為無理姑存其字數于此然亦未審其字數確否也涪翁詩故為聱牙當時宗尚西江故俎豆之為鼻祖實則原非大雅正傳更以此手為詞尤覺了無佳處詞綜云于黃作去取特嚴未肻深論愚則有所不耐矣又一體一百四字栁永繡幃睡起殘粧淺無緒勻紅鋪翠藻井凝塵金階鋪蘚寂寞鳳樓十二風絮紛紛煙蕪苒苒永日畫欄沈吟獨倚望逺行南陌春殘悄歸騎凝睇消遣離愁無計但暗擲金叉買醉好景空飲香醪爭奈轉添珠泪待伊遊冶歸來故故解放翠羽輕裙重繫見纎腰圖信人憔悴此詞前後參差恐有錯訛不如後一百六字者整齊可從又一體一百六字栁永長空降瑞寒風剪淅淅瑤華初下亂飄僧舍密灑歌樓迤邐漸迷鴛瓦好是漁人披得一簔歸厺江上晚來堪畫滿長安髙却旗亭酒價幽雅乘興最宜訪戴泛小棹越溪瀟灑皓鶴奪鮮白鷴失素千里廣鋪寒野須信幽蘭歌斷同雲收盡别有瑤臺瓊榭放一輪明月交光清夜按亂飄密灑二句用鄭谷詩皓鶴白鷴二句用謝靈運賦此正前後相對處其平仄自宜合轍今前則先舍字仄後則先鮮字平未知應何所從余曰此調通用仄音玩其聲響不應以平字居下此必密灑句在上或因美成女冠子亦用此二語遂相襲而訛刻耳上字各譜訛山字榭字汲古嘯餘沈際飛草堂詞及填詞圖譜等俱訛樹字因使句拗韻失而圖譜踵嘯餘之謬前結則注九字後結則注一五一四皆未經讐勘并不知較對前後相同處也紅窗睡五十三字又名紅窗聽栁永如削肌膚紅玉瑩舉動有許多端正二年三嵗同鴛寢表溫柔心性别後無非良夜永如何向名牽利役歸期未定算伊心裏却寃人薄幸汲古刻樂章瑩字下多一峰字誤聽珠玉詞名紅窗聽然睡字有理必誤作也東坡引五十三字趙師使相看情未足離觴已催促停歌欲語眉先蹙何期歸太速如今去也無計追逐怎忍聽陽關曲扁舟後夜灘頭宿愁隨煙樹簇愁隨煙樹簇巳催促用仄平仄坦庵三首稼軒二首惜香一首皆同計字仄坦庵三首皆同餘家用平此調前結不用疊句又一體五十八字趙長卿茅齋無客至冰硯凍寒泚南枝喜入新詩裏惱人頻嚼蕊惱人頻嚼蕊因思去臘江頭醉倚動客興傷春意經年自嘆人如寄光陰如撚指光陰如撚指前後結俱疊句硯字仄聲江頭醉倚句與前稍異又一體五十九字辛棄疾玉纎彈舊怨還敲繡屏面清歌自送西風雁雁行吹字斷雁行吹字斷夜深拜半月瑣窗西畔但桂影空階滿翠帷自掩無人見羅衣寬一半羅衣寬一半後起用五字譜圓謂後第二句五字而于夜深拜半讀斷無論後有半字此不宜重叶不知拜何以半真笑府也又一體五十九字辛棄疾花梢紅未足條破驚新緑重簾下遍欄干曲有人春睡熟有人春睡熟鳴禽破夢雲偏目蹙起來香腮褪紅玉花時愛與愁相續羅裙過半幅羅裙過半幅起來句用七字驚字用平惟此一首為然過平聲於中好五十四字楊無咎濺濺不住溪流素憶曽記碧桃紅露别來寂寞朝朝暮恨遮斷當時路仙家豈解空相誤嗟塵世自難知處而今重與春為主儘浪蕊浮花妒前後同楊又一首自難知處作兩葉飛墜葉字乃作平用勿誤可仄也按夀域有端正好詞四首與此句法俱同雖其用字四首中亦自平仄各異而其為一調則無疑蓋題名俱有一好字必同調也今録一闋于後以為覽者折衷焉檻端正好霑秋露韻天微冷菊愁煙雙燕辭杜安世明空去月照别離苦望透素光長穿朱戶箋寫夜來西風雕寒樹憑欄迢遙路花就此情緒特傳寄其知何處平仄注之可見即為於中好矣此據四首中本譜于調同名異者俱歸併一名此體恐人因杜詞多拗句疑别是一調故載此備證若月照梨花惜雙雙令等比原調多一二字者則仍大字書之不在此例又按周竹坡有憶王孫一詞字句與此合只前後第三句用平字不叶韻不可誤認為一調紅羅襖五十四字周邦彥畫燭尋歡去羸馬載愁歸念取酒東壚樽罍雖近採花南圃蜂蝶須知自分袂天濶鴻稀空懷乖夢約心期楚客憶江蘺算宋玉未必為秋悲懷乖二字恐有誤或只一懷字或只一乖字或更有脫字耳戀繡衾五十四字吳文英頻摩書眼怯細文小窗陰天氣似昏獸爐暖慵添困帶茶煙微潤寶薰少年嬌馬西風冷舊春衫猶涴酒痕夢不到梨花路斷長橋無限暮雲首句拗體乃此調定格夢窗稼軒竹山皆同陳允平緗桃紅淺栁褪黃銀鴛金鳳畫暗消亦然惟放翁作不惜貂裘換釣篷裘字用平耳至詞統所選李太古橘花風信滿園香園字作平大謬蓋此調聲響每句俱于叶韻上一字用仄聲豈可作園字乎前後第二第四句末四字用平仄仄平乃是定格如此方為戀繡衾也如此詞無限暮雲暮字不可不仄暮字用仄則無字不可不平此歌聲頓挫處至理存焉譜圖不識槩注可作仄仄平平試于四處俱作仄仄平平尚可謂之戀繡衾乎又獸爐暖夢不到二句皆三字豆者譜總作六字句誤人不少字按竹山舊金小袖花下行一首于夢不到句止五稼軒長夜偏冷添被兒一首于獸爐暖句作七字此皆誤也故不另列詞律卷七
